<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>CS 채팅</title>
<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
.chat-wrapper { width:60%; margin:30px auto; }
.chat-title { font-size:24px; font-weight:bold; margin-bottom:20px; }
.user-row { margin-bottom:10px; display:flex; gap:6px; }
.chat-box { width:100%; height:400px; background:#fff; border:1px solid #ccc; overflow-y:auto; padding:10px; }

.msg { margin:10px 0; padding:10px; border-radius:10px; max-width:70%; }
.me { background:#cfe5ff; margin-left:auto; }
.other { background:#eee; margin-right:auto; }

#msg { width:100%; height:70px; margin-top:10px; }
button { margin-top:6px; padding:6px 14px; }
</style>
</head>

<body>

<div class="chat-wrapper">
<div class="chat-title">CS 채팅</div>

<div class="user-row">
<select id="team">
<option value="">선택</option>
<option>꿈비</option>
</select>

<input id="name" placeholder="이름">
</div>

<div id="chat" class="chat-box"></div>

<textarea id="msg"></textarea>
<button id="sendBtn" onclick="send()">전송</button>

</div>

<script>
const SERVER = "https://adaptable-expression-production-ba28.up.railway.app";

/* 🔥 핵심 수정: 전역 함수 */
window.send = async function () {

    console.log("전송 클릭됨");

    const team = document.getElementById("team").value.trim();
    const name = document.getElementById("name").value.trim();
    const msgBox = document.getElementById("msg");
    const msg = msgBox.value.trim();

    if (!team || !name) {
        alert("소속/이름 입력");
        return;
    }

    if (!msg) return;

    const res = await fetch(SERVER + "/send", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name: team + " " + name,
            message: msg
        })
    });

    msgBox.value = "";
};

/* 엔터 전송 */
document.getElementById("msg").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        e.preventDefault();
        send();
    }
});
</script>

</body>
</html>
