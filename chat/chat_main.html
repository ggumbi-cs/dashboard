<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>CS 채팅</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
}

.chat-wrapper {
    width: 60%;
    margin: 30px auto;
}

.chat-title {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 20px;
}

.user-row {
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
}

.user-row select,
.user-row input {
    height: 30px;
    padding: 4px 8px;
    font-size: 14px;
}

.chat-box {
    width: 100%;
    height: 400px;
    background: #fff;
    border: 1px solid #ccc;
    overflow-y: auto;
    padding: 10px;
    box-sizing: border-box;
}

.msg {
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 70%;
    word-break: break-all;
}

.me {
    background: #cfe5ff;
    margin-left: auto;
}

.other {
    background: #eee;
    margin-right: auto;
}

.name {
    font-size: 12px;
    color: #555;
    margin-bottom: 3px;
}

.time {
    font-size: 11px;
    color: #888;
    text-align: right;
    margin-top: 3px;
}

#msg {
    width: 100%;
    height: 70px;
    margin-top: 10px;
    resize: none;
    font-size: 14px;
    padding: 8px;
    box-sizing: border-box;
}

#msg:disabled {
    background: #eee;
    color: #888;
    cursor: not-allowed;
}

button {
    margin-top: 6px;
    padding: 6px 14px;
    font-size: 14px;
    cursor: pointer;
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

#version {
    position: absolute;
    top: 10px;
    right: 20px;
    font-size: 12px;
    color: #888;
}
</style>
</head>
<body>

<div id="version">수정버전 : 2026/04/22 15:30:00</div>

<div class="chat-wrapper">
    <div class="chat-title">CS 채팅</div>

    <div class="user-row">
        <label for="team">소속:</label>
        <select id="team">
            <option value="꿈비" selected>꿈비</option>
            <option value="에르모어">에르모어</option>
            <option value="가이아">가이아</option>
        </select>

        <label for="name">이름:</label>
        <input id="name" type="text" value="심우승">
    </div>

    <div id="chat" class="chat-box"></div>

    <textarea id="msg" placeholder="메시지 입력"></textarea>

    <br>
    <button type="button" id="sendBtn" onclick="send()">전송</button>
</div>

<script>
const SERVER = "https://adaptable-expression-production-ba28.up.railway.app";

function setVersion() {
    const d = new Date();
    const version =
        d.getFullYear() + "/" +
        String(d.getMonth() + 1).padStart(2, "0") + "/" +
        String(d.getDate()).padStart(2, "0") + " " +
        String(d.getHours()).padStart(2, "0") + ":" +
        String(d.getMinutes()).padStart(2, "0") + ":" +
        String(d.getSeconds()).padStart(2, "0");

    document.getElementById("version").innerText = "수정버전 : " + version;
}
setVersion();

function getFullName() {
    const team = document.getElementById("team").value.trim();
    const name = document.getElementById("name").value.trim();
    return (team + " " + name).trim();
}

function checkLock() {
    const team = document.getElementById("team").value.trim();
    const name = document.getElementById("name").value.trim();
    const msgBox = document.getElementById("msg");
    const sendBtn = document.getElementById("sendBtn");

    if (!team || !name) {
        msgBox.disabled = true;
        msgBox.placeholder = "소속 및 이름 입력 후 사용 가능";
        sendBtn.disabled = true;
    } else {
        msgBox.disabled = false;
        msgBox.placeholder = "메시지 입력";
        sendBtn.disabled = false;
    }
}

function escapeHtml(text) {
    return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function render(data) {
    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    const list = [...data].reverse();

    list.forEach(d => {
        const isMe = (d.name || "").trim() === getFullName();

        chat.innerHTML += `
            <div class="msg ${isMe ? 'me' : 'other'}">
                <div class="name">${escapeHtml(d.name || "")}</div>
                <div>${escapeHtml(d.message || "")}</div>
                <div class="time">${escapeHtml(d.created_at || d.time || "")}</div>
            </div>
        `;
    });

    chat.scrollTop = chat.scrollHeight;
}

async function load() {
    try {
        const res = await fetch(SERVER + "/messages", {
            method: "GET"
        });

        if (!res.ok) {
            console.log("메시지 불러오기 실패:", res.status);
            return;
        }

        const data = await res.json();
        if (!Array.isArray(data)) {
            console.log("메시지 형식 이상");
            return;
        }

        render(data);
    } catch (e) {
        console.log("불러오기 실패", e);
    }
}

window.send = async function () {
    const team = document.getElementById("team").value.trim();
    const name = document.getElementById("name").value.trim();
    const msgBox = document.getElementById("msg");
    const sendBtn = document.getElementById("sendBtn");
    const msg = msgBox.value.trim();

    if (!team || !name) {
        alert("소속/이름 입력");
        checkLock();
        return;
    }

    if (!msg) return;

    sendBtn.disabled = true;

    try {
        const res = await fetch(SERVER + "/send", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name: team + " " + name,
                message: msg
            })
        });

        if (!res.ok) {
            alert("전송 실패");
            console.log("전송 실패 상태코드:", res.status);
            return;
        }

        msgBox.value = "";
        await load();
    } catch (e) {
        alert("서버 연결 실패");
        console.log("전송 오류:", e);
    } finally {
        sendBtn.disabled = false;
        checkLock();
        msgBox.focus();
    }
};

document.getElementById("msg").addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
    }
});

document.getElementById("team").addEventListener("change", checkLock);
document.getElementById("name").addEventListener("input", checkLock);

checkLock();
load();
setInterval(load, 2000);
</script>

</body>
</html>
