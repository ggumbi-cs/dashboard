<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>CS 채팅</title>

<style>
body {
    font-family: Arial;
    margin: 0;
}

#chat-container {
    max-width: 900px;
    margin: 30px auto;
}

#chat-box {
    border: 1px solid #ccc;
    height: 400px;
    overflow-y: auto;
    padding: 10px;
    background: #fff;
}

input, textarea {
    padding: 10px;
    margin-top: 10px;
}

#username {
    width: 200px;
}

#message {
    width: 100%;
    height: 60px;
    resize: none;
}

button {
    padding: 10px 15px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div id="chat-container">

    <h2>CS 채팅</h2>

    <input id="username" placeholder="이름 입력">

    <div id="chat-box"></div>

    <textarea id="message" placeholder="메시지 입력"></textarea>
    <br>
    <button onclick="sendMessage()">전송</button>

</div>

<script>

const SERVER_URL = "https://adaptive-expression-production-ba28.up.railway.app";

// ✅ 전송 함수
function sendMessage() {
    const name = document.getElementById("username").value;
    const msg = document.getElementById("message").value;

    if (!name || !msg) return;

    fetch(SERVER_URL + "/send", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: name,
            message: msg
        })
    })
    .then(() => {
        document.getElementById("message").value = "";
        loadMessages(); // 🔥 바로 갱신
    });
}

// ✅ 메시지 불러오기
function loadMessages() {
    fetch(SERVER_URL + "/messages")
    .then(res => res.json())
    .then(data => {
        const chatBox = document.getElementById("chat-box");
        chatBox.innerHTML = "";

        data.forEach(msg => {
            chatBox.innerHTML += `<div><b>${msg.name}</b>: ${msg.message}</div>`;
        });

        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

// ✅ 엔터 처리
document.getElementById("message").addEventListener("keydown", function(e) {

    // Enter만 → 전송
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }

    // Shift+Enter → 줄바꿈 (기본동작 유지)
});

// 자동 갱신
setInterval(loadMessages, 1000);

</script>

</body>
</html>
