<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>CS 채팅</title>

<style>
body { font-family: Arial; background:#f5f5f5; }

.chat-wrapper {
    width: 60%;
    margin: 30px auto;
}

.chat-box {
    width:100%;
    height:400px;
    background:#fff;
    border:1px solid #ccc;
    overflow-y:auto;
    padding:10px;
}

.msg {
    margin:10px 0;
    padding:10px;
    border-radius:10px;
    max-width:70%;
    word-break:break-all;
}

.me { background:#cfe5ff; margin-left:auto; }
.other { background:#eee; margin-right:auto; }

.name { font-size:12px; color:#555; }
.time { font-size:11px; color:#888; text-align:right; }

textarea { width:100%; height:60px; }

#version {
    position:absolute;
    top:10px;
    right:20px;
    font-size:12px;
    color:#888;
}
</style>
</head>

<body>

<div id="version">수정버전 : 로딩중...</div>

<div class="chat-wrapper">

<h2>CS 채팅</h2>

소속:
<select id="team">
<option value="">선택</option>
<option>꿈비</option>
<option>에르모어</option>
<option>가이아</option>
</select>

이름:
<input id="name">

<div id="chat" class="chat-box"></div>

<textarea id="msg" placeholder="소속 및 이름 입력 후 사용 가능"></textarea>
<button onclick="send()">전송</button>

</div>

<script>
const SERVER = "https://adaptable-expression-production-ba28.up.railway.app";

let lastData = [];

// ======================
// 버전 표시
// ======================
function setVersion(){
    const d = new Date();
    const t =
        d.getFullYear()+"/"+
        (d.getMonth()+1).toString().padStart(2,'0')+"/"+
        d.getDate().toString().padStart(2,'0')+" "+
        d.getHours().toString().padStart(2,'0')+":"+
        d.getMinutes().toString().padStart(2,'0')+":"+
        d.getSeconds().toString().padStart(2,'0');

    document.getElementById("version").innerText = "수정버전 : " + t;
}
setVersion();

// ======================
function getFullName(){
    return document.getElementById("team").value + " " + document.getElementById("name").value;
}

// ======================
function render(data){
    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    data.forEach(d=>{
        const isMe = d.name === getFullName();

        chat.innerHTML += `
        <div class="msg ${isMe ? 'me':'other'}">
            <div class="name">${d.name}</div>
            <div>${d.message}</div>
            <div class="time">${d.time || ""}</div>
        </div>`;
    });

    chat.scrollTop = chat.scrollHeight;
}

// ======================
async function load(){
    try{
        const res = await fetch(SERVER + "/messages");

        if(!res.ok) return;

        const data = await res.json();

        if(!data || data.length === 0) return;
        if(data.length < lastData.length) return;

        lastData = data;
        render(data);

    }catch(e){
        console.log("서버 끊김 - 유지");
    }
}

// ======================
async function send(){
    const team = document.getElementById("team").value;
    const name = document.getElementById("name").value;
    const msg = document.getElementById("msg").value;

    if(!team || !name){
        alert("소속/이름 입력");
        return;
    }

    if(!msg.trim()) return;

    await fetch(SERVER + "/send",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            name: team+" "+name,
            message: msg
        })
    });

    document.getElementById("msg").value="";
    load();
}

// ======================
// 엔터 전송
// ======================
document.getElementById("msg").addEventListener("keydown", e=>{
    if(e.key==="Enter" && !e.shiftKey){
        e.preventDefault();
        send();
    }
});

setInterval(load, 2000);
load();
</script>

</body>
</html>
