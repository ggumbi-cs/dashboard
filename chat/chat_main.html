<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>CS 채팅</title>

<style>
body {
    font-family: Arial, sans-serif;
}

.chat-wrap {
    width: 90%;
    margin: auto;
}

.title {
    font-size: 24px;
    font-weight: bold;
    margin: 20px 0;
}

.user-row {
    margin-bottom: 10px;
}

#chat-box {
    width: 100%;
    height: 420px;
    border: 1px solid #ccc;
    overflow-y: auto;
    padding: 10px;
    background: #f9f9f9;
}

.msg {
    margin: 6px 0;
    display: flex;
}

.msg.me {
    justify-content: flex-end;
}

.bubble {
    max-width: 60%;
    padding: 8px 12px;
    border-radius: 12px;
}

.me .bubble {
    background: #d0ebff;
}

.other .bubble {
    background: #eee;
}

.name {
    font-size: 12px;
    color: #666;
    margin-bottom: 2px;
}

#msg {
    width: 100%;
    height: 80px;
    margin-top: 10px;
}

.locked {
    background: #eee;
    color: #888;
}
</style>

</head>

<body>
<div class="chat-wrap">

<div class="title">CS 채팅</div>

<div class="user-row">
    소속:
    <select id="dept">
        <option value="">선택</option>
        <option>꿈비</option>
        <option>에르모어</option>
        <option>가이아</option>
    </select>

    이름:
    <input id="username" placeholder="이름 입력">
</div>

<div id="chat-box"></div>

<textarea id="msg" class="locked" disabled placeholder="소속 및 이름 입력 후 사용 가능"></textarea>
<button onclick="sendMessage()">전송</button>

</div>

<script>
const API = "https://adaptable-expression-production-ba28.up.railway.app";

const deptEl = document.getElementById("dept");
const nameEl = document.getElementById("username");
const msgEl = document.getElementById("msg");
const chatBox = document.getElementById("chat-box");

function getMyName() {
    return deptEl.value + " " + nameEl.value;
}

function checkLock() {
    if (!deptEl.value || !nameEl.value) {
        msgEl.disabled = true;
        msgEl.classList.add("locked");
        msgEl.placeholder = "소속 및 이름 입력 후 사용 가능";
    } else {
        msgEl.disabled = false;
        msgEl.classList.remove("locked");
        msgEl.placeholder = "메시지 입력";
    }
}

deptEl.addEventListener("change", checkLock);
nameEl.addEventListener("input", checkLock);

async function loadMessages() {
    const res = await fetch(API + "/messages");
    const data = await res.json();

    chatBox.innerHTML = "";

    data.forEach(m => {
        const isMe = m.name === getMyName();

        const msgDiv = document.createElement("div");
        msgDiv.className = "msg " + (isMe ? "me" : "other");

        const bubble = document.createElement("div");
        bubble.className = "bubble";

        const name = document.createElement("div");
        name.className = "name";
        name.innerText = m.name;

        const text = document.createElement("div");
        text.innerText = m.message;

        bubble.appendChild(name);
        bubble.appendChild(text);
        msgDiv.appendChild(bubble);
        chatBox.appendChild(msgDiv);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage() {
    if (msgEl.disabled) return;

    const text = msgEl.value.trim();
    if (!text) return;

    await fetch(API + "/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            name: getMyName(),
            message: text
        })
    });

    msgEl.value = "";
    loadMessages();
}

msgEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

setInterval(loadMessages, 2000);
loadMessages();
checkLock();
</script>

</body>
</html>
