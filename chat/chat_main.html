<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>계열사CS 소통챗</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Malgun Gothic", sans-serif;
      background: transparent;
    }

    .chat-wrap {
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
      padding: 18px 24px 24px;
      position: relative;
    }

    .version {
      position: absolute;
      top: 18px;
      right: 24px;
      font-size: 12px;
      color: #666;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      margin: 8px 0 14px;
    }

    .user-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .user-row label {
      font-weight: 700;
    }

    .user-row input {
      height: 36px;
      padding: 6px 10px;
      border: 1px solid #999;
      background: #fff;
      font-size: 16px;
    }

    #dept {
      width: 180px;
    }

    #username {
      width: 180px;
    }

    #chat-box {
      width: 100%;
      min-height: 420px;
      height: 420px;
      border: 1px solid #bbb;
      background: #fff;
      overflow-y: auto;
      padding: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .msg-item {
      margin-bottom: 10px;
      word-break: break-word;
    }

    .msg-name {
      font-weight: 700;
      margin-right: 6px;
    }

    .input-row {
      margin-top: 12px;
    }

    #msg {
      width: 100%;
      height: 92px;
      resize: none;
      border: 1px solid #999;
      padding: 10px;
      font-size: 16px;
      background: #fff;
    }

    .btn-row {
      margin-top: 8px;
    }

    #send-btn {
      min-width: 72px;
      height: 42px;
      border: 1px solid #888;
      background: #fff;
      cursor: pointer;
      font-size: 15px;
    }

    #send-btn:hover {
      background: #f3f3f3;
    }
  </style>
</head>
<body>
  <div class="chat-wrap">
    <div class="version" id="version"></div>

    <div class="title">CS 채팅</div>

    <div class="user-row">
      <label for="dept">소속:</label>
      <input id="dept" type="text" placeholder="소속" />

      <label for="username">이름:</label>
      <input id="username" type="text" placeholder="이름" />
    </div>

    <div id="chat-box"></div>

    <div class="input-row">
      <textarea id="msg" placeholder="메시지 입력"></textarea>
    </div>

    <div class="btn-row">
      <button id="send-btn" type="button">전송</button>
    </div>
  </div>

  <script>
    const API_URL = "https://adaptable-expression-production-ba28.up.railway.app";
    const FIXED_VERSION = "수정버전 : 2026/04/22 13:00:00";

    const deptEl = document.getElementById("dept");
    const usernameEl = document.getElementById("username");
    const msgEl = document.getElementById("msg");
    const chatBoxEl = document.getElementById("chat-box");
    const sendBtnEl = document.getElementById("send-btn");
    const versionEl = document.getElementById("version");

    versionEl.textContent = FIXED_VERSION;

    const LS_DEPT_KEY = "cs_chat_dept";
    const LS_NAME_KEY = "cs_chat_name";

    deptEl.value = localStorage.getItem(LS_DEPT_KEY) || "꿈비";
    usernameEl.value = localStorage.getItem(LS_NAME_KEY) || "";

    deptEl.addEventListener("input", () => {
      localStorage.setItem(LS_DEPT_KEY, deptEl.value);
    });

    usernameEl.addEventListener("input", () => {
      localStorage.setItem(LS_NAME_KEY, usernameEl.value);
    });

    async function loadMessages() {
      try {
        const res = await fetch(`${API_URL}/messages`, {
          method: "GET",
          cache: "no-store"
        });

        if (!res.ok) {
          console.error("messages load failed:", res.status);
          return;
        }

        const data = await res.json();
        chatBoxEl.innerHTML = "";

        data.forEach((item) => {
          const row = document.createElement("div");
          row.className = "msg-item";

          const name = document.createElement("span");
          name.className = "msg-name";
          name.textContent = `${item.name} :`;

          const msg = document.createElement("span");
          msg.textContent = item.message;

          row.appendChild(name);
          row.appendChild(msg);
          chatBoxEl.appendChild(row);
        });

        chatBoxEl.scrollTop = chatBoxEl.scrollHeight;
      } catch (err) {
        console.error("messages fetch error:", err);
      }
    }

    async function sendMessage() {
      const dept = deptEl.value.trim();
      const username = usernameEl.value.trim();
      const message = msgEl.value.trim();

      if (!dept) {
        alert("소속을 입력해 주세요.");
        deptEl.focus();
        return;
      }

      if (!username) {
        alert("이름을 입력해 주세요.");
        usernameEl.focus();
        return;
      }

      if (!message) {
        msgEl.focus();
        return;
      }

      const fullName = `${dept} ${username}`;

      try {
        const res = await fetch(`${API_URL}/send`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name: fullName,
            message: message
          })
        });

        if (!res.ok) {
          const text = await res.text();
          console.error("send failed:", res.status, text);
          alert("서버 연결 실패");
          return;
        }

        msgEl.value = "";
        await loadMessages();
        msgEl.focus();
      } catch (err) {
        console.error("send fetch error:", err);
        alert("서버 연결 실패");
      }
    }

    msgEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtnEl.addEventListener("click", sendMessage);

    loadMessages();
    setInterval(loadMessages, 2000);
  </script>
</body>
</html>
