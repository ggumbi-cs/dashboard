<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>CS 채팅</title>

<style>
body {
    font-family: Arial;
    margin: 0;
}

#chat-container {
    max-width: 1000px;
    margin: 30px auto;
}

#chat-box {
    border: 1px solid #ccc;
    height: 400px;
    overflow-y: auto;
    padding: 10px;
    background: #fff;
}

input, textarea {
    padding: 10px;
    margin-top: 10px;
}

#dept {
    width: 120px;
}

#username {
    width: 150px;
}

#message {
    width: 100%;
    height: 70px;
    resize: none;
}

button {
    padding: 10px 15px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div id="chat-container">

    <h2>CS 채팅</h2>

    <!-- 🔥 소속 + 이름 -->
    <input id="dept" placeholder="소속">
    <input id="username" placeholder="이름">

    <div id="chat-box"></div>

    <textarea id="message" placeholder="메시지 입력"></textarea>
    <br>
    <button onclick="sendMessage()">전송</button>

</div>

<script>

const SERVER_URL = "https://adaptive-expression-production-ba28.up.railway.app";

// 🔥 전송
function sendMessage() {
    const dept = document.getElementById("dept").value;
    const name = document.getElementById("username").value;
    const msg = document.getElementById("message").value;

    if (!dept || !name || !msg) {
        alert("소속/이름/메시지 입력 필요");
        return;
    }

    fetch(SERVER_URL + "/send", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            dept: dept,
            name: name,
            message: msg
        })
    })
    .then(res => res.json())
    .then(data => {
        console.log("전송 성공:", data);
        document.getElementById("message").value = "";
        loadMessages();
    })
    .catch(err => {
        console.error("전송 실패:", err);
        alert("서버 연결 실패");
    });
}

// 🔥 불러오기
function loadMessages() {
    fetch(SERVER_URL + "/messages")
    .then(res => res.json())
    .then(data => {
        const chatBox = document.getElementById("chat-box");
        chatBox.innerHTML = "";

        data.forEach(msg => {
            chatBox.innerHTML += `
                <div>
                    <b>${msg.dept} ${msg.name}</b> : ${msg.message}
                </div>
            `;
        });

        chatBox.scrollTop = chatBox.scrollHeight;
    })
    .catch(err => {
        console.error("불러오기 실패:", err);
    });
}

// 🔥 엔터 전송 / Shift+Enter 줄바꿈
document.getElementById("message").addEventListener("keydown", function(e) {

    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }

});

// 자동 갱신
setInterval(loadMessages, 1000);

</script>

</body>
</html>
