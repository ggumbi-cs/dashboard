<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>CS 채팅</title>

<style>
body {
    font-family: Arial;
}

.container {
    width: 90%;
    margin: auto;
}

#version {
    position: absolute;
    top: 10px;
    right: 20px;
    font-size: 12px;
    color: #666;
}

#chat-box {
    width: 100%;
    height: 400px;
    border: 1px solid #ccc;
    overflow-y: auto;
    margin-top: 10px;
    padding: 10px;
}

#msg {
    width: 100%;
    height: 80px;
}

</style>
</head>

<body>

<div id="version"></div>

<div class="container">
    <h2>CS 채팅</h2>

    소속: <input id="dept" value="꿈비">
    이름: <input id="name" value="홍길동">

    <div id="chat-box"></div>

    <textarea id="msg" placeholder="메시지 입력"></textarea><br>
    <button onclick="sendMessage()">전송</button>
</div>

<script>
const API_URL = "https://adaptable-expression-production-ba28.up.railway.app";

// 🔥 버전 표시 (현재 시간)
const now = new Date();
const versionText = now.getFullYear() + "/" +
    String(now.getMonth()+1).padStart(2,"0") + "/" +
    String(now.getDate()).padStart(2,"0") + " " +
    String(now.getHours()).padStart(2,"0") + ":" +
    String(now.getMinutes()).padStart(2,"0") + ":" +
    String(now.getSeconds()).padStart(2,"0");

document.getElementById("version").innerText = "수정버전 : " + versionText;


// 메시지 전송
async function sendMessage() {
    const dept = document.getElementById("dept").value;
    const name = document.getElementById("name").value;
    const msg = document.getElementById("msg").value;

    if (!msg) return;

    const fullName = dept + " " + name;

    try {
        await fetch(API_URL + "/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                name: fullName,
                message: msg
            })
        });

        document.getElementById("msg").value = "";
        loadMessages();

    } catch (e) {
        alert("서버 연결 실패");
    }
}


// 메시지 불러오기
async function loadMessages() {
    try {
        const res = await fetch(API_URL + "/messages");
        const data = await res.json();

        const box = document.getElementById("chat-box");
        box.innerHTML = "";

        data.forEach(d => {
            const div = document.createElement("div");
            div.innerText = d.name + " : " + d.message;
            box.appendChild(div);
        });

    } catch (e) {
        console.log("불러오기 실패");
    }
}

// 최초 로딩
loadMessages();

// 2초마다 자동 갱신
setInterval(loadMessages, 2000);


// 엔터 전송 / 쉬프트 줄바꿈
document.getElementById("msg").addEventListener("keydown", function(e){
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});
</script>

</body>
</html>
