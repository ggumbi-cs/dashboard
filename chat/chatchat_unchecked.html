<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>V 미체크 모아보기</title>
<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #abc1d1;
}

.chat-wrapper {
    width: 420px;
    max-width: calc(100vw - 20px);
    height: calc(100vh - 20px);
    margin: 10px auto;
    background: #b2c7da;
    display: flex;
    flex-direction: column;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    position: relative;
    border: 2px solid rgba(254, 229, 0, 0.95);
}

.top-bar {
    background: #abc1d1;
    padding: 10px 14px 8px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    position: relative;
    min-height: 96px;
}

.chat-title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 8px;
    color: #1f1f1f;
}

.sub-title {
    font-size: 12px;
    color: #3e3e3e;
    line-height: 1.45;
}

.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 14px 12px 18px;
    background: #b2c7da;
}

.msg-row {
    display: flex;
    margin: 10px 0;
    justify-content: flex-start;
}

.msg-wrap {
    max-width: 78%;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
}

.name {
    font-size: 12px;
    color: #3e3e3e;
    margin-bottom: 4px;
    padding: 0 2px;
}

.bubble-line {
    display: flex;
    align-items: flex-end;
    gap: 6px;
}

.bubble {
    padding: 10px 12px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.45;
    word-break: break-word;
    white-space: pre-wrap;
    box-shadow: 0 1px 1px rgba(0,0,0,0.04);
    background: #ffffff;
    color: #111;
    border-top-left-radius: 4px;
}

.check-btn {
    min-width: 18px;
    height: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    line-height: 1;
    color: #8a8f96;
    cursor: pointer;
    user-select: none;
    opacity: 0.75;
}

.check-btn:hover {
    opacity: 1;
    color: #2b7cff;
    font-weight: bold;
}

.time {
    font-size: 11px;
    color: #55606b;
    white-space: nowrap;
    margin-top: 4px;
    padding: 0 2px;
}

.empty-state {
    padding: 14px 12px;
    color: #4a5661;
    font-size: 13px;
    line-height: 1.5;
}

#version {
    position: absolute;
    top: 12px;
    right: 14px;
    font-size: 11px;
    color: rgba(0,0,0,0.45);
    pointer-events: none;
}

@media (max-width: 520px) {
    .chat-wrapper {
        width: 100vw;
        max-width: 100vw;
        height: 100vh;
        margin: 0;
        border-radius: 0;
    }

    .top-bar {
        min-height: 96px;
    }

    #version {
        top: 10px;
        right: 10px;
    }
}
</style>
</head>
<body>

<div id="version">수정버전 : 2026/04/22 15:30:00</div>

<div class="chat-wrapper">
    <div class="top-bar">
        <div class="chat-title">V 미체크 모아보기</div>
        <div class="sub-title">체크되지 않은 대화만 표시됩니다.</div>
    </div>

    <div id="chat" class="chat-box"></div>
</div>

<script>
const SERVER = "https://script.google.com/macros/s/AKfycbymKpZXyoAmsI978lOgGcJI8Z26J6UE8XesXb7haMJ6dRT16jAIFsJANMnK-Y9Wd35jNA/exec";

function setVersion() {
    const d = new Date();
    const version =
        d.getFullYear() + "/" +
        String(d.getMonth() + 1).padStart(2, "0") + "/" +
        String(d.getDate()).padStart(2, "0") + " " +
        String(d.getHours()).padStart(2, "0") + ":" +
        String(d.getMinutes()).padStart(2, "0") + ":" +
        String(d.getSeconds()).padStart(2, "0");

    document.getElementById("version").innerText = "수정버전 : " + version;
}
setVersion();

function getFullName() {
    const team = localStorage.getItem("cs_team") || "";
    const name = localStorage.getItem("cs_name") || "";
    return (team + " " + name).trim();
}

function escapeHtml(text) {
    return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function renderMessage(text) {
    const str = String(text || "");
    // [사진] Drive 썸네일 형식
    if (str.startsWith("[사진] ")) {
        const parts  = str.slice(5).split("|||");
        const thumb  = parts[0].trim();
        const origin = (parts[1] || parts[0]).trim();
        return `<img src="${escapeHtml(thumb)}" onclick="window.open('${escapeHtml(origin)}','_blank')"
            style="max-width:200px;max-height:160px;border-radius:8px;cursor:pointer;display:block;" loading="lazy">`;
    }
    // [영상]
    if (str.startsWith("[영상] ")) {
        const url = str.slice(5).trim();
        return `<a href="${escapeHtml(url)}" target="_blank" rel="noopener" style="color:#1d4ed8;font-weight:600;">📹 영상 보기</a>`;
    }
    // [IMG] 기존 호환
    if (str.startsWith("[IMG]")) {
        const url = str.replace("[IMG]","").trim();
        return `<img src="${escapeHtml(url)}" style="max-width:200px;max-height:160px;border-radius:8px;display:block;" loading="lazy">`;
    }
    return escapeHtml(str);
}

function normalizeCheckedByText(value) {
    const items = String(value || "")
        .split(",")
        .map(v => v.trim())
        .filter(Boolean);

    const seen = new Set();
    const result = [];

    items.forEach(name => {
        if (seen.has(name)) return;
        seen.add(name);
        result.push(name);
    });

    return result.join(", ");
}

function render(data) {
    const chat = document.getElementById("chat");

    const prevScrollTop = chat.scrollTop;
    const prevScrollHeight = chat.scrollHeight;
    const prevClientHeight = chat.clientHeight;
    const isNearBottom = (prevScrollHeight - (prevScrollTop + prevClientHeight)) <= 40;

    chat.innerHTML = "";

    const list = [...data]
        .filter(d => !normalizeCheckedByText(d.checked_by || ""))
        .slice(0, 30)
        .reverse();

    if (list.length === 0) {
        chat.innerHTML = `<div class="empty-state">현재 V 미체크 대화가 없습니다.</div>`;
        return;
    }

    chat.innerHTML = list.map(d => `
            <div class="msg-row other">
                <div class="msg-wrap">
                    <div class="name">${escapeHtml(d.name || "")}</div>
                    <div class="bubble-line">
                        <div class="bubble">${renderMessage(d.message || "")}</div>
                        <div
                            class="check-btn"
                            title="V 체크하기"
                            onclick="toggleCheck(${d.id})"
                        >✔</div>
                    </div>
                    <div class="time">${escapeHtml(d.created_at || d.time || "")}</div>
                </div>
            </div>
        `).join("");

    if (prevScrollHeight === 0) {
        chat.scrollTop = chat.scrollHeight;
        return;
    }

    if (isNearBottom) {
        chat.scrollTop = chat.scrollHeight;
    } else {
        const newScrollHeight = chat.scrollHeight;
        const heightDiff = newScrollHeight - prevScrollHeight;
        chat.scrollTop = prevScrollTop + heightDiff;
    }
}

async function load() {
    try {
        const res = await fetch(SERVER + "?action=getMessages", {
            method: "GET"
        });

        if (!res.ok) {
            console.log("미체크 메시지 불러오기 실패:", res.status);
            return;
        }

        const data = await res.json();
        if (!Array.isArray(data)) {
            console.log("미체크 메시지 형식 이상");
            return;
        }

        render(data);
    } catch (e) {
        console.log("미체크 불러오기 실패", e);
    }
}

window.toggleCheck = async function (id) {
    const fullName = getFullName();

    if (!fullName) {
        alert("왼쪽 CS 채팅에서 소속/이름을 먼저 입력해 주세요.");
        return;
    }

    try {
        const checkParams = new URLSearchParams({
            action: "check",
            id: id,
            checker: fullName
        });
        const res = await fetch(SERVER + "?" + checkParams.toString(), {
            method: "GET"
        });

        if (!res.ok) {
            alert("체크 저장 실패");
            console.log("미체크 체크 저장 실패 상태코드:", res.status);
            return;
        }

        await load();
    } catch (e) {
        alert("체크 저장 실패");
        console.log("미체크 체크 저장 오류:", e);
    }
};

load();
setInterval(load, 2000);
</script>

</body>
</html>
