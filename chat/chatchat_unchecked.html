<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>V 미체크 모아보기</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #abc1d1;
}

.chat-wrapper {
    width: 420px;
    height: 100vh;
    margin: auto;
    background: #b2c7da;
    display: flex;
    flex-direction: column;
    border-radius: 14px;
    overflow: hidden;
}

.top-bar {
    padding: 10px;
    font-weight: bold;
}

.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.msg {
    background: #fff;
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    position: relative;
}

.check-btn {
    position: absolute;
    right: 10px;
    bottom: 10px;
    cursor: pointer;
    color: #999;
}

.check-btn.checked {
    color: #2b7cff;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="chat-wrapper">
    <div class="top-bar">V 미체크 모아보기</div>
    <div id="chat" class="chat-box"></div>
</div>

<script>
const SERVER = "https://adaptable-expression-production-ba28.up.railway.app";

// 👉 이름 가져오기 (chat_main과 동일 방식)
function getFullName() {
    return localStorage.getItem("cs_team") + " " + localStorage.getItem("cs_name");
}

// 👉 체크 버튼
async function toggleCheck(id) {
    const fullName = getFullName();

    await fetch(SERVER + "/check", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            id: id,
            checker: fullName
        })
    });

    load();
}

// 👉 렌더
function render(data) {
    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    data.reverse().forEach(d => {
        const checked = d.checked_by ? "checked" : "";

        chat.innerHTML += `
            <div class="msg">
                <b>${d.name}</b><br>
                ${d.message}<br>
                <small>${d.created_at}</small>

                <div class="check-btn ${checked}" onclick="toggleCheck(${d.id})">
                    ✔
                </div>
            </div>
        `;
    });
}

// 👉 데이터 로드
async function load() {
    const res = await fetch(SERVER + "/messages");
    const data = await res.json();

    // 🔥 핵심 필터 (미체크만)
    const filtered = data.filter(d => !d.checked_by);

    render(filtered);
}

load();
setInterval(load, 2000);
</script>

</body>
</html>
