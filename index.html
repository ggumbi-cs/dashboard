<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CS · 품질관리 대시보드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f1f5f9;min-height:100vh;}
button{cursor:pointer;font-family:inherit;}
@keyframes sp{to{transform:rotate(360deg)}}

#hdr1{background:#0f1f3d;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
#hdr1 .title{font-size:14px;font-weight:700;color:#fff;letter-spacing:-0.02em;}
#hdr1 .period-btns button{padding:4px 12px;border-radius:4px;font-size:11px;font-weight:600;background:transparent;color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.15);margin-left:2px;}
#hdr1 .period-btns button.active{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.5);}
#hdr2{background:#1a2f52;height:38px;display:flex;align-items:center;padding:0 20px;gap:2px;position:sticky;top:44px;z-index:100;}
#hdr2 button{padding:5px 16px;border:none;border-radius:4px;font-size:12px;font-weight:600;background:transparent;color:rgba(255,255,255,.45);}
#hdr2 button.active{background:rgba(255,255,255,.18);color:#fff;}
#content{padding:16px 20px 40px;}

.kpi-grid{display:grid;gap:10px;margin-bottom:14px;}
.kpi-grid.col4{grid-template-columns:repeat(4,1fr);}
.kpi-grid.col3{grid-template-columns:repeat(3,1fr);}
.kpi-card{background:#fff;border:1px solid #e2e8f0;border-top:3px solid #1e40af;border-radius:6px;padding:14px 16px;min-width:0;}
.kpi-label{font-size:11px;font-weight:600;color:#64748b;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.kpi-value{font-size:22px;font-weight:700;color:#0f1f3d;line-height:1;}
.kpi-sub{font-size:12px;color:#64748b;margin-top:4px;}

.card{background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:16px 18px;margin-bottom:12px;}
.card-header{padding-bottom:10px;border-bottom:1px solid #e2e8f0;margin-bottom:14px;}
.card-title{font-size:13px;font-weight:600;color:#0f1f3d;}
.card-sub{font-size:11px;color:#64748b;margin-top:2px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.grid32{display:grid;grid-template-columns:3fr 2fr;gap:12px;margin-bottom:12px;}

.hbar-wrap{display:flex;flex-direction:column;gap:6px;}
.hbar-row{display:grid;grid-template-columns:130px 1fr 56px;align-items:center;gap:8px;}
.hbar-label{font-size:12px;color:#334155;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hbar-track{background:#f1f5f9;border-radius:2px;height:16px;overflow:hidden;}
.hbar-fill{height:100%;border-radius:2px;}
.hbar-val{font-size:12px;font-weight:600;color:#0f1f3d;text-align:right;}
.no-data{color:#64748b;font-size:13px;padding:8px 0;}

.section-title{font-size:12px;font-weight:700;color:#fff;padding:6px 14px;border-radius:4px;margin-bottom:12px;margin-top:4px;}
.sub-label{background:rgba(30,64,175,0.07);border-radius:6px;padding:8px 14px;margin-bottom:12px;font-size:11px;color:#1e40af;font-weight:700;}

.badge{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:6px;margin-bottom:8px;}
.badge-label{font-size:13px;font-weight:700;color:#fff;}
.badge-pct{font-size:12px;font-weight:700;border-radius:4px;padding:2px 9px;background:#fff;}
.badge-val{font-size:16px;font-weight:700;color:#fff;}

.gaug-card{background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:14px 16px;min-width:0;}
.gaug-label{font-size:11px;font-weight:600;color:#64748b;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
.gaug-nums{display:flex;gap:6px;align-items:flex-end;margin-bottom:10px;}
.gaug-main{font-size:24px;font-weight:700;}
.gaug-sub-num{font-size:13px;color:#64748b;margin-bottom:3px;}
.gaug-bar{display:flex;border-radius:4px;overflow:hidden;height:10px;}
.gaug-legend{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;font-weight:600;}

.stackbar-wrap{display:flex;flex-direction:column;gap:10px;}
.stackbar-bar{display:flex;border-radius:3px;overflow:hidden;height:18px;background:#f1f5f9;}
.stackbar-seg{display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:600;}
.stackbar-legend{display:flex;gap:12px;margin-top:3px;}
.stackbar-dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:3px;vertical-align:middle;}

.rank-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:4px;margin-bottom:6px;}
.rank-right{display:flex;gap:8px;align-items:center;}
.rank-pct{font-size:11px;font-weight:600;border-radius:3px;padding:1px 7px;background:#fff;}
.rank-val{font-size:14px;font-weight:700;color:#0f1f3d;}

.prepare{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:16px;}
.prepare h2{font-size:20px;font-weight:700;color:#0f1f3d;}
.prepare p{font-size:14px;color:#64748b;text-align:center;line-height:1.7;}
.soon{background:#dbeafe;border:1px solid #1e40af;border-radius:8px;padding:8px 20px;font-size:12px;color:#1e40af;font-weight:600;}
</style>
</head>

</div>

function el(tag,cls,style,html){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(style)Object.assign(e.style,typeof style==='string'?{cssText:style}:style);
  if(html!==undefined)e.innerHTML=html;
  return e;
}
function app(parent,...children){children.forEach(c=>{if(c)parent.appendChild(c);});return parent;}

function kpiCard(label,value,sub,accent){
  const d=el("div","kpi-card");
  d.style.borderTopColor=accent||C.blue;
  d.innerHTML=`<div class="kpi-label">${label}</div><div class="kpi-value">${value??"-"}</div>${sub?`<div class="kpi-sub">${sub}</div>`:""}`;
  return d;
}

function hbar(data,accent,maxV,unit){
  if(!data||!data.length)return el("div","no-data",{},"데이터 없음");
  const m=maxV||Math.max(...data.map(d=>d.v),1);
  const wrap=el("div","hbar-wrap");
  data.slice(0,12).forEach(d=>{
    wrap.innerHTML+=`<div class="hbar-row"><div class="hbar-label" title="${d.l}">${d.l}</div><div class="hbar-track"><div class="hbar-fill" style="width:${Math.max(Math.round(d.v/m*100),d.v>0?2:0)}%;background:${accent||C.blue}"></div></div><div class="hbar-val">${Number(d.v).toLocaleString()}${unit||""}</div></div>`;
  });
  return wrap;
}

function card(title,sub,children){
  const d=el("div","card");
  const hdr=el("div","card-header","",`<div class="card-title">${title}</div>${sub?`<div class="card-sub">${sub}</div>`:""}`);
  d.appendChild(hdr);
  if(children)d.appendChild(children);
  return d;
}

function grid(cols,gap,items){
  const d=el("div");

  items.forEach(i=>{if(i)d.appendChild(i);});
  return d;
}

    const w0=Math.round(d.segments[0].v/maxV*100), w1=Math.round(d.segments[1].v/maxV*100);
    const item=document.createElement("div");
    item.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span style="font-size:12px;color:#334155;font-weight:500">${d.l}</span><span style="font-size:12px;font-weight:700;color:#0f1f3d">${d.total.toLocaleString()}건</span></div><div class="stackbar-bar">${d.segments[0].v>0?`<div class="stackbar-seg" style="width:${w0}%;background:${c1}">${d.segments[0].v>d.total*0.1?d.segments[0].v:""}</div>`:""} ${d.segments[1].v>0?`<div class="stackbar-seg" style="width:${w1}%;background:${c2}">${d.segments[1].v>d.total*0.1?d.segments[1].v:""}</div>`:""}</div><div class="stackbar-legend"><span style="font-size:11px;color:#64748b"><span class="stackbar-dot" style="background:${c1}"></span>가전 ${d.segments[0].v.toLocaleString()}</span><span style="font-size:11px;color:#64748b"><span class="stackbar-dot" style="background:${c2}"></span>가전외 ${d.segments[1].v.toLocaleString()}</span></div>`;
    wrap.appendChild(item);
  });
  return wrap;
}

function subLabel(text,color){
  const d=el("div","sub-label","",text);
  if(color)d.style.color=color;
  return d;
}

function prepareScreen(){
  return el("div","prepare",{},"<h2>준비중</h2><p>해당 섹션은 현재 데이터 연결 작업 중입니다.</p><div class='soon'>Coming Soon</div>");
}

function render(){
  const now=new Date();
  document.getElementById("date-str").textContent=`2026년 기준 · ${DATA.updated} ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;

  const pb=document.getElementById("period-btns");
  pb.innerHTML="";
  PERIODS.forEach(p=>{
    const b=el("button","","",p);
    if(state.period===p)b.classList.add("active");
    b.onclick=()=>{state.period=p;render();};
    pb.appendChild(b);
  });

  const hdr2=document.getElementById("hdr2");
  hdr2.innerHTML="";
  TABS.forEach(t=>{
    const b=el("button","","",t+(t==="Issue"?" ❗":""));
    if(state.tab===t)b.classList.add("active");
    b.onclick=()=>{state.tab=t;render();};
    hdr2.appendChild(b);
  });

  const cnt=document.getElementById("content");
  cnt.innerHTML="";

  const {tab,period}=state;
  const S=DATA["상담실적"][period]||{};
  const R=DATA["반품현황"][period]||{};
  const P=DATA["처리현황"][period]||{};
  const Q=DATA["품질관리"][period]||{};

  if(tab==="주요KPI"||tab==="Issue"){cnt.appendChild(prepareScreen());return;}

  // ── 상담실적 ──
  if(tab==="상담실적"){
    app(cnt,
      grid("repeat(4,1fr)",10,[
        kpiCard("총 인입수",(S.총인입수||0).toLocaleString(),S.인입회차?S.인입회차.join(", "):"",C.blue),
        kpiCard("ALF 관여건",S.ALF관여건?S.ALF관여건.toLocaleString():"-",S.관여월||"",C.teal),
        kpiCard("만족도",S.만족도?`${S.만족도}점`:"-",S.만족도참여율?`참여율 ${S.만족도참여율}`:"",C.amber),
        kpiCard("통화성공율",S.통화성공율&&S.통화성공율.length?`${S.통화성공율[S.통화성공율.length-1].v}%`:"-","최근 마감 기준",C.purple),
      ]),
      grid("1fr 1fr",12,[
        card("서비스별 인입 비율",`${period} · 총 ${(S.총인입수||0).toLocaleString()}건`,hbar(S.인입태그,C.blue)),
        card("상담 태그별 인입 비율",null,hbar(S.상담태그,C.teal)),
      ]),
      grid("1fr 1fr",12,[
        card("통화성공율","통화성공률(IN) 기준",hbar(S.통화성공율,C.purple,100,"%")),
        card("만족도 월별 추이",null,hbar(S.만족도추이,C.amber,5,"점")),
      ])
    );
  }

  // ── 반품현황 ──
  if(tab==="반품현황"){
    const 꿈비총=R.꿈비총건||0, 꿈비가전총=R.꿈비가전총||0, 꿈비가전외총=R.꿈비가전외총||0;
    const 소브총=R.소브총건||0, 소브가전총=R.소브가전총||0, 소브가전외총=R.소브가전외총||0;
    const 기준월=R.기준월||"";
    const 꿈비교환율=R.꿈비교환율!=null?`${R.꿈비교환율}%`:"-";
    const 소브교환율=R.소브교환율!=null?`${R.소브교환율}%`:"-";

    app(cnt, sectionTitle("1. 꿈비",C.blue));
    app(cnt, grid("repeat(3,1fr)",10,[
      kpiCard("반품/교환 총계",꿈비총.toLocaleString(),`${period} 기준`,C.blue),
      gaugCard("가전 / 가전외",꿈비총,꿈비가전총,꿈비가전외총,C.navy,C.blue),
      kpiCard("반품/교환율",꿈비교환율,기준월,C.red),
    ]));

    if(period==="2026년"){
      app(cnt, card("꿈비 — 월별 반품/교환 현황","마감회차 기준",stackBar(R.꿈비월별,C.navy,C.blue)));
    } else {
      const 꿈비유형wrap=document.createElement("div");
      // 품목 배지
      const 꿈비가전유형총=꿈비가전총; const 꿈비가전외유형총=꿈비가전외총;
      [["가전",꿈비가전유형총],["가전외",꿈비가전외유형총]].forEach(([품목,v])=>{
        꿈비유형wrap.appendChild(badge(품목,v,꿈비총?Math.round(v/꿈비총*100):0,C.blue));
      });
      꿈비유형wrap.appendChild(hbar(R.꿈비유형,C.blue));
      app(cnt, grid("1fr 1fr",12,[
        card("꿈비 — 교환/반품 유형별",null,꿈비유형wrap),
        card("꿈비 — 반품 사유",null,hbar(R.꿈비사유,C.blue)),
      ]));
    }

    app(cnt, sectionTitle("2. 소브",C.teal));
    app(cnt, grid("repeat(3,1fr)",10,[
      kpiCard("반품/교환 총계",소브총.toLocaleString(),`${period} 기준`,C.teal),
      gaugCard("가전 / 가전외",소브총,소브가전총,소브가전외총,C.teal,"#0d9488"),
      kpiCard("반품/교환율",소브교환율,기준월,C.red),
    ]));

    if(period==="2026년"){
      app(cnt, card("소브 — 월별 반품/교환 현황","마감회차 기준",stackBar(R.소브월별,C.teal,"#0d9488")));
    } else {
      const 소브유형wrap=document.createElement("div");
      [["가전",소브가전총],["가전외",소브가전외총]].forEach(([품목,v])=>{
        소브유형wrap.appendChild(badge(품목,v,소브총?Math.round(v/소브총*100):0,C.teal));
      });
      소브유형wrap.appendChild(hbar(R.소브유형,C.teal));
      app(cnt, grid("1fr 1fr",12,[
        card("소브 — 교환/반품 유형별",null,소브유형wrap),
        card("소브 — 반품 사유",null,hbar(R.소브사유,C.teal)),
      ]));
    }
  }

  // ── 처리현황 ──
  if(tab==="처리현황"){
    const 수리총=P.수리총건||0, 무상=P.무상||0, 유상=P.유상||0;
    const 가전외=P.가전외||{};
    app(cnt,
      sectionTitle("1. 전자제품",C.blue),
      subLabel("1-1. 수리출고 (처리일 기준)"),
      grid("repeat(4,1fr)",10,[
        kpiCard("수리 총건",수리총.toLocaleString(),null,C.blue),
        kpiCard("무상수리",무상.toLocaleString(),`${P.무상율||0}%`,C.teal),
        kpiCard("유상수리",유상.toLocaleString(),`${P.유상율||0}%`,C.amber),
        kpiCard("유상 처리금액",`${(P.유상금액만원||0).toLocaleString()}만원`,null,C.red),
      ]),
      grid("1fr 1fr",12,[
        card("월별 수리현황 추이","처리일 기준 · 2026년",hbar(P.수리월별,C.blue)),
        card("불량부품 현황","자재출고 기준 (대체품 제외)",hbar(P.자재부품,C.red)),
      ]),
      subLabel("1-2. 자재출고 (처리일 기준 · 대체품 제외)"),
      grid("repeat(3,1fr)",10,[
        kpiCard("자재출고 총건",(P.자재총건||0).toLocaleString(),null,C.blue),
        kpiCard("모델 종류",(P.자재모델||[]).length,null,C.teal),
        kpiCard("부품 종류",(P.자재부품||[]).length,null,C.amber),
      ]),
      grid("1fr 1fr",12,[
        card("자재출고 — 모델별",null,hbar(P.자재모델,C.blue)),
        card("자재출고 — 자재별",null,hbar(P.자재부품,C.teal)),
      ]),
      sectionTitle("2. 전자제품 外",C.teal),
      grid("repeat(4,1fr)",10,[
        kpiCard("접수 건수",(가전외.접수||0).toLocaleString(),null,C.teal),
        kpiCard("유상 건수",(가전외.유상||0).toLocaleString(),`${가전외.유상율||0}%`,C.amber),
        kpiCard("유상 처리금액",`${(가전외.금액만원||0).toLocaleString()}만원`,null,C.red),
        kpiCard("평균 소요기간",가전외.소요평균?`${가전외.소요평균}일`:"-",null,C.teal),
      ]),
      card("가전외 처리 모델 비율",null,hbar(가전외.모델,C.teal))
    );
  }

  // ── 품질관리 ──
  if(tab==="품질관리"){
    const top5=Q.top5||[], 총불량=Q.총불량||0;
    const bgColors=[C.redXL,C.amberXL,C.blueXL,C.tealXL,"#f1f5f9"];
    const fgColors=[C.red,C.amber,C.blue,C.teal,C.slate];
    const 구분fgColors=[C.blue,C.teal,C.amber];
    const 구분bgColors=[C.blueXL,C.tealXL,C.amberXL];

    const top5card=document.createElement("div");
    top5.forEach((d,i)=>{
      top5card.innerHTML+=`<div class="rank-item" style="background:${bgColors[i]}"><span style="font-size:13px;font-weight:600;color:#0f1f3d">${i+1}. ${d.l.replace("[꿈비] ","")}</span><div class="rank-right"><span class="rank-pct" style="color:${fgColors[i]};border:1px solid ${fgColors[i]}">${총불량?Math.round(d.v/총불량*100):0}%</span><span class="rank-val">${d.v.toLocaleString()}</span></div></div>`;
    });

    const 구분card=document.createElement("div");
    (Q.구분별||[]).forEach((d,i)=>{
      구분card.innerHTML+=`<div class="rank-item" style="background:${구분bgColors[i]}"><span style="font-size:13px;font-weight:600;color:#0f1f3d">${d.l}</span><div class="rank-right"><span class="rank-pct" style="color:${구분fgColors[i]};border:1px solid ${구분fgColors[i]}">${총불량?Math.round(d.v/총불량*100):0}%</span><span class="rank-val">${d.v.toLocaleString()}</span></div></div>`;
    });

    app(cnt,
      sectionTitle("1. 불량인입 TOP.5 (접수일 기준)",C.red),
      grid("repeat(4,1fr)",10,[
        kpiCard("불량인입 총건",총불량.toLocaleString(),null,C.red),
        ...top5.slice(0,3).map((d,i)=>kpiCard(`TOP${i+1}`,d.l.replace("[꿈비] ","").slice(0,14),`${d.v.toLocaleString()}건 · ${총불량?Math.round(d.v/총불량*100):0}%`,[C.red,C.amber,C.blue][i]))
      ]),
      grid("3fr 2fr",12,[
        card("불량 TOP5 — 제품별 비율",`${period} · 총 ${총불량.toLocaleString()}건`,top5card),
        card("불량접수 현황 (구분별)",null,구분card),
      ]),
      grid("1fr 1fr",12,[
        card("접수불량 유형 TOP10",null,hbar(Q.접수불량top10,C.red)),
        card("월별 불량 추이","2026년 전체 · 접수일 기준",hbar(Q.월별추이,C.amber)),
      ])
    );
  }
}

render();
</script>
</body>
</html>
