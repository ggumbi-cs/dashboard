<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>엄마감동팀</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a2e50; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; font-size: 13px; color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  background: #1a2e50; padding: 0 20px; height: 44px;
  flex-shrink: 0; border-bottom: 1px solid #243d6a;
}
.header-title { font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }
.header-date { font-size: 11px; color: #8aaccc; }

.tabs {
  display: flex; align-items: center; background: #1a2e50;
  padding: 0 20px; height: 38px; flex-shrink: 0;
  gap: 2px; border-bottom: 2px solid #243d6a;
}
.tab {
  padding: 0 16px; height: 38px; display: flex; align-items: center;
  font-size: 12.5px; color: #8aaccc; cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap; user-select: none;
}
.tab:hover { color: #c8ddf0; }
.tab.active { color: #fff; border-bottom-color: #4a9fd4; font-weight: 600; }

.main { display: flex; flex: 1; overflow: hidden; }

/* ── 사이드바 ── */
.sidebar {
  width: 174px; background: #111e35; flex-shrink: 0;
  overflow-y: auto; padding: 10px 0;
  display: flex; flex-direction: column;
  border-right: 1px solid #1a2e4a;
}
.sb-label {
  font-size: 10px; color: #7a9ec0;
  padding: 10px 16px 3px; letter-spacing: 1px;
  font-weight: 700; text-transform: uppercase;
}
.sb-item {
  padding: 6px 16px; font-size: 12.5px; color: #a8c4df;
  cursor: pointer; transition: color 0.1s, background 0.1s;
  white-space: nowrap;
}
.sb-item:hover { background: #1a2e4a; color: #e0eefc; }
.sb-item.active { color: #5bb8f5; font-weight: 700; background: #162640; }
.sb-item.sub { padding-left: 26px; font-size: 12px; color: #8aaac8; }
.sb-item.sub:hover { color: #e0eefc; background: #1a2e4a; }
.sb-item.sub.active { color: #5bb8f5; font-weight: 700; background: #162640; }
.sb-item.off { color: #2e4460 !important; cursor: default; pointer-events: none; }

.now-dot {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: #5bb8f5;
  margin-left: 5px; vertical-align: middle;
}
.week-range { font-size: 10px; color: #6a8faa; display: block; padding-left: 4px; }

/* 주간 토글 버튼 */
.sb-toggle {
  padding: 6px 16px; font-size: 12.5px; color: #a8c4df;
  cursor: pointer; display: flex; align-items: center;
  justify-content: space-between;
  transition: color 0.1s, background 0.1s;
}
.sb-toggle:hover { background: #1a2e4a; color: #e0eefc; }
.arrow { font-size: 9px; transition: transform 0.2s; display: inline-block; }
.arrow.open { transform: rotate(180deg); }

.weekly-list { display: none; }
.weekly-list.open { display: block; }

/* 직접선택 달력 */
.date-pick-wrap { padding: 4px 16px 8px; }

.cal-toggle-btn {
  width: 100%; background: #1a2e4a; border: 1px solid #2a4060;
  color: #a8c4df; padding: 5px 8px; font-size: 11.5px;
  border-radius: 3px; cursor: pointer; outline: none;
  font-family: inherit; text-align: left; display: flex;
  justify-content: space-between; align-items: center;
}
.cal-toggle-btn:hover { border-color: #5bb8f5; color: #e0eefc; }

.cal-popup {
  display: none; background: #0e1a2e;
  border: 1px solid #2a4060; border-radius: 5px;
  padding: 8px 6px; margin-top: 4px; user-select: none;
}
.cal-popup.open { display: block; }

.cal-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px; padding: 0 2px;
}
.cal-nav-btn {
  background: none; border: none; color: #7a9ec0;
  cursor: pointer; font-size: 13px; padding: 2px 6px; border-radius: 3px;
}
.cal-nav-btn:hover { background: #1a2e4a; color: #e0eefc; }
.cal-month-label { font-size: 11.5px; font-weight: 700; color: #c8ddf0; }

.cal-dow { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 2px; }
.cal-dow span { text-align: center; font-size: 9.5px; color: #4a6a8a; padding: 2px 0; }
.cal-dow span:first-child { color: #7a3a3a; }
.cal-dow span:last-child  { color: #3a5a8a; }

.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
.cal-cell {
  text-align: center; font-size: 10.5px; padding: 3px 1px;
  border-radius: 2px; cursor: pointer; color: #8aaac8;
  transition: background 0.1s, color 0.1s;
}
.cal-cell.other-month { color: #2e4460; }
.cal-cell.sun { color: #7a3a3a; }
.cal-cell.sat { color: #3a5a8a; }
.cal-cell.week-hover { background: #1a3a5a; color: #c8ddf0; }
.cal-cell.week-hover.fri-end { background: #1e4e7a; color: #5bb8f5; font-weight: 700; }
.cal-cell.week-selected { background: #162e4e; color: #a8c4df; }
.cal-cell.week-selected.fri-end { background: #1a3a6a; color: #5bb8f5; font-weight: 700; }
.cal-cell.empty { cursor: default; pointer-events: none; }
.cal-cell.today-marker { outline: 1px solid #3a5a7a; }

.cal-result { font-size: 10px; color: #5bb8f5; margin-top: 5px; padding-left: 2px; min-height: 14px; font-weight: 600; }

.sb-divider { height: 1px; background: #1a2e4a; margin: 6px 16px; }

.sb-logout { margin-top: auto; padding: 10px 16px; }
.logout-btn {
  background: #1a2e4a; border: 1px solid #2a4060; color: #a8c4df;
  padding: 7px 10px; border-radius: 4px; font-size: 11.5px;
  cursor: pointer; width: 100%; text-align: left;
}
.logout-btn:hover { background: #223650; color: #e0eefc; }

/* iframe */
.content { flex: 1; overflow: hidden; }
.content iframe { width: 100%; height: 100%; border: none; display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">엄마감동팀</div>
  <div class="header-date" id="headerDate"></div>
</div>

<div class="tabs">
  <div class="tab" data-tab="주요kpi"  onclick="switchTab(this)">주요KPI</div>
  <div class="tab active" data-tab="상담실적" onclick="switchTab(this)">상담실적</div>
  <div class="tab" data-tab="반품현황" onclick="switchTab(this)">반품현황</div>

  <div class="sidebar" id="sidebar">

    <!-- ── 대시보드용 사이드바 ── -->
    <div id="dashSidebar">
      <div class="sb-label">연간현황</div>

<script>
// ═══════════════════════════════════════════════════
//  기간 파라미터 구조
//
//  하위 페이지(report/*.html)는 URL 파라미터를 읽어서
//  해당 기간 데이터를 필터링하면 됨.
//
//  전달 파라미터:
//    ?type=monthly  &period=2026-04
//    ?type=weekly   &period=2026-04-17   ← 금요일 날짜
//    ?type=yearly   &period=2026
//    ?type=direct   &period=2026-04-15
//
//  주간 기준: 토요일 시작 ~ 금요일 종료
//    예) period=2026-04-17 → 4/11(토)~4/17(금)
//
//  하위 페이지에서 읽는 예시 코드 (각 report/*.html 에 삽입):
//  ─────────────────────────────────────────────────
//  const params = new URLSearchParams(window.location.search);
//  const type   = params.get('type')   || 'monthly';
//  const period = params.get('period') || '';
//
//  if (type === 'weekly' && period) {
//    const fri   = new Date(period);
//    const sat   = new Date(fri); sat.setDate(fri.getDate() - 6);
//    // sat ~ fri 범위로 데이터 필터
//  }
//  if (type === 'monthly' && period) {
//    const [year, month] = period.split('-');
//    // year, month 로 필터
//  }
// ═══════════════════════════════════════════════════

const TAB_MAP = {
  '주요kpi':  'report/kpi.html',
  '상담실적': 'report/상담실적.html',
  '반품현황': 'report/반품현황.html',
  '처리현황': 'report/처리현황.html',
  '품질관리': 'report/품질관리.html',
  'Issue':    'report/Issue.html',
  '팀Tool':   'report/팀Tool.html',
};

let state = {
  tab: '상담실적',
  type: 'monthly',
  period: ''
};

// ── 날짜 유틸 ──────────────────────────────────────
function pad(n) { return String(n).padStart(2, '0'); }
function toKey(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function toDisplay(d) { return `${d.getMonth()+1}/${d.getDate()}`; }

// ── 포맷 변환 (내부 → 송출용) ──────────────────────
// 월간: '2026-04'      → '26.04월'
// 주간: '2026-04-17'   → '260417'   (금요일 YYMMDD)
// 직접: '2026-04-15'   → '260415'
function toPeriodParam(type, raw) {
  if (type === 'monthly') {
    const [y, m] = raw.split('-');
    return `${String(y).slice(2)}.${m}월`;          // 26.04월
  }
  if (type === 'weekly' || type === 'direct') {
    return raw.replace(/-/g, '').slice(2);           // 260417
  }
  return raw; // yearly 등 그대로
}

// 주간: 금요일 기준 → 해당주 토(금-6일)~금
function weekRange(fridayDate) {
  const fri = new Date(fridayDate);
  const sat = new Date(fri);
  sat.setDate(fri.getDate() - 6);
  return { sat, fri };
}

// 이번주 금요일 (오늘 기준, 미래면 지난주로)
function thisWeekFriday() {
  const today = new Date();
  const day = today.getDay();
  const fri = new Date(today);
  if (day === 6) {
    fri.setDate(today.getDate() - 1);
  } else {
    fri.setDate(today.getDate() + (5 - day));
    if (fri > today) fri.setDate(fri.getDate() - 7);
  }
  return fri;
}

// 올해 금요일 목록 (오늘 이전, 최신순)
function fridaysUntilToday(year) {
  const list = [];
  const d = new Date(year, 0, 1);
  while (d.getDay() !== 5) d.setDate(d.getDate() + 1);
  const today = new Date();
  while (d.getFullYear() === year && d <= today) {
    list.push(new Date(d));
    d.setDate(d.getDate() + 7);
  }
  return list.reverse();
}

// ── 렌더 ──────────────────────────────────────────
function renderMonthly() {
  const now = new Date();
  const year = now.getFullYear();
  const curM = now.getMonth() + 1;
  let html = '';
  for (let m = 1; m <= 12; m++) {
    const period = `${year}-${pad(m)}`;   // 내부키: 2026-04
    const off = m > curM;
    const cur = m === curM;
    const cls = ['sb-item', 'sub', off ? 'off' : '', cur ? 'active' : ''].filter(Boolean).join(' ');
    const dot = cur ? '<span class="now-dot"></span>' : '';
    html += `<div class="${cls}" data-type="monthly" data-period="${period}"
                  onclick="selectPeriod(this)">${m}월${dot}</div>`;
  }
  document.getElementById('monthlyList').innerHTML = html;
}

function renderWeekly() {
  // 최근 6주만 표시 (최신순)
  const fridays = fridaysUntilToday(new Date().getFullYear()).slice(0, 6);
  const curKey  = toKey(thisWeekFriday());
  let html = '';
  fridays.forEach(fri => {
    const { sat } = weekRange(fri);
    const period  = toKey(fri);
    const cur     = period === curKey;
    const cls     = ['sb-item', 'sub', cur ? 'active' : ''].filter(Boolean).join(' ');
    const dot     = cur ? '<span class="now-dot"></span>' : '';
    html += `<div class="${cls}" data-type="weekly" data-period="${period}"
                  onclick="selectPeriod(this)">
               ${toDisplay(fri)}${dot}
               <span class="week-range">${toDisplay(sat)}~${toDisplay(fri)}</span>
             </div>`;
  });
  document.getElementById('weeklyList').innerHTML = html;
}

// ── 커스텀 달력 ────────────────────────────────────
let calYear, calMonth, calHoverFri = null, calSelectedFri = null;

function toggleCal() {
  const popup = document.getElementById('calPopup');
  popup.classList.toggle('open');
  if (popup.classList.contains('open')) renderCal();
}

function calMove(dir) {
  calMonth += dir;
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0;  calYear++; }
  renderCal();
}

// 어떤 날짜든 그 주(토~금) 금요일로 스냅
function snapToFriday(d) {
  const day = d.getDay(); // 0=일 ... 5=금 6=토
  // 토요일: 이미 새 주 시작 → 다음 금요일(+6)
  const diff = day === 6 ? 6 : (5 - day);
  const fri = new Date(d);
  fri.setDate(d.getDate() + diff);
  return fri;
}

function renderCal() {
  const label = document.getElementById('calMonthLabel');
  label.textContent = `${calYear}년 ${calMonth + 1}월`;

  const grid = document.getElementById('calGrid');
  const today = new Date();
  today.setHours(0,0,0,0);

  // 이번달 1일의 요일
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  // 이번달 마지막 날
  const lastDate = new Date(calYear, calMonth + 1, 0).getDate();

  let cells = [];

  // 앞 빈칸 (이전달 날짜로 채움)
  const prevLast = new Date(calYear, calMonth, 0).getDate();
  for (let i = firstDay - 1; i >= 0; i--) {
    cells.push({ day: prevLast - i, cur: false });
  }
  // 이번달
  for (let d = 1; d <= lastDate; d++) {
    cells.push({ day: d, cur: true });
  }
  // 뒤 빈칸
  const tail = 7 - (cells.length % 7);
  if (tail < 7) for (let d = 1; d <= tail; d++) cells.push({ day: d, cur: false });

  let html = '';
  cells.forEach((c, i) => {
    const dow = i % 7; // 0=일 ~ 6=토
    if (!c.cur) {
      html += `<div class="cal-cell other-month empty">${c.day}</div>`;
      return;
    }
    const date = new Date(calYear, calMonth, c.day);
    date.setHours(0,0,0,0);
    const fri = snapToFriday(date);
    const friKey = toKey(fri);
    const { sat } = weekRange(fri);

    // hover 주 범위인지
    const inHover = calHoverFri && friKey === toKey(calHoverFri);
    // 선택된 주 범위인지
    const inSel = calSelectedFri && friKey === toKey(calSelectedFri);
    const isFriEnd = dow === 5; // 금요일 칸
    const isToday = date.getTime() === today.getTime();

    let cls = 'cal-cell';
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    if (inHover) cls += ' week-hover';
    if (inHover && isFriEnd) cls += ' fri-end';
    if (inSel && !inHover) cls += ' week-selected';
    if (inSel && !inHover && isFriEnd) cls += ' fri-end';
    if (isToday) cls += ' today-marker';

    html += `<div class="${cls}"
      onmouseenter="calHover('${friKey}')"
      onmouseleave="calUnhover()"
      onclick="selectCalWeek('${friKey}')"
    >${c.day}</div>`;
  });

  grid.innerHTML = html;
}

function calHover(friKey) {
  calHoverFri = new Date(friKey);
  renderCal();
}
function calUnhover() {
  calHoverFri = null;
  renderCal();
}

function selectCalWeek(friKey) {
  const fri = new Date(friKey);
  const { sat } = weekRange(fri);
  calSelectedFri = fri;

  // 달력 토글 버튼 텍스트 = 금요일 날짜
  document.getElementById('calToggleLabel').textContent =
    `${toDisplay(fri)} (${toDisplay(sat)}~${toDisplay(fri)})`;

  // 결과 레이블
  document.getElementById('calResult').textContent =
    `▶ ${fri.getFullYear()}.${pad(fri.getMonth()+1)}.${pad(fri.getDate())} (금)`;

  // 달력 닫기
  document.getElementById('calPopup').classList.remove('open');

  renderCal();

  // 6주 목록 active 연동
  document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
  const match = document.querySelector(`.sb-item[data-period="${friKey}"]`);
  if (match) match.classList.add('active');

  state.type   = 'weekly';
  state.period = friKey;
  updateFrame();
  updateHeader();
}

// ── 선택 핸들러 ────────────────────────────────────
function selectPeriod(el) {
  document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  state.type   = el.dataset.type;
  state.period = el.dataset.period;    // 내부키 저장
  updateFrame();
  updateHeader();
}

function toggleWeekly() {
  // 더 이상 토글 없음 - 호환성 유지용 빈 함수
}

function switchTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  state.tab = el.dataset.tab;

  const isToolTab = state.tab === '팀Tool';
  document.getElementById('dashSidebar').style.display = isToolTab ? 'none' : 'block';
  document.getElementById('toolSidebar').style.display = isToolTab ? 'block' : 'none';

  if (isToolTab) {
    toolNav('tool/Tool_main.html', null);
    // 팀Tool 탭 진입 시 CSV 로드 (함수가 아래 정의되어 있어도 hoisting으로 동작)
    setTimeout(() => loadAndBroadcastCSV(false), 0);
  } else {
    updateFrame();
  }
}

// 팀Tool 내 메뉴 이동
function toolNav(path, el) {
  if (el) {
    document.querySelectorAll('#toolSidebar .sb-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
  }
  const frame = document.getElementById('mainFrame');
  frame.src = path;
  // iframe 로드 완료 후 CSV 캐시 전달
  frame.onload = () => { if (typeof pushCSVToFrame === 'function') pushCSVToFrame(); };
}

// ── iframe 갱신 ────────────────────────────────────
// 송출 포맷:
//   월간 → ?type=monthly&period=26.04월
//   주간 → ?type=weekly&period=260417
//   직접 → ?type=direct&period=260415
function updateFrame() {
  const base = TAB_MAP[state.tab];
  if (!base) return;
  const periodParam = toPeriodParam(state.type, state.period);
  const url = `${base}?type=${encodeURIComponent(state.type)}&period=${encodeURIComponent(periodParam)}`;
  document.getElementById('mainFrame').src = url;
}

// ── 헤더 날짜 ─────────────────────────────────────
function updateHeader() {
  const { type, period } = state;  // 헤더는 내부키 기준으로 읽기 편하게 표시
  let label = '';
  if (type === 'yearly') {
    label = `${period}년 연간`;
  } else if (type === 'monthly') {
    const [y, m] = period.split('-');
    label = `${y}년 기준 · ${parseInt(m)}월 마감`;
  } else if (type === 'weekly') {
    const fri = new Date(period);
    const { sat } = weekRange(fri);
    label = `주간 · ${toDisplay(sat)} ~ ${toDisplay(fri)}`;
  } else if (type === 'direct') {
    label = `직접선택 · ${period}`;
  }
  const now = new Date();
  document.getElementById('headerDate').textContent =
    `${label} · ${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())}`;
}

// ── 초기화 ─────────────────────────────────────────
function init() {
  const now = new Date();
  state.period = `${now.getFullYear()}-${pad(now.getMonth()+1)}`;  // 이번달
  renderMonthly();
  renderWeekly();
  updateHeader();
  updateFrame();
}

init();

// ═══════════════════════════════════════════════════
//  팀Tool CSV 데이터 공급자
//  switchTab / toolNav 는 위에서 이미 정의되어 있으므로
//  여기서는 CSV 로드 함수만 정의하고
//  switchTab / toolNav 안에서 직접 호출
// ═══════════════════════════════════════════════════

const toolDataChannel = new BroadcastChannel('as-tool-channel-v1');

const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
const CSV_URL = '/dashboard/data/가전마감.csv';

let csvCache = null;
let csvETag  = null;

function indexParseCSV(text) {
  const rows = [];
  let row = [], cur = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], nc = text[i+1];
    if (c === '"' && nc === '"')              { cur += '"'; i++; }
    else if (c === '"')                        { inQ = !inQ; }
    else if (c === ',' && !inQ)               { row.push(cur.trim()); cur = ''; }
    else if ((c === '\n' || c === '\r') && !inQ) {
      if (c === '\r' && nc === '\n') i++;
      row.push(cur.trim()); rows.push(row); row = []; cur = '';
    } else { cur += c; }
  }
  if (cur || row.length) { row.push(cur.trim()); rows.push(row); }
  return rows;
}

async function loadAndBroadcastCSV(force = false) {
  try {
    if (!force && csvCache) {
      const h = await fetch(CSV_URL, { method: 'HEAD', cache: 'no-cache' });
      const et = h.headers.get('ETag') || h.headers.get('Last-Modified') || '';
      if (et && et === csvETag) return;
      csvETag = et;
    }
    const res = await fetch(CSV_URL, { cache: 'no-cache' });
    if (!res.ok) throw new Error(res.status);
    csvETag  = res.headers.get('ETag') || res.headers.get('Last-Modified') || String(Date.now());
    csvCache = indexParseCSV(await res.text());

    toolDataChannel.postMessage({ type: 'CSV_DATA', rows: csvCache, loadedAt: new Date().toISOString() });
    pushCSVToFrame();
    console.log('[index] CSV 송출:', csvCache.length - 1, '행');
  } catch(e) { console.warn('[index] CSV 로드 실패:', e.message); }
}

function pushCSVToFrame() {
  if (!csvCache) return;
  const frame = document.getElementById('mainFrame');
  if (!frame || !frame.contentWindow) return;
  try {
    frame.contentWindow.postMessage({ type: 'CSV_DATA', rows: csvCache, loadedAt: new Date().toISOString() }, '*');
  } catch(e) {}
}

// BroadcastChannel 릴레이 (AS1→AS3 등 툴간 연동)
toolDataChannel.addEventListener('message', (e) => {
  const d = e.data || {};
  if (d.type === 'CSV_DATA') return; // 루프 방지
  const frame = document.getElementById('mainFrame');
  if (frame && frame.contentWindow) {
    try { frame.contentWindow.postMessage(d, '*'); } catch(e) {}
  }
});

// 5분마다 ETag 폴링
setInterval(() => { if (state.tab === '팀Tool') loadAndBroadcastCSV(false); }, 5 * 60 * 1000);
</script>
