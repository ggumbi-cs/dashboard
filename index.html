<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS · 품질관리 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f1f5f9; }
:root {
  --navy: #0f1f3d; --navyL: #1a2f52;
  --blue: #1e40af; --blueXL: #dbeafe;
  --teal: #0f766e; --tealXL: #ccfbf1;
  --amber: #b45309; --amberXL: #fef3c7;
  --red: #991b1b; --redXL: #fee2e2;
  --slate: #334155; --slateL: #64748b; --slateXL: #f1f5f9;
  --border: #e2e8f0;
}
.header1 { background: var(--navy); height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
.header2 { background: var(--navyL); height: 38px; display: flex; align-items: center; padding: 0 24px; gap: 2px; }
.title { font-size: 14px; font-weight: 700; color: #fff; }
.date-info { font-size: 11px; color: rgba(255,255,255,.35); margin-right: 10px; }
.period-btns, .tab-btns { display: flex; gap: 2px; }
.period-btn, .tab-btn { padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; background: transparent; color: rgba(255,255,255,.45); border: 1px solid rgba(255,255,255,.15); transition: all .15s; }
.period-btn.active { background: rgba(255,255,255,.15); color: #fff; border-color: rgba(255,255,255,.5); }
.tab-btn { border: none; font-size: 12px; padding: 6px 16px; color: rgba(255,255,255,.45); }
.tab-btn.active { background: rgba(255,255,255,.15); color: #fff; }
.content { padding: 20px 24px; }
.grid4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 14px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.grid32 { display: grid; grid-template-columns: 3fr 2fr; gap: 12px; margin-bottom: 12px; }
.kpi { background: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 16px 18px; }
.kpi-label { font-size: 11px; font-weight: 600; color: var(--slateL); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 6px; }
.kpi-value { font-size: 26px; font-weight: 700; color: var(--navy); line-height: 1; }
.kpi-sub { font-size: 12px; color: var(--slateL); margin-top: 5px; }
.card { background: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 18px 20px; }
.card-title { font-size: 13px; font-weight: 600; color: var(--navy); padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 14px; }
.hbar-row { display: grid; grid-template-columns: 140px 1fr 60px; align-items: center; gap: 8px; margin-bottom: 7px; }
.hbar-label { font-size: 12px; color: var(--slate); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hbar-track { background: var(--slateXL); border-radius: 2px; height: 16px; overflow: hidden; }
.hbar-fill { height: 100%; border-radius: 2px; transition: width .3s; }
.hbar-val { font-size: 12px; font-weight: 600; color: var(--navy); text-align: right; }
.badge { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-radius: 4px; margin-bottom: 6px; }
.badge-label { font-size: 13px; font-weight: 500; color: var(--navy); }
.badge-pct { font-size: 11px; font-weight: 600; border: 1px solid; border-radius: 3px; padding: 1px 7px; background: #fff; }
.badge-val { font-size: 14px; font-weight: 700; color: var(--navy); }
.section-label { font-size: 11px; font-weight: 700; color: var(--slateL); letter-spacing: .07em; text-transform: uppercase; margin: 16px 0 10px; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.no-data { color: var(--slateL); font-size: 13px; padding: 8px 0; }
.upload-area { background: #fff; border: 2px dashed var(--border); border-radius: 8px; padding: 20px; text-align: center; margin-bottom: 16px; }
.upload-area input { display: none; }
.upload-btn { display: inline-block; padding: 8px 20px; background: var(--navy); color: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; margin-top: 8px; }
.upload-status { font-size: 12px; color: var(--slateL); margin-top: 8px; }
.kpi8-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(210px,1fr)); gap: 10px; }
.kpi8-item { background: #fff; border: 1px solid var(--border); border-left: 4px solid #cbd5e1; border-radius: 6px; padding: 14px 16px; }
</style>
</head>
<body>

<div class="header1">
  <div class="title">CS · 품질관리 대시보드</div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="date-info" id="dateInfo"></div>
    <div class="period-btns">
      <button class="period-btn active" onclick="setPeriod('주간',this)">주간</button>
      <button class="period-btn" onclick="setPeriod('월간',this)">월간</button>
      <button class="period-btn" onclick="setPeriod('연간',this)">연간</button>
    </div>
  </div>
</div>
<div class="header2">
  <div class="tab-btns">
    <button class="tab-btn active" onclick="setTab('kpi',this)">주요KPI</button>
    <button class="tab-btn" onclick="setTab('cs',this)">상담실적</button>
    <button class="tab-btn" onclick="setTab('return',this)">반품현황</button>
    <button class="tab-btn" onclick="setTab('process',this)">처리현황</button>
    <button class="tab-btn" onclick="setTab('quality',this)">품질관리</button>
  </div>
</div>

<div class="content">
  <!-- CSV 업로드 -->
  <div class="upload-area">
    <div style="font-size:13px;color:var(--slateL);font-weight:600;">CSV 파일 일괄 업로드</div>
    <div style="font-size:12px;color:var(--slateL);margin-top:4px;">가전마감, 가전외마감, 반품현황 등 CSV 파일을 한꺼번에 선택하세요</div>
    <label class="upload-btn">파일 선택 <input type="file" id="csvInput" accept=".csv" multiple onchange="loadCSVs(this.files)"></label>
    <div class="upload-status" id="uploadStatus">파일을 선택하면 자동으로 대시보드가 갱신됩니다</div>
  </div>

  <!-- 탭별 콘텐츠 -->
  <div id="tab-kpi" class="tab-content active">
    <div style="font-size:12px;color:var(--slateL);margin-bottom:14px;font-weight:500;">데이터 연결 예정 항목 — 틀 구성 (2026년)</div>
    <div class="kpi8-grid" id="kpiGrid"></div>
  </div>

  <div id="tab-cs" class="tab-content">
    <div class="grid4" id="csKpis"></div>
    <div class="grid2">
      <div class="card"><div class="card-title">인입태그별 통계</div><div id="inTag"></div></div>
      <div class="card"><div class="card-title">상담태그별 통계</div><div id="csTag"></div></div>
    </div>
    <div class="grid2">
      <div class="card"><div class="card-title">통화성공율</div><div id="callRate"></div></div>
      <div class="card"><div class="card-title">만족도 월별 추이</div><div id="satisfy"></div></div>
    </div>
  </div>

  <div id="tab-return" class="tab-content">
    <div class="grid4" id="returnKpis"></div>
    <div class="grid2">
      <div class="card"><div class="card-title">꿈비 — 교환/반품 유형별</div><div id="ggumbiType"></div></div>
      <div class="card"><div class="card-title">소브 — 교환/반품 유형별</div><div id="sobType"></div></div>
    </div>
    <div class="grid2">
      <div class="card"><div class="card-title">꿈비 — 반품 사유</div><div id="ggumbiReason"></div></div>
      <div class="card"><div class="card-title">소브 — 반품 사유</div><div id="sobReason"></div></div>
    </div>
  </div>

  <div id="tab-process" class="tab-content">
    <div class="section-label">가전</div>
    <div class="grid4" id="processKpis"></div>
    <div class="grid2">
      <div class="card"><div class="card-title">자재출고 — 제품별</div><div id="partModel"></div></div>
      <div class="card"><div class="card-title">자재출고 — 부품별</div><div id="partItem"></div></div>
    </div>
    <div class="section-label">가전외</div>
    <div class="grid4" id="extKpis"></div>
    <div class="card"><div class="card-title">가전외 처리 모델 비율</div><div id="extModel"></div></div>
  </div>

  <div id="tab-quality" class="tab-content">
    <div class="grid4" id="qualityKpis"></div>
    <div class="grid32">
      <div class="card"><div class="card-title">불량 TOP5 — 제품별 비율</div><div id="top5List"></div></div>
      <div class="card"><div class="card-title">불량접수 현황 (구분별)</div><div id="defectByType"></div></div>
    </div>
    <div class="card"><div class="card-title">접수불량 유형 TOP10</div><div id="defectTop10"></div></div>
  </div>
</div>

<script>
const EXCLUDE = ["취소","수리제외"];
const KPI_ITEMS = [
  "신제품 출시 2주전 Q&A 30건 이상 작성",
  "Q&A 업데이트 후 24시간 내 AI 학습 반영",
  "VOC, A/S 불량율 주 1회 업데이트",
  "불량 예측지표 도입 : 위험품목 TOP5 선정",
  "AI 처리율 70% 이상",
  "주요 가전 품목 불량율 현황 공유",
  "가전 수리접수 7일이내 처리",
  "반복 A/S 품목 TOP3 분기별 개선안 제출"
];

let DB = {}, currentPeriod = "주간";

// 날짜 파싱 (한글 포함)
function pd(v) {
  if (!v) return null;
  let s = String(v).trim();
  s = s.replace(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/, (_,y,m,d) => `${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`);
  const d = new Date(s);
  return isNaN(d) ? null : d;
}

function inPeriod(v, period, allDates) {
  const d = pd(v);
  if (!d || d.getFullYear() < 2026) return false;
  const valid = allDates.map(pd).filter(x=>x&&x.getFullYear()===2026);
  if (!valid.length) return false;
  if (period==="연간") return d.getFullYear()===2026;
  if (period==="월간") {
    const latest = new Date(Math.max(...valid.map(x=>x.getTime())));
    return d.getFullYear()===latest.getFullYear() && d.getMonth()===latest.getMonth();
  }
  if (period==="주간") {
    const maxT = Math.max(...valid.map(x=>x.getTime()));
    return (maxT - d.getTime()) <= 7*24*60*60*1000;
  }
  return false;
}

function fg(rows, dateCol, extra) {
  const all = rows.map(r=>r[dateCol]);
  return rows.filter(r => {
    const d = pd(r[dateCol]);
    if (!d || d.getFullYear() < 2026) return false;
    if (!inPeriod(r[dateCol], currentPeriod, all)) return false;
    if (EXCLUDE.includes(String(r["진행상황"]||"").trim())) return false;
    return extra ? extra(r) : true;
  });
}

// CSV 로드
function loadCSVs(files) {
  const names = [];
  let loaded = 0;
  Array.from(files).forEach(file => {
    Papa.parse(file, {
      header: true, skipEmptyLines: true, dynamicTyping: true,
      complete: result => {
        DB[file.name] = result.data;
        names.push(file.name);
        loaded++;
        if (loaded === files.length) {
          document.getElementById("uploadStatus").textContent = `✅ ${names.join(", ")} 로드 완료`;
          render();
        }
      }
    });
  });
}

function setPeriod(p, btn) {
  currentPeriod = p;
  document.querySelectorAll(".period-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  render();
}

function setTab(t, btn) {
  document.querySelectorAll(".tab-content").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+t).classList.add("active");
  btn.classList.add("active");
}

// UI 헬퍼
function kpiCard(label, value, sub, accentColor) {
  return `<div class="kpi" style="border-top:3px solid ${accentColor}">
    <div class="kpi-label">${label}</div>
    <div class="kpi-value">${value}</div>
    ${sub?`<div class="kpi-sub">${sub}</div>`:""}
  </div>`;
}

function hbar(data, accent, max, unit="") {
  if (!data || !data.length) return `<div class="no-data">데이터 없음</div>`;
  const m = max || Math.max(...data.map(d=>d.v), 1);
  return data.slice(0,12).map(d=>`
    <div class="hbar-row">
      <div class="hbar-label" title="${d.l}">${d.l}</div>
      <div class="hbar-track"><div class="hbar-fill" style="width:${Math.max(Math.round(d.v/m*100),d.v>0?2:0)}%;background:${accent}"></div></div>
      <div class="hbar-val">${Number(d.v).toLocaleString()}${unit}</div>
    </div>`).join("");
}

function badge(label, value, pct, accent, bg) {
  return `<div class="badge" style="background:${bg}">
    <span class="badge-label">${label}</span>
    <div style="display:flex;gap:10px;align-items:center;">
      ${pct!=null?`<span class="badge-pct" style="color:${accent};border-color:${accent}">${pct}%</span>`:""}
      <span class="badge-val">${typeof value==="number"?value.toLocaleString():value}</span>
    </div>
  </div>`;
}

function groupBy(arr, key) {
  const m={};
  arr.forEach(r=>{ const k=String(r[key]||"기타"); m[k]=(m[k]||0)+(Number(r["건수"])||0); });
  return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(([l,v])=>({l,v}));
}

function render() {
  const now = new Date();
  document.getElementById("dateInfo").textContent = `2026년 기준 · ${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,"0")}.${String(now.getDate()).padStart(2,"0")} ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;

  const 가전 = DB["가전마감.csv"]||[];
  const 가전외 = DB["가전외마감.csv"]||[];
  const 반품현황r = DB["반품현황.csv"]||[];
  const 반품교환율r = DB["반품교환율.csv"]||[];
  const 상담태그r = DB["상담태그.csv"]||[];
  const 인입태그r = DB["인입태그.csv"]||[];
  const 통화성공율r = DB["통화성공율.csv"]||[];
  const 관여해결율r = DB["관여해결율.csv"]||[];
  const 만족도조사r = DB["만족도조사.csv"]||[];

  // KPI 탭
  document.getElementById("kpiGrid").innerHTML = KPI_ITEMS.map((k,i)=>`
    <div class="kpi8-item">
      <div style="font-size:11px;font-weight:600;color:var(--slateL);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px;">KPI ${String(i+1).padStart(2,"0")}</div>
      <div style="font-size:13px;color:var(--slate);line-height:1.5;">${k}</div>
      <div style="font-size:22px;font-weight:700;color:#cbd5e1;margin-top:10px;">—</div>
    </div>`).join("");

  // 상담실적
  const 반품f = r=>{const pw=String(r["주/월"]||"");return currentPeriod==="주간"?pw.includes("주"):currentPeriod==="월간"?pw.includes("월"):true;};
  const tagF = r=>{const yr=Number(r["년"]||0);if(yr&&yr<2026)return false;const pw=String(r["주/월"]||"");return currentPeriod==="주간"?pw.includes("주"):currentPeriod==="월간"?pw.includes("월"):true;};
  const 상담rows=상담태그r.filter(tagF), 인입rows=인입태그r.filter(tagF);
  const 통화rows=통화성공율r.filter(r=>{const yr=Number(r["년"]||0);if(yr&&yr<2026)return false;const pw=String(r["주기"]||"");return currentPeriod==="주간"?pw.includes("주"):currentPeriod==="월간"?pw.includes("월"):true;});
  const 만족최신=[...만족도조사r].filter(r=>{const d=pd(r["마감일"]);return d&&d.getFullYear()===2026;}).sort((a,b)=>pd(b["마감일"])-pd(a["마감일"]))[0];
  const 관여최신=[...관여해결율r].filter(r=>Number(r["년"]||0)===2026).sort((a,b)=>b["관여건"]-a["관여건"])[0];

  document.getElementById("csKpis").innerHTML =
    kpiCard("총 인입수", 인입rows.reduce((s,r)=>s+(Number(r["인입수"])||0),0).toLocaleString(), "", "#1e40af") +
    kpiCard("총 상담수", 상담rows.reduce((s,r)=>s+(Number(r["인입수"])||0),0).toLocaleString(), "", "#0f766e") +
    kpiCard("ALF 관여건", 관여최신?.["관여건"]??"-", "", "#b45309") +
    kpiCard("만족도", 만족최신?`${Number(만족최신["만족도"]||0).toFixed(1)}점`:"-", 만족최신?`참여율 ${만족최신["참여율"]||"-"}`:"2026년 데이터 없음", "#1e40af");

  document.getElementById("inTag").innerHTML = hbar(인입rows.reduce((acc,r)=>{
    const k=String(r["서비스태그"]||"기타"),v=Number(r["인입수"])||0;
    const e=acc.find(x=>x.l===k);e?e.v+=v:acc.push({l:k,v});return acc;},[]).sort((a,b)=>b.v-a.v),"#1e40af");
  document.getElementById("csTag").innerHTML = hbar(상담rows.reduce((acc,r)=>{
    const k=String(r["상담태그"]||"기타"),v=Number(r["인입수"])||0;
    const e=acc.find(x=>x.l===k);e?e.v+=v:acc.push({l:k,v});return acc;},[]).sort((a,b)=>b.v-a.v),"#0f766e");
  document.getElementById("callRate").innerHTML = hbar(통화rows.map(r=>({l:String(r["회차"]||r["마감일"]||""),v:parseFloat(String(r["통화 call"]||"0").replace(/[^0-9.]/g,""))||0})),"#b45309");
  document.getElementById("satisfy").innerHTML = hbar(만족도조사r.filter(r=>{const d=pd(r["마감일"]);return d&&d.getFullYear()===2026;}).map(r=>({l:String(r["월별"]||""),v:Number(r["만족도"])||0})),"#1e40af",5,"점");

  // 반품현황
  const 반품rows=반품현황r.filter(r=>{const yr=Number(String(r["마감회차"]||"").slice(0,4));if(yr&&yr<2026)return false;return 반품f(r);});
  const 꿈비반품=반품rows.filter(r=>String(r["구분"]||"").includes("꿈비"));
  const 소브반품=반품rows.filter(r=>String(r["구분"]||"").includes("소브"));
  const accentColors=["#991b1b","#b45309"];
  const 율data=반품교환율r.filter(r=>{const yr=Number(String(r["마감월"]||"").slice(0,4));return !yr||yr>=2026;}).slice(0,2);

  document.getElementById("returnKpis").innerHTML =
    kpiCard("꿈비 반품/교환", 꿈비반품.reduce((s,r)=>s+(Number(r["건수"])||0),0).toLocaleString(), "건", "#1e40af") +
    kpiCard("소브 반품/교환", 소브반품.reduce((s,r)=>s+(Number(r["건수"])||0),0).toLocaleString(), "건", "#0f766e") +
    율data.map((r,i)=>kpiCard(`반품/교환율 (${r["구분"]||""})`,String(r["반품/교환율"]||"-"),r["항목"]||"",accentColors[i])).join("");

  document.getElementById("ggumbiType").innerHTML = hbar(groupBy(꿈비반품,"교환/반품"),"#1e40af");
  document.getElementById("sobType").innerHTML = hbar(groupBy(소브반품,"교환/반품"),"#0f766e");
  document.getElementById("ggumbiReason").innerHTML = hbar(groupBy(꿈비반품,"사유"),"#0f1f3d");
  document.getElementById("sobReason").innerHTML = hbar(groupBy(소브반품,"사유"),"#334155");

  // 처리현황
  const 가전all=가전.map(r=>r["접수일"]);
  const 수리rows=fg(가전,"접수일",r=>["수리출고","점검"].includes(String(r["구분"]||"").trim()));
  const 무상=수리rows.filter(r=>String(r["유/무상"]||"").includes("무상")).length;
  const 유상=수리rows.filter(r=>String(r["유/무상"]||"").includes("유상")).length;
  const 유상금액=수리rows.filter(r=>String(r["유/무상"]||"").includes("유상")).reduce((s,r)=>s+(parseFloat(String(r["유상AS비용"]||"0").replace(/,/g,""))||0),0);
  const 자재rows=fg(가전,"접수일",r=>String(r["구분"]||"").trim()==="자재출고");
  const 자재모델={},자재부품={};
  자재rows.forEach(r=>{
    const k=String(r["제품명"]||"기타");자재모델[k]=(자재모델[k]||0)+1;
    String(r["사용부품"]||"").split(",").forEach(p=>{const pk=p.trim();if(pk)자재부품[pk]=(자재부품[pk]||0)+1;});
  });

  document.getElementById("processKpis").innerHTML =
    kpiCard("수리 총건", 수리rows.length.toLocaleString(), "", "#1e40af") +
    kpiCard("무상수리", 무상.toLocaleString(), `${수리rows.length?Math.round(무상/수리rows.length*100):0}%`, "#0f766e") +
    kpiCard("유상수리", 유상.toLocaleString(), `${수리rows.length?Math.round(유상/수리rows.length*100):0}%`, "#b45309") +
    kpiCard("유상 처리금액", `${Math.round(유상금액/10000).toLocaleString()}만`, "", "#991b1b");
  document.getElementById("partModel").innerHTML = hbar(Object.entries(자재모델).sort((a,b)=>b[1]-a[1]).map(([l,v])=>({l,v})),"#1e40af");
  document.getElementById("partItem").innerHTML = hbar(Object.entries(자재부품).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([l,v])=>({l,v})),"#0f766e");

  const 가전외all=가전외.map(r=>r["접수일자"]);
  const 가전외rows=가전외.filter(r=>{const d=pd(r["접수일자"]);return d&&d.getFullYear()===2026&&inPeriod(r["접수일자"],currentPeriod,가전외all);});
  const 가전외유상=가전외rows.filter(r=>String(r["유/무상"]||"").includes("유상"));
  const 가전외금액=가전외유상.reduce((s,r)=>s+(parseFloat(String(r["비용"]||"0").replace(/,/g,""))||0),0);
  const 가전외모델={};
  가전외rows.forEach(r=>{const k=String(r["상품명"]||"기타");가전외모델[k]=(가전외모델[k]||0)+1;});
  const 소요평균=가전외rows.length?(가전외rows.reduce((s,r)=>s+(Number(r["소요기간"])||0),0)/가전외rows.length).toFixed(1):"-";

  document.getElementById("extKpis").innerHTML =
    kpiCard("접수 건수", 가전외rows.length.toLocaleString(), "", "#1e40af") +
    kpiCard("유상 건수", 가전외유상.length.toLocaleString(), `${가전외rows.length?Math.round(가전외유상.length/가전외rows.length*100):0}%`, "#b45309") +
    kpiCard("유상 금액", `${Math.round(가전외금액/10000).toLocaleString()}만`, "", "#991b1b") +
    kpiCard("평균 소요기간", `${소요평균}일`, "", "#0f766e");
  document.getElementById("extModel").innerHTML = hbar(Object.entries(가전외모델).sort((a,b)=>b[1]-a[1]).map(([l,v])=>({l,v})),"#0f1f3d");

  // 품질관리
  const 품질rows=fg(가전,"접수일",r=>["수리출고","자재출고","교환/환불"].includes(String(r["구분"]||"").trim()));
  const 불량집계={};
  품질rows.forEach(r=>{const k=String(r["제품명"]||"기타").trim();불량집계[k]=(불량집계[k]||0)+1;});
  const top5=Object.entries(불량집계).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const 총불량=Object.values(불량집계).reduce((a,b)=>a+b,0);
  const 불량접수집계={};
  품질rows.forEach(r=>{String(r["접수불량"]||"").split(",").forEach(t=>{const k=t.trim();if(k)불량접수집계[k]=(불량접수집계[k]||0)+1;});});
  const 불량접수top=Object.entries(불량접수집계).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([l,v])=>({l,v}));

  const qColors=["#991b1b","#b45309","#1e40af"];
  document.getElementById("qualityKpis").innerHTML =
    kpiCard("불량 접수 총건", 총불량.toLocaleString(), "", "#991b1b") +
    top5.slice(0,3).map(([l,v],i)=>kpiCard(`불량 ${i+1}위`,l.replace("[꿈비] ","").slice(0,14),`${v.toLocaleString()}건 · ${총불량?Math.round(v/총불량*100):0}%`,qColors[i])).join("");

  const bgColors=["#fee2e2","#fef3c7","#dbeafe","#ccfbf1","#f1f5f9"];
  document.getElementById("top5List").innerHTML = top5.map(([l,v],i)=>
    badge(`${i+1}. ${l.replace("[꿈비] ","")}`, v, 총불량?Math.round(v/총불량*100):0, qColors[i]||"#334155", bgColors[i])).join("");

  const typeColors=["#1e40af","#0f766e","#b45309"];
  const typeBgs=["#dbeafe","#ccfbf1","#fef3c7"];
  document.getElementById("defectByType").innerHTML = ["수리출고","자재출고","교환/환불"].map((구분,i)=>{
    const cnt=fg(가전,"접수일",r=>String(r["구분"]||"").trim()===구분).length;
    return badge(구분, cnt, 총불량?Math.round(cnt/총불량*100):0, typeColors[i], typeBgs[i]);
  }).join("");

  document.getElementById("defectTop10").innerHTML = hbar(불량접수top,"#991b1b");
}

// 초기 렌더
render();
</script>
</body>
</html>
