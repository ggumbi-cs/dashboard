<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>엄마감동팀</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f1f5f9;min-height:100vh;}
button{cursor:pointer;font-family:inherit;}
@keyframes sp{to{transform:rotate(360deg)}}
#hdr1{background:#0f1f3d;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
#hdr1 .title{font-size:14px;font-weight:700;color:#fff;letter-spacing:-0.02em;}
#hdr1 .period-btns button{padding:4px 12px;border-radius:4px;font-size:11px;font-weight:600;background:transparent;color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.15);margin-left:2px;}
#hdr1 .period-btns button.active{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.5);}
#hdr2{background:#1a2f52;height:38px;display:flex;align-items:center;padding:0 20px;gap:2px;position:sticky;top:44px;z-index:100;}
#hdr2 button{padding:5px 16px;border:none;border-radius:4px;font-size:12px;font-weight:600;background:transparent;color:rgba(255,255,255,.45);}
#hdr2 button.active{background:rgba(255,255,255,.18);color:#fff;}
#content{padding:16px 20px 40px;}
.kpi-grid{display:grid;gap:10px;margin-bottom:14px;}
.kpi-grid.col4{grid-template-columns:repeat(4,1fr);}
.kpi-grid.col3{grid-template-columns:repeat(3,1fr);}
.kpi-card{background:#fff;border:1px solid #e2e8f0;border-top:3px solid #1e40af;border-radius:6px;padding:14px 16px;min-width:0;}
.kpi-label{font-size:11px;font-weight:600;color:#64748b;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.kpi-value{font-size:22px;font-weight:700;color:#0f1f3d;line-height:1;}
.kpi-sub{font-size:12px;color:#64748b;margin-top:4px;}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:16px 18px;margin-bottom:12px;}
.card-header{padding-bottom:10px;border-bottom:1px solid #e2e8f0;margin-bottom:14px;}
.card-title{font-size:13px;font-weight:600;color:#0f1f3d;}
.card-sub{font-size:11px;color:#64748b;margin-top:2px;}
.hbar-wrap{display:flex;flex-direction:column;gap:6px;}
.hbar-row{display:grid;grid-template-columns:130px 1fr 56px;align-items:center;gap:8px;}
.hbar-label{font-size:12px;color:#334155;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hbar-track{background:#f1f5f9;border-radius:2px;height:16px;overflow:hidden;}
.hbar-fill{height:100%;border-radius:2px;}
.hbar-val{font-size:12px;font-weight:600;color:#0f1f3d;text-align:right;}
.no-data{color:#64748b;font-size:13px;padding:8px 0;}
.section-title{font-size:12px;font-weight:700;color:#fff;padding:6px 14px;border-radius:4px;margin-bottom:12px;margin-top:4px;}
.sub-label{background:rgba(30,64,175,0.07);border-radius:6px;padding:8px 14px;margin-bottom:12px;font-size:11px;color:#1e40af;font-weight:700;}
.gaug-card{background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:14px 16px;min-width:0;}
.gaug-label{font-size:11px;font-weight:600;color:#64748b;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
.gaug-nums{display:flex;gap:6px;align-items:flex-end;margin-bottom:10px;}
.gaug-main{font-size:24px;font-weight:700;}
.gaug-sub-num{font-size:13px;color:#64748b;margin-bottom:3px;}
.gaug-bar{display:flex;border-radius:4px;overflow:hidden;height:10px;}
.gaug-legend{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;font-weight:600;}
.rank-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:4px;margin-bottom:6px;}
.rank-right{display:flex;gap:8px;align-items:center;}
.rank-pct{font-size:11px;font-weight:600;border-radius:3px;padding:1px 7px;background:#fff;}
.rank-val{font-size:14px;font-weight:700;color:#0f1f3d;}
.prepare{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:16px;}
.prepare h2{font-size:20px;font-weight:700;color:#0f1f3d;}
.soon{background:#dbeafe;border:1px solid #1e40af;border-radius:8px;padding:8px 20px;font-size:12px;color:#1e40af;font-weight:600;}
</style>
</head>

function el(tag,cls,sty,html){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(sty)Object.assign(e.style,sty);
  if(html!==undefined)e.innerHTML=html;
  return e;
}
function app(p,...ch){ch.forEach(c=>{if(c)p.appendChild(c);});return p;}

// 안전한 숫자 변환
function safeNum(v){return(typeof v==="number"&&!isNaN(v))?v:0;}
function safeArr(v){return Array.isArray(v)?v:[];}
function safeStr(v){return v!=null?String(v):"-";}

function kpiCard(label,value,sub,accent){
  const d=el("div","kpi-card");
  d.style.borderTopColor=accent||C.blue;
  d.innerHTML=`<div class="kpi-label">${label}</div><div class="kpi-value">${value??"-"}</div>${sub?`<div class="kpi-sub">${sub}</div>`:""}`;
  return d;
}

function hbar(data,accent,maxV,unit){
  const arr=safeArr(data).filter(d=>d&&safeNum(d.v)>0);
  if(!arr.length)return el("div","no-data",null,"데이터 없음");
  const m=maxV||Math.max(...arr.map(d=>safeNum(d.v)),1);
  const wrap=el("div","hbar-wrap");
  arr.slice(0,12).forEach(d=>{
    const pct=Math.max(Math.round(safeNum(d.v)/m*100),2);
    wrap.innerHTML+=`<div class="hbar-row"><div class="hbar-label" title="${d.l||""}">${d.l||""}</div><div class="hbar-track"><div class="hbar-fill" style="width:${pct}%;background:${accent||C.blue}"></div></div><div class="hbar-val">${safeNum(d.v).toLocaleString()}${unit||""}</div></div>`;
  });
  return wrap;
}

function card(title,sub,children){
  const d=el("div","card");
  app(d,el("div","card-header",null,`<div class="card-title">${title}</div>${sub?`<div class="card-sub">${sub}</div>`:""}`));
  if(children)d.appendChild(children);
  return d;
}

function grid(cols,gap,items){
  const d=el("div");
  d.style.cssText=`display:grid;grid-template-columns:${cols};gap:${gap||12}px;margin-bottom:12px;`;
  items.filter(Boolean).forEach(i=>d.appendChild(i));
  return d;
}

function sectionTitle(text,color){
  const d=el("div","section-title",null,text);
  d.style.background=color||C.navy;
  return d;
}
function subLabel(text){return el("div","sub-label",null,text);}

function gaugCard(label,total,가전,가전외,a1,a2){
  const t=safeNum(total),g=safeNum(가전),ge=safeNum(가전외);
  const p1=t?Math.round(g/t*100):0,p2=t?Math.round(ge/t*100):0;
  const d=el("div","gaug-card");
  d.style.borderTop=`3px solid ${a1}`;
  d.innerHTML=`<div class="gaug-label">${label}</div><div class="gaug-nums"><span class="gaug-main" style="color:${a1}">${g.toLocaleString()}</span><span class="gaug-sub-num">/ ${ge.toLocaleString()}</span></div><div class="gaug-bar"><div style="width:${p1}%;background:${a1}"></div><div style="flex:1;background:${a2}"></div></div><div class="gaug-legend"><span style="color:${a1}">가전 ${p1}%</span><span style="color:${a2}">가전외 ${p2}%</span></div>`;
  return d;
}

// ── 도넛 카드 (교환/반품) ──────────────────────────────
function donutCard(label,total,교환,반품,accent){
  const t=safeNum(total),교=safeNum(교환),반=safeNum(반품);
  const p교=t?Math.round(교/t*100):0, p반=t?Math.round(반/t*100):0;
  const d=el("div","kpi-card");
  d.style.borderTopColor=accent;
  const size=80,cx=40,cy=40,r=34,ri=22;
  
  let svgPaths="";
  if(t>0){
    [[교,accent,p교,"교환"],[반,"rgba(30,64,175,0.25)",p반,"반품"]].reduce((ang,item)=>{
      const[v,color,pct,name]=item;
      if(v<=0)return ang;
      const sweep=(v/t)*Math.PI*2;
      const x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang);
      const x2=cx+r*Math.cos(ang+sweep),y2=cy+r*Math.sin(ang+sweep);
      const xi1=cx+ri*Math.cos(ang),yi1=cy+ri*Math.sin(ang);
      const xi2=cx+ri*Math.cos(ang+sweep),yi2=cy+ri*Math.sin(ang+sweep);
      const lg=sweep>Math.PI?1:0;
      svgPaths+=`<path d="M ${xi1} ${yi1} L ${x1} ${y1} A ${r} ${r} 0 ${lg} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${ri} ${ri} 0 ${lg} 0 ${xi1} ${yi1} Z" fill="${color}" stroke="#fff" stroke-width="1.5"/>`;
      return ang+sweep;
    },-Math.PI/2);
  } else {
    svgPaths=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="#f1f5f9"/><circle cx="${cx}" cy="${cy}" r="${ri}" fill="#fff"/>`;
  }

  d.innerHTML=`<div class="kpi-label">${label}</div>
    <div style="display:flex;align-items:center;gap:12px;margin-top:4px;">
      <svg viewBox="0 0 ${size} ${size}" style="width:${size}px;height:${size}px;flex-shrink:0;">${svgPaths}
        <text x="${cx}" y="${cy-3}" text-anchor="middle" fill="#0f1f3d" font-size="11" font-weight="700" font-family="'Apple SD Gothic Neo',sans-serif">${t.toLocaleString()}</text>
        <text x="${cx}" y="${cy+10}" text-anchor="middle" fill="#64748b" font-size="8" font-family="'Apple SD Gothic Neo',sans-serif">건</text>
      </svg>
      <div style="flex:1;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="display:flex;align-items:center;gap:4px;font-size:11px;color:#334155;"><span style="width:8px;height:8px;border-radius:2px;background:${accent};display:inline-block;"></span>교환</span>
          <span style="font-size:12px;font-weight:700;color:#0f1f3d;">${교.toLocaleString()}<span style="font-size:10px;color:#64748b;font-weight:400;"> (${p교}%)</span></span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="display:flex;align-items:center;gap:4px;font-size:11px;color:#334155;"><span style="width:8px;height:8px;border-radius:2px;background:rgba(30,64,175,0.25);display:inline-block;"></span>반품</span>
          <span style="font-size:12px;font-weight:700;color:#0f1f3d;">${반.toLocaleString()}<span style="font-size:10px;color:#64748b;font-weight:400;"> (${p반}%)</span></span>
        </div>
      </div>
    </div>`;
  return d;
}

// ── 파이차트 SVG ──────────────────────────────────────────
function pieSection(data, colors, title, sub){

  wrap.style.cssText="display:flex;gap:16px;align-items:flex-start;";

    return card(title,sub,wrap);
  }
  
  const size=150,cx=75,cy=75,r=68,ri=r*0.52;
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox",`0 0 ${size} ${size}`);
  svg.style.cssText=`width:${size}px;height:${size}px;flex-shrink:0;`;
  
  let angle=-Math.PI/2;
  arr.slice(0,10).forEach((d,i)=>{

    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);

    const xi1=cx+ri*Math.cos(angle),yi1=cy+ri*Math.sin(angle);
    const xi2=cx+ri*Math.cos(angle+sweep),yi2=cy+ri*Math.sin(angle+sweep);
    const lg=sweep>Math.PI?1:0;
    const path=document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",`M ${xi1} ${yi1} L ${x1} ${y1} A ${r} ${r} 0 ${lg} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${ri} ${ri} 0 ${lg} 0 ${xi1} ${yi1} Z`);
    path.setAttribute("fill",colors[i%colors.length]);
    path.setAttribute("stroke","#fff");
    path.setAttribute("stroke-width","1.5");
    svg.appendChild(path);
    angle+=sweep;
  });
  const tTotal=document.createElementNS("http://www.w3.org/2000/svg","text");
  tTotal.setAttribute("x",cx);tTotal.setAttribute("y",cy-3);
  tTotal.setAttribute("text-anchor","middle");tTotal.setAttribute("fill","#0f1f3d");
  tTotal.setAttribute("font-size","12");tTotal.setAttribute("font-weight","700");
  tTotal.setAttribute("font-family","'Apple SD Gothic Neo',sans-serif");
  tTotal.textContent=total.toLocaleString();
  svg.appendChild(tTotal);
  const tUnit=document.createElementNS("http://www.w3.org/2000/svg","text");
  tUnit.setAttribute("x",cx);tUnit.setAttribute("y",cy+11);
  tUnit.setAttribute("text-anchor","middle");tUnit.setAttribute("fill","#64748b");
  tUnit.setAttribute("font-size","9");tUnit.setAttribute("font-family","'Apple SD Gothic Neo',sans-serif");
  tUnit.textContent="건";
  svg.appendChild(tUnit);

  const legend=el("div");
  legend.style.cssText="flex:1;display:flex;flex-direction:column;gap:5px;overflow:hidden;justify-content:center;";
  arr.slice(0,10).forEach((d,i)=>{
    const pct=Math.round(safeNum(d.v)/total*100);
    const row=el("div");
    row.style.cssText="display:flex;align-items:center;gap:5px;";
    row.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:${colors[i%colors.length]};flex-shrink:0;"></span><span style="font-size:11px;color:#334155;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${d.l||""}</span><span style="font-size:11px;font-weight:600;color:#0f1f3d;flex-shrink:0;">${pct.toFixed(1)}% (${safeNum(d.v).toLocaleString()}건)</span>`;
    legend.appendChild(row);

  return card(title,sub,wrap);
}

// ── 누적 꺾은선 차트 (3종) ────────────────────────────────
function cumulativeLineChart(data, title, sub){
  const arr=safeArr(data).filter(d=>d&&safeNum(d.total)>0);
  if(!arr.length) return card(title,sub,el("div","no-data",null,"데이터 없음"));
  const C교환="#e57373", C수리="#ef9a9a", C자재="#ffcdd2";
  const w=460, h=130, padL=44, padR=12, padT=14, padB=32;
  const cW=w-padL-padR, cH=h-padT-padB;
  const maxV=Math.max(...arr.map(d=>safeNum(d.total)),1);
  const n=arr.length;
  const xStep=n>1?cW/(n-1):cW/2;

  function px(i){ return padL + (n>1 ? i*xStep : cW/2); }
  function py(v){ return padT + cH - Math.round((v/maxV)*cH); }

  // Y축 눈금
  const yTicks=4;
  let yLines="", yLabels="";
  for(let i=0;i<=yTicks;i++){
    const v=Math.round(maxV/yTicks*i);
    const y=py(v);
    yLines+=`<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="#f1f5f9" stroke-width="1"/>`;
    yLabels+=`<text x="${padL-6}" y="${y+4}" text-anchor="end" fill="#94a3b8" font-size="9" font-family="'Apple SD Gothic Neo',sans-serif">${v>=1000?(v/1000).toFixed(1)+"k":v}</text>`;
  }

  // 3종 라인 + 포인트
  function makeLine(key, color, dash=""){
    const pts=arr.map((d,i)=>`${px(i)},${py(safeNum(d[key]))}`).join(" ");
    const circles=arr.map((d,i)=>`<circle cx="${px(i)}" cy="${py(safeNum(d[key]))}" r="3.5" fill="${color}" stroke="#fff" stroke-width="1.5"><title>${d.l}: ${safeNum(d[key]).toLocaleString()}건</title></circle>`).join("");
    return `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" ${dash?`stroke-dasharray="${dash}"`:""}/>${circles}`;
  }

  // total 라인 (진하게)
  function makeTotalLine(){
    const pts=arr.map((d,i)=>`${px(i)},${py(safeNum(d.total))}`).join(" ");
    // 면적 채우기
    const areaBot=padT+cH;
    const areaPts=`${px(0)},${areaBot} ${pts} ${px(n-1)},${areaBot}`;
    const circles=arr.map((d,i)=>{
      const v=safeNum(d.total);
      return `<circle cx="${px(i)}" cy="${py(v)}" r="4.5" fill="#c0392b" stroke="#fff" stroke-width="2"><title>${d.l} 누적합계: ${v.toLocaleString()}건</title></circle>
<text x="${px(i)}" y="${py(v)-9}" text-anchor="middle" fill="#c0392b" font-size="9" font-weight="700" font-family="'Apple SD Gothic Neo',sans-serif">${v.toLocaleString()}</text>`;
    }).join("");
    return `<polygon points="${areaPts}" fill="rgba(224,79,79,0.07)"/>
<polyline points="${pts}" fill="none" stroke="#c0392b" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>${circles}`;
  }

  // X축 라벨
  const xLabels=arr.map((d,i)=>`<text x="${px(i)}" y="${h-4}" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="'Apple SD Gothic Neo',sans-serif">${(d.l||"").replace("26.","")}</text>`).join("");

  const svgContent=`${yLines}${yLabels}
${makeLine("교환",C교환)}
${makeLine("수리",C수리,"4 2")}
${makeLine("자재",C자재,"2 2")}
${makeTotalLine()}
${xLabels}`;

  const wrap=el("div");
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox",`0 0 ${w} ${h}`);
  svg.style.cssText=`width:100%;height:auto;overflow:visible;`;
  svg.innerHTML=svgContent;
  wrap.appendChild(svg);

  // 범례
  const leg=el("div");
  leg.style.cssText="display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;";
  [["#c0392b","누적합계",""],["#e57373","교환/환불",""],["#ef9a9a","수리출고","4 2"],["#ffcdd2","자재출고","2 2"]].forEach(([color,label,dash])=>{
    const item=el("div");
    item.style.cssText="display:flex;align-items:center;gap:4px;font-size:11px;color:#334155;";
    const svgIcon=`<svg width="20" height="10" style="flex-shrink:0"><line x1="0" y1="5" x2="20" y2="5" stroke="${color}" stroke-width="${label==="누적합계"?"2.5":"2"}" ${dash?`stroke-dasharray="${dash}"`:""}/>${label==="누적합계"?`<circle cx="10" cy="5" r="3" fill="${color}"/>`:`<circle cx="10" cy="5" r="2.5" fill="${color}"/>`}</svg>`;
    item.innerHTML=svgIcon+`<span>${label}</span>`;
    leg.appendChild(item);
  });
  wrap.appendChild(leg);
  return card(title,sub,wrap);
}

  } else {
    arr.forEach(function(d,i){
      var sweep=(d.v/tot)*Math.PI*2;
      if(sweep<=0)return;
      var x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
      var x2=cx+r*Math.cos(angle+sweep),y2=cy+r*Math.sin(angle+sweep);
      var xi1=cx+ri*Math.cos(angle),yi1=cy+ri*Math.sin(angle);
      var xi2=cx+ri*Math.cos(angle+sweep),yi2=cy+ri*Math.sin(angle+sweep);
      var lg=sweep>Math.PI?1:0;
      var color=colors[i%colors.length];
      svgHtml+='<path d="M '+xi1+' '+yi1+' L '+x1+' '+y1+' A '+r+' '+r+' 0 '+lg+' 1 '+x2+' '+y2+' L '+xi2+' '+yi2+' A '+ri+' '+ri+' 0 '+lg+' 0 '+xi1+' '+yi1+' Z" fill="'+color+'" stroke="#fff" stroke-width="1.2"/>';
      angle+=sweep;
    });
  }
  svgHtml+='<text x="'+cx+'" y="'+(cy-3)+'" text-anchor="middle" fill="#0f1f3d" font-size="11" font-weight="700" font-family="Apple SD Gothic Neo,sans-serif">'+total+'</text>';
  svgHtml+='<text x="'+cx+'" y="'+(cy+11)+'" text-anchor="middle" fill="#64748b" font-size="9" font-family="Apple SD Gothic Neo,sans-serif">건</text>';

  // 범례 HTML
  var legHtml="";
  arr.slice(0,6).forEach(function(item,i){
    var pct=((item.v/tot)*100).toFixed(1);
    var color=colors[i%colors.length];
    legHtml+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:3px;">'
      +'<span style="width:6px;height:6px;border-radius:50%;background:'+color+';flex-shrink:0;"></span>'
      +'<span style="font-size:10px;color:#334155;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+item.l+'</span>'
      +'<span style="font-size:10px;font-weight:600;color:#0f1f3d;flex-shrink:0;">'+pct+'% ('+item.v+'건)</span>'
      +'</div>';
  });
  if(!legHtml) legHtml='<div style="font-size:10px;color:#94a3b8;padding:4px 0;">데이터 없음</div>';

  var wrap=document.createElement("div");
  wrap.className="card";
  wrap.style.cssText="padding:12px 14px;margin-bottom:0;";
  wrap.innerHTML='<div style="font-size:11px;font-weight:600;color:#0f1f3d;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+shortName+'">'+shortName+'</div>'
    +'<div style="display:flex;gap:10px;align-items:flex-start;">'
    +'<svg viewBox="0 0 '+size+' '+size+'" width="'+size+'" height="'+size+'" style="flex-shrink:0;">'+svgHtml+'</svg>'
    +'<div style="flex:1;min-width:0;">'+legHtml+'</div>'
    +'</div>';
  return wrap;
}

// ── 반품현황 브랜드 렌더 ─────────────────────────────────
function renderBrand(cnt, R, period, prefix, a1, a2){
  const 총건=safeNum(R[prefix+"총건"]);
  const 가전총=safeNum(R[prefix+"가전총"]);
  const 가전외총=safeNum(R[prefix+"가전외총"]);
  const 유형=safeArr(R[prefix+"유형"]);
  const 교환=safeNum(유형.find(d=>d.l==="교환")?.v);
  const 반품=safeNum(유형.find(d=>d.l==="반품")?.v);
  const 교환율=R[prefix+"교환율"]!=null?`${R[prefix+"교환율"]}%`:"-";
  const 기준월=R["기준월"]||"";
  const 사유=safeArr(R[prefix+"사유"]).filter(d=>safeNum(d.v)>0);
  const 월별=safeArr(R[prefix+"월별"]);
  const 주간추이=safeArr(R[prefix+"주간추이"]);

  const PIE_꿈비=["#1e40af","#3b82f6","#60a5fa","#93c5fd","#1e3a8a","#1d4ed8","#6d28d9","#7c3aed","#2563eb","#bfdbfe"];
  const PIE_소브=["#0f766e","#14b8a6","#2dd4bf","#0d9488","#115e59","#0891b2","#0ea5e9","#99f6e4","#134e4a","#ccfbf1"];
  const PIE = prefix==="꿈비"?PIE_꿈비:PIE_소브;

  // KPI 4칸
  app(cnt, grid("repeat(4,1fr)",10,[
    kpiCard("반품/교환 총계",총건.toLocaleString(),`${period} 기준`,a1),
    gaugCard("가전 / 가전외",총건,가전총,가전외총,a1,a2),
    donutCard("교환 / 반품",총건,교환,반품,a1),
    kpiCard("반품/교환율",교환율,기준월,C.red),
  ]));

  // 차트 2칸: 사유 파이 + 추이
  const 일자별=safeArr(R[prefix+"일자별추이"]);
  let trendCard;
  if(period==="주간"){
    if(prefix==="꿈비"&&일자별.length>0){
      trendCard=singleBarChart(일자별, a1, `${prefix} — 일자별 교환/환불 추이`, "영업일 기준 최근 10일");
    } else {
      trendCard=trendBarChart(주간추이.slice(-8), a1, a2, `${prefix} — 주차별 추이`, "최근 8주 기준");
    }
  } else if(period==="월간"){
    trendCard=trendBarChart(주간추이.slice(-8), a1, a2, `${prefix} — 주차별 추이`, "최근 8주 · 주간 마감 기준");
  } else {
    trendCard=trendBarChart(월별, a1, a2, `${prefix} — 월별 반품/교환 추이`, "월간 마감 기준");
  }

  app(cnt, grid("1fr 1fr",12,[
    pieSection(사유.slice(0,9), PIE, `${prefix} — 반품 사유 비율`, null),
    trendCard,
  ]));
}

function render(){

    const IMP=DATA["개선품질"]?.[period]||{};

    const 목록=safeArr(IMP.목록);
    const 진행단계=safeArr(IMP.진행단계집계);
    const STAGE_COLOR={"1-1. 샘플테스트":C.teal,"1-2. 개선요청":C.blue,"취소_발주중단":C.slateL};
    const KW_COLORS=["#1e40af","#0f766e","#b45309","#991b1b","#6d28d9","#0891b2","#065f46","#92400e"];
    const 개선요청건=safeNum(진행단계.find(d=>d.l==="1-2. 개선요청")?.v);
    const 샘플테스트건=safeNum(진행단계.find(d=>d.l==="1-1. 샘플테스트")?.v);
    const 취소건=safeNum(진행단계.find(d=>d.l==="취소_발주중단")?.v);
    const top5=safeArr(Q.top5), top5총=safeNum(Q.총불량);
    const bgColors=[C.redXL,C.amberXL,C.blueXL,C.tealXL,"#f1f5f9"];
    const fgColors=[C.red,C.amber,C.blue,C.teal,C.slate];

    // ── 1. 불량 TOP.5 섹션 (KPI행 대체) ─────────────────────
    const top5KpiRow=el("div");
    top5KpiRow.style.cssText="display:grid;grid-template-columns:1.2fr repeat(5,1fr);gap:10px;margin-bottom:14px;";
    const 총건card=el("div","kpi-card");
    총건card.style.borderTopColor=C.red;
    총건card.innerHTML=`<div class="kpi-label">불량인입 총건</div><div class="kpi-value">${top5총.toLocaleString()}</div><div class="kpi-sub">${period} 기준</div>`;
    top5KpiRow.appendChild(총건card);
    top5.slice(0,5).forEach((d,i)=>{
      const c=el("div","kpi-card");
      c.style.borderTopColor=fgColors[i];
      const name=(d.l||"").replace("[꿈비] ","").replace("[집계] ","");
      const shortName=name.length>10?name.slice(0,10)+"…":name;
      const pct=top5총?Math.round(safeNum(d.v)/top5총*100):0;
      c.innerHTML=`<div class="kpi-label" style="color:${fgColors[i]}">TOP${i+1}</div><div class="kpi-value" style="font-size:13px;font-weight:700;color:#0f1f3d;line-height:1.3;word-break:keep-all;">${shortName}</div><div class="kpi-sub">${safeNum(d.v).toLocaleString()}건 · ${pct}%</div>`;
      top5KpiRow.appendChild(c);
    });
    app(cnt, sectionTitle("1. 불량 TOP.5 (접수일 기준)", C.red), top5KpiRow);

    (function(){
      var 제품모델=safeArr(Q.제품모델비율);
      var top5접수불량=Q.top5_접수불량||{};
      var 구분별=safeArr(Q.구분별);
      var PIE_BIG=["#1e40af","#0f766e","#b45309","#991b1b","#6d28d9","#0891b2","#065f46","#92400e","#1e3a8a","#134e4a"];
      var TOP5C=[
        ["#1e40af","#3b82f6","#93c5fd","#bfdbfe","#1d4ed8","#60a5fa"],
        ["#0f766e","#14b8a6","#2dd4bf","#99f6e4","#0d9488","#5eead4"],
        ["#b45309","#f59e0b","#fcd34d","#fef3c7","#d97706","#fbbf24"],
        ["#991b1b","#ef4444","#fca5a5","#fee2e2","#dc2626","#f87171"],
        ["#6d28d9","#8b5cf6","#c4b5fd","#ede9fe","#7c3aed","#a78bfa"]
      ];

      function makePie(data,total,colors,size){
        var arr=(data||[]).filter(function(d){return (d.v||0)>0;});
        var cx=size/2,cy=size/2,r=size/2-4,ri=r*0.52;
        var tot=arr.reduce(function(s,d){return s+(d.v||0);},0)||1;
        var paths='';
        var ang=-Math.PI/2;
        if(arr.length===0){
          paths='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="#e2e8f0"/><circle cx="'+cx+'" cy="'+cy+'" r="'+ri+'" fill="#fff"/>';
        } else {
          arr.forEach(function(d,i){
            var sw=(d.v/tot)*Math.PI*2;
            if(sw<=0.01)return;
            var x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang);
            var x2=cx+r*Math.cos(ang+sw),y2=cy+r*Math.sin(ang+sw);
            var xi1=cx+ri*Math.cos(ang),yi1=cy+ri*Math.sin(ang);
            var xi2=cx+ri*Math.cos(ang+sw),yi2=cy+ri*Math.sin(ang+sw);
            var lg=sw>Math.PI?1:0;
            paths+='<path d="M '+xi1+' '+yi1+' L '+x1+' '+y1+' A '+r+' '+r+' 0 '+lg+' 1 '+x2+' '+y2+' L '+xi2+' '+yi2+' A '+ri+' '+ri+' 0 '+lg+' 0 '+xi1+' '+yi1+' Z" fill="'+colors[i%colors.length]+'" stroke="#fff" stroke-width="1.5"/>';
            ang+=sw;
          });
        }
        paths+='<text x="'+cx+'" y="'+(cy-3)+'" text-anchor="middle" fill="#0f1f3d" font-size="'+(size>120?14:11)+'" font-weight="700" font-family="Apple SD Gothic Neo,sans-serif">'+total.toLocaleString()+'</text>';
        paths+='<text x="'+cx+'" y="'+(cy+12)+'" text-anchor="middle" fill="#64748b" font-size="9" font-family="Apple SD Gothic Neo,sans-serif">건</text>';
        return '<svg viewBox="0 0 '+size+' '+size+'" width="'+size+'" height="'+size+'" style="display:block;flex-shrink:0;">'+paths+'</svg>';
      }

      function makeLegend(data,colors,maxItems){
        var arr=(data||[]).slice(0,maxItems||8);
        var tot=arr.reduce(function(s,d){return s+(d.v||0);},0)||1;
        var html='';
        arr.forEach(function(d,i){
          var pct=((d.v||0)/tot*100).toFixed(1);
          var name=(d.l||'').replace('[꿈비] ','').replace('[집계] ','');
          html+='<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;">'
            +'<span style="width:8px;height:8px;border-radius:50%;background:'+colors[i%colors.length]+';flex-shrink:0;"></span>'
            +'<span style="font-size:10px;color:#334155;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+name+'">'+name+'</span>'
            +'<span style="font-size:10px;font-weight:600;color:#0f1f3d;flex-shrink:0;white-space:nowrap;">'+pct+'% ('+d.v+'건)</span>'
            +'</div>';
        });
        return html;
      }

      function makeSCard(title,inner,minH){
        var d=document.createElement('div');
        d.style.cssText='background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:12px 14px;min-height:'+(minH||0)+'px;';
        d.innerHTML='<div style="font-size:11px;font-weight:600;color:#0f1f3d;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+title+'</div>'+inner;
        return d;
      }

      var bdTotal=제품모델.reduce(function(s,d){return s+safeNum(d.v);},0)||1;
      var top5names=제품모델.slice(0,5).map(function(d){return d.l;});

      // 큰 도넛 카드
      var bigCard=document.createElement('div');
      bigCard.style.cssText='background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:14px 16px;grid-row:span 2;';
      bigCard.innerHTML='<div style="font-size:12px;font-weight:700;color:#0f1f3d;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #e2e8f0;">제품 불량 발생 비율<span style="font-size:10px;color:#64748b;font-weight:400;margin-left:6px;">총 '+bdTotal.toLocaleString()+'건</span></div>'
        +'<div style="display:flex;flex-direction:column;align-items:center;gap:10px;">'
        +makePie(제품모델,bdTotal,PIE_BIG,170)
        +'<div style="width:100%;">'+makeLegend(제품모델,PIE_BIG,9)+'</div>'
        +'</div>';

      // TOP5 소형 파이 카드
      function makeSmallPie(idx){
        var prod=top5names[idx]||'';
        var info=top5접수불량[prod]||{total:0,접수불량:[]};
        var name=prod.replace('[꿈비] ','').replace('[집계] ','');
        var pieSvg=makePie(info.접수불량,info.total,TOP5C[idx%5],90);
        var leg=makeLegend(info.접수불량,TOP5C[idx%5],5);
        var inner='<div style="display:flex;gap:8px;align-items:flex-start;">'+pieSvg+'<div style="flex:1;min-width:0;">'+leg+'</div></div>';
        return makeSCard('Top.'+(idx+1)+' '+name,inner);
      }

      // 3스택 막대 카드 (구분별)
      // 주차별 추이 카드 (tripleStackChart 사용)
      var stackCard=tripleStackChart(safeArr(Q.주차별추이),'불량 추이 — 주차별','최종마감주 기준 최근 10주 · 접수일 기준');

      // 레이아웃: 1행(큰도넛span2 + 소형0,1,2), 2행(소형3,4 + 구분별span2)
      // grid: 6칸, 큰도넛=col1, row1~2 / 소형0,1,2=col2,3,4 row1 / 소형3,4=col2,3 row2 / 구분별=col4-6 row2
      var grid=document.createElement('div');
      grid.style.cssText='display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;grid-template-rows:auto auto;gap:10px;margin-bottom:14px;';

      bigCard.style.gridRow='1 / 3';
      bigCard.style.gridColumn='1';
      grid.appendChild(bigCard);

      // row1: 소형 0,1,2
      for(var _a=0;_a<3;_a++){
        if(_a<top5names.length){ grid.appendChild(makeSmallPie(_a)); }
        else{ var _ea=document.createElement('div'); _ea.style.cssText='background:#fff;border:1px solid #e2e8f0;border-radius:6px;'; grid.appendChild(_ea); }
      }

      // row2: 소형 3,4 + 구분별(1칸) - 총 3칸
      for(var _b=3;_b<5;_b++){
        if(_b<top5names.length){ grid.appendChild(makeSmallPie(_b)); }
        else{ var _eb=document.createElement('div'); _eb.style.cssText='background:#fff;border:1px solid #e2e8f0;border-radius:6px;'; grid.appendChild(_eb); }
      }
      stackCard.style.gridColumn='span 1';
      grid.appendChild(stackCard);

      cnt.appendChild(grid);
    })();



    // ── 품질 개선 현황 KPI (구분별 아래로 이동) ─────────────
    app(cnt,
      sectionTitle("2. 품질 개선 현황", C.teal),
      grid("repeat(4,1fr)",10,[
        kpiCard("총 개선 건수",총건.toLocaleString(),`${period} · 등록일 기준`,C.teal),
        kpiCard("개선요청",개선요청건.toLocaleString(),"1-2. 개선요청 단계",C.blue),
        kpiCard("샘플테스트",샘플테스트건.toLocaleString(),"1-1. 샘플테스트 단계",C.amber),
        kpiCard("취소/중단",취소건.toLocaleString(),"취소_발주중단",C.slateL),
      ])
    );

    // 개선항목 테이블
    var tblWrap=document.createElement("div");
    tblWrap.style.cssText="background:#fff;border:1px solid #e2e8f0;border-radius:6px;overflow:hidden;margin-top:4px;";
    var tblHead=document.createElement("div");
    tblHead.style.cssText="padding:14px 18px 12px;border-bottom:1px solid #e2e8f0;";
    tblHead.innerHTML='<div style="font-size:13px;font-weight:600;color:#0f1f3d;">개선 항목 상세 목록</div><div style="font-size:11px;color:#64748b;margin-top:2px;">'+period+' · 총 '+총건+'건</div>';
    tblWrap.appendChild(tblHead);
    if(!목록.length){
      var empty=document.createElement("div");
      empty.style.cssText="padding:32px;text-align:center;color:#94a3b8;font-size:13px;";
      empty.textContent="해당 기간 데이터 없음";
      tblWrap.appendChild(empty);
    } else {
      var tblInner=document.createElement("div");
      var hdr=document.createElement("div");
      hdr.style.cssText="display:grid;grid-template-columns:2fr 1.4fr 4.5fr 1.4fr;background:#f8fafc;border-bottom:2px solid #e2e8f0;";
      [["제품명","#dbeafe"],["핵심키워드","#dcfce7"],["주제","#fef9c3"],["진행단계","#ede9fe"]].forEach(function(col){
        var h=document.createElement("div");
        h.style.cssText="padding:8px 14px;font-size:11px;font-weight:700;color:#374151;background:"+col[1]+";";
        h.textContent=col[0];
        hdr.appendChild(h);
      });
      tblInner.appendChild(hdr);
      목록.forEach(function(item,ri){
        var row=document.createElement("div");
        row.style.cssText="display:grid;grid-template-columns:2fr 1.4fr 4.5fr 1.4fr;border-bottom:1px solid #f1f5f9;align-items:start;";

      function makePie(data,total,colors,size){
        var arr=(data||[]).filter(function(d){return (d.v||0)>0;});
        var cx=size/2,cy=size/2,r=size/2-4,ri=r*0.52;
        var tot=arr.reduce(function(s,d){return s+(d.v||0);},0)||1;
        var paths='';
        var ang=-Math.PI/2;
        if(arr.length===0){
          paths='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="#e2e8f0"/><circle cx="'+cx+'" cy="'+cy+'" r="'+ri+'" fill="#fff"/>';
        } else {
          arr.forEach(function(d,i){
            var sw=(d.v/tot)*Math.PI*2;
            if(sw<=0.01)return;
            var x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang);
            var x2=cx+r*Math.cos(ang+sw),y2=cy+r*Math.sin(ang+sw);
            var xi1=cx+ri*Math.cos(ang),yi1=cy+ri*Math.sin(ang);
            var xi2=cx+ri*Math.cos(ang+sw),yi2=cy+ri*Math.sin(ang+sw);
            var lg=sw>Math.PI?1:0;
            paths+='<path d="M '+xi1+' '+yi1+' L '+x1+' '+y1+' A '+r+' '+r+' 0 '+lg+' 1 '+x2+' '+y2+' L '+xi2+' '+yi2+' A '+ri+' '+ri+' 0 '+lg+' 0 '+xi1+' '+yi1+' Z" fill="'+colors[i%colors.length]+'" stroke="#fff" stroke-width="1.5"/>';
            ang+=sw;
          });
        }
        paths+='<text x="'+cx+'" y="'+(cy-3)+'" text-anchor="middle" fill="#0f1f3d" font-size="'+(size>120?14:11)+'" font-weight="700" font-family="Apple SD Gothic Neo,sans-serif">'+total.toLocaleString()+'</text>';
        paths+='<text x="'+cx+'" y="'+(cy+12)+'" text-anchor="middle" fill="#64748b" font-size="9" font-family="Apple SD Gothic Neo,sans-serif">건</text>';
        return '<svg viewBox="0 0 '+size+' '+size+'" width="'+size+'" height="'+size+'" style="display:block;flex-shrink:0;">'+paths+'</svg>';
      }

      function makeLegend(data,colors,maxItems){
        var arr=(data||[]).slice(0,maxItems||8);

        var html='';
        arr.forEach(function(d,i){
          var pct=((d.v||0)/tot*100).toFixed(1);
          var name=(d.l||'').replace('[꿈비] ','').replace('[집계] ','');
          html+='<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;">'

      // grid: 6칸, 큰도넛=col1, row1~2 / 소형0,1,2=col2,3,4 row1 / 소형3,4=col2,3 row2 / 구분별=col4-6 row2
      var grid=document.createElement('div');

      }

      // row2: 소형 3,4 + 구분별(1칸) - 총 3칸

        if(_b<top5names.length){ grid.appendChild(makeSmallPie(_b)); }
        else{ var _eb=document.createElement('div'); _eb.style.cssText='background:#fff;border:1px solid #e2e8f0;border-radius:6px;'; grid.appendChild(_eb); }
      }
      stackCard.style.gridColumn='span 1';
      grid.appendChild(stackCard);

    // ── 품질 개선 현황 KPI (구분별 아래로 이동) ─────────────

        var c1=document.createElement("div");
        c1.style.cssText="padding:10px 14px;background:"+bgRows[1][ri%2]+";border-right:1px solid #e2e8f0;display:flex;flex-wrap:wrap;gap:4px;";
        safeArr(item.핵심키워드).forEach(function(kw,j){
          var b=document.createElement("span");
          b.style.cssText="font-size:10px;font-weight:600;color:#fff;background:"+KW_COLORS[j%KW_COLORS.length]+";border-radius:3px;padding:2px 7px;white-space:nowrap;";
          b.textContent=kw;
          c1.appendChild(b);
        });
        var c2=document.createElement("div");
        c2.style.cssText="padding:10px 14px;font-size:12px;color:#334155;line-height:1.5;background:"+bgRows[2][ri%2]+";border-right:1px solid #e2e8f0;";
        c2.textContent=item.주제||"";
        var c3=document.createElement("div");
        c3.style.cssText="padding:10px 14px;background:"+bgRows[3][ri%2]+";";
        var sc=STAGE_COLOR[item.진행단계]||C.slateL;
        var badge=document.createElement("span");
        badge.style.cssText="font-size:10px;font-weight:600;color:"+sc+";border:1px solid "+sc+";border-radius:4px;padding:2px 8px;white-space:nowrap;display:inline-block;";
        badge.textContent=item.진행단계||"";
        c3.appendChild(badge);
        row.appendChild(c0);row.appendChild(c1);row.appendChild(c2);row.appendChild(c3);
        tblInner.appendChild(row);
      });
      tblWrap.appendChild(tblInner);
    }
    cnt.appendChild(tblWrap);
    return;
  }

  if(tab==="상담실적"){
    app(cnt,
      grid("repeat(4,1fr)",10,[
        kpiCard("총 인입수",safeNum(S.총인입수).toLocaleString(),safeArr(S.인입회차).join(", "),C.blue),
        kpiCard("ALF 관여건",S.ALF관여건!=null?safeNum(S.ALF관여건).toLocaleString():"-",S.관여월||"",C.teal),
        kpiCard("만족도",S.만족도?`${S.만족도}점`:"-",S.만족도참여율?`참여율 ${S.만족도참여율}`:"",C.amber),
        kpiCard("통화성공율",safeArr(S.통화성공율).length?`${safeArr(S.통화성공율)[safeArr(S.통화성공율).length-1].v}%`:"-","최근 마감 기준",C.purple),
      ]),
      grid("1fr 1fr",12,[
        card("서비스별 인입 비율",`${period} · 총 ${safeNum(S.총인입수).toLocaleString()}건`,hbar(S.인입태그,C.blue)),
        card("상담 태그별 인입 비율",null,hbar(S.상담태그,C.teal)),
      ]),
      grid("1fr 1fr",12,[
        card("통화성공율","통화성공률(IN) 기준",hbar(S.통화성공율,C.purple,100,"%")),
        card("만족도 월별 추이",null,hbar(S.만족도추이,C.amber,5,"점")),
      ])
    );
  }

  if(tab==="반품현황"){
    app(cnt,sectionTitle("1. 꿈비",C.blue));
    renderBrand(cnt,R,period,"꿈비",C.blue,"#3b82f6");
    app(cnt,sectionTitle("2. 소브",C.teal));
    renderBrand(cnt,R,period,"소브",C.teal,C.teal2);
  }

  if(tab==="처리현황"){
    const 수리총=safeNum(P.수리총건),무상=safeNum(P.무상),유상=safeNum(P.유상);
    const 가전외=P.가전외||{};
    app(cnt,
      sectionTitle("1. 전자제품",C.blue),
      subLabel("1-1. 수리출고 (처리일 기준)"),
      grid("repeat(4,1fr)",10,[
        kpiCard("수리 총건",수리총.toLocaleString(),null,C.blue),
        kpiCard("무상수리",무상.toLocaleString(),`${safeNum(P.무상율)}%`,C.teal),
        kpiCard("유상수리",유상.toLocaleString(),`${safeNum(P.유상율)}%`,C.amber),
        kpiCard("유상 처리금액",`${safeNum(P.유상금액만원).toLocaleString()}만원`,null,C.red),
      ]),
      grid("1fr 1fr",12,[
        card("월별 수리현황 추이","처리일 기준 · 2026년",hbar(P.수리월별,C.blue)),
        card("불량부품 현황","자재출고 기준 (대체품 제외)",hbar(P.자재부품,C.red)),
      ]),
      subLabel("1-2. 자재출고 (처리일 기준 · 대체품 제외)"),
      grid("repeat(3,1fr)",10,[
        kpiCard("자재출고 총건",safeNum(P.자재총건).toLocaleString(),null,C.blue),
        kpiCard("모델 종류",safeArr(P.자재모델).length,null,C.teal),
        kpiCard("부품 종류",safeArr(P.자재부품).length,null,C.amber),
      ]),
      grid("1fr 1fr",12,[
        card("자재출고 — 모델별",null,hbar(P.자재모델,C.blue)),
        card("자재출고 — 자재별",null,hbar(P.자재부품,C.teal)),
      ]),
      sectionTitle("2. 전자제품 外",C.teal),
      grid("repeat(4,1fr)",10,[
        kpiCard("접수 건수",safeNum(가전외.접수).toLocaleString(),null,C.teal),
        kpiCard("유상 건수",safeNum(가전외.유상).toLocaleString(),`${safeNum(가전외.유상율)}%`,C.amber),
        kpiCard("유상 처리금액",`${safeNum(가전외.금액만원).toLocaleString()}만원`,null,C.red),
        kpiCard("평균 소요기간",가전외.소요평균?`${가전외.소요평균}일`:"-",null,C.teal),
      ]),
      card("가전외 처리 모델 비율",null,hbar(가전외.모델,C.teal))
    );
  }

  if(tab==="품질관리"){
    const top5=safeArr(Q.top5),총불량=safeNum(Q.총불량);
    const bgColors=[C.redXL,C.amberXL,C.blueXL,C.tealXL,"#f1f5f9"];
    const fgColors=[C.red,C.amber,C.blue,C.teal,C.slate];
    const 구분fgColors=[C.blue,C.teal,C.amber];
    const 구분bgColors=[C.blueXL,C.tealXL,C.amberXL];

    // ── 큰 도넛 + 소형파이5 + 3스택막대 ──────────────────
    (function(){
      var 제품모델=safeArr(Q.제품모델비율);
      var top5접수불량=Q.top5_접수불량||{};
      var 구분별=safeArr(Q.구분별);
      var PIE_BIG=["#1e40af","#0f766e","#b45309","#991b1b","#6d28d9","#0891b2","#065f46","#92400e","#1e3a8a","#134e4a"];
      var TOP5C=[
        ["#1e40af","#3b82f6","#93c5fd","#bfdbfe","#1d4ed8","#60a5fa"],
        ["#0f766e","#14b8a6","#2dd4bf","#99f6e4","#0d9488","#5eead4"],
        ["#b45309","#f59e0b","#fcd34d","#fef3c7","#d97706","#fbbf24"],
        ["#991b1b","#ef4444","#fca5a5","#fee2e2","#dc2626","#f87171"],
        ["#6d28d9","#8b5cf6","#c4b5fd","#ede9fe","#7c3aed","#a78bfa"]
      ];

      function makePie(data,total,colors,size){
        var arr=(data||[]).filter(function(d){return (d.v||0)>0;});
        var cx=size/2,cy=size/2,r=size/2-4,ri=r*0.52;
        var tot=arr.reduce(function(s,d){return s+(d.v||0);},0)||1;
        var paths='';
        var ang=-Math.PI/2;
        if(arr.length===0){
          paths='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="#e2e8f0"/><circle cx="'+cx+'" cy="'+cy+'" r="'+ri+'" fill="#fff"/>';
        } else {
          arr.forEach(function(d,i){
            var sw=(d.v/tot)*Math.PI*2;
            if(sw<=0.01)return;
            var x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang);
            var x2=cx+r*Math.cos(ang+sw),y2=cy+r*Math.sin(ang+sw);
            var xi1=cx+ri*Math.cos(ang),yi1=cy+ri*Math.sin(ang);
            var xi2=cx+ri*Math.cos(ang+sw),yi2=cy+ri*Math.sin(ang+sw);
            var lg=sw>Math.PI?1:0;
            paths+='<path d="M '+xi1+' '+yi1+' L '+x1+' '+y1+' A '+r+' '+r+' 0 '+lg+' 1 '+x2+' '+y2+' L '+xi2+' '+yi2+' A '+ri+' '+ri+' 0 '+lg+' 0 '+xi1+' '+yi1+' Z" fill="'+colors[i%colors.length]+'" stroke="#fff" stroke-width="1.5"/>';
            ang+=sw;
          });
        }
        paths+='<text x="'+cx+'" y="'+(cy-3)+'" text-anchor="middle" fill="#0f1f3d" font-size="'+(size>120?14:11)+'" font-weight="700" font-family="Apple SD Gothic Neo,sans-serif">'+total.toLocaleString()+'</text>';
        paths+='<text x="'+cx+'" y="'+(cy+12)+'" text-anchor="middle" fill="#64748b" font-size="9" font-family="Apple SD Gothic Neo,sans-serif">건</text>';
        return '<svg viewBox="0 0 '+size+' '+size+'" width="'+size+'" height="'+size+'" style="display:block;flex-shrink:0;">'+paths+'</svg>';
      }

      function makeLegend(data,colors,maxItems){
        var arr=(data||[]).slice(0,maxItems||8);
        var tot=arr.reduce(function(s,d){return s+(d.v||0);},0)||1;
        var html='';
        arr.forEach(function(d,i){
          var pct=((d.v||0)/tot*100).toFixed(1);
          var name=(d.l||'').replace('[꿈비] ','').replace('[집계] ','');
          html+='<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;">'
            +'<span style="width:8px;height:8px;border-radius:50%;background:'+colors[i%colors.length]+';flex-shrink:0;"></span>'
            +'<span style="font-size:10px;color:#334155;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+name+'">'+name+'</span>'
            +'<span style="font-size:10px;font-weight:600;color:#0f1f3d;flex-shrink:0;white-space:nowrap;">'+pct+'% ('+d.v+'건)</span>'
            +'</div>';
        });
        return html;
      }

      function makeSCard(title,inner,minH){
        var d=document.createElement('div');
        d.style.cssText='background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:12px 14px;min-height:'+(minH||0)+'px;';
        d.innerHTML='<div style="font-size:11px;font-weight:600;color:#0f1f3d;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+title+'</div>'+inner;
        return d;
      }

      var bdTotal=제품모델.reduce(function(s,d){return s+safeNum(d.v);},0)||1;
      var top5names=제품모델.slice(0,5).map(function(d){return d.l;});

      // 큰 도넛 카드
      var bigCard=document.createElement('div');
      bigCard.style.cssText='background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:14px 16px;grid-row:span 2;';
      bigCard.innerHTML='<div style="font-size:12px;font-weight:700;color:#0f1f3d;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #e2e8f0;">제품 불량 발생 비율<span style="font-size:10px;color:#64748b;font-weight:400;margin-left:6px;">총 '+bdTotal.toLocaleString()+'건</span></div>'
        +'<div style="display:flex;flex-direction:column;align-items:center;gap:10px;">'
        +makePie(제품모델,bdTotal,PIE_BIG,170)
        +'<div style="width:100%;">'+makeLegend(제품모델,PIE_BIG,9)+'</div>'
        +'</div>';

      // TOP5 소형 파이 카드
      function makeSmallPie(idx){
        var prod=top5names[idx]||'';
        var info=top5접수불량[prod]||{total:0,접수불량:[]};
        var name=prod.replace('[꿈비] ','').replace('[집계] ','');
        var pieSvg=makePie(info.접수불량,info.total,TOP5C[idx%5],90);
        var leg=makeLegend(info.접수불량,TOP5C[idx%5],5);
        var inner='<div style="display:flex;gap:8px;align-items:flex-start;">'+pieSvg+'<div style="flex:1;min-width:0;">'+leg+'</div></div>';
        return makeSCard('Top.'+(idx+1)+' '+name,inner);
      }

      // 3스택 막대 카드 (구분별)
      // 주차별 추이 카드 (tripleStackChart 사용)
      var stackCard=tripleStackChart(safeArr(Q.주차별추이),'불량 추이 — 주차별','최종마감주 기준 최근 10주 · 접수일 기준');

      // 레이아웃: 1행(큰도넛span2 + 소형0,1,2), 2행(소형3,4 + 구분별span2)
      // grid: 6칸, 큰도넛=col1, row1~2 / 소형0,1,2=col2,3,4 row1 / 소형3,4=col2,3 row2 / 구분별=col4-6 row2
      var grid=document.createElement('div');
      grid.style.cssText='display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;grid-template-rows:auto auto;gap:10px;margin-bottom:14px;';

      bigCard.style.gridRow='1 / 3';
      bigCard.style.gridColumn='1';
      grid.appendChild(bigCard);

      // row1: 소형 0,1,2
      for(var _a=0;_a<3;_a++){
        if(_a<top5names.length){ grid.appendChild(makeSmallPie(_a)); }
        else{ var _ea=document.createElement('div'); _ea.style.cssText='background:#fff;border:1px solid #e2e8f0;border-radius:6px;'; grid.appendChild(_ea); }
      }

      // row2: 소형 3,4 + 구분별(1칸) - 총 3칸
      for(var _b=3;_b<5;_b++){
        if(_b<top5names.length){ grid.appendChild(makeSmallPie(_b)); }
        else{ var _eb=document.createElement('div'); _eb.style.cssText='background:#fff;border:1px solid #e2e8f0;border-radius:6px;'; grid.appendChild(_eb); }
      }
      stackCard.style.gridColumn='span 1';
      grid.appendChild(stackCard);

      cnt.appendChild(grid);
    })();

        // TOP5 카드: 5개 모두 한 줄에 (KPI 카드 스타일)
    const top5KpiRow=el("div");
    top5KpiRow.style.cssText="display:grid;grid-template-columns:1.2fr repeat(5,1fr);gap:10px;margin-bottom:14px;";
    // 총건 카드
    const 총건card=el("div","kpi-card");
    총건card.style.borderTopColor=C.red;
    총건card.innerHTML=`<div class="kpi-label">불량인입 총건</div><div class="kpi-value">${총불량.toLocaleString()}</div><div class="kpi-sub">${period} 기준</div>`;
    top5KpiRow.appendChild(총건card);
    // TOP1~5
    const topColors=[C.red,C.amber,C.blue,C.teal,C.slate];
    top5.slice(0,5).forEach((d,i)=>{
      const c=el("div","kpi-card");
      c.style.borderTopColor=topColors[i];
      const name=(d.l||"").replace("[꿈비] ","");
      const shortName=name.length>10?name.slice(0,10)+"…":name;
      const pct=총불량?Math.round(safeNum(d.v)/총불량*100):0;
      c.innerHTML=`<div class="kpi-label" style="color:${topColors[i]}">TOP${i+1}</div><div class="kpi-value" style="font-size:13px;font-weight:700;color:#0f1f3d;line-height:1.3;word-break:keep-all;">${shortName}</div><div class="kpi-sub">${safeNum(d.v).toLocaleString()}건 · ${pct}%</div>`;
      top5KpiRow.appendChild(c);
    });
    app(cnt, sectionTitle("1. 불량인입 TOP5 (접수일 기준)",C.red), top5KpiRow);

    // 불량 TOP5 상세 + 구분별 + 추이
    const top5card=document.createElement("div");
    top5.forEach((d,i)=>{
      top5card.innerHTML+=`<div class="rank-item" style="background:${bgColors[i]||"#f1f5f9"}"><span style="font-size:12px;font-weight:600;color:#0f1f3d">${i+1}. ${(d.l||"").replace("[꿈비] ","")}</span><div class="rank-right"><span class="rank-pct" style="color:${fgColors[i]};border:1px solid ${fgColors[i]}">${총불량?Math.round(safeNum(d.v)/총불량*100):0}%</span><span class="rank-val">${safeNum(d.v).toLocaleString()}</span></div></div>`;
    });
    const 구분card=document.createElement("div");
    safeArr(Q.구분별).forEach((d,i)=>{
      구분card.innerHTML+=`<div class="rank-item" style="background:${구분bgColors[i]||"#f1f5f9"}"><span style="font-size:12px;font-weight:600;color:#0f1f3d">${d.l||""}</span><div class="rank-right"><span class="rank-pct" style="color:${구분fgColors[i]};border:1px solid ${구분fgColors[i]}">${총불량?Math.round(safeNum(d.v)/총불량*100):0}%</span><span class="rank-val">${safeNum(d.v).toLocaleString()}</span></div></div>`;
    });

    // 기간별 추이 선택
    // 상단 오른쪽 추이 카드
    let trendCard1;
    if(period==="주간"){
      trendCard1=singleBarChart(safeArr(Q.일자별추이),"#e88080","불량 추이 — 일자별","최종마감일 기준 최근 10 영업일 · 접수일 기준");
    } else if(period==="월간"){
      trendCard1=tripleStackChart(safeArr(Q.주차별추이),"불량 추이 — 주차별","최종마감주 기준 최근 10주 · 접수일 기준");
    } else {
      trendCard1=tripleStackChart(safeArr(Q.주차별추이),"불량 추이 — 주차별","최근 10주 · 접수일 기준");
    }

    // 하단 오른쪽 추이 카드
    let trendCard2;
    if(period==="주간"){
      trendCard2=tripleStackChart(safeArr(Q.주차별추이),"불량 추이 — 주차별","최근 10주 · 접수일 기준");
    } else if(period==="월간"){
      trendCard2=tripleStackChart(safeArr(Q.월별추이_3종),"불량 추이 — 월별","2026년 1월~3월 · 접수일 기준");
    } else {
      trendCard2=cumulativeLineChart(safeArr(Q.월별누적추이),"불량 누적 추이 — 월별","2026년 누적 · 접수일 기준");
    }

    app(cnt,
      grid("repeat(4,1fr)",12,[
        card("불량 TOP5 — 제품별 비율",`${period} · 총 ${총불량.toLocaleString()}건`,top5card),
        card("불량접수 현황 (구분별)",null,구분card),
        trendCard1,
        trendCard2,
      ]),
      grid("repeat(4,1fr)",12,[
        card(`접수불량 유형 TOP10`,`${period} · 접수일 기준`,hbar(Q.접수불량top10,"#e88080")),
        el("div"),
        el("div"),
        el("div"),
      ])
    );
  }
}

render();
</script>
</body>
</html>
