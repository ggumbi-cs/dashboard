<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>엄마감동팀</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f1f5f9;min-height:100vh;}
button{cursor:pointer;font-family:inherit;}
@keyframes sp{to{transform:rotate(360deg)}}
#hdr1{background:#0f1f3d;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
#hdr1 .title{font-size:14px;font-weight:700;color:#fff;letter-spacing:-0.02em;}
#hdr1 .period-btns button{padding:4px 12px;border-radius:4px;font-size:11px;font-weight:600;background:transparent;color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.15);margin-left:2px;}
#hdr1 .period-btns button.active{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.5);}
#hdr2{background:#1a2f52;height:38px;display:flex;align-items:center;padding:0 20px;gap:2px;position:sticky;top:44px;z-index:100;}
#hdr2 button{padding:5px 16px;border:none;border-radius:4px;font-size:12px;font-weight:600;background:transparent;color:rgba(255,255,255,.45);}
#hdr2 button.active{background:rgba(255,255,255,.18);color:#fff;}
#content{padding:14px 20px 40px;}
.kpi-grid{display:grid;gap:10px;margin-bottom:14px;}
.kpi-grid.col4{grid-template-columns:repeat(4,1fr);}
.kpi-grid.col3{grid-template-columns:repeat(3,1fr);}
.kpi-card{background:#fff;border:1px solid #e2e8f0;border-top:3px solid #1e40af;border-radius:8px;padding:12px 14px;min-width:0;}
.kpi-label{font-size:11px;font-weight:600;color:#64748b;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.kpi-value{font-size:22px;font-weight:700;color:#0f1f3d;line-height:1;}
.kpi-sub{font-size:12px;color:#64748b;margin-top:4px;}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:14px 16px;margin-bottom:10px;}
.card-header{padding-bottom:8px;border-bottom:1px solid #e2e8f0;margin-bottom:12px;}
.card-title{font-size:13px;font-weight:600;color:#0f1f3d;}
.card-sub{font-size:11px;color:#64748b;margin-top:2px;}
.hbar-wrap{display:flex;flex-direction:column;gap:5px;}
.hbar-row{display:grid;grid-template-columns:120px 1fr 52px;align-items:center;gap:6px;}
.hbar-label{font-size:12px;color:#334155;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hbar-track{background:#f0f0f0;border-radius:3px;height:20px;overflow:hidden;}
.hbar-fill{height:100%;border-radius:3px;}
.hbar-val{font-size:12px;font-weight:600;color:#0f1f3d;text-align:right;}
.no-data{color:#64748b;font-size:13px;padding:8px 0;}
.section-title{font-size:12px;font-weight:700;color:#fff;padding:8px 16px;border-radius:6px;margin-bottom:10px;margin-top:6px;letter-spacing:.03em;}
.sub-label{background:rgba(30,64,175,0.06);border-radius:5px;padding:7px 14px;margin-bottom:10px;font-size:11px;color:#1e40af;font-weight:700;}
.gaug-card{background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:14px 16px;min-width:0;border-top:3px solid #e2e8f0;}
.gaug-label{font-size:11px;font-weight:600;color:#64748b;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
.gaug-nums{display:flex;gap:6px;align-items:flex-end;margin-bottom:10px;}
.gaug-main{font-size:24px;font-weight:700;}
.gaug-sub-num{font-size:13px;color:#64748b;margin-bottom:3px;}
.gaug-bar{display:flex;border-radius:4px;overflow:hidden;height:10px;}
.gaug-legend{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;font-weight:600;}
.rank-item{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;border-radius:5px;margin-bottom:5px;}
.rank-right{display:flex;gap:8px;align-items:center;}
.rank-pct{font-size:11px;font-weight:600;border-radius:3px;padding:1px 7px;background:#fff;}
.rank-val{font-size:14px;font-weight:700;color:#0f1f3d;}
.prepare{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:16px;}
.prepare h2{font-size:20px;font-weight:700;color:#0f1f3d;}
.soon{background:#dbeafe;border:1px solid #1e40af;border-radius:8px;padding:8px 20px;font-size:12px;color:#1e40af;font-weight:600;}
#layout-wrap{display:flex;min-height:calc(100vh - 82px);}
#sidebar{width:148px;min-width:148px;background:#0f1f3d;padding:12px 0 16px;position:sticky;top:82px;height:calc(100vh - 82px);overflow-y:auto;flex-shrink:0;border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:0;}
#sidebar .sb-section{font-size:10px;font-weight:700;color:rgba(255,255,255,.35);padding:10px 14px 4px;letter-spacing:.1em;text-transform:uppercase;}
#sidebar .sb-item{font-size:12px;font-weight:600;color:rgba(255,255,255,.6);padding:8px 14px;cursor:pointer;display:block;line-height:1.3;border-left:3px solid transparent;transition:all .15s;}
#sidebar .sb-item:hover{color:#fff;background:rgba(255,255,255,.06);}
#sidebar .sb-item.active{color:#fff;background:rgba(255,255,255,.1);border-left-color:#3b82f6;}
#sidebar .sb-sub{font-size:11px;font-weight:500;color:rgba(255,255,255,.4);padding:5px 14px 5px 26px;cursor:pointer;display:block;line-height:1.3;border-left:3px solid transparent;transition:all .15s;}
#sidebar .sb-sub:hover{color:rgba(255,255,255,.75);}
#sidebar .sb-sub.active{color:#93c5fd;border-left-color:#3b82f6;}
#sidebar .sb-divider{height:1px;background:rgba(255,255,255,.07);margin:8px 10px;}
#sidebar .sb-week-btn{font-size:11px;color:rgba(255,255,255,.5);padding:4px 14px 4px 26px;cursor:pointer;display:flex;align-items:center;gap:6px;}
#sidebar .sb-week-btn:hover{color:#fff;}
#sidebar .sb-week-chip{font-size:10px;background:rgba(255,255,255,.08);border-radius:3px;padding:1px 5px;color:rgba(255,255,255,.5);}
#sidebar .sb-logout{display:block;width:calc(100% - 20px);margin:auto;padding:8px 0;background:rgba(220,38,38,0.15);border:1px solid rgba(220,38,38,0.4);border-radius:6px;color:#fca5a5;font-size:11px;font-weight:700;text-align:center;cursor:pointer;letter-spacing:0.04em;transition:all .15s;}
#sidebar .sb-logout:hover{background:rgba(220,38,38,0.35);border-color:#ef4444;color:#fff;}
#content{flex:1;padding:14px 20px 40px;min-width:0;}

/* ── 로그인 모달 ── */
#login-overlay{position:fixed;inset:0;background:rgba(10,20,40,0.82);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
#login-box{background:#fff;border-radius:14px;padding:40px 36px;width:360px;box-shadow:0 24px 60px rgba(0,0,0,0.3);display:flex;flex-direction:column;gap:18px;}
#login-box .lb-logo{font-size:18px;font-weight:800;color:#0f1f3d;letter-spacing:-0.03em;text-align:center;}
#login-box .lb-sub{font-size:12px;color:#64748b;text-align:center;margin-top:-10px;}
#login-box label{font-size:11px;font-weight:700;color:#334155;margin-bottom:4px;display:block;}
#login-box select,#login-box input{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:#f8fafc;transition:border 0.15s;}
#login-box select:focus,#login-box input:focus{border-color:#1e40af;background:#fff;}
#login-btn{width:100%;padding:12px;background:#0f1f3d;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:0.02em;transition:background 0.15s;}
#login-btn:hover{background:#1e40af;}
#login-err{font-size:12px;color:#dc2626;text-align:center;min-height:16px;font-weight:600;}
#login-box .lb-divider{border:none;border-top:1px solid #f1f5f9;}
.no-access{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;}
.no-access .na-icon{font-size:36px;}
.no-access .na-text{font-size:15px;font-weight:700;color:#0f1f3d;}
.no-access .na-sub{font-size:12px;color:#64748b;}
</style>
</head>
<body>
<!-- 로그인 오버레이 -->
<div id="login-overlay">
  <div id="login-box">
    <div class="lb-logo">🌸 엄마감동팀</div>
    <div class="lb-sub">CS 대시보드 · 로그인</div>
    <hr class="lb-divider">
    <div>
      <label>로그인 유형</label>
      <select id="login-role">
        <option value="">-- 유형 선택 --</option>
        <option value="admin">운영자 (임원)</option>
        <option value="user">사용자 (직원)</option>
        <option value="partner">계열사 (에르모어)</option>
      </select>
    </div>
    <div>
      <label>비밀번호</label>
      <input type="password" id="login-pw" placeholder="비밀번호를 입력하세요" autocomplete="off">
    </div>
    <div id="login-err"></div>
    <button id="login-btn">로그인</button>
  </div>
</div>
<div id="hdr1">
  <div class="title">엄마감동팀</div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div id="date-str" style="font-size:11px;color:rgba(255,255,255,.35);"></div>
    <div id="period-btns" style="display:none;"></div>
  </div>
</div>
<div id="hdr2"></div>
<div id="layout-wrap">
  <nav id="sidebar">
    <div class="sb-section">연간현황</div>
    <span class="sb-item" id="sb-2026년" onclick="setPeriod('2026년')">2026년</span>
    <div class="sb-divider"></div>
    <div class="sb-section" id="sb-section-월간">월간현황</div>
    <span class="sb-item" id="sb-월간" onclick="setPeriod('월간')">월간현황</span>
    <span class="sb-sub sb-sub-month" id="sb-month-1" onclick="selectMonth(1)">ㄴ 1월</span>
    <span class="sb-sub sb-sub-month" id="sb-month-2" onclick="selectMonth(2)">ㄴ 2월</span>
    <span class="sb-sub sb-sub-month active" id="sb-month-3" onclick="selectMonth(3)">ㄴ 3월 ●</span>
    <span class="sb-sub sb-sub-month" style="color:rgba(255,255,255,.15);">ㄴ 4월~</span>
    <div class="sb-divider" id="sb-divider-주간"></div>
    <div class="sb-section" id="sb-section-주간">주간현황</div>
    <span class="sb-item" id="sb-주간" onclick="setPeriod('주간')">주차 선택 ▾</span>
    <div id="sb-week-list"></div>
    <div style="flex:1;"></div>
    <div class="sb-divider"></div>
    <button class="sb-logout" onclick="doLogout()">🔓 로그아웃</button>
  </nav>
  <div id="content"></div>
</div>

<script>
// ── 로그인 권한 관리 ──────────────────────────────────
const AUTH = {
  admin:   { pw: "rnjsaltnr", label: "운영자", allowAll: true,  tabs: null },
  user:    { pw: "hihi00",    label: "사용자", allowAll: true,  tabs: null },
  partner: { pw: "dpfmahdj", label: "계열사", allowAll: false, tabs: ["팀Tool"] },
};
let currentRole = null;

function doLogin(){
  const role = document.getElementById("login-role").value;
  const pw   = document.getElementById("login-pw").value;
  const err  = document.getElementById("login-err");
  if(!role){ err.textContent = "로그인 유형을 선택해주세요."; return; }
  if(!pw)  { err.textContent = "비밀번호를 입력해주세요."; return; }
  if(!AUTH[role] || AUTH[role].pw !== pw){
    err.textContent = "비밀번호가 올바르지 않습니다.";
    document.getElementById("login-pw").value = "";
    return;
  }
  currentRole = role;
  document.getElementById("login-overlay").style.display = "none";
  // 계열사는 팀Tool 탭으로 초기화
  if(role === "partner") state.tab = "팀Tool";
  render();
}

function canAccess(tab){
  if(!currentRole) return false;
  if(AUTH[currentRole].allowAll) return true;
  return AUTH[currentRole].tabs.includes(tab);
}

function doLogout(){
  currentRole = null;
  document.getElementById("login-pw") && (document.getElementById("login-pw").value = "");
  document.getElementById("login-role") && (document.getElementById("login-role").value = "");
  document.getElementById("login-err") && (document.getElementById("login-err").textContent = "");
  document.getElementById("login-overlay").style.display = "flex";
}

// 엔터키 로그인
window.addEventListener("DOMContentLoaded", function(){
  document.getElementById("login-btn").addEventListener("click", doLogin);
  document.getElementById("login-pw").addEventListener("keydown", function(e){
    if(e.key === "Enter") doLogin();
  });

// 달력 팝업 - 날짜 클릭 시 해당 주 금요일로 이동
function showWeekCalendar(anchor, availableWeeks){
  // 기존 달력 제거
  const existing=document.getElementById("week-calendar-popup");
  if(existing){existing.remove();return;}

  const popup=document.createElement("div");
  popup.id="week-calendar-popup";
  popup.style.cssText="position:fixed;z-index:9999;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:16px;box-shadow:0 8px 32px rgba(0,0,0,.5);min-width:260px;";

  // 현재 표시할 월 (가장 최근 available 주 기준)
  const latestAvail = availableWeeks[0] || "2026-04-03";
  let viewDate = new Date(latestAvail);
  let viewYear = viewDate.getFullYear();
  let viewMonth = viewDate.getMonth();

  function getFriday(date){
    const d=new Date(date);
    const dow=d.getDay(); // 0=일,1=월,...,5=금
    const diff=dow<=5?(5-dow):(5+7-dow);
    d.setDate(d.getDate()+diff);
    return d;
  }

  function toYMD(d){
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function renderCal(){
    popup.innerHTML="";
    const header=document.createElement("div");
    header.style.cssText="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;";
    const prev=document.createElement("button");
    prev.textContent="︿";prev.style.cssText="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:14px;padding:2px 6px;";
    prev.onclick=(e)=>{e.stopPropagation();viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--;}renderCal();};
    const next=document.createElement("button");
    next.textContent="﹀";next.style.cssText="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:14px;padding:2px 6px;";
    next.onclick=(e)=>{e.stopPropagation();viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++;}renderCal();};
    const title=document.createElement("span");
    title.textContent=`${viewYear}년 ${viewMonth+1}월`;
    title.style.cssText="color:#f1f5f9;font-size:13px;font-weight:600;";
    header.appendChild(prev);header.appendChild(title);header.appendChild(next);
    popup.appendChild(header);

    // 요일 헤더
    const dayRow=document.createElement("div");
    dayRow.style.cssText="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;";
    ["일","월","화","수","목","금","토"].forEach(d=>{
      const cell=document.createElement("div");
      cell.textContent=d;
      cell.style.cssText="text-align:center;font-size:10px;color:#64748b;padding:3px 0;";
      dayRow.appendChild(cell);
    });
    popup.appendChild(dayRow);

    // 날짜 그리드
    const grid=document.createElement("div");
    grid.style.cssText="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;";

    const firstDay=new Date(viewYear,viewMonth,1).getDay();
    const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();

    // 앞 빈칸
    for(let i=0;i<firstDay;i++){
      const empty=document.createElement("div"); grid.appendChild(empty);
    }

    for(let d=1;d<=daysInMonth;d++){
      const date=new Date(viewYear,viewMonth,d);
      const dow=date.getDay();
      const cell=document.createElement("div");
      cell.textContent=d;
      cell.style.cssText="text-align:center;font-size:11px;padding:5px 2px;border-radius:5px;cursor:default;color:#94a3b8;";

      // 월~금만 클릭 가능
      if(dow>=1&&dow<=5){
        const friday=getFriday(date);
        const fridayYMD=toYMD(friday);
        // availableWeeks에 있는 주인지 확인
        if(availableWeeks.includes(fridayYMD)){
          cell.style.cursor="pointer";
          cell.style.color="#e2e8f0";
          // 오늘 표시
          const today=new Date();
          if(d===today.getDate()&&viewMonth===today.getMonth()&&viewYear===today.getFullYear()){
            cell.style.background="#1e40af";
            cell.style.color="#fff";
          }
          // 선택된 주 표시
          if(fridayYMD===state.selectedWeek){
            cell.style.background="#0f766e";
            cell.style.color="#fff";
          }
          // 점 표시 (해당 주에 데이터 있음)
          const dot=document.createElement("div");
          dot.style.cssText="width:3px;height:3px;border-radius:50%;background:#60a5fa;margin:1px auto 0;";
          cell.appendChild(dot);

          cell.onmouseover=()=>{if(fridayYMD!==state.selectedWeek)cell.style.background="#334155";};
          cell.onmouseout=()=>{if(fridayYMD!==state.selectedWeek)cell.style.background="";};
          cell.onclick=()=>{
            state.selectedWeek=fridayYMD;
            popup.remove();
            render();
          };
        }
      }
      grid.appendChild(cell);
    }
    popup.appendChild(grid);
  }

  renderCal();

  // 위치 계산 (사이드바 오른쪽)
  const rect=anchor.getBoundingClientRect();
  popup.style.left=(rect.right+8)+"px";
  popup.style.top=Math.min(rect.top, window.innerHeight-340)+"px";
  document.body.appendChild(popup);

  // 외부 클릭 시 닫기
  setTimeout(()=>{
    document.addEventListener("click",function handler(e){
      if(!popup.contains(e.target)){popup.remove();document.removeEventListener("click",handler);}
    });
  },0);
}
function updateSidebar(){
  // 주요KPI 탭일 때 월간/주간 섹션 숨김
  const isKPI = state.tab === "주요KPI";
  const hideSidebar = state.tab === "팀Tool";
  const sidebar = document.getElementById("sidebar");
  if(sidebar) sidebar.style.display = hideSidebar ? "none" : "";
  const hideIds = ["sb-section-월간","sb-월간","sb-month-1","sb-month-2","sb-month-3",
                   "sb-divider-주간","sb-section-주간","sb-주간","sb-week-list"];
  hideIds.forEach(id=>{
    const el2 = document.getElementById(id);
    if(el2) el2.style.display = (isKPI || hideSidebar) ? "none" : "";
  });
  // sb-sub-month들도 숨김
  document.querySelectorAll(".sb-sub-month").forEach(el2=>{
    el2.style.display = (isKPI || hideSidebar) ? "none" : "";
  });
  // 섹션 헤더 active (period 기준)
  ["주간","월간","2026년"].forEach(p=>{
    const el=document.getElementById("sb-"+p);
    if(el) el.classList.toggle("active", state.period===p);
  });
  // 월간 서브 active (selectedMonth 반영)
  [1,2,3].forEach(m=>{
    const el=document.getElementById("sb-month-"+m);
    if(el) el.classList.toggle("active", state.period==="월간"&&state.selectedMonth===m);
  });
  // 주간 주차 목록 렌더 (주간 선택 시에만 펼침)
  const wl=document.getElementById("sb-week-list");
  if(wl){
    if(state.period==="주간"){
      // 전체 주간 목록 (최신순)
      const allWeeks=Object.keys(DATA["주간"]||{}).sort().reverse(); // YYYY-MM-DD 형식
      const recent4=allWeeks.slice(0,4); // 최근 4주
      const fmt=w=>{const d=new Date(w);return `${d.getMonth()+1}/${d.getDate()}`;};
      if(!state.selectedWeek) state.selectedWeek=allWeeks[0];
      wl.innerHTML="";

      // 최근 4주 직접 클릭
      recent4.forEach(w=>{
        const sub=document.createElement("span");
        sub.className="sb-sub"+(w===state.selectedWeek?" active":"");
        sub.textContent=`ㄴ ~${fmt(w)}`;
        sub.onclick=()=>{state.selectedWeek=w;render();};
        wl.appendChild(sub);
      });

      // 이전자료(달력) 버튼 - 항상 고정 표시
      const calBtn=document.createElement("span");
      calBtn.className="sb-sub";
      calBtn.style.cssText="cursor:pointer;color:rgba(255,255,255,.55);display:flex;align-items:center;gap:4px;";
      calBtn.innerHTML=`이전자료(달력) <span style="font-size:13px;">🗓</span>`;
      calBtn.onclick=(e)=>{
        e.stopPropagation();
        showWeekCalendar(calBtn, allWeeks.slice(4));
      };
      wl.appendChild(calBtn);

      // 달력에서 선택된 주차 → 버튼 아래에 표시
      if(state.selectedWeek && !recent4.includes(state.selectedWeek)){
        const selSub=document.createElement("span");
        selSub.className="sb-sub active";
        selSub.style.cssText="padding-left:28px;";
        selSub.textContent=`ㄴ ~${fmt(state.selectedWeek)}`;
        selSub.onclick=()=>{
          state.selectedWeek=state.selectedWeek;
          render();
        };
        wl.appendChild(selSub);
      }
    } else {
      wl.innerHTML="";
    }
  }
}

function el(tag,cls,sty,html){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(sty)Object.assign(e.style,sty);
  if(html!==undefined)e.innerHTML=html;
  return e;
}
function app(p,...ch){ch.forEach(c=>{if(c)p.appendChild(c);});return p;}

// 안전한 숫자 변환
function safeNum(v){return(typeof v==="number"&&!isNaN(v))?v:0;}
function safeArr(v){return Array.isArray(v)?v:[];}
function safeStr(v){return v!=null?String(v):"-";}

function kpiCard(label,value,sub,accent){
  const d=el("div","kpi-card");
  d.style.borderTopColor=accent||C.blue;
  d.innerHTML=`<div class="kpi-label">${label}</div><div class="kpi-value">${value??"-"}</div>${sub?`<div class="kpi-sub">${sub}</div>`:""}`;
  return d;
}

function hbar(data,accent,maxV,unit){
  const arr=safeArr(data).filter(d=>d&&safeNum(d.v)>0);
  if(!arr.length)return el("div","no-data",null,noDataMsg);
  const m=maxV||Math.max(...arr.map(d=>safeNum(d.v)),1);
  const wrap=el("div","hbar-wrap");
  arr.slice(0,12).forEach(d=>{
    const pct=Math.max(Math.round(safeNum(d.v)/m*100),2);
    wrap.innerHTML+=`<div class="hbar-row"><div class="hbar-label" title="${d.l||""}">${d.l||""}</div><div class="hbar-track"><div class="hbar-fill" style="width:${pct}%;background:${accent||C.blue}"></div></div><div class="hbar-val">${safeNum(d.v).toLocaleString()}${unit||""}</div></div>`;
  });
  return wrap;
}

function card(title,sub,children){
  const d=el("div","card");
  app(d,el("div","card-header",null,`<div class="card-title">${title}</div>${sub?`<div class="card-sub">${sub}</div>`:""}`));
  if(children)d.appendChild(children);
  return d;
}

function grid(cols,gap,items){
  const d=el("div");
  d.style.cssText=`display:grid;grid-template-columns:${cols};gap:${gap||12}px;margin-bottom:12px;`;
  items.filter(Boolean).forEach(i=>d.appendChild(i));

}

function sectionTitle(text,color){

function subLabel(text){return el("div","sub-label",null,text);}

// ── 도넛 카드 (교환/반품) ──────────────────────────────
function donutCard(label,total,교환,반품,accent){
  const t=safeNum(total),교=safeNum(교환),반=safeNum(반품);
  const p교=t?Math.round(교/t*100):0, p반=t?Math.round(반/t*100):0;
  const d=el("div","kpi-card");
  d.style.borderTopColor=accent;
  const size=80,cx=40,cy=40,r=34,ri=22;
  
  let svgPaths="";
  if(t>0){
    [[교,accent,p교,"교환"],[반,"rgba(30,64,175,0.25)",p반,"반품"]].reduce((ang,item)=>{
      const[v,color,pct,name]=item;
      if(v<=0)return ang;
      const sweep=(v/t)*Math.PI*2;
      const x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang);
      const x2=cx+r*Math.cos(ang+sweep),y2=cy+r*Math.sin(ang+sweep);
      const xi1=cx+ri*Math.cos(ang),yi1=cy+ri*Math.sin(ang);
      const xi2=cx+ri*Math.cos(ang+sweep),yi2=cy+ri*Math.sin(ang+sweep);
      const lg=sweep>Math.PI?1:0;
      svgPaths+=`<path d="M ${xi1} ${yi1} L ${x1} ${y1} A ${r} ${r} 0 ${lg} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${ri} ${ri} 0 ${lg} 0 ${xi1} ${yi1} Z" fill="${color}" stroke="#e2e8f0" stroke-width="1.5"/>`;
      return ang+sweep;
    },-Math.PI/2);
  } else {
    svgPaths=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="#f1f5f9"/><circle cx="${cx}" cy="${cy}" r="${ri}" fill="#fff"/>`;
  }

  d.innerHTML=`<div class="kpi-label">${label}</div>
    <div style="display:flex;align-items:center;gap:12px;margin-top:4px;">
      <svg viewBox="0 0 ${size} ${size}" style="width:${size}px;height:${size}px;flex-shrink:0;">${svgPaths}
        <text x="${cx}" y="${cy-3}" text-anchor="middle" fill="#0f1f3d" font-size="11" font-weight="700" font-family="'Apple SD Gothic Neo',sans-serif">${t.toLocaleString()}</text>
        <text x="${cx}" y="${cy+10}" text-anchor="middle" fill="#64748b" font-size="8" font-family="'Apple SD Gothic Neo',sans-serif">건</text>
      </svg>
      <div style="flex:1;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="display:flex;align-items:center;gap:4px;font-size:11px;color:#334155;"><span style="width:8px;height:8px;border-radius:2px;background:${accent};display:inline-block;"></span>교환</span>
          <span style="font-size:12px;font-weight:700;color:#0f1f3d;">${교.toLocaleString()}<span style="font-size:10px;color:#64748b;font-weight:400;"> (${p교}%)</span></span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="display:flex;align-items:center;gap:4px;font-size:11px;color:#334155;"><span style="width:8px;height:8px;border-radius:2px;background:rgba(30,64,175,0.25);display:inline-block;"></span>반품</span>
          <span style="font-size:12px;font-weight:700;color:#0f1f3d;">${반.toLocaleString()}<span style="font-size:10px;color:#64748b;font-weight:400;"> (${p반}%)</span></span>
        </div>
      </div>
    </div>`;
  return d;
}

// ── 파이차트 SVG ──────────────────────────────────────────
function pieSection(data, colors, title, sub){
  const arr=safeArr(data).filter(d=>d&&safeNum(d.v)>0);
  const total=arr.reduce((s,d)=>s+safeNum(d.v),0);
  
  const wrap=el("div");
  wrap.style.cssText="display:flex;gap:16px;align-items:flex-start;";
  
  if(!total){
    wrap.appendChild(el("div","no-data",null,noDataMsg));
    return card(title,sub,wrap);
  }
  
  const size=150,cx=75,cy=75,r=68,ri=r*0.52;
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox",`0 0 ${size} ${size}`);
  svg.style.cssText=`width:${size}px;height:${size}px;flex-shrink:0;`;
  
  let angle=-Math.PI/2;
  arr.slice(0,10).forEach((d,i)=>{
    const sweep=(safeNum(d.v)/total)*Math.PI*2;
    if(sweep<=0)return;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+sweep),y2=cy+r*Math.sin(angle+sweep);
    const xi1=cx+ri*Math.cos(angle),yi1=cy+ri*Math.sin(angle);
    const xi2=cx+ri*Math.cos(angle+sweep),yi2=cy+ri*Math.sin(angle+sweep);
    const lg=sweep>Math.PI?1:0;
    const path=document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",`M ${xi1} ${yi1} L ${x1} ${y1} A ${r} ${r} 0 ${lg} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${ri} ${ri} 0 ${lg} 0 ${xi1} ${yi1} Z`);
    path.setAttribute("fill",colors[i%colors.length]);
    path.setAttribute("stroke","#e2e8f0");
    path.setAttribute("stroke-width","1.5");
    svg.appendChild(path);
    angle+=sweep;
  });
  const tTotal=document.createElementNS("http://www.w3.org/2000/svg","text");
  tTotal.setAttribute("x",cx);tTotal.setAttribute("y",cy-3);
  tTotal.setAttribute("text-anchor","middle");tTotal.setAttribute("fill","#0f1f3d");
  tTotal.setAttribute("font-size","12");tTotal.setAttribute("font-weight","700");
  tTotal.setAttribute("font-family","'Apple SD Gothic Neo',sans-serif");
  tTotal.textContent=total.toLocaleString();
  svg.appendChild(tTotal);
  const tUnit=document.createElementNS("http://www.w3.org/2000/svg","text");
  tUnit.setAttribute("x",cx);tUnit.setAttribute("y",cy+11);
  tUnit.setAttribute("text-anchor","middle");tUnit.setAttribute("fill","#64748b");
  tUnit.setAttribute("font-size","9");tUnit.setAttribute("font-family","'Apple SD Gothic Neo',sans-serif");
  tUnit.textContent="건";
  svg.appendChild(tUnit);
  wrap.appendChild(svg);
  
  const legend=el("div");
  legend.style.cssText="flex:1;display:flex;flex-direction:column;gap:5px;overflow:hidden;justify-content:center;";
  arr.slice(0,10).forEach((d,i)=>{
    const pct=Math.round(safeNum(d.v)/total*100);
    const row=el("div");
    row.style.cssText="display:flex;align-items:center;gap:5px;";
    row.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:${colors[i%colors.length]};flex-shrink:0;"></span><span style="font-size:11px;color:#334155;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${d.l||""}</span><span style="font-size:11px;font-weight:600;color:#0f1f3d;flex-shrink:0;">${pct.toFixed(1)}% (${safeNum(d.v).toLocaleString()}건)</span>`;
    legend.appendChild(row);
  });
  wrap.appendChild(legend);
  return card(title,sub,wrap);
}

// ── 3색 스택 추이 차트 (수리출고/자재출고/교환환불) ──────
function tripleStackChart(data, title, sub){
  const arr=safeArr(data).filter(d=>d&&safeNum(d.total)>=0);
  if(!arr.length) return card(title,sub,el("div","no-data",null,noDataMsg));

  const chartH=110;
  const wrap=el("div");
  const barsWrap=el("div");
  barsWrap.style.cssText=`display:flex;align-items:flex-end;justify-content:space-evenly;height:${chartH+18}px;padding:0 4px;`;
  arr.forEach(d=>{
    const 수리=safeNum(d.수리),자재=safeNum(d.자재),교환=safeNum(d.교환),tot=safeNum(d.total);
    const colWrap=el("div");
    colWrap.style.cssText=`flex:1;max-width:38px;min-width:0;display:flex;flex-direction:column;align-items:center;`;
    const totalH=maxV>0?Math.max(Math.round((tot/maxV)*chartH),tot>0?2:0):0;
    const h수=tot>0?Math.round((수리/tot)*totalH):0;
    const h자=tot>0?Math.round((자재/tot)*totalH):0;
    const h교=totalH-h수-h자;
    const stack=el("div");
    stack.style.cssText=`width:100%;display:flex;flex-direction:column;height:${totalH}px;border-radius:2px 2px 0 0;overflow:hidden;`;
    stack.title=`${d.l}\n수리출고: ${수리}\n자재출고: ${자재}\n교환/환불: ${교환}\n합계: ${tot}`;
    if(h자>0){const b=el("div");b.style.cssText=`height:${h자}px;background:${C자재};`;stack.appendChild(b);}
    if(h수>0){const b=el("div");b.style.cssText=`height:${h수}px;background:${C수리};`;stack.appendChild(b);}
    if(h교>0){const b=el("div");b.style.cssText=`height:${h교}px;background:${C교환};`;stack.appendChild(b);}
    const tl=el("div");
    tl.style.cssText="font-size:8px;font-weight:700;color:#0f1f3d;text-align:center;margin-bottom:2px;white-space:nowrap;";
    tl.textContent=tot>0?tot:"";
    const xl=el("div");
    xl.style.cssText="font-size:8px;color:#64748b;text-align:center;margin-top:1px;white-space:nowrap;overflow:hidden;width:100%;";
    xl.textContent=d.l||"";
    app(colWrap,tl,stack,xl);
    barsWrap.appendChild(colWrap);
  });
  const leg=el("div");
  leg.style.cssText="display:flex;gap:14px;margin-top:10px;padding:0 2px;flex-wrap:wrap;";
  [[C교환,"교환/환불"],[C자재,"자재출고"],[C수리,"수리출고"]].forEach(([color,label])=>{
    const item=el("div");
    item.style.cssText="display:flex;align-items:center;gap:4px;font-size:11px;color:#334155;";
    const dot=el("span");dot.style.cssText=`width:8px;height:8px;border-radius:2px;background:${color};`;
    app(item,dot,document.createTextNode(label));
    leg.appendChild(item);
  });
  app(wrap,barsWrap,leg);
  return card(title,sub,wrap);
}


// ── 누적 꺾은선 차트 (3종) ────────────────────────────────
function cumulativeLineChart(data, title, sub){
  const arr=safeArr(data).filter(d=>d&&safeNum(d.total)>0);
  if(!arr.length) return card(title,sub,el("div","no-data",null,noDataMsg));
  const C교환="#e57373", C수리="#ef9a9a", C자재="#ffcdd2";
  const w=460, h=130, padL=44, padR=12, padT=14, padB=32;
  const cW=w-padL-padR, cH=h-padT-padB;
  const maxV=Math.max(...arr.map(d=>safeNum(d.total)),1);
  const n=arr.length;
  const xStep=n>1?cW/(n-1):cW/2;

  function px(i){ return padL + (n>1 ? i*xStep : cW/2); }
  function py(v){ return padT + cH - Math.round((v/maxV)*cH); }

  // Y축 눈금
  const yTicks=4;
  let yLines="", yLabels="";
  for(let i=0;i<=yTicks;i++){
    const v=Math.round(maxV/yTicks*i);
    const y=py(v);
    yLines+=`<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="#f1f5f9" stroke-width="1"/>`;
    yLabels+=`<text x="${padL-6}" y="${y+4}" text-anchor="end" fill="#94a3b8" font-size="9" font-family="'Apple SD Gothic Neo',sans-serif">${v>=1000?(v/1000).toFixed(1)+"k":v}</text>`;
  }

  // 3종 라인 + 포인트
  function makeLine(key, color, dash=""){
    const pts=arr.map((d,i)=>`${px(i)},${py(safeNum(d[key]))}`).join(" ");
    const circles=arr.map((d,i)=>`<circle cx="${px(i)}" cy="${py(safeNum(d[key]))}" r="3.5" fill="${color}" stroke="#e2e8f0" stroke-width="1.5"><title>${d.l}: ${safeNum(d[key]).toLocaleString()}건</title></circle>`).join("");
    return `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" ${dash?`stroke-dasharray="${dash}"`:""}/>${circles}`;
  }

  // total 라인 (진하게)
  function makeTotalLine(){
    const pts=arr.map((d,i)=>`${px(i)},${py(safeNum(d.total))}`).join(" ");
    // 면적 채우기
    const areaBot=padT+cH;
    const areaPts=`${px(0)},${areaBot} ${pts} ${px(n-1)},${areaBot}`;
    const circles=arr.map((d,i)=>{
      const v=safeNum(d.total);
      return `<circle cx="${px(i)}" cy="${py(v)}" r="4.5" fill="#c0392b" stroke="#e2e8f0" stroke-width="2"><title>${d.l} 누적합계: ${v.toLocaleString()}건</title></circle>
<text x="${px(i)}" y="${py(v)-9}" text-anchor="middle" fill="#c0392b" font-size="9" font-weight="700" font-family="'Apple SD Gothic Neo',sans-serif">${v.toLocaleString()}</text>`;
    }).join("");
    return `<polygon points="${areaPts}" fill="rgba(224,79,79,0.07)"/>
<polyline points="${pts}" fill="none" stroke="#c0392b" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>${circles}`;
  }

  // X축 라벨
  const xLabels=arr.map((d,i)=>`<text x="${px(i)}" y="${h-4}" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="'Apple SD Gothic Neo',sans-serif">${(d.l||"").replace("26.","")}</text>`).join("");

  const svgContent=`${yLines}${yLabels}
${makeLine("교환",C교환)}
${makeLine("수리",C수리,"4 2")}
${makeLine("자재",C자재,"2 2")}
${makeTotalLine()}
${xLabels}`;

  const wrap=el("div");
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox",`0 0 ${w} ${h}`);
  svg.style.cssText=`width:100%;height:auto;overflow:visible;`;
  svg.innerHTML=svgContent;
  wrap.appendChild(svg);

  // 범례
  const leg=el("div");
  leg.style.cssText="display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;";
  [["#c0392b","누적합계",""],["#e57373","교환/환불",""],["#ef9a9a","수리출고","4 2"],["#ffcdd2","자재출고","2 2"]].forEach(([color,label,dash])=>{
    const item=el("div");
    item.style.cssText="display:flex;align-items:center;gap:4px;font-size:11px;color:#334155;";
    const svgIcon=`<svg width="20" height="10" style="flex-shrink:0"><line x1="0" y1="5" x2="20" y2="5" stroke="${color}" stroke-width="${label==="누적합계"?"2.5":"2"}" ${dash?`stroke-dasharray="${dash}"`:""}/>${label==="누적합계"?`<circle cx="10" cy="5" r="3" fill="${color}"/>`:`<circle cx="10" cy="5" r="2.5" fill="${color}"/>`}</svg>`;
    item.innerHTML=svgIcon+`<span>${label}</span>`;
    leg.appendChild(item);
  });
  wrap.appendChild(leg);
  return card(title,sub,wrap);
}


// ── TOP5 소형 파이차트 카드 ──────────────────────────────
function smallPieCard(prodName, dataArr, total, colors){
  const arr=(dataArr||[]).filter(function(d){return d&&(d.v||0)>0;});
  const shortName=prodName.replace("[꿈비] ","").replace("[집계] ","").replace("[개발] ","");
  const size=100,cx=50,cy=50,r=44,ri=28;
  const tot=arr.reduce(function(s,d){return s+(d.v||0);},0)||1;
  
  // SVG 도넛
  var svgHtml="";
  var angle=-Math.PI/2;
  if(arr.length===0){
    svgHtml='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="#f1f5f9"/><circle cx="'+cx+'" cy="'+cy+'" r="'+ri+'" fill="#fff"/>';
  } else {
    arr.forEach(function(d,i){
      var sweep=(d.v/tot)*Math.PI*2;
      if(sweep<=0)return;
      var x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
      var x2=cx+r*Math.cos(angle+sweep),y2=cy+r*Math.sin(angle+sweep);
      var xi1=cx+ri*Math.cos(angle),yi1=cy+ri*Math.sin(angle);
      var xi2=cx+ri*Math.cos(angle+sweep),yi2=cy+ri*Math.sin(angle+sweep);
      var lg=sweep>Math.PI?1:0;
      var color=colors[i%colors.length];
      svgHtml+='<path d="M '+xi1+' '+yi1+' L '+x1+' '+y1+' A '+r+' '+r+' 0 '+lg+' 1 '+x2+' '+y2+' L '+xi2+' '+yi2+' A '+ri+' '+ri+' 0 '+lg+' 0 '+xi1+' '+yi1+' Z" fill="'+color+'" stroke="#e2e8f0" stroke-width="1.2"/>';
      angle+=sweep;
    });
  }
  svgHtml+='<text x="'+cx+'" y="'+(cy-3)+'" text-anchor="middle" fill="#0f1f3d" font-size="11" font-weight="700" font-family="Apple SD Gothic Neo,sans-serif">'+total+'</text>';
  svgHtml+='<text x="'+cx+'" y="'+(cy+11)+'" text-anchor="middle" fill="#64748b" font-size="9" font-family="Apple SD Gothic Neo,sans-serif">건</text>';

  // 범례 HTML
  var legHtml="";
  arr.slice(0,6).forEach(function(item,i){
    var pct=((item.v/tot)*100).toFixed(1);
    var color=colors[i%colors.length];
    legHtml+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:3px;">'
      +'<span style="width:6px;height:6px;border-radius:50%;background:'+color+';flex-shrink:0;"></span>'
      +'<span style="font-size:10px;color:#334155;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+item.l+'</span>'
      +'<span style="font-size:10px;font-weight:600;color:#0f1f3d;flex-shrink:0;">'+pct+'% ('+item.v+'건)</span>'
      +'</div>';
  });
  if(!legHtml) legHtml='<div style="font-size:10px;color:#94a3b8;padding:4px 0;">데이터 없음</div>';

  var wrap=document.createElement("div");
  wrap.className="card";
  wrap.style.cssText="padding:12px 14px;margin-bottom:0;";
  wrap.innerHTML='<div style="font-size:11px;font-weight:600;color:#0f1f3d;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+shortName+'">'+shortName+'</div>'
    +'<div style="display:flex;gap:10px;align-items:flex-start;">'
    +'<svg viewBox="0 0 '+size+' '+size+'" width="'+size+'" height="'+size+'" style="flex-shrink:0;">'+svgHtml+'</svg>'
    +'<div style="flex:1;min-width:0;">'+legHtml+'</div>'
    +'</div>';
  return wrap;
}

// ── 월별 반품/교환율 꺾은선 SVG ─────────────────────────
function returnRateLineChart(월별data, 주간data, period, a1, title){
  // 월별교환율: 월별 배열에서 구성
  let arr=[];
  if(period==="2026년"||period==="월간"){
    arr=safeArr(월별data).map(d=>({l:(d.l||"").replace("26.",""),v:safeNum(d.total)}));
  } else {
    arr=safeArr(주간data).slice(-8).map(d=>({l:d.l||"",v:safeNum(d.total)}));
  }
  if(!arr.length) return card(title, period==="주간"?"주별 반품/교환 추이":"월별 반품/교환 추이", el("div","no-data",null,noDataMsg));

  const w=320,h=140,pL=36,pR=12,pT=20,pB=28;
  const cW=w-pL-pR,cH=h-pT-pB;
  const maxV=Math.max(...arr.map(d=>d.v),1);
  const n=arr.length;
  function px(i){return pL+(n>1?i*(cW/(n-1)):cW/2);}
  function py(v){return pT+cH-Math.round((v/maxV)*cH);}

  let yLines="",yLabels="";
  for(let i=0;i<=4;i++){
    const v=Math.round(maxV/4*i);
    const y=py(v);
    yLines+=`<line x1="${pL}" y1="${y}" x2="${w-pR}" y2="${y}" stroke="#f1f5f9" stroke-width="1"/>`;
    yLabels+=`<text x="${pL-4}" y="${y+4}" text-anchor="end" fill="#94a3b8" font-size="9" font-family="Apple SD Gothic Neo,sans-serif">${v>=1000?(v/1000).toFixed(1)+"k":v}</text>`;
  }
  const pts=arr.map((d,i)=>`${px(i)},${py(d.v)}`).join(" ");
  const area=`${px(0)},${pT+cH} ${pts} ${px(n-1)},${pT+cH}`;
  const circles=arr.map((d,i)=>{
    const show=d.v>0;
    return show?`<circle cx="${px(i)}" cy="${py(d.v)}" r="3.5" fill="${a1}" stroke="#e2e8f0" stroke-width="1.5"><title>${d.l}: ${d.v.toLocaleString()}건</title></circle><text x="${px(i)}" y="${py(d.v)-7}" text-anchor="middle" fill="${a1}" font-size="8" font-weight="700" font-family="Apple SD Gothic Neo,sans-serif">${d.v.toLocaleString()}</text>`:"";
  }).join("");
  const xLabels=arr.map((d,i)=>`<text x="${px(i)}" y="${h-4}" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="Apple SD Gothic Neo,sans-serif">${d.l}</text>`).join("");

  const svgHtml=`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;overflow:visible;">
    ${yLines}${yLabels}
    <polygon points="${area}" fill="${a1}22"/>
    <polyline points="${pts}" fill="none" stroke="${a1}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${circles}${xLabels}
  </svg>`;

  const wrap=el("div");
  wrap.innerHTML=svgHtml;
  return card(title,period==="주간"?"주별 반품/교환건 추이":"월별 반품/교환건 추이",wrap);
}

// ── 반품현황: 꿈비+소브 2열 동시 렌더 ─────────────────────
function renderBothBrands(cnt, R, period){
  function buildBrand(prefix, a1, a2){
    const 총건=safeNum(R[prefix+"총건"]);
    const 가전총=safeNum(R[prefix+"가전총"]);
    const 가전외총=safeNum(R[prefix+"가전외총"]);
    const 유형=safeArr(R[prefix+"유형"]);
    const 교환=safeNum(유형.find(d=>d.l==="교환")?.v);
    const 반품=safeNum(유형.find(d=>d.l==="반품")?.v);
    const 교환율=R[prefix+"교환율"]!=null?`${R[prefix+"교환율"]}%`:"-";
    const 기준월=R["기준월"]||"";
    const 교환율안내 = period==="주간" ? "<div style='font-size:10px;color:#94a3b8;margin-top:3px;'>* 주문배송 확정건 월간집계</div>" : "";
    const 사유=safeArr(R[prefix+"사유"]).filter(d=>safeNum(d.v)>0);
    const 월별=safeArr(R[prefix+"월별"]);
    const 주간추이=safeArr(R[prefix+"주간추이"]);

    const PIE_꿈비=["#1e40af","#3b82f6","#60a5fa","#93c5fd","#1e3a8a","#1d4ed8","#6d28d9","#7c3aed","#2563eb","#bfdbfe"];
    const PIE_소브=["#0f766e","#14b8a6","#2dd4bf","#0d9488","#115e59","#0891b2","#0ea5e9","#99f6e4","#134e4a","#ccfbf1"];
    const PIE=prefix==="꿈비"?PIE_꿈비:PIE_소브;

    // ── 세련된 꺾은선 차트 ────────────────────────────────
    function buildLineChart(data, color){
      const arr=safeArr(data).filter(d=>safeNum(d.total)>0||safeNum(d.v)>0);
      const wrap=el("div","card"); wrap.style.cssText="padding:14px 16px;margin-bottom:0;flex:1;";
      const hdrDiv=el("div"); hdrDiv.style.cssText="margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #e2e8f0;";
      hdrDiv.innerHTML=`<div class="card-title">${prefix} — ${period==="주간"?"주별":"월별"} 추이</div><div class="card-sub">${period==="주간"?"주별":"월별"} 반품/교환건 추이</div>`;
      wrap.appendChild(hdrDiv);
      if(!arr.length){wrap.appendChild(el("div","no-data",null,noDataMsg));return wrap;}
      const vals=arr.map(d=>safeNum(d.total||d.v));
      const maxV=Math.max(...vals,1);
      const w=360,h=160,pL=42,pR=16,pT=28,pB=32;
      const cW=w-pL-pR,cH=h-pT-pB;
      const n=arr.length;
      function px(i){return pL+(n>1?i*(cW/(n-1)):cW/2);}
      function py(v){return pT+cH-Math.round((v/maxV)*cH);}
      // Y 눈금
      let yLines="",yLabels="";
      const ticks=4;
      for(let i=0;i<=ticks;i++){
        const v=Math.round(maxV/ticks*i);
        const y=py(v);
        yLines+=`<line x1="${pL}" y1="${y}" x2="${w-pR}" y2="${y}" stroke="#f0f4f8" stroke-width="1"/>`;
        const lbl=v>=1000?(v/1000).toFixed(1)+"k":v;
        yLabels+=`<text x="${pL-6}" y="${y+4}" text-anchor="end" fill="#94a3b8" font-size="9" font-family="Apple SD Gothic Neo,sans-serif">${lbl}</text>`;
      }
      // 면적 그라데이션
      const pts=arr.map((d,i)=>`${px(i)},${py(vals[i])}`).join(" ");
      const areaBot=pT+cH;
      const areaPts=`${px(0)},${areaBot} ${pts} ${px(n-1)},${areaBot}`;
      // 데이터 포인트 + 라벨
      const circles=arr.map((d,i)=>{
        const v=vals[i]; const x=px(i),y=py(v);
        return `<circle cx="${x}" cy="${y}" r="4" fill="${color}" stroke="#e2e8f0" stroke-width="2"/>`
          +`<text x="${x}" y="${y-10}" text-anchor="middle" fill="${color}" font-size="10" font-weight="700" font-family="Apple SD Gothic Neo,sans-serif">${v.toLocaleString()}</text>`;
      }).join("");
      // X 라벨
      const xLabels=arr.map((d,i)=>{
        const lbl=(d.l||"").replace("26.","").replace("월","월");
        return `<text x="${px(i)}" y="${h-6}" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Apple SD Gothic Neo,sans-serif">${lbl}</text>`;
      }).join("");
      // 그라데이션 ID
      const gid="lg_"+prefix;
      const svgContent=`
        <defs>
          <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="${color}" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="${color}" stop-opacity="0.01"/>
          </linearGradient>
        </defs>
        ${yLines}${yLabels}
        <polygon points="${areaPts}" fill="url(#${gid})"/>
        <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
        ${circles}${xLabels}`;
      const svgEl=el("div");
      svgEl.innerHTML=`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;overflow:visible;">${svgContent}</svg>`;
      wrap.appendChild(svgEl);
      return wrap;
    }

    // 추이 데이터: 주간=주간추이 꺾은선, 월간=월별 꺾은선
    const trendCard = period==="주간"
      ? buildLineChart(주간추이.slice(-8), a1)
      : buildLineChart(월별.map(d=>({l:d.l,total:d.total||0,v:d.total||0})), a1);

    // ── 파이차트 ─────────────────────────────────────────
    const pieCard=pieSection(사유.slice(0,9),PIE,`${prefix} — 반품 사유 비율`,null);
    pieCard.style.marginBottom="0";

    // ── 우측(6): 꺾은선 위 + 파이 아래 ──────────────────
    const rightCol=el("div");
    rightCol.style.cssText="display:flex;flex-direction:column;gap:10px;flex:6;min-width:0;align-self:stretch;";
    trendCard.style.cssText=(trendCard.style.cssText||"")+"flex:1;min-height:0;margin-bottom:0;";
    pieCard.style.cssText=(pieCard.style.cssText||"")+"flex:1;min-height:0;margin-bottom:0;";
    rightCol.appendChild(trendCard);
    rightCol.appendChild(pieCard);

    // ── 좌측(4): KPI 세로 ────────────────────────────────
    const leftCol=el("div");
    leftCol.style.cssText="display:flex;flex-direction:column;gap:8px;flex:4;min-width:0;align-self:stretch;";

    const kpi율=el("div","kpi-card");
    kpi율.style.cssText=`border-top:3px solid ${C.red};margin-bottom:0;flex:1;`;
    kpi율.innerHTML=`<div class="kpi-label">반품/교환율</div><div class="kpi-value" style="color:${C.red};font-size:24px;">${교환율}</div><div class="kpi-sub">${기준월}</div>${교환율안내}`;

    const kpi총계=el("div","kpi-card");
    kpi총계.style.cssText=`border-top:3px solid ${a1};margin-bottom:0;flex:1;`;
    kpi총계.innerHTML=`<div class="kpi-label">반품/교환 총계</div><div class="kpi-value">${총건.toLocaleString()}</div><div class="kpi-sub">${period} 기준</div>`;

    const gCard=gaugCard("가전 / 가전외",총건,가전총,가전외총,a1,a2);
    gCard.style.cssText="margin-bottom:0;flex:1;";

    const dCard=donutCard("교환 / 반품",총건,교환,반품,a1);
    dCard.style.cssText="margin-bottom:0;flex:1;";

    app(leftCol,kpi율,kpi총계,gCard,dCard);

    // ── 브랜드 전체 박스 ─────────────────────────────────
    const box=el("div");
    box.style.cssText="display:flex;flex-direction:column;min-width:0;height:100%;";

    const title=el("div","section-title");
    title.style.cssText+=`background:${a1};margin-bottom:8px;margin-top:0;`;
    title.textContent=prefix==="꿈비"?"1. 꿈비":"2. 소브";
    box.appendChild(title);

    const inner=el("div");
    inner.style.cssText="display:flex;gap:10px;align-items:stretch;flex:1;";
    app(inner,leftCol,rightCol);
    box.appendChild(inner);
    return box;
  }

  // 꿈비/소브 2열 grid
  const wrapper=el("div");
  wrapper.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:10px;align-items:stretch;";
  wrapper.appendChild(buildBrand("꿈비",C.blue,"#3b82f6"));
  wrapper.appendChild(buildBrand("소브",C.teal,C.teal2));
  cnt.appendChild(wrapper);

  // 꿈비/소브 높이 동기화
  requestAnimationFrame(()=>{
    const boxes = wrapper.children;
    if(boxes.length===2){
      const h = Math.max(boxes[0].offsetHeight, boxes[1].offsetHeight);
      boxes[0].style.minHeight = h+"px";
      boxes[1].style.minHeight = h+"px";
    }
  });
}

// ── 반품현황 브랜드 렌더 (하위호환용) ───────────────────────
function renderBrand(cnt, R, period, prefix, a1, a2){
  const 총건=safeNum(R[prefix+"총건"]);
  const 가전총=safeNum(R[prefix+"가전총"]);
  const 가전외총=safeNum(R[prefix+"가전외총"]);
  const 유형=safeArr(R[prefix+"유형"]);
  const 교환=safeNum(유형.find(d=>d.l==="교환")?.v);
  const 반품=safeNum(유형.find(d=>d.l==="반품")?.v);
  const 교환율=R[prefix+"교환율"]!=null?`${R[prefix+"교환율"]}%`:"-";
  const 기준월=R["기준월"]||"";
  const 사유=safeArr(R[prefix+"사유"]).filter(d=>safeNum(d.v)>0);
  const 월별=safeArr(R[prefix+"월별"]);
  const 주간추이=safeArr(R[prefix+"주간추이"]);
  const 일자별=safeArr(R[prefix+"일자별추이"]);

  const PIE_꿈비=["#1e40af","#3b82f6","#60a5fa","#93c5fd","#1e3a8a","#1d4ed8","#6d28d9","#7c3aed","#2563eb","#bfdbfe"];
  const PIE_소브=["#0f766e","#14b8a6","#2dd4bf","#0d9488","#115e59","#0891b2","#0ea5e9","#99f6e4","#134e4a","#ccfbf1"];
  const PIE = prefix==="꿈비"?PIE_꿈비:PIE_소브;

  // 추이 카드 결정
  let trendCard;
  if(period==="주간"){
    // 주간: 주간추이 꺾은선
    trendCard=trendBarChart(주간추이.slice(-8), a1, a2, `${prefix} — 주별 추이`, "최근 8주 기준");
  } else if(period==="월간"){
    trendCard=buildLineChart(월별, a1);
  } else {
    trendCard=buildLineChart(월별, a1);
  }

  // ── 왼쪽 KPI 세로 컬럼 ──────────────────────────────────
  const leftCol = el("div");
  leftCol.style.cssText = "display:grid;gap:10px;min-width:160px;max-width:180px;";

  // KPI: 교환율 (최상단)
  const kpi율 = el("div","kpi-card");
  kpi율.style.cssText = `border-top:3px solid ${C.red};margin-bottom:0;`;
  kpi율.innerHTML = `<div class="kpi-label">반품/교환율</div><div class="kpi-value" style="color:${C.red}">${교환율}</div><div class="kpi-sub">${기준월}</div>`;
  leftCol.appendChild(kpi율);

  // KPI: 총계
  const kpi총계 = el("div","kpi-card");
  kpi총계.style.cssText = `border-top:3px solid ${a1};margin-bottom:0;`;
  kpi총계.innerHTML = `<div class="kpi-label">반품/교환 총계</div><div class="kpi-value">${총건.toLocaleString()}</div><div class="kpi-sub">${period} 기준</div>`;
  leftCol.appendChild(kpi총계);

  // 가전/가전외 게이지
  const gaug = gaugCard("가전 / 가전외", 총건, 가전총, 가전외총, a1, a2);
  gaug.style.marginBottom = "0";
  leftCol.appendChild(gaug);

  // 교환/반품 도넛
  const donutWrapL = donutCard("교환 / 반품", 총건, 교환, 반품, a1);
  donutWrapL.style.marginBottom = "0";
  leftCol.appendChild(donutWrapL);

  // ── 가운데: 파이차트 (사유) ──────────────────────────────
  const midCard = pieSection(사유.slice(0,9), PIE, `${prefix} — 반품 사유 비율`, null);
  midCard.style.cssText = "flex:1.4;margin-bottom:0;min-width:0;";

  // ── 오른쪽: 꺾은선 추이만 ────────────────────────────────
  const rightCol = el("div");
  rightCol.style.cssText = "display:flex;flex-direction:column;gap:10px;flex:1.4;min-width:0;";

  const lineCard = returnRateLineChart(월별, 주간추이, period, a1, `${prefix} — ${period==="주간"?"주별":"월별"} 추이`);
  lineCard.style.cssText = "margin-bottom:0;flex:1;";
  rightCol.appendChild(lineCard);

  // ── 전체 행 레이아웃 ──────────────────────────────────────
  const row = el("div");
  row.style.cssText = "display:flex;gap:10px;align-items:stretch;margin-bottom:10px;";
  app(row, leftCol, midCard, rightCol);
  cnt.appendChild(row);

  // row 렌더 후 leftCol 높이를 우측 높이에 맞춰 4등분
  requestAnimationFrame(()=>{
    const rowH = row.offsetHeight;
    if(rowH > 0){
      const gap = 10;
      const n = 4;
      const cardH = Math.floor((rowH - gap*(n-1)) / n);
      leftCol.style.gridTemplateRows = `repeat(${n}, ${cardH}px)`;
    }
  });
}

let noDataMsg = "데이터 없음";
function render(){
  const now=new Date();
  const monthLabel = state.period==="월간" ? ` · ${state.selectedMonth}월 마감` : state.period==="주간" && state.selectedWeek ? ` · ~${state.selectedWeek.slice(5).replace('-','/')} 마감` : "";
  document.getElementById("date-str").textContent=`2026년 기준${monthLabel} · ${DATA.updated||""} ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;

  // 상단 카테고리 탭 (주요KPI, 상담실적, ...) 렌더
  const hdr2=document.getElementById("hdr2");
  hdr2.innerHTML="";
  TABS.forEach(t=>{
    const b=el("button","",null,t+(t==="Issue"?" ❗":t==="팀Tool"?" 🔧":""));
    if(state.tab===t)b.classList.add("active");
    b.onclick=()=>{
      if(!canAccess(t)){
        state.tab=t; render(); return;
      }
      state.tab=t; render();
    };
    hdr2.appendChild(b);
  });

  const cnt=document.getElementById("content");
  cnt.innerHTML="";
  updateSidebar();

  const{tab,period}=state;

  // ── 접근 권한 체크 ──
  if(!canAccess(tab)){
    const na=el("div","no-access");
    na.innerHTML='<div class="na-icon">🔒</div><div class="na-text">현재 권한으로 접근 불가</div><div class="na-sub">해당 탭은 접근 권한이 없습니다.</div>';
    cnt.appendChild(na);
    return;
  }
  // 주간 선택 시 selectedWeek 초기화 (NaN 방지)
  if(period==="주간" && !state.selectedWeek){
    const wks=Object.keys(DATA["주간"]||{}).sort().reverse();
    state.selectedWeek=wks[0]||null;
  }
  noDataMsg = period==="주간" ? "금주 실적 없음" : period==="월간" ? "당월 실적 없음" : "데이터 없음";
  const periodLabel = period==="월간" ? `${state.selectedMonth}월` : period==="주간" && state.selectedWeek ? `~${state.selectedWeek.slice(5).replace('-','/')}주` : period;
  // 월간일 때 선택된 월 데이터 사용
  const 월별D = period==="월간" ? (DATA["월별"]?.[String(state.selectedMonth)]||null) : null;
  const 주간D = period==="주간" ? (DATA["주간"]?.[state.selectedWeek]||null) : null;
  const S = 월별D ? (월별D["상담실적"]||{}) : 주간D ? (주간D["상담실적"]||{}) : (DATA["상담실적"]?.[period]||{});
  const R = 월별D ? (월별D["반품현황"]||{}) : 주간D ? (주간D["반품현황"]||{}) : (DATA["반품현황"]?.[period]||{});
  const P = 월별D ? (월별D["처리현황"]||{}) : 주간D ? (주간D["처리현황"]||{}) : (DATA["처리현황"]?.[period]||{});
  const Q = 월별D ? (월별D["품질관리"]||{}) : 주간D ? (주간D["품질관리"]||{}) : (DATA["품질관리"]?.[period]||{});
  const IMP_D = 월별D ? (월별D["개선품질"]||{}) : 주간D ? (주간D["개선품질"]||{}) : (DATA["개선품질"]?.[period]||{});

  if(tab==="주요KPI"){
    // ──────────────────────────────────────────────────────
    // 주요 KPI — 캡쳐 레이아웃 기반 완전 재구성
    // 구조: [상단: 좌타이틀+우섹션헤더] / [중단: 종합도넛+도넛그리드] / [하단: 테이블]
    // ──────────────────────────────────────────────────────

    const KPI_ITEMS = (DATA["kpi_items"]||[]);

    const rated = KPI_ITEMS.filter(k=>k.rate!=null);
    const avgRate = rated.length ? Math.round(rated.reduce((s,k)=>s+k.rate,0)/rated.length) : 0;

    // ── 색상 함수 ──
    function kpiColor(r){ return r==null?"#cbd5e1":r>=100?"#0f766e":r>=70?"#0d9488":r>=40?"#f59e0b":"#ef4444"; }
    function kpiBg(r){ return r==null?"#f1f5f9":r>=100?"#ccfbf1":r>=70?"#dbeafe":r>=40?"#fef3c7":"#fee2e2"; }
    function kpiTextColor(r){ return r==null?"#64748b":r>=100?"#0f766e":r>=70?"#1e40af":r>=40?"#b45309":"#991b1b"; }

    // ── 섹션 헤더 ──
    function kpiSecHeader(text){
      const d=el("div");
      d.style.cssText="background:#0f1f3d;color:#fff;font-size:13px;font-weight:700;padding:8px 14px;border-radius:6px 6px 0 0;margin-bottom:0;letter-spacing:0.02em;";
      d.textContent=text;
      return d;
    }

    // ── 소형 도넛 카드 ──
    function kpiSmallCard(item){
      const wrap=el("div");
      wrap.style.cssText="background:#fff;border:1px solid #e2e8f0;border-top:none;padding:12px 10px 10px;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0;flex:1;height:100%;box-sizing:border-box;";

      // 타이틀
      const ttl=el("div"); ttl.style.cssText="font-size:11px;font-weight:700;color:#0f1f3d;text-align:center;width:100%;line-height:1.3;min-height:28px;display:flex;align-items:center;justify-content:center;";
      ttl.textContent=item.label;
      // 서브
      const sub=el("div"); sub.style.cssText="font-size:9px;color:#64748b;text-align:center;width:100%;line-height:1.3;min-height:22px;";
      sub.textContent=item.sub;

      // 도넛 SVG
      const r=item.rate, pct=r!=null?Math.min(r,100):0;
      const sz=90,cx=45,cy=45,radius=34,circ=Math.PI*2*radius;
      const col=kpiColor(r);
      let arcSvg="";
      if(pct>=100){
        arcSvg=`<circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="${col}" stroke-width="9"/>`;
      } else if(pct>0){
        const filled=circ*(pct/100);
        arcSvg=`<circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="${col}" stroke-width="9" stroke-dasharray="${filled} ${circ}" stroke-dashoffset="${circ/4}" stroke-linecap="round"/>`;
      }
      const svg=`<svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}">
        <circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="#f1f5f9" stroke-width="9"/>
        ${arcSvg}
        <text x="${cx}" y="${cy-4}" text-anchor="middle" fill="#0f1f3d" font-size="${r!=null?15:11}" font-weight="700" font-family="Apple SD Gothic Neo,sans-serif">${r!=null?Math.round(r)+"%":"–"}</text>
        <text x="${cx}" y="${cy+12}" text-anchor="middle" fill="#64748b" font-size="8" font-family="Apple SD Gothic Neo,sans-serif">${r!=null?"달성율":"미집계"}</text>
      </svg>`;
      const svgDiv=el("div"); svgDiv.innerHTML=svg;

      app(wrap,ttl,sub,svgDiv);
      return wrap;
    }

    // ── 큰 도넛 (종합 진행현황) ──
    function kpiBigCard(rate){
      const wrap=el("div");
      wrap.style.cssText="background:#fff;border:1px solid #e2e8f0;border-radius:0 0 6px 6px;padding:16px 12px 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;height:100%;box-sizing:border-box;";
      const ttl=el("div"); ttl.style.cssText="font-size:13px;font-weight:700;color:#0f1f3d;align-self:flex-start;";
      ttl.textContent="종합 진행현황";
      const sub=el("div"); sub.style.cssText="font-size:10px;color:#64748b;align-self:flex-start;margin-bottom:4px;";
      sub.textContent="주요 KPI 종합 진행율";
      const sz=200,cx=100,cy=100,radius=82,circ=Math.PI*2*radius;
      const col=kpiColor(rate);
      let bigArc="";
      if(rate>=100){
        bigArc=`<circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="${col}" stroke-width="16"/>`;
      } else if(rate>0){
        const filled=circ*(rate/100);
        bigArc=`<circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="${col}" stroke-width="16" stroke-dasharray="${filled} ${circ}" stroke-dashoffset="${circ/4}" stroke-linecap="round"/>`;
      }
      const svgHtml=`<svg viewBox="0 0 ${sz} ${sz}" width="100%" height="auto" style="display:block;max-width:220px;margin:0 auto;">
        <circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="#f1f5f9" stroke-width="16"/>
        ${bigArc}
        <text x="${cx}" y="${cy-6}" text-anchor="middle" fill="#0f1f3d" font-size="32" font-weight="700" font-family="Apple SD Gothic Neo,sans-serif">${rate}%</text>
        <text x="${cx}" y="${cy+20}" text-anchor="middle" fill="#64748b" font-size="13" font-family="Apple SD Gothic Neo,sans-serif">평균 달성율</text>
      </svg>`;
      const svgDiv=el("div"); svgDiv.style.cssText="width:100%;flex:1;display:flex;align-items:center;justify-content:center;";
      svgDiv.innerHTML=svgHtml;
      app(wrap,ttl,sub,svgDiv);
      return wrap;
    }

    // ── KPI 테이블 (2열) ──
    function kpiTableTwo(items){
      const outer=el("div");
      outer.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:12px;";

      function makeTable(rows, groupLabel){
        const wrap=el("div");

        rows.forEach((k,i)=>{

          // 구분 셀: 첫번째 행만 텍스트, 나머지는 좌측 border로 구분
          const isFirst = i===0;
          row.innerHTML=`
            <div style="padding:8px 12px;font-size:11px;font-weight:700;color:#1e40af;text-align:center;display:flex;align-items:center;justify-content:center;border-right:1px solid #e2e8f0;${isFirst?"":"color:transparent;"}">${groupLabel}</div>
            <div style="padding:8px 4px 8px 0;font-size:11px;font-weight:600;color:#0f1f3d;display:flex;align-items:center;">${k.label}</div>
            <div style="padding:8px 12px 8px 0;font-size:11px;color:#334155;display:flex;align-items:center;">${rateTag}${k.note||k.sub}</div>`;
          wrap.appendChild(row);
        });
        return wrap;
      }

      outer.appendChild(makeTable(items.slice(0,5), "상담관리"));
      outer.appendChild(makeTable(items.slice(5), "품질관리"));
      return outer;
    }

    // ── 전체 레이아웃 ──
    const root=el("div");
    root.style.cssText="display:flex;flex-direction:column;gap:12px;";

    // ── 상단 전체: 3열 그리드 (좌카드 2행span | 상담관리 | 품질관리) ──
    // grid: [KPI카드(span2)] [상담관리] / [공백(span)] [품질관리]
    const topGrid=el("div");
    topGrid.style.cssText="display:grid;grid-template-columns:1fr 2fr;grid-template-rows:300px 280px;gap:12px;";

    // ── 좌: 주요KPI 진행율 카드 (2행 span) ──
    const z1left=el("div");
    z1left.style.cssText="grid-row:1/3;display:flex;flex-direction:column;";
    const z1title=el("div");
    z1title.style.cssText="background:#0f1f3d;color:#fff;font-size:15px;font-weight:700;padding:9px 14px;border-radius:6px 6px 0 0;";
    z1title.textContent="주요KPI 진행율";
    z1left.appendChild(z1title);
    z1left.appendChild(kpiBigCard(avgRate));
    topGrid.appendChild(z1left);

    // ── 우상: 상담관리 ──
    const z1right=el("div");
    z1right.style.cssText="display:flex;flex-direction:column;";
    z1right.appendChild(kpiSecHeader("상담관리"));
    const 상담Grid=el("div");
    상담Grid.style.cssText="display:flex;gap:0;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 6px 6px;overflow:hidden;flex:1;align-items:stretch;min-height:220px;";
    KPI_ITEMS.filter(k=>k.group==="상담관리").forEach((k,i,arr)=>{
      const card=kpiSmallCard(k);
      if(i<arr.length-1) card.style.borderRight="1px solid #e2e8f0";
      card.style.borderLeft="none";
      card.style.borderTop="none";
      card.style.borderBottom="none";
      card.style.borderRadius="0";
      상담Grid.appendChild(card);
    });
    z1right.appendChild(상담Grid);
    topGrid.appendChild(z1right);

    // ── 우하: 품질관리 ──
    const z2right=el("div");
    z2right.style.cssText="display:flex;flex-direction:column;";
    z2right.appendChild(kpiSecHeader("품질관리"));
    const 품질Grid=el("div");
    품질Grid.style.cssText="display:flex;gap:0;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 6px 6px;overflow:hidden;flex:1;align-items:stretch;min-height:220px;";
    KPI_ITEMS.filter(k=>k.group==="품질관리").forEach((k,i,arr)=>{
      const card=kpiSmallCard(k);
      if(i<arr.length-1) card.style.borderRight="1px solid #e2e8f0";

      const mx=maxV||Math.max(...arr.map(d=>safeNum(d.v)),1);
      const n=arr.length;
      function px(i){return pL+(n>1?i*(cW/(n-1)):cW/2);}
      function py(v){return pT+cH-Math.round((safeNum(v)/mx)*cH);}

        const v=Math.round(mx/4*i);
        const y=py(v);
        yLines+=`<line x1="${pL}" y1="${y}" x2="${w-pR}" y2="${y}" stroke="#f1f5f9" stroke-width="1"/>`;
        yLabels+=`<text x="${pL-4}" y="${y+4}" text-anchor="end" fill="#94a3b8" font-size="9" font-family="Apple SD Gothic Neo,sans-serif">${v}${unit||""}</text>`;
      }
      const pts=arr.map((d,i)=>`${px(i)},${py(d.v)}`).join(" ");
      const area=`${px(0)},${pT+cH} ${pts} ${px(n-1)},${pT+cH}`;
      const circles=arr.map((d,i)=>`<circle cx="${px(i)}" cy="${py(d.v)}" r="3.5" fill="${color}" stroke="#e2e8f0" stroke-width="1.5"/><text x="${px(i)}" y="${py(d.v)-8}" text-anchor="middle" fill="${color}" font-size="8" font-weight="700" font-family="Apple SD Gothic Neo,sans-serif">${isInt ? Math.round(safeNum(d.v)).toLocaleString() : (+(+safeNum(d.v)).toFixed(2))}${unit||""}</text>`).join("");

      wrap.appendChild(svgEl);
      return wrap;
    }

        const vl=el("div"); vl.style.cssText="font-size:9px;font-weight:700;color:#0f1f3d;text-align:center;margin-bottom:2px;white-space:nowrap;";
        vl.textContent=v>0?(unitFn?unitFn(v):v.toLocaleString()):"";
        const bar=el("div"); bar.style.cssText=`width:100%;height:${barH}px;background:${color};border-radius:3px 3px 0 0;`;
        const xl=el("div"); xl.style.cssText="font-size:8px;color:#64748b;text-align:center;margin-top:3px;white-space:nowrap;overflow:hidden;width:100%;";
        xl.textContent=(d.l||"").replace("26.","");
        app(col,vl,bar,xl); bw.appendChild(col);
      });
      w.appendChild(bw); return w;
    }

    // ── 공용: 도넛 차트 ──────────────────────────────────────
    function donutChart(data, colors, title, sub){
      const arr=safeArr(data).filter(d=>safeNum(d.v)>0);
      const total=arr.reduce((s,d)=>s+safeNum(d.v),0)||1;
      const w=el("div","card"); w.style.cssText="padding:14px 16px;margin-bottom:0;";
      app(w,el("div","card-header",null,`<div class="card-title">${title}</div>${sub?`<div class="card-sub">${sub}</div>`:""}`));
      if(!arr.length){w.appendChild(el("div","no-data",null,noDataMsg));return w;}
      const size=110,cx=55,cy=55,r=48,ri=30;
      let paths="",angle=-Math.PI/2;
      arr.slice(0,10).forEach((d,i)=>{
        const sw=(safeNum(d.v)/total)*Math.PI*2; if(sw<0.01)return;
        const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle),x2=cx+r*Math.cos(angle+sw),y2=cy+r*Math.sin(angle+sw);
        const xi1=cx+ri*Math.cos(angle),yi1=cy+ri*Math.sin(angle),xi2=cx+ri*Math.cos(angle+sw),yi2=cy+ri*Math.sin(angle+sw);
        const lg=sw>Math.PI?1:0;
        paths+=`<path d="M ${xi1} ${yi1} L ${x1} ${y1} A ${r} ${r} 0 ${lg} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${ri} ${ri} 0 ${lg} 0 ${xi1} ${yi1} Z" fill="${colors[i%colors.length]}" stroke="#e2e8f0" stroke-width="1.5"/>`;
        angle+=sw;
      });
      paths+=`<text x="${cx}" y="${cy-2}" text-anchor="middle" fill="#0f1f3d" font-size="12" font-weight="700" font-family="Apple SD Gothic Neo,sans-serif">${total.toLocaleString()}</text>`;
      paths+=`<text x="${cx}" y="${cy+12}" text-anchor="middle" fill="#64748b" font-size="8" font-family="Apple SD Gothic Neo,sans-serif">건</text>`;
      const body=el("div"); body.style.cssText="display:flex;gap:8px;align-items:center;";
      body.innerHTML=`<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="flex-shrink:0;">${paths}</svg>`;
      const leg=el("div"); leg.style.cssText="flex:1;display:flex;flex-direction:column;gap:3px;overflow:hidden;";
      arr.slice(0,7).forEach((d,i)=>{
        const pct=((safeNum(d.v)/total)*100).toFixed(1);
        const name=(d.l||"").replace("[꿈비] ","").replace("[AS] ","").replace("[집계] ","");
        const row=el("div"); row.style.cssText="display:flex;align-items:center;gap:4px;";
        row.innerHTML=`<span style="width:6px;height:6px;border-radius:50%;background:${colors[i%colors.length]};flex-shrink:0;"></span><span style="font-size:10px;color:#334155;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${name}">${name}</span><span style="font-size:10px;font-weight:600;color:#0f1f3d;flex-shrink:0;">${pct}%</span>`;
        leg.appendChild(row);
      });
      body.appendChild(leg); w.appendChild(body); return w;
    }

    // ── 공용: 꺾은선 ─────────────────────────────────────────
    function lineChart(data, color, title, sub, fixedMax){
      const arr=safeArr(data).filter(d=>safeNum(d.v)>0);
      const w=el("div","card"); w.style.cssText="padding:14px 16px;margin-bottom:0;";
      app(w,el("div","card-header",null,`<div class="card-title">${title}</div>${sub?`<div class="card-sub">${sub}</div>`:""}`));
      if(!arr.length){w.appendChild(el("div","no-data",null,noDataMsg));return w;}
      const vals=arr.map(d=>safeNum(d.v));
      const maxV=fixedMax||Math.max(...vals,1),pw=260,ph=120,pL=30,pR=8,pT=22,pB=26;
      const cW=pw-pL-pR,cH=ph-pT-pB,n=arr.length;
      function px(i){return pL+(n>1?i*(cW/(n-1)):cW/2);}
      function py(v){return pT+cH-Math.round((v/maxV)*cH);}
      let yL="",yLb="";
      for(let i=0;i<=3;i++){const v=+(maxV/3*i).toFixed(1),y=py(v);yL+=`<line x1="${pL}" y1="${y}" x2="${pw-pR}" y2="${y}" stroke="#f0f4f8" stroke-width="1"/>`;yLb+=`<text x="${pL-3}" y="${y+4}" text-anchor="end" fill="#94a3b8" font-size="8" font-family="Apple SD Gothic Neo,sans-serif">${v}</text>`;}
      const pts=arr.map((d,i)=>`${px(i)},${py(vals[i])}`).join(" ");
      const area=`${px(0)},${pT+cH} ${pts} ${px(n-1)},${pT+cH}`;
      const gid="lc"+Math.random().toString(36).slice(2,6);
      const cir=arr.map((d,i)=>`<circle cx="${px(i)}" cy="${py(vals[i])}" r="4" fill="${color}" stroke="#e2e8f0" stroke-width="2"/><text x="${px(i)}" y="${py(vals[i])-9}" text-anchor="middle" fill="${color}" font-size="9" font-weight="700" font-family="Apple SD Gothic Neo,sans-serif">${vals[i]}</text>`).join("");
      const xl=arr.map((d,i)=>`<text x="${px(i)}" y="${ph-4}" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="Apple SD Gothic Neo,sans-serif">${(d.l||"").replace("26.","")}</text>`).join("");
      const sv=el("div");
      sv.innerHTML=`<svg viewBox="0 0 ${pw} ${ph}" style="width:100%;height:auto;overflow:visible;"><defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.15"/><stop offset="100%" stop-color="${color}" stop-opacity="0.01"/></linearGradient></defs>${yL}${yLb}<polygon points="${area}" fill="url(#${gid})"/><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>${cir}${xl}</svg>`;
      w.appendChild(sv); return w;
    }

    // ── 색상 ────────────────────────────────────────────────
    const CM=["#1e40af","#3b82f6","#60a5fa","#0f766e","#14b8a6","#6d28d9","#b45309","#f59e0b","#991b1b","#ef4444"];
    const CP=["#991b1b","#ef4444","#fca5a5","#f97316","#fb923c","#0f766e","#14b8a6","#1e40af","#6d28d9","#b45309"];

    // ══ 전자제품 배너 ══
    app(cnt, sectionTitle("전자제품", C.blue));

    const mainGrid=el("div");
    mainGrid.style.cssText="display:grid;grid-template-columns:7.5fr 2.5fr;gap:12px;margin-bottom:10px;";

    // ── 왼쪽: 수리출고 ──────────────────────────────────────
    const leftBox=el("div"); leftBox.style.cssText="display:flex;flex-direction:column;gap:10px;";
    const subL=el("div","section-title"); subL.style.cssText="background:#1e3a8a;margin:0;font-size:11px;padding:5px 12px;";
    subL.textContent="수리출고"; leftBox.appendChild(subL);

    // 1행: 수리현황(2스택) + 유상처리금액
    const row1L=el("div"); row1L.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:10px;";
    row1L.appendChild(stackColChart(수리월별S,"#1e40af","#60a5fa","무상","유상","수리현황",`처리일 기준 · ${period==="주간"?"주별":"월별"}`));
    row1L.appendChild(colChart(유상금액월별,C.amber,"유상처리금액",`${period==="주간"?"주별":"월별"} 유상 처리금액`,v=>(v/10000).toFixed(0)+"만"));
    leftBox.appendChild(row1L);

    // 2행: 수리모델비율 + 부품교체비율 + 처리소요일
    const row2L=el("div"); row2L.style.cssText="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;";
    row2L.appendChild(donutChart(수리모델, CM, "수리모델 비율", null));
    const 부품교체용 = safeArr(수리부품).filter(d=>!['점검','재조립','폐기'].includes(d.l));
    row2L.appendChild(donutChart(부품교체용, CP, "부품교체 비율", null));
    row2L.appendChild(lineChart(소요평균월별, C.purple, "처리소요일", `${period==="주간"?"주별":"월별"} 평균 처리소요일`, period==="주간"?40:null));
    leftBox.appendChild(row2L);

    // ── 오른쪽: 자재출고 ────────────────────────────────────
    const rightBox=el("div"); rightBox.style.cssText="display:flex;flex-direction:column;gap:10px;";
    const subR=el("div","section-title"); subR.style.cssText="background:#0f766e;margin:0;font-size:11px;padding:5px 12px;";
    subR.textContent="자재출고"; rightBox.appendChild(subR);

    rightBox.appendChild(colChart(자재출고월별,"#1e3a8a","자재출고현황",`${period==="주간"?"주별":"월별"} 자재출고 추이`));
    const row2R=el("div"); row2R.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:10px;";
    row2R.appendChild(donutChart(자재모델, CM, "모델별", "자재출고 모델 비율"));
    row2R.appendChild(donutChart(자재부품2, CP, "부품별", "자재출고 부품 비율"));
    rightBox.appendChild(row2R);

    mainGrid.appendChild(leftBox);
    mainGrid.appendChild(rightBox);
    cnt.appendChild(mainGrid);

    // 행 높이 동기화: 수리출고 row1L(1번) ↔ 자재출고현황(1번), row2L(2번) ↔ row2R(2번)
    requestAnimationFrame(()=>{
      // 1번: row1L vs 자재출고현황(rightBox의 2번째 child = index 1)
      const r1 = row1L;
      const r1right = rightBox.children[1]; // 자재출고현황 카드
      if(r1 && r1right){
        const h = Math.max(r1.offsetHeight, r1right.offsetHeight);
        r1.style.minHeight = h+'px';
        r1right.style.minHeight = h+'px';
      }
      // 2번: row2L vs row2R
      const r2 = row2L;
      const r2right = row2R;
      if(r2 && r2right){
        const h = Math.max(r2.offsetHeight, r2right.offsetHeight);
        r2.style.minHeight = h+'px';
        r2right.style.minHeight = h+'px';
      }
    });

    // ══ 전자제품 外 배너 ══
    app(cnt, sectionTitle("전자제품 外", C.teal));

    // 4열: 접수현황(2스택) + 유상처리금액 + 처리소요일 + 모델비율
    const geRow=el("div"); geRow.style.cssText="display:grid;grid-template-columns:7.5fr 2.5fr;gap:12px;margin-bottom:10px;align-items:stretch;";

    // 왼쪽(7.5fr): row2L과 동일하게 1fr:1fr:1fr, gap:10px
    const geLeft=el("div"); geLeft.style.cssText="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;align-items:stretch;min-width:0;";
    const ge1=stackColChart(가전외월별,"#0f766e","#2dd4bf","무상","유상","접수현황",`완료일자 기준 · ${period==="주간"?"주별":"월별"}`); ge1.style.cssText="margin-bottom:0;min-width:0;";
    const ge2=colChart(가전외유상금액,C.amber,"유상처리금액",`${period==="주간"?"주별":"월별"} 유상 처리금액`,v=>(v/10000).toFixed(0)+"만"); ge2.style.cssText="margin-bottom:0;min-width:0;";
    const 가전외소요arr=safeArr(P.가전외소요평균월별).length?safeArr(P.가전외소요평균월별).filter(d=>d.v>0):[{l:"26.03월",v:safeNum(가전외.소요평균)||2.2}];
    const ge3=lineChart(
      가전외소요arr,
      C.purple,"처리소요일",`평균 ${가전외.소요평균||"-"}일`,period==="주간"?40:null
    ); ge3.style.cssText="margin-bottom:0;min-width:0;";
    geLeft.appendChild(ge1); geLeft.appendChild(ge2); geLeft.appendChild(ge3);

    // 오른쪽(2.5fr): 모델비율 단독 (rightBox 전체와 동일)
    const ge4=donutChart(가전외모델, ["#0f766e","#14b8a6","#2dd4bf","#0d9488","#0891b2","#1e40af","#6d28d9","#b45309","#f59e0b","#ef4444"], "모델비율", "처리 모델별"); ge4.style.marginBottom="0";

    geRow.appendChild(geLeft); geRow.appendChild(ge4);
    cnt.appendChild(geRow);

    // geRow 높이 고정: 주간 레이아웃 통일 (고정 높이)
    requestAnimationFrame(()=>{
      // 전체 row에서 가장 큰 카드 높이 기준으로 모두 통일
      const allCards = [...geLeft.children, ge4];
      const maxH = Math.max(...allCards.map(el=>el.offsetHeight));
      if(maxH > 0){
        allCards.forEach(el=>{ el.style.minHeight = maxH+'px'; });
      }
    });
    }
  }

  // ── 처리현황2 ─────────────────────────────────────────


}

render();
</script>
</body>
</html>
