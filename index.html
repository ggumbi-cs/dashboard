<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS · 품질관리 대시보드</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f1f5f9; }
.h1 { background: #0f1f3d; height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
.h2 { background: #1a2f52; height: 38px; display: flex; align-items: center; padding: 0 24px; gap: 2px; }
.htitle { font-size: 14px; font-weight: 700; color: #fff; }
.dinfo { font-size: 11px; color: rgba(255,255,255,.35); margin-right: 10px; }
.pbtn, .tbtn { cursor: pointer; font-weight: 600; transition: all .15s; border-radius: 4px; }
.pbtn { padding: 4px 12px; font-size: 12px; background: transparent; color: rgba(255,255,255,.45); border: 1px solid rgba(255,255,255,.15); }
.pbtn.on { background: rgba(255,255,255,.15); color: #fff; border-color: rgba(255,255,255,.5); }
.tbtn { padding: 6px 16px; border: none; font-size: 12px; background: transparent; color: rgba(255,255,255,.45); }
.tbtn.on { background: rgba(255,255,255,.15); color: #fff; }
.wrap { padding: 20px 24px; }
.loading { display: flex; align-items: center; justify-content: center; height: 300px; color: #64748b; font-size: 14px; flex-direction: column; gap: 14px; }
.spin { width: 36px; height: 36px; border: 3px solid #e2e8f0; border-top-color: #1e40af; border-radius: 50%; animation: sp .8s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }
.errbx { background: #fee2e2; border: 1px solid #fca5a5; border-radius: 8px; padding: 16px 20px; color: #991b1b; font-size: 13px; line-height: 1.7; }
.g4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 14px; }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.g32 { display: grid; grid-template-columns: 3fr 2fr; gap: 12px; margin-bottom: 12px; }
.kpi { background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; padding: 16px 18px; }
.klb { font-size: 11px; font-weight: 600; color: #64748b; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 6px; }
.kval { font-size: 26px; font-weight: 700; color: #0f1f3d; line-height: 1; }
.ksub { font-size: 12px; color: #64748b; margin-top: 5px; }
.card { background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; padding: 18px 20px; margin-bottom: 12px; }
.ctitle { font-size: 13px; font-weight: 600; color: #0f1f3d; padding-bottom: 10px; border-bottom: 1px solid #e2e8f0; margin-bottom: 14px; }
.hrow { display: grid; grid-template-columns: 140px 1fr 60px; align-items: center; gap: 8px; margin-bottom: 7px; }
.hlb { font-size: 12px; color: #334155; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.htrk { background: #f1f5f9; border-radius: 2px; height: 16px; overflow: hidden; }
.hfil { height: 100%; border-radius: 2px; }
.hval { font-size: 12px; font-weight: 600; color: #0f1f3d; text-align: right; }
.bdg { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-radius: 4px; margin-bottom: 6px; }
.bpct { font-size: 11px; font-weight: 600; border: 1px solid; border-radius: 3px; padding: 1px 7px; background: #fff; }
.bval { font-size: 14px; font-weight: 700; color: #0f1f3d; }
.slb { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: .07em; text-transform: uppercase; margin: 16px 0 10px; }
.tc { display: none; }
.tc.on { display: block; }
.nodata { color: #64748b; font-size: 13px; padding: 8px 0; }
.kg { display: grid; grid-template-columns: repeat(auto-fit,minmax(210px,1fr)); gap: 10px; }
.ki { background: #fff; border: 1px solid #e2e8f0; border-left: 4px solid #cbd5e1; border-radius: 6px; padding: 14px 16px; }
.updated { font-size: 11px; color: #94a3b8; margin-bottom: 16px; }
</style>
</head>
<body>

<div class="h1">
  <div class="htitle">CS · 품질관리 대시보드</div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="dinfo" id="dinfo"></div>
    <div style="display:flex;gap:2px">
      <button class="pbtn on" onclick="sp('주간',this)">주간</button>
      <button class="pbtn" onclick="sp('월간',this)">월간</button>
      <button class="pbtn" onclick="sp('연간',this)">연간</button>
    </div>
  </div>
</div>
<div class="h2">
  <button class="tbtn on" onclick="st('kpi',this)">주요KPI</button>
  <button class="tbtn" onclick="st('cs',this)">상담실적</button>
  <button class="tbtn" onclick="st('ret',this)">반품현황</button>
  <button class="tbtn" onclick="st('proc',this)">처리현황</button>
  <button class="tbtn" onclick="st('qual',this)">품질관리</button>
</div>

<div class="wrap">
  <div id="loading" class="loading"><div class="spin"></div><div>데이터 불러오는 중...</div></div>
  <div id="err" class="errbx" style="display:none"></div>
  <div id="main" style="display:none">

    <!-- 주요KPI -->
    <div id="t-kpi" class="tc on">
      <div style="font-size:12px;color:#64748b;margin-bottom:14px;font-weight:500">데이터 연결 예정 항목 — 틀 구성 (2026년)</div>
      <div class="kg" id="kpiGrid"></div>
    </div>

    <!-- 상담실적 -->
    <div id="t-cs" class="tc">
      <div class="g4" id="csKpi"></div>
      <div class="g2">
        <div class="card"><div class="ctitle">인입태그별 통계</div><div id="inTag"></div></div>
        <div class="card"><div class="ctitle">상담태그별 통계</div><div id="csTag"></div></div>
      </div>
      <div class="g2">
        <div class="card"><div class="ctitle">통화성공율</div><div id="callRate"></div></div>
        <div class="card"><div class="ctitle">만족도 월별 추이</div><div id="satisfy"></div></div>
      </div>
    </div>

    <!-- 반품현황 -->
    <div id="t-ret" class="tc">
      <div class="g4" id="retKpi"></div>
      <div class="g2">
        <div class="card"><div class="ctitle">꿈비 — 교환/반품 유형별</div><div id="ggType"></div></div>
        <div class="card"><div class="ctitle">소브 — 교환/반품 유형별</div><div id="sbType"></div></div>
      </div>
      <div class="g2">
        <div class="card"><div class="ctitle">꿈비 — 반품 사유</div><div id="ggReason"></div></div>
        <div class="card"><div class="ctitle">소브 — 반품 사유</div><div id="sbReason"></div></div>
      </div>
    </div>

    <!-- 처리현황 -->
    <div id="t-proc" class="tc">
      <div class="slb">가전</div>
      <div class="g4" id="procKpi"></div>
      <div class="g2">
        <div class="card"><div class="ctitle">자재출고 — 제품별</div><div id="partModel"></div></div>
        <div class="card"><div class="ctitle">자재출고 — 부품별</div><div id="partItem"></div></div>
      </div>
      <div class="slb">가전외</div>
      <div class="g4" id="extKpi"></div>
      <div class="card"><div class="ctitle">가전외 처리 모델 비율</div><div id="extModel"></div></div>
    </div>

    <!-- 품질관리 -->
    <div id="t-qual" class="tc">
      <div class="g4" id="qualKpi"></div>
      <div class="g32">
        <div class="card"><div class="ctitle">불량 TOP5 — 제품별 비율</div><div id="top5"></div></div>
        <div class="card"><div class="ctitle">불량접수 현황 (구분별)</div><div id="defType"></div></div>
      </div>
      <div class="card"><div class="ctitle">접수불량 유형 TOP10</div><div id="def10"></div></div>
    </div>

  </div>
</div>

<script>
const REPO = 'https://raw.githubusercontent.com/ggumbi-cs/dashboard/main/data/dashboard.json';
const KPI_ITEMS = [
  '신제품 출시 2주전 Q&A 30건 이상 작성',
  'Q&A 업데이트 후 24시간 내 AI 학습 반영',
  'VOC, A/S 불량율 주 1회 업데이트',
  '불량 예측지표 도입 : 위험품목 TOP5 선정',
  'AI 처리율 70% 이상',
  '주요 가전 품목 불량율 현황 공유',
  '가전 수리접수 7일이내 처리',
  '반복 A/S 품목 TOP3 분기별 개선안 제출'
];

let D = {}, period = '주간';

// 탭 전환
function st(t, btn) {
  document.querySelectorAll('.tc').forEach(e => e.classList.remove('on'));
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('on'));
  document.getElementById('t-' + t).classList.add('on');
  btn.classList.add('on');
}

// 주기 전환
function sp(p, btn) {
  period = p;
  document.querySelectorAll('.pbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

// UI 헬퍼
function kpi(label, val, sub, accent) {
  return `<div class="kpi" style="border-top:3px solid ${accent}">
    <div class="klb">${label}</div>
    <div class="kval">${val}</div>
    ${sub ? `<div class="ksub">${sub}</div>` : ''}
  </div>`;
}

function hbar(arr, accent, maxV, unit='') {
  if (!arr || !arr.length) return '<div class="nodata">데이터 없음</div>';
  const m = maxV || Math.max(...arr.map(d => d.v), 1);
  return arr.slice(0,12).map(d => `
    <div class="hrow">
      <div class="hlb" title="${d.l}">${d.l}</div>
      <div class="htrk"><div class="hfil" style="width:${Math.max(Math.round(d.v/m*100), d.v>0?2:0)}%;background:${accent}"></div></div>
      <div class="hval">${Number(d.v).toLocaleString()}${unit}</div>
    </div>`).join('');
}

function bdg(label, val, pct, accent, bg) {
  return `<div class="bdg" style="background:${bg}">
    <span style="font-size:13px;font-weight:500;color:#0f1f3d">${label}</span>
    <div style="display:flex;gap:10px;align-items:center">
      ${pct!=null?`<span class="bpct" style="color:${accent};border-color:${accent}">${pct}%</span>`:''}
      <span class="bval">${typeof val==='number'?val.toLocaleString():val}</span>
    </div>
  </div>`;
}

function get(obj, key) {
  // period에 맞는 데이터 반환
  if (!obj) return null;
  return obj[period] ?? obj['월간'] ?? obj['연간'] ?? obj;
}

function render() {
  if (!D || !D.updated) return;

  // 날짜 표시
  const now = new Date();
  document.getElementById('dinfo').textContent =
    `2026년 기준 · 데이터 기준일: ${D.updated} · 조회: ${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;

  // ── 주요KPI ─────────────────────────────────────────
  document.getElementById('kpiGrid').innerHTML = KPI_ITEMS.map((k,i) => `
    <div class="ki">
      <div style="font-size:11px;font-weight:600;color:#64748b;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px">KPI ${String(i+1).padStart(2,'0')}</div>
      <div style="font-size:13px;color:#334155;line-height:1.5">${k}</div>
      <div style="font-size:22px;font-weight:700;color:#cbd5e1;margin-top:10px">—</div>
    </div>`).join('');

  // ── 상담실적 ─────────────────────────────────────────
  const cs = D.상담실적?.[period] || D.상담실적?.월간 || {};
  document.getElementById('csKpi').innerHTML =
    kpi('총 인입수', (cs.총인입수||0).toLocaleString(), '', '#1e40af') +
    kpi('총 상담수', (cs.총상담수||0).toLocaleString(), '', '#0f766e') +
    kpi('ALF 관여건', cs.ALF관여건??'-', '', '#b45309') +
    kpi('만족도', cs.만족도?`${cs.만족도}점`:'-', cs.만족도참여율?`참여율 ${cs.만족도참여율}`:'', '#1e40af');

  document.getElementById('inTag').innerHTML = hbar(cs.인입태그||[], '#1e40af');
  document.getElementById('csTag').innerHTML = hbar(cs.상담태그||[], '#0f766e');
  document.getElementById('callRate').innerHTML = hbar(cs.통화성공율||[], '#b45309');
  document.getElementById('satisfy').innerHTML = hbar(cs.만족도추이||[], '#1e40af', 5, '점');

  // ── 반품현황 ─────────────────────────────────────────
  const ret = D.반품현황?.[period] || D.반품현황?.월간 || {};
  document.getElementById('retKpi').innerHTML =
    kpi('꿈비 반품/교환', (ret.꿈비총건||0).toLocaleString(), '건', '#1e40af') +
    kpi('소브 반품/교환', (ret.소브총건||0).toLocaleString(), '건', '#0f766e') +
    kpi('꿈비 반품/교환율', ret.꿈비교환율||'-', '', '#991b1b') +
    kpi('소브 반품/교환율', ret.소브교환율||'-', '', '#b45309');

  document.getElementById('ggType').innerHTML = hbar(ret.꿈비유형||[], '#1e40af');
  document.getElementById('sbType').innerHTML = hbar(ret.소브유형||[], '#0f766e');
  document.getElementById('ggReason').innerHTML = hbar(ret.꿈비사유||[], '#0f1f3d');
  document.getElementById('sbReason').innerHTML = hbar(ret.소브사유||[], '#334155');

  // ── 처리현황 ─────────────────────────────────────────
  const proc = D.처리현황?.[period] || D.처리현황?.월간 || {};
  document.getElementById('procKpi').innerHTML =
    kpi('수리 총건', (proc.수리총건||0).toLocaleString(), '', '#1e40af') +
    kpi('무상수리', (proc.무상||0).toLocaleString(), proc.무상율?`${proc.무상율}%`:'', '#0f766e') +
    kpi('유상수리', (proc.유상||0).toLocaleString(), proc.유상율?`${proc.유상율}%`:'', '#b45309') +
    kpi('유상 처리금액', proc.유상금액?`${proc.유상금액}만`:'-', '', '#991b1b');

  document.getElementById('partModel').innerHTML = hbar(proc.자재모델||[], '#1e40af');
  document.getElementById('partItem').innerHTML = hbar(proc.자재부품||[], '#0f766e');

  const ext = proc.가전외 || {};
  document.getElementById('extKpi').innerHTML =
    kpi('접수 건수', (ext.접수||0).toLocaleString(), '', '#1e40af') +
    kpi('유상 건수', (ext.유상||0).toLocaleString(), ext.유상율?`${ext.유상율}%`:'', '#b45309') +
    kpi('유상 금액', ext.금액?`${ext.금액}만`:'-', '', '#991b1b') +
    kpi('평균 소요기간', ext.소요평균?`${ext.소요평균}일`:'-', '', '#0f766e');

  document.getElementById('extModel').innerHTML = hbar(ext.모델||[], '#0f1f3d');

  // ── 품질관리 ─────────────────────────────────────────
  const qual = D.품질관리?.[period] || D.품질관리?.월간 || {};
  const top5 = qual.top5 || [];
  const 총 = qual.총불량 || 0;
  const qC = ['#991b1b','#b45309','#1e40af'];
  const qB = ['#fee2e2','#fef3c7','#dbeafe','#ccfbf1','#f1f5f9'];

  document.getElementById('qualKpi').innerHTML =
    kpi('불량 접수 총건', 총.toLocaleString(), '', '#991b1b') +
    top5.slice(0,3).map(([l,v],i) =>
      kpi(`불량 ${i+1}위`, l.replace('[꿈비] ','').slice(0,14), `${v.toLocaleString()}건 · ${총?Math.round(v/총*100):0}%`, qC[i])
    ).join('');

  document.getElementById('top5').innerHTML = top5.map(([l,v],i) =>
    bdg(`${i+1}. ${l.replace('[꿈비] ','')}`, v, 총?Math.round(v/총*100):0, qC[i]||'#334155', qB[i])
  ).join('');

  document.getElementById('defType').innerHTML = (qual.구분별||[]).map((d,i) =>
    bdg(d.l, d.v, 총?Math.round(d.v/총*100):0, ['#1e40af','#0f766e','#b45309'][i], ['#dbeafe','#ccfbf1','#fef3c7'][i])
  ).join('');

  document.getElementById('def10').innerHTML = hbar(qual.접수불량top10||[], '#991b1b');
}

// ── JSON 로드 ─────────────────────────────────────────
async function load() {
  try {
    const res = await fetch(REPO + '?t=' + Date.now()); // 캐시 방지
    if (!res.ok) throw new Error(`dashboard.json 불러오기 실패 (${res.status})`);
    D = await res.json();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    render();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('err').style.display = 'block';
    document.getElementById('err').innerHTML =
      `⚠️ 데이터를 불러오지 못했습니다.<br>
       GitHub <code>data/dashboard.json</code> 파일이 업로드되어 있는지 확인해 주세요.<br>
       <small>${e.message}</small>`;
  }
}

load();
</script>
</body>
</html>
