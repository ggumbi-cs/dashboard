
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<div id="root" style="font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;min-height:100vh;background:var(--color-background-tertiary);padding-bottom:40px;"></div>

<script>
const TABS=["주요KPI","상담실적","반품현황","처리현황","품질관리","Issue"];
const PERIODS=["주간","월간","2026년"];
const EXCLUDE_STATUS=["취소","수리제외"];

const C={
  navy:"#0f1f3d",navyL:"#1a2f52",
  blue:"#1e40af",blueXL:"#dbeafe",
  teal:"#0f766e",tealXL:"#ccfbf1",
  amber:"#b45309",amberXL:"#fef3c7",
  red:"#991b1b",redXL:"#fee2e2",
  purple:"#6d28d9",purpleXL:"#ede9fe",
  slate:"#334155",slateL:"#64748b",slateXL:"#f1f5f9",
  white:"#ffffff",border:"#e2e8f0",
};

let state={tab:"반품현황",period:"월간",DB:null,loading:true};

function parseDate(v){
  if(!v)return null;
  let s=String(v).trim();
  s=s.replace(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/,(_,y,m,d)=>`${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`);
  const d=new Date(s);
  return isNaN(d)?null:d;
}
function is2026(v){const d=parseDate(v);return d&&d.getFullYear()===2026;}

function filterByPW(rows,period,pwCol,회차Col){
  const rows2026=rows.filter(r=>Number(r["년"]||0)===2026||!r["년"]);
  if(period==="2026년")return rows2026;
  const pw값=period==="주간"?"주간":"월간";
  const filtered=rows2026.filter(r=>String(r[pwCol]||"").trim()===pw값);
  if(!filtered.length)return[];
  const 회차목록=[...new Set(filtered.map(r=>String(r[회차Col]||"")).filter(Boolean))].sort((a,b)=>b.localeCompare(a));
  return filtered.filter(r=>String(r[회차Col]||"")===회차목록[0]);
}

function filterReturn(rows,period){
  const rows2026=rows.filter(r=>{const mc=String(r["마감회차"]||"").trim();return mc.startsWith("26.")||mc.startsWith("2026-");});
  if(period==="2026년")return rows2026;
  const pw값=period==="주간"?"주간":"월간";
  const filtered=rows2026.filter(r=>String(r["주/월"]||"").trim()===pw값);
  if(!filtered.length)return[];
  const 회차목록=[...new Set(filtered.map(r=>String(r["마감회차"]||"")).filter(Boolean))].sort((a,b)=>b.localeCompare(a));
  return filtered.filter(r=>String(r["마감회차"]||"")===회차목록[0]);
}

function filterByDate(rows,period,dateCol){
  if(period==="2026년")return rows;
  const dates=rows.map(r=>parseDate(r[dateCol])).filter(d=>d&&d.getFullYear()===2026);
  if(!dates.length)return[];
  if(period==="월간"){
    const latest=new Date(Math.max(...dates.map(d=>d.getTime())));
    return rows.filter(r=>{const d=parseDate(r[dateCol]);return d&&d.getFullYear()===2026&&d.getMonth()===latest.getMonth();});
  }
  if(period==="주간"){
    const maxT=Math.max(...dates.map(d=>d.getTime()));
    return rows.filter(r=>{const d=parseDate(r[dateCol]);return d&&d.getFullYear()===2026&&(maxT-d.getTime())<=7*24*60*60*1000;});
  }
  return rows;
}

function filterGajeon(rows,period,mode){
  const rows2026=rows.filter(r=>is2026(r["접수일"]));
  if(mode==="수리출고"){
    const valid=rows2026.filter(r=>String(r["구분"]||"").trim()==="수리출고"&&!EXCLUDE_STATUS.includes(String(r["진행상황"]||"").trim())&&r["처리일"]);
    return filterByDate(valid,period,"처리일");
  }
  if(mode==="자재출고"){
    const valid=rows2026.filter(r=>String(r["구분"]||"").trim()==="자재출고"&&!EXCLUDE_STATUS.includes(String(r["진행상황"]||"").trim())&&String(r["사용부품"]||"").trim()!==""&&!String(r["사용부품"]||"").includes("대체품"));
    return filterByDate(valid,period,"처리일");
  }
  if(mode==="품질"){
    const valid=rows2026.filter(r=>["수리출고","자재출고","교환/환불"].includes(String(r["구분"]||"").trim())&&!EXCLUDE_STATUS.includes(String(r["진행상황"]||"").trim()));
    return filterByDate(valid,period,"접수일");
  }
  return[];
}

function filterExt(rows,period){
  const valid=rows.filter(r=>is2026(r["접수일자"]));
  return filterByDate(valid,period,"완료일자");
}

function getRateVal(row){
  const keys=Object.keys(row||{});
  const k=keys.find(k=>k.includes("교환율")||(k.includes("반품")&&k.includes("율")));
  return k?row[k]:null;
}

function fmtRate(val){
  if(val==null||val==="")return"-";
  const n=Number(String(val).replace(/[^0-9.]/g,""));
  if(isNaN(n)||n===0)return"-";
  return n<1?`${(n*100).toFixed(1)}%`:`${n.toFixed(1)}%`;
}

function gSum(arr,kg,kv){const m={};arr.forEach(r=>{const k=String(r[kg]||"기타").trim();m[k]=(m[k]||0)+(Number(r[kv])||0);});return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(([l,v])=>({l,v}));}
function gTag(arr,kt,kv){const m={};arr.forEach(r=>{const k=String(r[kt]||"기타").trim();m[k]=(m[k]||0)+(Number(r[kv])||0);});return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(([l,v])=>({l,v}));}

function groupByMonthCount(rows,dateCol){
  const m={};
  rows.forEach(r=>{
    const d=parseDate(r[dateCol]);
    if(!d||d.getFullYear()!==2026)return;
    const k=`26.${String(d.getMonth()+1).padStart(2,"0")}월`;
    m[k]=(m[k]||0)+1;
  });
  return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0])).map(([l,v])=>({l,v}));
}

function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k==="onclick")el.onclick=v;
    else el.setAttribute(k,v);
  });
  (children||[]).forEach(c=>{
    if(c==null)return;
    if(typeof c==="string")el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  });
  return el;
}

function Kpi(label,value,sub,accent){
  return h("div",{style:{background:C.white,border:`1px solid ${C.border}`,borderTop:`3px solid ${accent||C.blue}`,borderRadius:6,padding:"14px 16px",minWidth:0}},[
    h("div",{style:{fontSize:11,fontWeight:600,color:C.slateL,letterSpacing:".06em",textTransform:"uppercase",marginBottom:6}},[label]),
    h("div",{style:{fontSize:22,fontWeight:700,color:C.navy,lineHeight:1}},[String(value)]),
    sub?h("div",{style:{fontSize:12,color:C.slateL,marginTop:4}},[String(sub)]):null,
  ]);
}

function HBar(data,accent,maxV,unit){
  if(!data||!data.length){
    return h("div",{style:{color:C.slateL,fontSize:13,padding:"8px 0"}},["데이터 없음"]);
  }
  const m=maxV||Math.max(...data.map(d=>d.v),1);
  const wrap=h("div",{style:{display:"flex",flexDirection:"column",gap:6}},[]);
  data.slice(0,12).forEach(d=>{
    const row=h("div",{style:{display:"grid",gridTemplateColumns:"130px 1fr 56px",alignItems:"center",gap:8}},[
      h("div",{style:{fontSize:12,color:C.slate,textAlign:"right",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},[d.l]),
      h("div",{style:{background:C.slateXL,borderRadius:2,height:16,overflow:"hidden"}},[
        h("div",{style:{width:`${Math.max(Math.round(d.v/m*100),d.v>0?2:0)}%`,background:accent||C.blue,height:"100%",borderRadius:2}},[])
      ]),
      h("div",{style:{fontSize:12,fontWeight:600,color:C.navy,textAlign:"right"}},[`${Number(d.v).toLocaleString()}${unit||""}`]),
    ]);
    wrap.appendChild(row);
  });
  return wrap;
}

function Card(title,sub,children){
  return h("div",{style:{background:C.white,border:`1px solid ${C.border}`,borderRadius:6,padding:"16px 18px",marginBottom:12}},[
    h("div",{style:{paddingBottom:10,borderBottom:`1px solid ${C.border}`,marginBottom:14}},[
      h("div",{style:{fontSize:13,fontWeight:600,color:C.navy}},[title]),
      sub?h("div",{style:{fontSize:11,color:C.slateL,marginTop:2}},[sub]):null,
    ]),
    children,
  ]);
}

function SectionTitle(text,color){
  return h("div",{style:{fontSize:12,fontWeight:700,color:C.white,background:color||C.navy,padding:"6px 14px",borderRadius:4,marginBottom:12,marginTop:4}},[text]);
}

function Badge(label,value,pct,accent){
  return h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:accent||C.blue,borderRadius:6,marginBottom:8}},[
    h("span",{style:{fontSize:13,fontWeight:700,color:"#fff"}},[label]),
    h("div",{style:{display:"flex",gap:10,alignItems:"center"}},[
      pct!=null?h("span",{style:{fontSize:12,fontWeight:700,color:accent,background:"#fff",borderRadius:4,padding:"2px 9px"}},[`${pct}%`]):null,
      h("span",{style:{fontSize:16,fontWeight:700,color:"#fff"}},[typeof value==="number"?value.toLocaleString():String(value)]),
    ]),
  ]);
}

function GaugCard(label,total,가전,가전외,accent1,accent2){
  const pct1=total?Math.round(가전/total*100):0;
  const pct2=total?Math.round(가전외/total*100):0;
  return h("div",{style:{background:C.white,border:`1px solid ${C.border}`,borderTop:`3px solid ${accent1}`,borderRadius:6,padding:"14px 16px",minWidth:0}},[
    h("div",{style:{fontSize:11,fontWeight:600,color:C.slateL,letterSpacing:".06em",textTransform:"uppercase",marginBottom:8}},[label]),
    h("div",{style:{display:"flex",gap:6,alignItems:"flex-end",marginBottom:10}},[
      h("span",{style:{fontSize:24,fontWeight:700,color:accent1}},[가전.toLocaleString()]),
      h("span",{style:{fontSize:13,color:C.slateL,marginBottom:3}},[`/ ${가전외.toLocaleString()}`]),
    ]),
    h("div",{style:{display:"flex",borderRadius:4,overflow:"hidden",height:10}},[
      h("div",{style:{width:`${pct1}%`,background:accent1}},[]),
      h("div",{style:{flex:1,background:accent2}},[]),
    ]),
    h("div",{style:{display:"flex",justifyContent:"space-between",marginTop:5,fontSize:11}},[
      h("span",{style:{fontWeight:600,color:accent1}},[`가전 ${pct1}%`]),
      h("span",{style:{fontWeight:600,color:accent2}},[`가전외 ${pct2}%`]),
    ]),
  ]);
}

function PrepareScreen(){
  return h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:300,gap:16}},[
    h("div",{style:{fontSize:36}}),
    h("div",{style:{fontSize:20,fontWeight:700,color:C.navy}},["준비중"]),
    h("div",{style:{fontSize:14,color:C.slateL,textAlign:"center",lineHeight:1.7}},["해당 섹션은 현재 데이터 연결 작업 중입니다."]),
    h("div",{style:{background:C.blueXL,border:`1px solid ${C.blue}`,borderRadius:8,padding:"8px 20px",fontSize:12,color:C.blue,fontWeight:600}},["Coming Soon"]),
  ]);
}

function StackBar(data,c1,c2){
  if(!data||!data.length)return h("div",{style:{color:C.slateL,fontSize:13}},["데이터 없음"]);
  const maxV=Math.max(...data.map(d=>d.total),1);
  const wrap=h("div",{style:{display:"flex",flexDirection:"column",gap:10}},[]);
  data.forEach(d=>{
    const item=h("div",{},[
      h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},[
        h("span",{style:{fontSize:12,color:C.slate,fontWeight:500}},[d.l]),
        h("span",{style:{fontSize:12,fontWeight:700,color:C.navy}},[`${d.total.toLocaleString()}건`]),
      ]),
      h("div",{style:{display:"flex",borderRadius:3,overflow:"hidden",height:18,background:C.slateXL}},[
        d.segments[0].v>0?h("div",{style:{width:`${Math.round(d.segments[0].v/maxV*100)}%`,background:c1,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",fontWeight:600}},[d.segments[0].v>d.total*0.1?String(d.segments[0].v):""]):null,
        d.segments[1].v>0?h("div",{style:{width:`${Math.round(d.segments[1].v/maxV*100)}%`,background:c2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",fontWeight:600}},[d.segments[1].v>d.total*0.1?String(d.segments[1].v):""]):null,
      ]),
      h("div",{style:{display:"flex",gap:12,marginTop:3}},[
        ...d.segments.map((s,j)=>h("span",{style:{fontSize:11,color:C.slateL}},[
          h("span",{style:{display:"inline-block",width:8,height:8,borderRadius:2,background:[c1,c2][j],marginRight:3}},[]),
          `${s.l} ${s.v.toLocaleString()}`
        ]))
      ]),
    ]);
    wrap.appendChild(item);
  });
  return wrap;
}

function grid(cols,gap,items){
  const el=h("div",{style:{display:"grid",gridTemplateColumns:cols,gap:gap||12,marginBottom:12}},[]);
  items.forEach(i=>{if(i)el.appendChild(i);});
  return el;
}

function render(){
  const root=document.getElementById("root");
  root.innerHTML="";

  if(state.loading){
    const spinner=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:300,flexDirection:"column",gap:12}},[
      h("div",{style:{width:32,height:32,border:"3px solid #e2e8f0",borderTopColor:"#1e40af",borderRadius:"50%",animation:"sp .8s linear infinite"}},[]),
      h("div",{style:{fontSize:14,color:C.slateL}},["데이터 불러오는 중..."]),
    ]);
    root.appendChild(spinner);
    return;
  }

  const {tab,period,DB}=state;
  const 가전=DB["가전마감.csv"]||[];
  const 가전외=DB["가전외마감.csv"]||[];
  const 반품현황r=DB["반품현황.csv"]||[];
  const 반품교환율r=DB["반품교환율.csv"]||[];
  const 상담태그r=DB["상담태그.csv"]||[];
  const 인입태그r=DB["인입태그.csv"]||[];
  const 통화성공율r=DB["통화성공율.csv"]||[];
  const 관여해결율r=DB["관여해결율.csv"]||[];
  const 만족도조사r=DB["만족도조사.csv"]||[];

  // 상담실적
  const 인입rows=filterByPW(인입태그r,period,"주/월","회차");
  const 상담rows=filterByPW(상담태그r,period,"주/월","회차");
  const 통화rows=filterByPW(통화성공율r,period,"주기","회차");
  const 총인입수=인입rows.reduce((s,r)=>s+(Number(r["인입수"])||0),0);
  const 관여2026=관여해결율r.filter(r=>Number(r["년"]||0)===2026);
  const 만족2026=만족도조사r.filter(r=>{const d=parseDate(r["마감일"]);return d&&d.getFullYear()===2026;});
  const 만족최신=[...만족2026].sort((a,b)=>parseDate(b["마감일"])-parseDate(a["마감일"]))[0];
  const 관여최신=[...관여2026].sort((a,b)=>b["관여건"]-a["관여건"])[0];
  const 통화데이터=통화rows.map(r=>({l:String(r["회차"]||r["마감일"]||""),v:parseFloat(String(r["통화성공률(IN)"]||r["통화 call"]||"0").replace(/[^0-9.]/g,""))||0})).filter(r=>r.v>0);
  const 인입회차=[...new Set(인입rows.map(r=>String(r["회차"]||"")))].join(", ");

  // 반품현황
  const 반품rows=filterReturn(반품현황r,period);
  const 꿈비반품=반품rows.filter(r=>String(r["구분"]||"")==="꿈비");
  const 소브반품=반품rows.filter(r=>String(r["구분"]||"")==="소브");
  const 꿈비가전=꿈비반품.filter(r=>String(r["품목"]||"")==="가전");
  const 꿈비가전외=꿈비반품.filter(r=>String(r["품목"]||"")==="가전외");
  const 소브가전=소브반품.filter(r=>String(r["품목"]||"")==="가전");
  const 소브가전외=소브반품.filter(r=>String(r["품목"]||"")==="가전외");
  const 꿈비총=꿈비반품.reduce((s,r)=>s+(Number(r["건수"])||0),0);
  const 꿈비가전총=꿈비가전.reduce((s,r)=>s+(Number(r["건수"])||0),0);
  const 꿈비가전외총=꿈비가전외.reduce((s,r)=>s+(Number(r["건수"])||0),0);
  const 소브총=소브반품.reduce((s,r)=>s+(Number(r["건수"])||0),0);
  const 소브가전총=소브가전.reduce((s,r)=>s+(Number(r["건수"])||0),0);
  const 소브가전외총=소브가전외.reduce((s,r)=>s+(Number(r["건수"])||0),0);
  const 반품회차=[...new Set(반품rows.map(r=>String(r["마감회차"]||"")))].join(", ");
  const 율2026=반품교환율r.filter(r=>String(r["마감월"]||"").startsWith("26."));
  const 율월목록=[...new Set(율2026.map(r=>String(r["마감월"]||"")))].sort((a,b)=>b.localeCompare(a));
  const 최근율월=period==="2026년"?null:율월목록[0];
  const 율필터=최근율월?율2026.filter(r=>String(r["마감월"]||"")===최근율월):율2026;
  const 꿈비율row=율필터.find(r=>String(r["구분"]||"")==="꿈비");
  const 소브율row=율필터.find(r=>String(r["구분"]||"")==="소브");
  const 꿈비교환율=fmtRate(꿈비율row?(getRateVal(꿈비율row)??꿈비율row["반품/교환율"]):null);
  const 소브교환율=fmtRate(소브율row?(getRateVal(소브율row)??소브율row["반품/교환율"]):null);

  const 꿈비월별=(()=>{
    const monthly=반품현황r.filter(r=>String(r["구분"]||"")==="꿈비"&&String(r["주/월"]||"")==="월간"&&String(r["마감회차"]||"").startsWith("26."));
    const m={};
    monthly.forEach(r=>{const k=String(r["마감회차"]||"");const 품목=String(r["품목"]||"기타");if(!m[k])m[k]={가전:0,가전외:0};m[k][품목]=(m[k][품목]||0)+(Number(r["건수"])||0);});
    return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0])).map(([l,v])=>({l,total:v.가전+(v.가전외||0),segments:[{l:"가전",v:v.가전},{l:"가전외",v:v.가전외||0}]}));
  })();

  const 소브월별=(()=>{
    const monthly=반품현황r.filter(r=>String(r["구분"]||"")==="소브"&&String(r["주/월"]||"")==="월간"&&String(r["마감회차"]||"").startsWith("26."));
    const m={};
    monthly.forEach(r=>{const k=String(r["마감회차"]||"");const 품목=String(r["품목"]||"기타");if(!m[k])m[k]={가전:0,가전외:0};m[k][품목]=(m[k][품목]||0)+(Number(r["건수"])||0);});
    return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0])).map(([l,v])=>({l,total:v.가전+(v.가전외||0),segments:[{l:"가전",v:v.가전},{l:"가전외",v:v.가전외||0}]}));
  })();

  // 처리현황
  const 수리rows=filterGajeon(가전,period,"수리출고");
  const 무상=수리rows.filter(r=>String(r["유/무상"]||"").includes("무상")).length;
  const 유상=수리rows.filter(r=>String(r["유/무상"]||"").includes("유상")).length;
  const 유상금액=수리rows.filter(r=>String(r["유/무상"]||"").includes("유상")).reduce((s,r)=>s+(parseFloat(String(r["유상AS비용"]||"0").replace(/,/g,""))||0),0);
  const 자재rows=filterGajeon(가전,period,"자재출고");
  const 자재모델={},자재부품={};
  자재rows.forEach(r=>{const k=String(r["제품명"]||"기타");자재모델[k]=(자재모델[k]||0)+1;String(r["사용부품"]||"").split(",").forEach(p=>{const pk=p.trim();if(pk&&pk!=="대체품")자재부품[pk]=(자재부품[pk]||0)+1;});});
  const 수리all=가전.filter(r=>is2026(r["처리일"])&&String(r["구분"]||"").trim()==="수리출고"&&!EXCLUDE_STATUS.includes(String(r["진행상황"]||"").trim())&&r["처리일"]);
  const 수리월별=groupByMonthCount(수리all,"처리일");
  const 가전외rows=filterExt(가전외,period);
  const 가전외유상=가전외rows.filter(r=>String(r["유/무상"]||"").includes("유상"));
  const 가전외금액=가전외유상.reduce((s,r)=>s+(parseFloat(String(r["비용"]||"0").replace(/,/g,""))||0),0);
  const 가전외모델={};
  가전외rows.forEach(r=>{const k=String(r["상품명"]||"기타");가전외모델[k]=(가전외모델[k]||0)+1;});
  const 소요평균=가전외rows.length?(가전외rows.reduce((s,r)=>s+(Number(r["소요기간"])||0),0)/가전외rows.length).toFixed(1):"-";

  // 품질관리
  const 품질rows=filterGajeon(가전,period,"품질");
  const 불량집계={};
  품질rows.forEach(r=>{const k=String(r["제품명"]||"기타").trim();불량집계[k]=(불량집계[k]||0)+1;});
  const top5=Object.entries(불량집계).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const 총불량=Object.values(불량집계).reduce((a,b)=>a+b,0);
  const 불량접수집계={};
  품질rows.forEach(r=>{String(r["접수불량"]||"").split(",").forEach(t=>{const k=t.trim();if(k)불량접수집계[k]=(불량접수집계[k]||0)+1;});});
  const 불량접수top=Object.entries(불량접수집계).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([l,v])=>({l,v}));
  const 품질월별=groupByMonthCount(filterGajeon(가전,"2026년","품질"),"접수일");
  const 구분별집계=["수리출고","자재출고","교환/환불"].map(구분=>({l:구분,v:filterByDate(가전.filter(r=>is2026(r["접수일"])&&String(r["구분"]||"").trim()===구분&&!EXCLUDE_STATUS.includes(String(r["진행상황"]||"").trim())),period,"접수일").length}));

  const now=new Date();
  const dateStr=`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,"0")}.${String(now.getDate()).padStart(2,"0")} ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;

  // 헤더1
  const hdr1=h("div",{style:{background:C.navy,height:44,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 20px"}},[
    h("div",{style:{fontSize:14,fontWeight:700,color:C.white,letterSpacing:"-0.02em"}},["CS · 품질관리 대시보드"]),
    h("div",{style:{display:"flex",alignItems:"center",gap:10}},[
      h("div",{style:{fontSize:11,color:"rgba(255,255,255,.35)"}},[`2026년 기준 · ${dateStr}`]),
      h("div",{style:{display:"flex",gap:2}},[
        ...PERIODS.map(p=>h("button",{style:{padding:"4px 12px",border:`1px solid ${period===p?"rgba(255,255,255,.5)":"rgba(255,255,255,.15)"}`,borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:600,background:period===p?"rgba(255,255,255,.15)":"transparent",color:period===p?C.white:"rgba(255,255,255,.4)"},onclick:()=>{state.period=p;render();}},[p]))
      ]),
    ]),
  ]);

  // 헤더2 탭
  const hdr2=h("div",{style:{background:C.navyL,height:38,display:"flex",alignItems:"center",padding:"0 20px",gap:2}},[
    ...TABS.map(t=>h("button",{style:{padding:"5px 16px",border:"none",borderRadius:4,cursor:"pointer",fontSize:12,fontWeight:600,background:tab===t?"rgba(255,255,255,.18)":"transparent",color:tab===t?C.white:"rgba(255,255,255,.45)"},onclick:()=>{state.tab=t;render();}},[t+(t==="Issue"?" ❗":"")]))
  ]);

  // 콘텐츠
  const content=h("div",{style:{padding:"16px 20px"}},[]);

  if(tab==="주요KPI"||tab==="Issue"){
    content.appendChild(PrepareScreen());
  }

  if(tab==="상담실적"){
    content.appendChild(grid("repeat(4,1fr)",10,[
      Kpi("총 인입수",총인입수.toLocaleString(),인입회차,C.blue),
      Kpi("ALF 관여건",관여최신?.["관여건"]??"-","2026년 최근",C.teal),
      Kpi("만족도",만족최신?`${Number(만족최신["만족도"]||0).toFixed(1)}점`:"-",만족최신?`참여율 ${만족최신["참여율"]||"-"}`:"데이터 없음",C.amber),
      Kpi("통화성공율",통화데이터.length?`${통화데이터[통화데이터.length-1]?.v}%`:"-","최근 마감 기준",C.purple),
    ]));
    content.appendChild(grid("1fr 1fr",12,[
      Card("서비스별 인입 비율",`${period} · 총 ${총인입수.toLocaleString()}건`,HBar(gTag(인입rows,"서비스태그","인입수"),C.blue)),
      Card("상담 태그별 인입 비율",null,HBar(gTag(상담rows,"상담태그","인입수"),C.teal)),
    ]));
    content.appendChild(grid("1fr 1fr",12,[
      Card("통화성공율","통화성공률(IN) 기준",통화데이터.length>0?HBar(통화데이터,C.purple,100,"%"):h("div",{style:{color:C.slateL,fontSize:13}},["데이터 없음"])),
      Card("만족도 월별 추이",null,HBar(만족2026.map(r=>({l:String(r["월별"]||""),v:Number(r["만족도"])||0})),C.amber,5,"점")),
    ]));
  }

  if(tab==="반품현황"){
    content.appendChild(SectionTitle("1. 꿈비",C.blue));
    content.appendChild(grid("repeat(3,1fr)",10,[
      Kpi("반품/교환 총계",꿈비총.toLocaleString(),`${period} 기준`,C.blue),
      GaugCard("가전 / 가전외",꿈비총,꿈비가전총,꿈비가전외총,C.navy,C.blue),
      Kpi("반품/교환율",꿈비교환율,최근율월||"",C.red),
    ]));
    if(period==="2026년"){
      content.appendChild(Card("꿈비 — 월별 반품/교환 현황","마감회차 기준",StackBar(꿈비월별,C.navy,C.blue)));
    } else {
      const 꿈비유형wrap=h("div",{},[]);
      ["가전","가전외"].forEach(품목=>{
        const v=꿈비반품.filter(r=>String(r["품목"]||"")===품목).reduce((s,r)=>s+(Number(r["건수"])||0),0);
        꿈비유형wrap.appendChild(Badge(품목,v,꿈비총?Math.round(v/꿈비총*100):0,C.blue));
      });
      꿈비유형wrap.appendChild(HBar(gSum(꿈비반품,"교환/반품","건수"),C.blue));
      content.appendChild(grid("1fr 1fr",12,[
        Card("꿈비 — 교환/반품 유형별",null,꿈비유형wrap),
        Card("꿈비 — 반품 사유",null,HBar(gSum(꿈비반품,"사유","건수"),C.blue)),
      ]));
    }
    content.appendChild(SectionTitle("2. 소브",C.teal));
    content.appendChild(grid("repeat(3,1fr)",10,[
      Kpi("반품/교환 총계",소브총.toLocaleString(),`${period} 기준`,C.teal),
      GaugCard("가전 / 가전외",소브총,소브가전총,소브가전외총,C.teal,"#0d9488"),
      Kpi("반품/교환율",소브교환율,최근율월||"",C.red),
    ]));
    if(period==="2026년"){
      content.appendChild(Card("소브 — 월별 반품/교환 현황","마감회차 기준",StackBar(소브월별,C.teal,"#0d9488")));
    } else {
      const 소브유형wrap=h("div",{},[]);
      ["가전","가전외"].forEach(품목=>{
        const v=소브반품.filter(r=>String(r["품목"]||"")===품목).reduce((s,r)=>s+(Number(r["건수"])||0),0);
        소브유형wrap.appendChild(Badge(품목,v,소브총?Math.round(v/소브총*100):0,C.teal));
      });
      소브유형wrap.appendChild(HBar(gSum(소브반품,"교환/반품","건수"),C.teal));
      content.appendChild(grid("1fr 1fr",12,[
        Card("소브 — 교환/반품 유형별",null,소브유형wrap),
        Card("소브 — 반품 사유",null,HBar(gSum(소브반품,"사유","건수"),C.teal)),
      ]));
    }
  }

  if(tab==="처리현황"){
    content.appendChild(SectionTitle("1. 전자제품",C.blue));
    content.appendChild(h("div",{style:{background:"rgba(30,64,175,0.07)",borderRadius:6,padding:"8px 14px",marginBottom:12,fontSize:11,color:C.blue,fontWeight:700}},["1-1. 수리출고 (처리일 기준)"]));
    content.appendChild(grid("repeat(4,1fr)",10,[
      Kpi("수리 총건",수리rows.length.toLocaleString(),null,C.blue),
      Kpi("무상수리",무상.toLocaleString(),`${수리rows.length?Math.round(무상/수리rows.length*100):0}%`,C.teal),
      Kpi("유상수리",유상.toLocaleString(),`${수리rows.length?Math.round(유상/수리rows.length*100):0}%`,C.amber),
      Kpi("유상 처리금액",`${Math.round(유상금액/10000).toLocaleString()}만원`,null,C.red),
    ]));
    content.appendChild(grid("1fr 1fr",12,[
      Card("월별 수리현황 추이","처리일 기준 · 2026년",HBar(수리월별,C.blue)),
      Card("불량부품 현황","자재출고 기준 (대체품 제외)",HBar(Object.entries(자재부품).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([l,v])=>({l,v})),C.red)),
    ]));
    content.appendChild(h("div",{style:{background:"rgba(30,64,175,0.07)",borderRadius:6,padding:"8px 14px",marginBottom:12,fontSize:11,color:C.blue,fontWeight:700}},["1-2. 자재출고 (처리일 기준 · 대체품 제외)"]));
    content.appendChild(grid("repeat(3,1fr)",10,[
      Kpi("자재출고 총건",자재rows.length.toLocaleString(),null,C.blue),
      Kpi("모델 종류",Object.keys(자재모델).length,null,C.teal),
      Kpi("부품 종류",Object.keys(자재부품).length,null,C.amber),
    ]));
    content.appendChild(grid("1fr 1fr",12,[
      Card("자재출고 — 모델별",null,HBar(Object.entries(자재모델).sort((a,b)=>b[1]-a[1]).map(([l,v])=>({l,v})),C.blue)),
      Card("자재출고 — 자재별",null,HBar(Object.entries(자재부품).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([l,v])=>({l,v})),C.teal)),
    ]));
    content.appendChild(SectionTitle("2. 전자제품 外",C.teal));
    content.appendChild(grid("repeat(4,1fr)",10,[
      Kpi("접수 건수",가전외rows.length.toLocaleString(),null,C.teal),
      Kpi("유상 건수",가전외유상.length.toLocaleString(),`${가전외rows.length?Math.round(가전외유상.length/가전외rows.length*100):0}%`,C.amber),
      Kpi("유상 처리금액",`${Math.round(가전외금액/10000).toLocaleString()}만원`,null,C.red),
      Kpi("평균 소요기간",`${소요평균}일`,null,C.teal),
    ]));
    content.appendChild(Card("가전외 처리 모델 비율",null,HBar(Object.entries(가전외모델).sort((a,b)=>b[1]-a[1]).map(([l,v])=>({l,v})),C.teal)));
  }

  if(tab==="품질관리"){
    content.appendChild(SectionTitle("1. 불량인입 TOP.5 (접수일 기준)",C.red));
    content.appendChild(grid("repeat(4,1fr)",10,[
      Kpi("불량인입 총건",총불량.toLocaleString(),null,C.red),
      ...top5.slice(0,3).map(([l,v],i)=>Kpi(`TOP${i+1}`,l.replace("[꿈비] ","").slice(0,14),`${v.toLocaleString()}건 · ${총불량?Math.round(v/총불량*100):0}%`,[C.red,C.amber,C.blue][i])),
    ]));
    const top5card=h("div",{},[]);
    top5.forEach(([l,v],i)=>{
      const colors=[C.redXL,C.amberXL,C.blueXL,C.tealXL,C.slateXL];
      const fgColors=[C.red,C.amber,C.blue,C.teal,C.slate];
      top5card.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:colors[i],borderRadius:4,marginBottom:6}},[
        h("span",{style:{fontSize:13,fontWeight:600,color:C.navy}},[`${i+1}. ${l.replace("[꿈비] ","")}`]),
        h("div",{style:{display:"flex",gap:8,alignItems:"center"}},[
          h("span",{style:{fontSize:11,fontWeight:600,color:fgColors[i],border:`1px solid ${fgColors[i]}`,borderRadius:3,padding:"1px 7px",background:"#fff"}},[`${총불량?Math.round(v/총불량*100):0}%`]),
          h("span",{style:{fontSize:14,fontWeight:700,color:C.navy}},[String(v.toLocaleString())]),
        ]),
      ]));
    });
    const 구분card=h("div",{},[]);
    구분별집계.forEach((d,i)=>{
      const colors=[C.blueXL,C.tealXL,C.amberXL];
      const fgColors=[C.blue,C.teal,C.amber];
      구분card.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:colors[i],borderRadius:4,marginBottom:6}},[
        h("span",{style:{fontSize:13,fontWeight:600,color:C.navy}},[d.l]),
        h("div",{style:{display:"flex",gap:8,alignItems:"center"}},[
          h("span",{style:{fontSize:11,fontWeight:600,color:fgColors[i],border:`1px solid ${fgColors[i]}`,borderRadius:3,padding:"1px 7px",background:"#fff"}},[`${총불량?Math.round(d.v/총불량*100):0}%`]),
          h("span",{style:{fontSize:14,fontWeight:700,color:C.navy}},[String(d.v.toLocaleString())]),
        ]),
      ]));
    });
    content.appendChild(grid("3fr 2fr",12,[
      Card("불량 TOP5 — 제품별 비율",`${period} · 총 ${총불량.toLocaleString()}건`,top5card),
      Card("불량접수 현황 (구분별)",null,구분card),
    ]));
    content.appendChild(grid("1fr 1fr",12,[
      Card("접수불량 유형 TOP10",null,HBar(불량접수top,C.red)),
      Card("월별 불량 추이","2026년 전체 · 접수일 기준",HBar(품질월별,C.amber)),
    ]));
  }

  root.appendChild(hdr1);
  root.appendChild(hdr2);
  root.appendChild(content);
}

async function loadData(){
  const files=["가전마감.csv","가전외마감.csv","관여해결율.csv","만족도조사.csv","반품교환율.csv","반품현황.csv","상담태그.csv","인입태그.csv","통화성공율.csv"];
  const DB={};
  await Promise.all(files.map(async f=>{
    try{
      const buf=await window.fs.readFile(f,{encoding:"utf8"});
      DB[f]=Papa.parse(buf,{header:true,skipEmptyLines:true,dynamicTyping:true}).data;
    }catch{DB[f]=[];}
  }));
  state.DB=DB;
  state.loading=false;
  render();
}

render();
loadData();
</script>
