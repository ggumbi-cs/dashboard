<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>엄마감동팀 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #080f1e; --bg2: #0d1830; --bg3: #111e35; --bg4: #162240;
  --border:   rgba(0,200,255,0.10); --border2: rgba(0,200,255,0.20);
  --cyan:     #00c8ff; --cyan-dim: rgba(0,200,255,0.08);
  --gold:     #f0c060; --gold-dim: rgba(240,192,96,0.12);
  --text:     #e8f0f8; --text2: #a8c8e0; --text3: #6a8faa;
  --green:    #00e5a0; --red: #ff5a6e; --orange: #ff9040; --purple: #a080ff;
  --font-kr:  'Noto Sans KR', sans-serif; --font-en: 'Inter', sans-serif;
}
html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:var(--font-kr); overflow-x:hidden; overflow-y:auto; }
::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* 상태바 */
#statusBar { position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:0 28px; height:36px; background:rgba(8,15,30,0.95); border-bottom:1px solid var(--border); backdrop-filter:blur(12px); font-family:var(--font-en); }
.sb-left { display:flex; align-items:center; gap:16px; }
.sb-brand { font-size:11px; font-weight:600; color:var(--cyan); letter-spacing:2px; text-transform:uppercase; }
.sb-dot { width:5px; height:5px; border-radius:50%; background:var(--green); animation:pulse-dot 2s infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1;}50%{opacity:0.3;} }
.sb-system { font-size:10px; color:var(--text3); letter-spacing:0.5px; }
.sb-right { display:flex; align-items:center; gap:20px; }
.sb-time { font-size:12px; font-weight:500; color:var(--text2); font-variant-numeric:tabular-nums; }
.sb-user { font-size:11px; color:var(--cyan); background:var(--cyan-dim); padding:3px 10px; border-radius:10px; border:1px solid var(--border2); }

/* 메인 */
#mainWrap { padding:32px 28px 60px; max-width:1400px; margin:0 auto; }
.sec-title { display:flex; align-items:center; gap:10px; font-size:11px; font-weight:600; font-family:var(--font-en); color:#8ab0cc; text-transform:uppercase; letter-spacing:2px; margin-bottom:16px; }
.sec-title::before { content:''; display:inline-block; width:3px; height:14px; background:var(--cyan); border-radius:2px; }
.sec-title .sec-count { margin-left:auto; font-size:10px; color:#8ab0cc; }

/* 웰컴 배너 */
#welcomeBanner { position:relative; background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 50%,#0a1428 100%); border:1px solid var(--border); border-radius:16px; padding:36px 40px; margin-bottom:32px; overflow:hidden; }
.wb-grid { position:absolute; inset:0; background-image:linear-gradient(rgba(0,200,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,0.03) 1px,transparent 1px); background-size:40px 40px; }
.wb-glow { position:absolute; top:-60px; right:-60px; width:300px; height:300px; background:radial-gradient(circle,rgba(0,200,255,0.06) 0%,transparent 70%); pointer-events:none; }
.wb-glow2 { position:absolute; bottom:-80px; left:40%; width:400px; height:200px; background:radial-gradient(ellipse,rgba(160,128,255,0.04) 0%,transparent 70%); pointer-events:none; }
.wb-content { position:relative; z-index:1; display:flex; align-items:center; gap:32px; }
.wb-left { flex:1; }
.wb-eyebrow { font-size:10px; font-weight:600; font-family:var(--font-en); color:var(--cyan); text-transform:uppercase; letter-spacing:3px; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.wb-eyebrow::before { content:''; width:20px; height:1px; background:var(--cyan); }
.wb-title { font-size:30px; font-weight:700; line-height:1.2; letter-spacing:-0.5px; margin-bottom:10px; }
.wb-title .hl { color:var(--cyan); }
.wb-sub { font-size:13px; color:var(--text2); font-weight:300; line-height:1.7; }
.wb-right { display:flex; flex-direction:column; align-items:flex-end; gap:12px; min-width:200px; }
.wb-stat { text-align:right; }
.wb-stat-val { font-size:28px; font-weight:700; font-family:var(--font-en); color:var(--text); line-height:1; }
.wb-stat-val .unit { font-size:13px; font-weight:400; color:var(--text2); margin-left:3px; }
.wb-stat-label { font-size:10px; color:var(--text3); margin-top:3px; letter-spacing:0.5px; }
.wb-divider-v { width:1px; height:48px; background:var(--border); }

/* 빠른 바로가기 */
#quickSection { margin-bottom:36px; }
#quickGrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:12px; }
.q-item { position:relative; display:flex; flex-direction:column; align-items:center; padding:18px 8px 14px; background:var(--bg2); border:1px solid var(--border); border-radius:14px; cursor:pointer; transition:all 0.2s ease; animation:fadeUp 0.5s ease both; gap:10px; }
.q-item:hover { border-color:var(--border2); background:var(--bg3); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.3); }
.q-item.locked { cursor:not-allowed; opacity:0.55; }
.q-item.locked:hover { transform:none; box-shadow:none; }
.q-icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; position:relative; flex-shrink:0; }
.q-label { font-size:10.5px; font-weight:500; color:var(--text2); text-align:center; line-height:1.3; word-break:keep-all; }
.q-item:hover .q-label { color:var(--text); }
.q-lock-badge { position:absolute; top:6px; right:6px; font-size:10px; }

/* 아이콘 컬러 */
.qi-cyan   { background:rgba(0,200,255,0.12); }
.qi-green  { background:rgba(0,229,160,0.12); }
.qi-gold   { background:rgba(240,192,96,0.12); }
.qi-purple { background:rgba(160,128,255,0.12); }
.qi-red    { background:rgba(255,90,110,0.12); }
.qi-orange { background:rgba(255,144,64,0.12); }
.qi-blue   { background:rgba(64,144,255,0.12); }
.qi-pink   { background:rgba(255,100,180,0.12); }

/* 관리자 기어 버튼 */
.admin-gear { display:none; position:absolute; top:7px; right:7px; width:20px; height:20px; background:rgba(240,192,96,0.15); border:1px solid rgba(240,192,96,0.3); border-radius:5px; cursor:pointer; align-items:center; justify-content:center; font-size:11px; color:var(--gold); transition:all 0.15s; z-index:10; }
.admin-gear:hover { background:rgba(240,192,96,0.3); }
body.is-admin .admin-gear { display:flex; }

/* 슬라이더 */
#sliderSection { margin-bottom:36px; }
#sliderTrackOuter { overflow:hidden; border-radius:16px; }
#sliderTrack { display:flex; gap:16px; transition:transform 0.45s cubic-bezier(0.4,0,0.2,1); }
.s-card { flex:0 0 calc(33.333% - 11px); min-width:280px; background:var(--bg2); border:1px solid var(--border); border-radius:16px; overflow:hidden; cursor:pointer; transition:border-color 0.2s,box-shadow 0.2s; position:relative; animation:fadeUp 0.6s ease both; }
.s-card:hover { border-color:var(--border2); box-shadow:0 12px 40px rgba(0,0,0,0.4); }
.s-card.locked { cursor:not-allowed; opacity:0.55; }
.s-card.locked:hover { border-color:var(--border); box-shadow:none; }
.s-card-header { padding:16px 18px 14px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--border); }
.s-card-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.s-card-info { flex:1; min-width:0; }
.s-card-title { font-size:13px; font-weight:600; color:var(--text); }
.s-card-sub { font-size:10px; color:#8ab0cc; margin-top:2px; }
.s-card-badge { font-size:9px; font-weight:600; font-family:var(--font-en); padding:2px 7px; border-radius:8px; white-space:nowrap; background:rgba(0,229,160,0.12); color:var(--green); border:1px solid rgba(0,229,160,0.2); }
.s-card-badge.warn { background:rgba(255,144,64,0.12); color:var(--orange); border-color:rgba(255,144,64,0.2); }
.s-card-badge.info { background:var(--cyan-dim); color:var(--cyan); border-color:var(--border2); }
.s-card-body { padding:16px 18px; }
.mini-bars { display:flex; align-items:flex-end; gap:4px; height:48px; }
.mini-bar { flex:1; border-radius:3px 3px 0 0; background:rgba(0,200,255,0.15); }
.mini-bar.hi { background:rgba(0,200,255,0.35); }
.mini-stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.mini-stat-item {}
.mini-stat-val { font-size:20px; font-weight:700; font-family:var(--font-en); color:var(--text); line-height:1; }
.mini-stat-val.accent { color:var(--cyan); } .mini-stat-val.green { color:var(--green); } .mini-stat-val.gold { color:var(--gold); } .mini-stat-val.red { color:var(--red); }
.mini-stat-lbl { font-size:10px; color:var(--text3); margin-top:3px; }
.mini-tags { display:flex; flex-wrap:wrap; gap:5px; }
.mini-tag { font-size:10px; padding:3px 8px; border-radius:8px; background:var(--bg4); border:1px solid var(--border); color:var(--text2); }
.mini-progress-wrap { margin-top:4px; }
.mini-progress-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.mini-progress-label { font-size:10px; color:var(--text2); min-width:64px; }
.mini-progress-bar { flex:1; height:4px; background:var(--bg4); border-radius:2px; overflow:hidden; }
.mini-progress-fill { height:100%; border-radius:2px; }
.mini-progress-val { font-size:10px; font-family:var(--font-en); color:var(--text2); min-width:30px; text-align:right; }
.mini-list { display:flex; flex-direction:column; gap:7px; }
.mini-list-item { display:flex; align-items:center; gap:8px; }
.mini-list-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
.mini-list-name { font-size:11px; color:var(--text2); flex:1; }
.mini-list-val { font-size:11px; font-family:var(--font-en); color:var(--text); font-weight:500; }

.slider-controls { display:flex; align-items:center; justify-content:center; gap:12px; margin-top:14px; }
.sl-btn { width:32px; height:32px; border-radius:50%; background:var(--bg2); border:1px solid var(--border); color:var(--text2); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; transition:all 0.15s; }
.sl-btn:hover { border-color:var(--border2); color:var(--cyan); }
.sl-dots { display:flex; gap:6px; }
.sl-dot { width:6px; height:6px; border-radius:50%; background:var(--border); cursor:pointer; transition:all 0.2s; }
.sl-dot.active { background:var(--cyan); width:18px; border-radius:3px; }

/* 공지 */
#noticeSection { margin-bottom:36px; }
#noticeGrid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.notice-card { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:20px 22px; position:relative; }
.notice-card-title { font-size:11px; font-weight:600; color:#8ab0cc; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.notice-item { display:flex; align-items:flex-start; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); }
.notice-item:last-child { border-bottom:none; padding-bottom:0; }
.notice-dot-wrap { padding-top:4px; flex-shrink:0; }
.notice-dot { width:5px; height:5px; border-radius:50%; background:var(--cyan); }
.notice-dot.gold { background:var(--gold); } .notice-dot.green { background:var(--green); } .notice-dot.orange { background:var(--orange); }
.notice-text { font-size:12px; color:var(--text2); line-height:1.5; flex:1; }
.notice-date { font-size:10px; color:var(--text3); font-family:var(--font-en); flex-shrink:0; }

/* 설정 모달 */
#settingModal { display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); align-items:center; justify-content:center; }
#settingModal.open { display:flex; }
.modal-box { background:var(--bg2); border:1px solid var(--border2); border-radius:20px; padding:28px 32px; width:560px; max-height:85vh; overflow-y:auto; position:relative; }
.modal-title { font-size:15px; font-weight:700; color:var(--text); margin-bottom:6px; }
.modal-sub { font-size:12px; color:var(--text3); margin-bottom:24px; }
.modal-close { position:absolute; top:18px; right:20px; background:none; border:none; color:var(--text3); font-size:20px; cursor:pointer; }
.modal-close:hover { color:var(--text); }
.modal-section { margin-bottom:24px; }
.modal-section-title { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:12px; }
.modal-input { width:100%; padding:8px 10px; background:var(--bg3); border:1px solid var(--border); border-radius:7px; color:var(--text); font-size:12px; font-family:var(--font-kr); outline:none; }
.modal-input:focus { border-color:var(--border2); }
.modal-btn { width:100%; padding:11px; background:var(--cyan); color:#000; border:none; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; font-family:var(--font-kr); }
.modal-btn:hover { opacity:0.85; }

/* 설정 행 */
.cfg-item { background:var(--bg3); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:10px; }
.cfg-item-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.cfg-icon-preview { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; cursor:pointer; border:1px solid var(--border2); }
.cfg-fields { display:flex; gap:8px; flex:1; }
.cfg-del { background:none; border:none; color:var(--text3); font-size:16px; cursor:pointer; padding:2px 4px; }
.cfg-del:hover { color:var(--red); }
.cfg-item-bottom { display:flex; align-items:center; gap:10px; }
.cfg-perm-label { font-size:11px; color:var(--text3); white-space:nowrap; }
.cfg-perm-btns { display:flex; gap:5px; }
.perm-btn { padding:3px 10px; border-radius:6px; font-size:10px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--bg4); color:var(--text3); transition:all 0.15s; }
.perm-btn.active-perm { border-color:var(--cyan); background:var(--cyan-dim); color:var(--cyan); }

/* 아이콘 선택 팝업 */
#iconPicker { display:none; position:fixed; z-index:10000; background:var(--bg2); border:1px solid var(--border2); border-radius:14px; padding:14px; width:280px; box-shadow:0 20px 60px rgba(0,0,0,0.6); }
#iconPicker.open { display:block; }
.icon-picker-title { font-size:11px; color:var(--text3); margin-bottom:10px; }
.icon-grid { display:grid; grid-template-columns:repeat(8,1fr); gap:4px; margin-bottom:10px; }
.icon-opt { width:30px; height:30px; display:flex; align-items:center; justify-content:center; font-size:18px; border-radius:7px; cursor:pointer; transition:background 0.1s; }
.icon-opt:hover { background:var(--bg4); }
.color-grid { display:flex; gap:6px; flex-wrap:wrap; }
.color-opt { width:24px; height:24px; border-radius:6px; cursor:pointer; border:2px solid transparent; transition:border-color 0.1s; }
.color-opt:hover, .color-opt.selected { border-color:white; }

/* 권한 차단 팝업 */
#permBlock { display:none; position:fixed; inset:0; z-index:9998; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); align-items:center; justify-content:center; }
#permBlock.open { display:flex; }
.perm-block-box { background:var(--bg2); border:1px solid rgba(255,90,110,0.3); border-radius:20px; padding:32px 36px; text-align:center; max-width:360px; }
.perm-block-icon { font-size:40px; margin-bottom:16px; }
.perm-block-title { font-size:16px; font-weight:700; color:var(--text); margin-bottom:8px; }
.perm-block-msg { font-size:13px; color:var(--text2); line-height:1.6; margin-bottom:20px; }
.perm-block-btn { padding:9px 28px; background:var(--bg3); border:1px solid var(--border); border-radius:10px; color:var(--text2); font-size:13px; cursor:pointer; font-family:var(--font-kr); }

/* 토스트 */
#toast { position:fixed; bottom:24px; right:24px; z-index:9997; background:var(--bg3); border:1px solid var(--border2); color:var(--text); font-size:12px; padding:10px 18px; border-radius:10px; opacity:0; transform:translateY(8px); transition:all 0.3s; pointer-events:none; }
#toast.show { opacity:1; transform:translateY(0); }

@keyframes fadeUp { from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);} }
.q-item:nth-child(1){animation-delay:0.05s} .q-item:nth-child(2){animation-delay:0.08s} .q-item:nth-child(3){animation-delay:0.11s}
.q-item:nth-child(4){animation-delay:0.14s} .q-item:nth-child(5){animation-delay:0.17s} .q-item:nth-child(6){animation-delay:0.20s}
.q-item:nth-child(7){animation-delay:0.23s} .q-item:nth-child(8){animation-delay:0.26s} .q-item:nth-child(9){animation-delay:0.29s}
.q-item:nth-child(10){animation-delay:0.32s} .q-item:nth-child(11){animation-delay:0.35s} .q-item:nth-child(12){animation-delay:0.38s}
.s-card:nth-child(1){animation-delay:0.1s} .s-card:nth-child(2){animation-delay:0.18s} .s-card:nth-child(3){animation-delay:0.26s}
</style>
</head>
<body>

<div id="statusBar">
  <div class="sb-left">
    <div class="sb-brand">GGUMBI CS</div>
    <div class="sb-dot"></div>
    <div class="sb-system">엄마감동팀 운영 시스템</div>
  </div>
  <div class="sb-right">
    <div class="sb-time" id="sbTime">--:--:--</div>
    <div class="sb-user" id="sbUser">-</div>
  </div>
</div>

<div id="mainWrap">
  <div id="welcomeBanner">
    <div class="wb-grid"></div><div class="wb-glow"></div><div class="wb-glow2"></div>
    <div class="wb-content">
      <div class="wb-left">
        <div class="wb-eyebrow">Dashboard</div>
        <div class="wb-title">안녕하세요,<br><span class="hl" id="wbName">엄마감동팀</span> 엄마감동팀 소통채널 입니다</div>
        <div class="wb-sub" id="wbDate">오늘도 고객의 마음을 움직이는 하루를 만들어가세요.</div>
      </div>
      <div class="wb-right">
        <div class="wb-stat">
          <div class="wb-stat-val" id="wbDateNum">--<span class="unit">일</span></div>
          <div class="wb-stat-label">TODAY</div>
        </div>
        <div class="wb-divider-v"></div>
        <div class="wb-stat">
          <div class="wb-stat-val" id="wbWeekDay">---</div>
          <div class="wb-stat-label">요일</div>
        </div>
      </div>
    </div>
  </div>

  <div id="quickSection">
    <div class="sec-title">Quick Access <span class="sec-count" id="qCount"></span></div>
    <div id="quickGrid"></div>
  </div>

  <div id="sliderSection">
    <div class="sec-title">Dashboard Preview</div>
    <div id="sliderWrap">
      <div id="sliderTrackOuter"><div id="sliderTrack"></div></div>
      <div class="slider-controls">
        <button class="sl-btn" id="slPrev">◀</button>
        <div class="sl-dots" id="slDots"></div>
        <button class="sl-btn" id="slNext">▶</button>
      </div>
    </div>
  </div>

  <div id="noticeSection">
    <div class="sec-title">System Notice</div>
    <div id="noticeGrid">
      <div class="notice-card">
        <div class="notice-card-title"><span>📌</span> 업데이트 내역</div>
        <div id="noticeUpdateList"></div>
      </div>
      <div class="notice-card">
        <div class="notice-card-title"><span>🔔</span> 운영 안내</div>
        <div id="noticeOpsList"></div>
      </div>
    </div>
  </div>
</div>

<!-- 설정 모달 -->
<div id="settingModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">⚙ 홈 화면 설정</div>
    <div class="modal-sub">아이콘 · 카드 구성 · 클릭 권한을 설정합니다.</div>
    <div class="modal-section">
      <div class="modal-section-title">빠른 바로가기</div>
      <div id="cfgQuickList"></div>
      <button style="margin-top:8px;padding:7px 14px;background:var(--bg4);border:1px solid var(--border);color:var(--cyan);border-radius:8px;cursor:pointer;font-size:12px;font-family:var(--font-kr);" onclick="addQuickItem()">+ 항목 추가</button>
    </div>
    <div class="modal-section">

<script>
// ─────────────────────────────────────────────
// 상수
// ─────────────────────────────────────────────
const ROLE_ORDER = { admin:0, leader:1, ggumbi:2, affiliate:3 };

  { cls:'qi-orange', hex:'rgba(255,144,64,0.12)',  label:'오렌지' },
  { cls:'qi-blue',   hex:'rgba(64,144,255,0.12)',  label:'블루' },

];

const DEFAULT_QUICK = [
  { icon:'📊', label:'주요 KPI',    tab:'주요kpi',    color:'qi-cyan',   minRole:'affiliate' },
  { icon:'⭐', label:'스마트스토어', tab:'스마트스토어',color:'qi-gold',   minRole:'affiliate' },

  { icon:'📈', label:'상담분석',    tab:'상담분석',   color:'qi-cyan',   minRole:'affiliate' },
  { icon:'🏷️', label:'건별 Issue',  tab:'건별Issue',  color:'qi-red',    minRole:'ggumbi'    },

const DEFAULT_CARDS = [
  { id:'kpi',     title:'주요 KPI',    sub:'핵심 지표 현황',     icon:'📊', tab:'주요kpi',    iconCls:'qi-cyan',   minRole:'affiliate' },
  { id:'review',  title:'스마트스토어', sub:'리뷰 분석 현황',    icon:'⭐', tab:'스마트스토어',iconCls:'qi-gold',   minRole:'affiliate' },
  { id:'cs',      title:'상담실적',    sub:'채널톡 상담 현황',   icon:'💬', tab:'상담분석',   iconCls:'qi-blue',   minRole:'affiliate' },
  { id:'return',  title:'반품현황',    sub:'반품 접수·처리',     icon:'↩️', tab:'반품현황',   iconCls:'qi-orange', minRole:'affiliate' },
  { id:'quality', title:'품질관리',    sub:'품질 이슈 모니터링', icon:'🛡️', tab:'품질관리',   iconCls:'qi-green',  minRole:'affiliate' },
  { id:'ai',      title:'AI 보고',     sub:'AI 주간·월간 분석',  icon:'🤖', tab:'AI보고',     iconCls:'qi-purple', minRole:'affiliate' },
];

const DEFAULT_NOTICES_UPDATE = [
  { text:'스마트스토어 리뷰 분석 페이지 오픈', date:'06.20', dot:'cyan' },
  { text:'홈 화면 런처 UI 적용', date:'06.20', dot:'green' },
  { text:'개발자탭 관리 매뉴얼 추가', date:'06.19', dot:'cyan' },
  { text:'건별보고 세척기 직수관 항목 추가', date:'06.18', dot:'gold' },
];
const DEFAULT_NOTICES_OPS = [
  { text:'관리자모드 접속 시 각 카드/아이콘 설정 가능', date:'', dot:'gold' },
  { text:'스마트스토어 탭은 별도 사이드바 구성', date:'', dot:'cyan' },
  { text:'GAS 웹훅: 채널톡 CSAT 자동 수집 중', date:'', dot:'green' },
  { text:'GitHub Pages 레포: ggumbi-cs/dashboard', date:'', dot:'cyan' },
];

// ─────────────────────────────────────────────
// 상태
// ─────────────────────────────────────────────
let _scriptUrl = '', _userRole = '', _isAdmin = false;
let _quickItems = [], _cardItems = [];
let _sliderIdx = 0, _sliderPer = 3;
let _pickerTarget = null, _pickerType = null, _pickerIdx = null;

// ─────────────────────────────────────────────
// postMessage 수신
// ─────────────────────────────────────────────
window.addEventListener('message', e => {
  if (!e.data || e.data.type !== 'SCRIPT_URL') return;
  _scriptUrl = e.data.url || '';
  _userRole  = e.data.userRole || '';
  _isAdmin   = (_userRole === 'admin');
  if (_isAdmin) document.body.classList.add('is-admin');
  applyUserInfo();
  loadSettings();
});

// ─────────────────────────────────────────────
// 시계
// ─────────────────────────────────────────────
function tickTime() {
  const now=new Date(), pad=n=>String(n).padStart(2,'0');
  document.getElementById('sbTime').textContent=`${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}
setInterval(tickTime,1000); tickTime();

// ─────────────────────────────────────────────
// 사용자 정보
// ─────────────────────────────────────────────
function applyUserInfo() {
  const nameMap={admin:'관리자',leader:'리더급',ggumbi:'꿈비',affiliate:'계열사'};
  const displayName=nameMap[_userRole]||_userRole||'방문자';
  document.getElementById('sbUser').textContent=displayName;
  document.getElementById('wbName').textContent=displayName+' 님';
  const now=new Date(), days=['일','월','화','수','목','금','토'], m=now.getMonth()+1, d=now.getDate();
  document.getElementById('wbDate').textContent=`${now.getFullYear()}년 ${m}월 ${d}일 ${days[now.getDay()]}요일 · 오늘도 고객의 마음을 움직이는 하루를 만들어가세요.`;
  document.getElementById('wbDateNum').innerHTML=`${d}<span class="unit">일</span>`;
  document.getElementById('wbWeekDay').textContent=days[now.getDay()]+'요일';
}

// ─────────────────────────────────────────────
// 권한 체크
// ─────────────────────────────────────────────
function canAccess(minRole) {
  if (!minRole) return true;
  const myLevel = ROLE_ORDER[_userRole] ?? 99;
  const reqLevel = ROLE_ORDER[minRole] ?? 0;
  return myLevel <= reqLevel;
}

// ─────────────────────────────────────────────
// 설정 불러오기
// ─────────────────────────────────────────────
async function loadSettings() {
  if (!_scriptUrl) { useDefaults(); return; }
  try {
    const res  = await fetch(`${_scriptUrl}?action=getHomeSettings`,{redirect:'follow'});
    const data = await res.json();
    if (data.ok && data.settings && (data.settings.quick || data.settings.cards)) {
      _quickItems = data.settings.quick?.length ? data.settings.quick : JSON.parse(JSON.stringify(DEFAULT_QUICK));
      _cardItems  = data.settings.cards?.length ? data.settings.cards : JSON.parse(JSON.stringify(DEFAULT_CARDS));
    } else { useDefaults(); }
  } catch(e) { useDefaults(); }
  renderAll();
}

function useDefaults() {
  _quickItems = JSON.parse(JSON.stringify(DEFAULT_QUICK));
  _cardItems  = JSON.parse(JSON.stringify(DEFAULT_CARDS));
  renderAll();
}

// ─────────────────────────────────────────────
// 렌더링
// ─────────────────────────────────────────────
function renderAll() { renderQuick(); renderSlider(); renderNotices(); }

function renderQuick() {
  const grid = document.getElementById('quickGrid');
  document.getElementById('qCount').textContent = _quickItems.length+' items';
  grid.innerHTML = _quickItems.map((it,i) => {
    const locked = !canAccess(it.minRole||'affiliate');
    return `
    <div class="q-item${locked?' locked':''}" onclick="handleQuickClick(${i})">
      <div class="admin-gear" onclick="event.stopPropagation();openItemEdit('quick',${i})">⚙</div>
      ${locked ? '<div class="q-lock-badge">🔒</div>' : ''}
      <div class="q-icon ${it.color||'qi-cyan'}">${it.icon}</div>
      <div class="q-label">${it.label}</div>
    </div>`;
  }).join('');
}

function handleQuickClick(i) {
  const it = _quickItems[i];
  if (!canAccess(it.minRole||'affiliate')) {
    showPermBlock(it.label);
    return;
  }
  goTab(it.tab);
}

function renderSlider() {
  const track = document.getElementById('sliderTrack');
  track.innerHTML = _cardItems.map((c,i)=>buildCard(c,i)).join('');
  buildDots();
  goSlide(0,false);
}

function buildCard(c,i) {
  const locked = !canAccess(c.minRole||'affiliate');
  const bodies = {
    kpi:`<div class="mini-stats"><div class="mini-stat-item"><div class="mini-stat-val accent">4.8</div><div class="mini-stat-lbl">고객만족도</div></div><div class="mini-stat-item"><div class="mini-stat-val green">97%</div><div class="mini-stat-lbl">처리완료율</div></div><div class="mini-stat-item"><div class="mini-stat-val gold">12m</div><div class="mini-stat-lbl">평균응답</div></div><div class="mini-stat-item"><div class="mini-stat-val">238</div><div class="mini-stat-lbl">주간 상담수</div></div></div>`,
    review:`<div class="mini-stats" style="margin-bottom:10px;"><div class="mini-stat-item"><div class="mini-stat-val gold">4.6</div><div class="mini-stat-lbl">평균 별점</div></div><div class="mini-stat-item"><div class="mini-stat-val accent">14,750</div><div class="mini-stat-lbl">총 리뷰 수</div></div></div><div class="mini-bars">${[65,78,55,90,82,70,88,95,60,72,85,91].map(h=>`<div class="mini-bar ${h>80?'hi':''}" style="height:${h}%"></div>`).join('')}</div>`,
    cs:`<div class="mini-progress-wrap"><div class="mini-progress-row"><div class="mini-progress-label">채널톡</div><div class="mini-progress-bar"><div class="mini-progress-fill" style="width:72%;background:var(--cyan)"></div></div><div class="mini-progress-val">72%</div></div><div class="mini-progress-row"><div class="mini-progress-label">카카오</div><div class="mini-progress-bar"><div class="mini-progress-fill" style="width:18%;background:var(--gold)"></div></div><div class="mini-progress-val">18%</div></div><div class="mini-progress-row"><div class="mini-progress-label">네이버</div><div class="mini-progress-bar"><div class="mini-progress-fill" style="width:10%;background:var(--green)"></div></div><div class="mini-progress-val">10%</div></div></div>`,
    return:`<div class="mini-stats" style="margin-bottom:10px;"><div class="mini-stat-item"><div class="mini-stat-val red">42</div><div class="mini-stat-lbl">이번 주 접수</div></div><div class="mini-stat-item"><div class="mini-stat-val green">38</div><div class="mini-stat-lbl">처리 완료</div></div></div><div class="mini-tags"><span class="mini-tag">단순변심</span><span class="mini-tag">불량</span><span class="mini-tag">배송오류</span></div>`,
    quality:`<div class="mini-list"><div class="mini-list-item"><div class="mini-list-dot" style="background:var(--red)"></div><div class="mini-list-name">누수 이슈</div><div class="mini-list-val">3건</div></div><div class="mini-list-item"><div class="mini-list-dot" style="background:var(--orange)"></div><div class="mini-list-name">소음 민원</div><div class="mini-list-val">7건</div></div><div class="mini-list-item"><div class="mini-list-dot" style="background:var(--gold)"></div><div class="mini-list-name">작동 불량</div><div class="mini-list-val">2건</div></div><div class="mini-list-item"><div class="mini-list-dot" style="background:var(--green)"></div><div class="mini-list-name">완료 처리</div><div class="mini-list-val">18건</div></div></div>`,
    ai:`<div class="mini-stats" style="margin-bottom:10px;"><div class="mini-stat-item"><div class="mini-stat-val" style="color:var(--purple)">ALF</div><div class="mini-stat-lbl">AI 자동응답</div></div><div class="mini-stat-item"><div class="mini-stat-val accent">68%</div><div class="mini-stat-lbl">처리율</div></div></div><div class="mini-bars">${[40,55,70,65,80,75,68,72,78,82,70,68].map(h=>`<div class="mini-bar ${h>72?'hi':''}" style="height:${h}%"></div>`).join('')}</div>`,
  };
  const badgeMap  = {kpi:'LIVE',review:'14,750건',cs:'ALF 연동',return:'주간',quality:'모니터링',ai:'AI 분석'};
  const badgeCls  = {kpi:'info',review:'info',cs:'',return:'warn',quality:'warn',ai:''};
  const body = bodies[c.id] || `<div style="color:var(--text3);font-size:12px;">준비 중</div>`;
  return `
  <div class="s-card${locked?' locked':''}" onclick="handleCardClick(${i})">
    <div class="admin-gear" onclick="event.stopPropagation();openItemEdit('card',${i})">⚙</div>
    <div class="s-card-header">
      <div class="s-card-icon ${c.iconCls||'qi-cyan'}">${c.icon}${locked?' 🔒':''}</div>
      <div class="s-card-info"><div class="s-card-title">${c.title}</div><div class="s-card-sub">${c.sub}</div></div>
      <div class="s-card-badge ${badgeCls[c.id]||''}">${badgeMap[c.id]||'바로가기'}</div>
    </div>
    <div class="s-card-body">${body}</div>
  </div>`;
}

function handleCardClick(i) {
  const c = _cardItems[i];
  if (!canAccess(c.minRole||'affiliate')) { showPermBlock(c.title); return; }
  goTab(c.tab);
}

function renderNotices() {
  const mkItem = it => `<div class="notice-item"><div class="notice-dot-wrap"><div class="notice-dot ${it.dot||'cyan'}"></div></div><div class="notice-text">${it.text}</div>${it.date?`<div class="notice-date">${it.date}</div>`:''}</div>`;
  document.getElementById('noticeUpdateList').innerHTML = DEFAULT_NOTICES_UPDATE.map(mkItem).join('');
  document.getElementById('noticeOpsList').innerHTML    = DEFAULT_NOTICES_OPS.map(mkItem).join('');
}

// ─────────────────────────────────────────────
// 슬라이더
// ─────────────────────────────────────────────
function buildDots() {
  const n=Math.ceil(_cardItems.length/_sliderPer);
  document.getElementById('slDots').innerHTML=Array.from({length:n},(_,i)=>`<div class="sl-dot ${i===0?'active':''}" onclick="goSlide(${i})"></div>`).join('');
}
function goSlide(idx,animate=true) {
  const n=Math.ceil(_cardItems.length/_sliderPer);
  _sliderIdx=Math.max(0,Math.min(idx,n-1));
  const track=document.getElementById('sliderTrack');
  const cardW=track.parentElement.offsetWidth, perW=cardW/_sliderPer;
  if(!animate)track.style.transition='none';
  track.style.transform=`translateX(-${_sliderIdx*_sliderPer*perW}px)`;
  if(!animate)setTimeout(()=>{track.style.transition='';},50);
  document.querySelectorAll('.sl-dot').forEach((d,i)=>d.classList.toggle('active',i===_sliderIdx));
}
document.getElementById('slPrev').onclick=()=>goSlide(_sliderIdx-1);
document.getElementById('slNext').onclick=()=>goSlide(_sliderIdx+1);

// ─────────────────────────────────────────────
// 탭 이동
// ─────────────────────────────────────────────
function goTab(tabName) { window.parent.postMessage({type:'GO_TAB',tab:tabName},'*'); }

// ─────────────────────────────────────────────
// 권한 차단 팝업
// ─────────────────────────────────────────────
function showPermBlock(menuName) {
  const myLabel = ROLE_LABEL[_userRole] || _userRole;
  document.getElementById('permBlockMsg').textContent = `${myLabel} 님은 [${menuName}] 메뉴를 이용하실 수 없습니다.`;
  document.getElementById('permBlock').classList.add('open');
}
function closePermBlock() { document.getElementById('permBlock').classList.remove('open'); }

// ─────────────────────────────────────────────
// 설정 모달
// ─────────────────────────────────────────────
function openItemEdit(type, i) { openModal(type, i); }

function openModal(focusType, focusIdx) {
  renderCfgList('quick', document.getElementById('cfgQuickList'), _quickItems);
  renderCfgList('card',  document.getElementById('cfgCardList'),  _cardItems);
  document.getElementById('settingModal').classList.add('open');
}
function closeModal() {
  document.getElementById('settingModal').classList.remove('open');
  closeIconPicker();
}

function renderCfgList(type, container, items) {
  const roles = ['admin','leader','ggumbi','affiliate'];
  const roleLabel = {admin:'관리자',leader:'리더',ggumbi:'꿈비',affiliate:'계열사(전체)'};
  container.innerHTML = items.map((it,i) => {
    const minRole = it.minRole || 'affiliate';
    const permBtns = roles.map(r => `<button class="perm-btn${minRole===r?' active-perm':''}" onclick="setMinRole('${type}',${i},'${r}',this)">${roleLabel[r]}</button>`).join('');
    const colorBg = COLOR_OPTIONS.find(c=>c.cls===(it.color||it.iconCls||'qi-cyan'))?.hex || 'rgba(0,200,255,0.12)';
    return `
    <div class="cfg-item" id="cfg-${type}-${i}">
      <div class="cfg-item-top">
        <div class="cfg-icon-preview ${it.color||it.iconCls||'qi-cyan'}" style="background:${colorBg}" onclick="openIconPicker('${type}',${i},this)">${it.icon}</div>
        <div class="cfg-fields">
          <input class="modal-input" value="${it.label||it.title||''}" placeholder="라벨" oninput="updateItem('${type}',${i},'label',this.value);updateItem('${type}',${i},'title',this.value)">
          <input class="modal-input" value="${it.tab||''}" placeholder="탭명" oninput="updateItem('${type}',${i},'tab',this.value)">
        </div>
        ${type==='quick'?`<button class="cfg-del" onclick="removeItem('quick',${i})">✕</button>`:''}
      </div>
      <div class="cfg-item-bottom">
        <span class="cfg-perm-label">🔑 최소권한</span>
        <div class="cfg-perm-btns">${permBtns}</div>
      </div>
    </div>`;
  }).join('');
}

function updateItem(type, i, key, val) {
  const arr = type==='quick' ? _quickItems : _cardItems;
  arr[i][key] = val;
}

function setMinRole(type, i, role, btn) {
  const arr = type==='quick' ? _quickItems : _cardItems;
  arr[i].minRole = role;
  btn.closest('.cfg-perm-btns').querySelectorAll('.perm-btn').forEach(b=>b.classList.remove('active-perm'));
  btn.classList.add('active-perm');
}

function addQuickItem() {
  _quickItems.push({icon:'📌',label:'새 항목',tab:'',color:'qi-cyan',minRole:'affiliate'});
  renderCfgList('quick',document.getElementById('cfgQuickList'),_quickItems);
}
function removeItem(type,i) {
  if(type==='quick') _quickItems.splice(i,1);
  renderCfgList('quick',document.getElementById('cfgQuickList'),_quickItems);
}

// ─────────────────────────────────────────────
// 아이콘 선택 팝업
// ─────────────────────────────────────────────
function openIconPicker(type, i, triggerEl) {
  _pickerType=type; _pickerIdx=i; _pickerTarget=triggerEl;
  const picker=document.getElementById('iconPicker');

  // 아이콘 그리드
  document.getElementById('iconGrid').innerHTML = ICON_LIST.map(ic=>
    `<div class="icon-opt" onclick="selectIcon('${ic}')">${ic}</div>`
  ).join('');

  // 색상 그리드
  const curColor=(type==='quick'?_quickItems[i].color:_cardItems[i].iconCls)||'qi-cyan';
  document.getElementById('colorGrid').innerHTML = COLOR_OPTIONS.map(c=>
    `<div class="color-opt${c.cls===curColor?' selected':''}" style="background:${c.hex};border-color:${c.cls===curColor?'white':'transparent'}" onclick="selectColor('${c.cls}',this)" title="${c.label}"></div>`
  ).join('');

  // 위치
  const rect=triggerEl.getBoundingClientRect();
  picker.style.left = Math.min(rect.left, window.innerWidth-296)+'px';
  picker.style.top  = (rect.bottom+8)+'px';
  picker.classList.add('open');
}

function selectIcon(ic) {
  if (_pickerType==='quick') { _quickItems[_pickerIdx].icon=ic; }
  else { _cardItems[_pickerIdx].icon=ic; }
  if (_pickerTarget) _pickerTarget.textContent=ic;
  closeIconPicker();
  // cfg-item 아이콘 프리뷰도 업데이트
  renderCfgList(_pickerType, document.getElementById(_pickerType==='quick'?'cfgQuickList':'cfgCardList'), _pickerType==='quick'?_quickItems:_cardItems);
}

function selectColor(cls, el) {
  if (_pickerType==='quick') { _quickItems[_pickerIdx].color=cls; }
  else { _cardItems[_pickerIdx].iconCls=cls; }
  document.querySelectorAll('.color-opt').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  closeIconPicker();
  renderCfgList(_pickerType, document.getElementById(_pickerType==='quick'?'cfgQuickList':'cfgCardList'), _pickerType==='quick'?_quickItems:_cardItems);
}

function closeIconPicker() {
  document.getElementById('iconPicker').classList.remove('open');
  _pickerTarget=null; _pickerType=null; _pickerIdx=null;
}
document.addEventListener('click', e => {
  const picker=document.getElementById('iconPicker');
  if (picker.classList.contains('open') && !picker.contains(e.target) && !e.target.classList.contains('cfg-icon-preview'))
    closeIconPicker();
});

// ─────────────────────────────────────────────
// 저장
// ─────────────────────────────────────────────
async function saveSettings() {
  renderAll();
  if (!_scriptUrl) { showToast('⚠ GAS URL 없음 — 화면에만 적용됨'); closeModal(); return; }
  try {
    const payload = encodeURIComponent(JSON.stringify({ quick:_quickItems, cards:_cardItems }));
    const res  = await fetch(`${_scriptUrl}?action=saveHomeSettings&data=${payload}`, { redirect:'follow' });
    const data = await res.json();
    showToast(data.ok ? '✅ 설정 저장 완료' : '⚠ 저장 실패: '+(data.msg||''));
  } catch(e) { showToast('⚠ 저장 오류'); }
  closeModal();
}

// ─────────────────────────────────────────────
// 토스트
// ─────────────────────────────────────────────
let _toastTimer;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

// fallback
setTimeout(()=>{ if(!_scriptUrl) useDefaults(); },800);
</script>
</body>
</html>
