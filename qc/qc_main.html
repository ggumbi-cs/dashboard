<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>품질관리</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f1f3d;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  }
  .msg {
    text-align: center;
    color: #fff;
  }
  .icon { font-size: 64px; margin-bottom: 24px; }
  .title {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #fff;
  }
  .sub {
    margin-top: 12px;
    font-size: 16px;
    color: #6b8cba;
    font-weight: 400;
  }
</style>
</head>
<body>
  <div class="msg">
    <div class="icon">🔬</div>
    <div class="title">대규모 업데이트 준비중</div>
    <div class="sub">품질관리 시스템을 새롭게 준비하고 있습니다</div>
  </div>
</body>
</html>
