<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>유상처리단가</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080f1e;--bg2:#0d1830;--bg3:#111e35;--bg4:#162240;
  --border:rgba(0,200,255,0.10);--border2:rgba(0,200,255,0.20);
  --cyan:#00c8ff;--cyan-dim:rgba(0,200,255,0.08);
  --gold:#f0c060;--green:#00e5a0;--red:#ff5a6e;--orange:#ff9040;
  --text:#e8f0f8;--text2:#a8c8e0;--text3:#6a8faa;
  --font-kr:'Noto Sans KR',sans-serif;--font-en:'Inter',sans-serif;
}
body.light{--bg:#f0f4fa;--bg2:#fff;--bg3:#e8f0fb;--bg4:#dce8f7;--border:rgba(26,78,180,0.12);--border2:rgba(26,78,180,0.25);--cyan:#1a6eb8;--cyan-dim:rgba(26,110,184,0.08);--gold:#b07800;--green:#007a50;--red:#c02020;--orange:#c05010;--text:#1a2e50;--text2:#2a4e7a;--text3:#3a6a9a;}
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font-kr);}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

#toolbar{padding:12px 18px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ph-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px;flex-shrink:0;}
.ph-title::before{content:'';display:inline-block;width:3px;height:15px;background:var(--green);border-radius:2px;}
.search-wrap{flex:1;min-width:140px;max-width:260px;display:flex;gap:4px;}
.search-input{flex:1;padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;font-family:var(--font-kr);outline:none;}
.search-input:focus{border-color:var(--border2);}
.search-btn{padding:5px 10px;background:var(--cyan-dim);border:1px solid var(--border2);border-radius:7px;color:var(--cyan);font-size:11px;font-weight:600;cursor:pointer;}
.ph-count{font-size:11px;color:var(--text3);}
.btn-filter{padding:5px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--cyan);font-size:11px;font-weight:600;cursor:pointer;position:relative;}
.btn-filter.has-filter{background:var(--cyan-dim);}
.btn-new{padding:5px 12px;background:var(--green);color:#000;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font-kr);}
.ph-refresh{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.ph-refresh:hover{border-color:var(--border2);color:var(--cyan);}
.ph-refresh.spin{animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* 필터 팝업 */
#filterPopup{display:none;position:fixed;z-index:999;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:14px 16px;min-width:220px;box-shadow:0 16px 48px rgba(0,0,0,0.5);}
#filterPopup.open{display:block;}
.fp-title{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.fp-all-btn{font-size:10px;color:var(--cyan);cursor:pointer;background:none;border:none;font-family:var(--font-kr);}
.fp-list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;}
.fp-item{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;}
.fp-item input[type=checkbox]{width:13px;height:13px;accent-color:var(--cyan);flex-shrink:0;cursor:pointer;}
.fp-item label{font-size:11px;color:var(--text2);cursor:pointer;flex:1;}
.fp-apply{width:100%;margin-top:10px;padding:7px;background:var(--cyan);color:#000;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font-kr);}

.wrap{padding:12px 18px 40px;}
.prod-group{margin-bottom:20px;}
.prod-group-hd{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px 10px 0 0;border-bottom:none;}
.prod-badge{font-size:11px;font-weight:700;color:var(--text);padding:2px 10px;border-radius:5px;background:var(--bg3);border:1px solid var(--border2);}
.prod-cnt-badge{font-size:10px;color:var(--text3);}
.danga-table{width:100%;border-collapse:collapse;background:var(--bg2);border:1px solid var(--border);border-radius:0 0 10px 10px;overflow:hidden;}
.danga-table th{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;padding:6px 10px;border-bottom:1px solid var(--border);text-align:left;background:var(--bg3);}
.danga-table td{font-size:11px;color:var(--text2);padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top;}
.danga-table tr:last-child td{border-bottom:none;}
.danga-table tr:hover td{background:var(--bg3);cursor:pointer;}
.amt{font-family:var(--font-en);font-weight:600;color:var(--text);}
.amt-total{font-family:var(--font-en);font-weight:700;color:var(--green);}

/* 신규등록 모달 */
#newModal{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;}
#newModal.open{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:24px 28px;width:480px;max-height:85vh;overflow-y:auto;position:relative;}
.modal-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:16px;}
.modal-close{position:absolute;top:16px;right:18px;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.modal-field{display:flex;flex-direction:column;gap:4px;}
.modal-field.full{grid-column:1/-1;}
.field-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;}
.field-input,.field-select{width:100%;padding:7px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;font-family:var(--font-kr);outline:none;}
.field-input:focus,.field-select:focus{border-color:var(--border2);}
.modal-btn{width:100%;padding:10px;background:var(--green);color:#000;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-kr);}
.modal-btn:disabled{opacity:0.5;cursor:not-allowed;}

#loadState,#emptyState{text-align:center;padding:50px 18px;}
.ld-dots{display:inline-flex;gap:5px;margin-bottom:12px;}
.ld-dots span{width:7px;height:7px;border-radius:50%;background:var(--green);animation:ldot 1.2s infinite;}
.ld-dots span:nth-child(2){animation-delay:0.2s;} .ld-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes ldot{0%,80%,100%{opacity:0.2;transform:scale(0.8);}40%{opacity:1;transform:scale(1);}}
</style>
</head>
<body>
<div id="toolbar">
  <div class="ph-title">💰 유상처리단가</div>
  <div class="search-wrap">
    <input class="search-input" id="searchInput" placeholder="증상·제품명·부품 검색..." onkeydown="if(event.key==='Enter')doSearch()">
    <button class="search-btn" onclick="doSearch()">검색</button>
  </div>
  <span class="ph-count" id="phCount">-</span>
  <button class="btn-filter" id="filterBtn" onclick="toggleFilter()">🔽 제품 필터</button>
  <button class="btn-new" onclick="openNew()">+ 신규등록</button>
  <button class="ph-refresh" id="refreshBtn" onclick="loadData()">↻</button>
</div>

<!-- 필터 팝업 -->
<div id="filterPopup">
  <div class="fp-title">
    <span>표시 제품 선택</span>
    <button class="fp-all-btn" onclick="toggleAll()">전체 선택/해제</button>
  </div>
  <div class="fp-list" id="fpList"></div>
  <button class="fp-apply" onclick="applyFilter()">적용</button>
</div>

<div id="loadState"><div class="ld-dots"><span></span><span></span><span></span></div><div style="font-size:12px;color:var(--text3);">불러오는 중...</div></div>
<div id="emptyState" style="display:none;"><div style="font-size:36px;margin-bottom:12px;">📭</div><div style="font-size:13px;color:var(--text);">항목 없음</div></div>
<div class="wrap" id="mainWrap" style="display:none;"></div>

<!-- 신규등록 모달 -->
<div id="newModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeNew()">✕</button>
    <div class="modal-title">💰 단가 신규등록</div>
    <div class="modal-grid">
      <div class="modal-field full"><div class="field-label">접수증상 *</div><input class="field-input" id="nw접수증상" placeholder="예: 누수O 누수, E3, 세척불가"></div>
      <div class="modal-field full"><div class="field-label">제품명</div>
        <select class="field-select" id="nw제품명">
          <option value="">선택</option>
        </select>
      </div>
      <div class="modal-field full"><div class="field-label">예상부품</div><input class="field-input" id="nw예상부품" placeholder="부품명"></div>
      <div class="modal-field"><div class="field-label">공임 (원)</div><input class="field-input" type="number" id="nw공임" placeholder="33000"></div>
      <div class="modal-field"><div class="field-label">소비자단가 (원)</div><input class="field-input" type="number" id="nw소비자단가" placeholder="0"></div>
      <div class="modal-field full"><div class="field-label">예상작업</div><input class="field-input" id="nw예상작업" placeholder="예상 작업 내용"></div>
      <div class="modal-field full"><div class="field-label">비고</div><input class="field-input" id="nw비고" placeholder="비고"></div>
    </div>
    <button class="modal-btn" id="newSaveBtn" onclick="saveNew()">등록</button>
  </div>
</div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbx0xkRz1H4eb79Me3R0ESDsvKYoIKoXcQTp2zuIkZPeDKy8_ZYVeXEF71rPK_0u_3M0LQ/exec';
const PROD_OPTS=['젖병살균세척기','분유쉐이커','젖병세척기 스팀플러스','출수형 분유포트','버블리스 분유포트','센서 휴지통','휴대용 분유포트','웜라이너','장난감 살균기','전동 젖병세척솔','UV LED살균기','퀵폴딩샤워가드','(분리형) 휴대용 분유포트'];

let _all=[], _checkedProds=new Set(), _query='';

window.addEventListener('message',e=>{if(e.data&&e.data.type==='THEME')document.body.classList.toggle('light',e.data.mode==='light');});
if(sessionStorage.getItem('_theme')==='light')document.body.classList.add('light');

// 신규등록 제품명 select 초기화
document.getElementById('nw제품명').innerHTML='<option value="">선택</option>'+PROD_OPTS.map(p=>`<option value="${p}">${p}</option>`).join('');

async function loadData(){
  document.getElementById('loadState').style.display='';
  document.getElementById('mainWrap').style.display='none';
  document.getElementById('refreshBtn').classList.add('spin');
  try{
    const res=await fetch(`${GAS}?action=getDangaData`,{redirect:'follow'});
    const d=await res.json();
    if(d.ok&&d.records){
      _all=d.records;
      const prods=[...new Set(_all.map(r=>r.제품명).filter(Boolean))].sort();
      _checkedProds=new Set(prods); // 기본 전체 선택
      buildFilterList(prods);
      render();
    }else{document.getElementById('loadState').style.display='none';document.getElementById('emptyState').style.display='';}
  }catch(e){document.getElementById('loadState').style.display='none';document.getElementById('emptyState').style.display='';}
  document.getElementById('refreshBtn').classList.remove('spin');
}

function buildFilterList(prods){
  document.getElementById('fpList').innerHTML=prods.map(p=>`
    <div class="fp-item">
      <input type="checkbox" id="fp_${p.replace(/[^a-zA-Z가-힣0-9]/g,'_')}" value="${p}" ${_checkedProds.has(p)?'checked':''}>
      <label for="fp_${p.replace(/[^a-zA-Z가-힣0-9]/g,'_')}">${p}</label>
    </div>`).join('');
}

function toggleFilter(){
  const popup=document.getElementById('filterPopup');
  const btn=document.getElementById('filterBtn');
  if(popup.classList.contains('open')){popup.classList.remove('open');return;}
  const rect=btn.getBoundingClientRect();
  popup.style.top=(rect.bottom+6)+'px';
  popup.style.left=Math.min(rect.left,window.innerWidth-240)+'px';
  popup.classList.add('open');
}

function toggleAll(){
  const cbs=document.querySelectorAll('#fpList input[type=checkbox]');
  const allChecked=[...cbs].every(c=>c.checked);
  cbs.forEach(c=>c.checked=!allChecked);
}

function applyFilter(){
  _checkedProds=new Set([...document.querySelectorAll('#fpList input[type=checkbox]:checked')].map(c=>c.value));
  document.getElementById('filterPopup').classList.remove('open');
  document.getElementById('filterBtn').classList.toggle('has-filter',_checkedProds.size<[...document.querySelectorAll('#fpList input')].length);
  render();
}

document.addEventListener('click',e=>{
  const popup=document.getElementById('filterPopup');
  const btn=document.getElementById('filterBtn');
  if(popup.classList.contains('open')&&!popup.contains(e.target)&&e.target!==btn&&!btn.contains(e.target))
    popup.classList.remove('open');
});

function doSearch(){_query=document.getElementById('searchInput').value.trim().toLowerCase(); render();}

function getFiltered(){
  let l=_all.filter(r=>_checkedProds.size===0||_checkedProds.has(r.제품명||''));
  if(_query) l=l.filter(r=>[r.접수증상,r.제품명,r.예상부품,r.예상작업,r.비고].join(' ').toLowerCase().includes(_query));
  return l;
}

function won(n){if(!n&&n!==0)return'-'; return '₩'+Math.round(n).toLocaleString('ko-KR');}

function render(){
  const list=getFiltered();
  document.getElementById('phCount').textContent=`${list.length}건`;
  document.getElementById('loadState').style.display='none';
  if(!list.length){document.getElementById('mainWrap').style.display='none';document.getElementById('emptyState').style.display='';return;}
  document.getElementById('emptyState').style.display='none';
  document.getElementById('mainWrap').style.display='';

  const grouped={};
  list.forEach(r=>{const k=r.제품명||'미분류'; if(!grouped[k])grouped[k]=[]; grouped[k].push(r);});
  document.getElementById('mainWrap').innerHTML=Object.entries(grouped).map(([prod,rows])=>`
    <div class="prod-group">
      <div class="prod-group-hd">
        <span class="prod-badge">${prod}</span>
        <span class="prod-cnt-badge">${rows.length}건</span>
      </div>
      <table class="danga-table">
        <thead><tr>
          <th>접수증상</th><th>예상부품</th><th>공임</th>
          <th>소비자단가</th><th>최종견적</th><th>예상작업</th><th>비고</th>
        </tr></thead>
        <tbody>
          ${rows.map(r=>`<tr onclick="openNotion('${r.url||''}','${r.id}')">
            <td style="font-weight:500;color:var(--text);">${r.접수증상||'-'}</td>
            <td>${r.예상부품||'-'}</td>
            <td class="amt">${won(r.공임)}</td>
            <td class="amt">${won(r.소비자단가)}</td>
            <td class="amt-total">${won(r.최종견적)}</td>
            <td style="max-width:140px;font-size:10px;color:var(--text3);">${r.예상작업||'-'}</td>
            <td style="max-width:120px;font-size:10px;color:var(--text3);">${r.비고||'-'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`).join('');
}

function openNotion(url,id){if(!url&&id)url=`https://notion.so/${id.replace(/-/g,'')}`; if(url)window.open(url,'_blank');}

// 신규등록
function openNew(){document.getElementById('newModal').classList.add('open');}
function closeNew(){document.getElementById('newModal').classList.remove('open');}

async function saveNew(){
  const 접수증상=document.getElementById('nw접수증상').value.trim();
  if(!접수증상){alert('접수증상은 필수입니다.');return;}
  const btn=document.getElementById('newSaveBtn');
  btn.disabled=true; btn.textContent='등록 중...';
  const data={접수증상,제품명:document.getElementById('nw제품명').value,예상부품:document.getElementById('nw예상부품').value.trim(),공임:parseInt(document.getElementById('nw공임').value)||0,소비자단가:parseInt(document.getElementById('nw소비자단가').value)||0,예상작업:document.getElementById('nw예상작업').value.trim(),비고:document.getElementById('nw비고').value.trim()};
  try{
    const p=encodeURIComponent(JSON.stringify(data));
    const res=await fetch(`${GAS}?action=createDangaItem&data=${p}`,{redirect:'follow'});
    const d=await res.json();
    if(d.ok){closeNew(); await loadData();}
    else alert('등록 실패: '+(d.msg||'오류'));
  }catch(e){alert('오류: '+e.message);}
  btn.disabled=false; btn.textContent='등록';
}

loadData();
</script>
</body>
</html>
