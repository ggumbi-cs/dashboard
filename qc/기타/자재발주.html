<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>자재발주</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080f1e;--bg2:#0d1830;--bg3:#111e35;--bg4:#162240;
  --border:rgba(0,200,255,0.10);--border2:rgba(0,200,255,0.20);
  --cyan:#00c8ff;--cyan-dim:rgba(0,200,255,0.08);
  --gold:#f0c060;--green:#00e5a0;--red:#ff5a6e;--orange:#ff9040;--purple:#a080ff;
  --text:#e8f0f8;--text2:#a8c8e0;--text3:#6a8faa;
  --font-kr:'Noto Sans KR',sans-serif;--font-en:'Inter',sans-serif;
}
body.light{--bg:#f0f4fa;--bg2:#fff;--bg3:#e8f0fb;--bg4:#dce8f7;--border:rgba(26,78,180,0.12);--border2:rgba(26,78,180,0.25);--cyan:#1a6eb8;--cyan-dim:rgba(26,110,184,0.08);--gold:#b07800;--green:#007a50;--red:#c02020;--orange:#c05010;--purple:#5030b0;--text:#1a2e50;--text2:#2a4e7a;--text3:#3a6a9a;}
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font-kr);}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

#toolbar{padding:12px 18px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ph-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px;flex-shrink:0;}
.ph-title::before{content:'';display:inline-block;width:3px;height:15px;background:var(--gold);border-radius:2px;}
.search-wrap{flex:1;min-width:140px;max-width:260px;display:flex;gap:4px;}
.search-input{flex:1;padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;font-family:var(--font-kr);outline:none;}
.search-input:focus{border-color:var(--border2);}
.search-btn{padding:5px 10px;background:var(--cyan-dim);border:1px solid var(--border2);border-radius:7px;color:var(--cyan);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font-kr);}
.ph-count{font-size:11px;color:var(--text3);flex-shrink:0;}
.ph-refresh{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.ph-refresh:hover{border-color:var(--border2);color:var(--cyan);}
.ph-refresh.spin{animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

#tabBar{display:flex;gap:0;padding:10px 18px 0;border-bottom:1px solid var(--border);overflow-x:auto;}
.s-tab{padding:7px 12px;cursor:pointer;border-bottom:2px solid transparent;font-size:11px;font-weight:600;color:var(--text3);white-space:nowrap;transition:all 0.15s;margin-bottom:-1px;display:flex;align-items:center;gap:5px;}
.s-tab:hover{color:var(--text2);}
.s-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab-cnt{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:var(--bg4);}
.s-tab.active .tab-cnt{background:rgba(240,192,96,0.15);}

#cardList{padding:12px 18px 40px;display:flex;flex-direction:column;gap:8px;}
.action-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color 0.15s;}
.action-card:hover{border-color:var(--border2);}
.card-top-bar{height:2px;}
.card-hd{display:flex;align-items:center;gap:8px;padding:9px 14px 0;flex-wrap:wrap;}
.elapsed-badge{font-size:10px;font-weight:700;font-family:var(--font-en);padding:2px 7px;border-radius:5px;flex-shrink:0;}
.elapsed-ok  {background:rgba(0,229,160,0.12);color:var(--green);}
.elapsed-warn{background:rgba(255,144,64,0.12);color:var(--orange);}
.elapsed-bad {background:rgba(255,90,110,0.12);color:var(--red);}
.status-sel{font-size:10px;font-weight:600;font-family:var(--font-kr);padding:2px 7px;border-radius:5px;border:1px solid var(--border);cursor:pointer;outline:none;background:var(--bg3);color:var(--text2);}
.prod-chip{font-size:10px;padding:2px 7px;border-radius:5px;background:var(--bg4);color:var(--text2);border:1px solid var(--border);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-bd{display:grid;grid-template-columns:1fr 1fr;gap:0;padding:8px 0 10px;}
.bd-left,.bd-right{padding:0 10px 0 14px;}
.bd-right{border-left:1px solid var(--border);padding-left:12px;}
.card-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px;display:flex;gap:5px;align-items:flex-start;}
.card-title-icon{font-size:10px;opacity:0.5;margin-top:2px;flex-shrink:0;}
.date-row{display:flex;align-items:center;gap:6px;margin-top:5px;}
.date-label{font-size:9px;color:var(--text3);min-width:48px;}
.date-val{font-size:11px;color:var(--text2);font-family:var(--font-en);}
.memo-label{font-size:9px;font-weight:700;font-family:var(--font-en);color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:6px;margin-bottom:2px;}
.memo-text{font-size:11px;color:var(--text2);line-height:1.5;}

#loadState,#emptyState{text-align:center;padding:50px 18px;}
.ld-dots{display:inline-flex;gap:5px;margin-bottom:12px;}
.ld-dots span{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:ldot 1.2s infinite;}
.ld-dots span:nth-child(2){animation-delay:0.2s;} .ld-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes ldot{0%,80%,100%{opacity:0.2;transform:scale(0.8);}40%{opacity:1;transform:scale(1);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeUp 0.25s ease both;}
</style>
</head>
<body>
<div id="toolbar">
  <div class="ph-title">📦 자재발주</div>
  <div class="search-wrap">
    <input class="search-input" id="searchInput" placeholder="건명·제품 검색..." onkeydown="if(event.key==='Enter')doSearch()">
    <button class="search-btn" onclick="doSearch()">검색</button>
  </div>
  <span class="ph-count" id="phCount">-</span>
  <button class="ph-refresh" id="refreshBtn" onclick="loadData()">↻</button>
</div>
<div id="tabBar">
  <div class="s-tab active" data-status="all" onclick="setStatus('all')">전체<span class="tab-cnt" id="cntAll">-</span></div>
  <div class="s-tab" data-status="미입고" onclick="setStatus('미입고')">미입고<span class="tab-cnt" id="cnt미입고">-</span></div>
  <div class="s-tab" data-status="입고대기" onclick="setStatus('입고대기')">입고대기<span class="tab-cnt" id="cnt입고대기">-</span></div>
  <div class="s-tab" data-status="기안진행" onclick="setStatus('기안진행')">기안진행<span class="tab-cnt" id="cnt기안진행">-</span></div>
  <div class="s-tab" data-status="결재대기" onclick="setStatus('결재대기')">결재대기<span class="tab-cnt" id="cnt결재대기">-</span></div>
  <div class="s-tab" data-status="사전체크" onclick="setStatus('사전체크')">사전체크<span class="tab-cnt" id="cnt사전체크">-</span></div>
  <div class="s-tab" data-status="중단" onclick="setStatus('중단')">중단<span class="tab-cnt" id="cnt중단">-</span></div>
</div>
<div id="loadState"><div class="ld-dots"><span></span><span></span><span></span></div><div style="font-size:12px;color:var(--text3);">데이터 불러오는 중...</div></div>
<div id="emptyState" style="display:none;"><div style="font-size:36px;margin-bottom:12px;">📭</div><div style="font-size:13px;color:var(--text);">항목이 없어요</div></div>
<div id="cardList" style="display:none;"></div>
<script>
const GAS = 'https://script.google.com/macros/s/AKfycbx0xkRz1H4eb79Me3R0ESDsvKYoIKoXcQTp2zuIkZPeDKy8_ZYVeXEF71rPK_0u_3M0LQ/exec';
const STATUS_OPTS = ['사전체크','기안진행','결재대기','입고대기','미입고','중단'];
const STATUS_COLOR = {미입고:'var(--gold)',입고대기:'var(--green)',기안진행:'var(--text3)',결재대기:'var(--purple)',사전체크:'var(--red)',중단:'var(--red)'};
let _all=[],_curStatus='all',_query='';

window.addEventListener('message',e=>{if(e.data&&e.data.type==='THEME')document.body.classList.toggle('light',e.data.mode==='light');});
if(sessionStorage.getItem('_theme')==='light')document.body.classList.add('light');

async function loadData(){
  showLoading();
  document.getElementById('refreshBtn').classList.add('spin');
  try{
    const res=await fetch(`${GAS}?action=getZaejaeData`,{redirect:'follow'});
    const d=await res.json();
    if(d.ok&&d.records){_all=d.records; updateCounts(); render();}
    else showEmpty();
  }catch(e){showEmpty();}
  document.getElementById('refreshBtn').classList.remove('spin');
}
function setStatus(s){_curStatus=s; document.querySelectorAll('.s-tab').forEach(t=>t.classList.toggle('active',t.dataset.status===s)); render();}
function doSearch(){_query=document.getElementById('searchInput').value.trim().toLowerCase(); render();}
function updateCounts(){
  document.getElementById('cntAll').textContent=_all.length;
  ['미입고','입고대기','기안진행','결재대기','사전체크','중단'].forEach(s=>{
    document.getElementById('cnt'+s).textContent=_all.filter(r=>r.진행상태===s).length;
  });
}
function getFiltered(){
  let l=_curStatus==='all'?[..._all]:_all.filter(r=>r.진행상태===_curStatus);
  if(_query) l=l.filter(r=>[r.건명,r.제품구분,r.문서제목,r.비고].join(' ').toLowerCase().includes(_query));
  return l;
}
function render(){
  const list=getFiltered();
  document.getElementById('phCount').textContent=`${list.length}건`;
  document.getElementById('loadState').style.display='none';
  if(!list.length){document.getElementById('cardList').style.display='none';document.getElementById('emptyState').style.display='';return;}
  document.getElementById('emptyState').style.display='none';
  document.getElementById('cardList').style.display='';
  document.getElementById('cardList').innerHTML=list.map((r,i)=>buildCard(r,i)).join('');
}
function elapsedClass(d){if(!d||d<0)return'elapsed-ok'; if(d<30)return'elapsed-ok'; if(d<60)return'elapsed-warn'; return'elapsed-bad';}
function elapsedColor(s){return STATUS_COLOR[s]||'var(--text3)';}
function buildCard(r,i){
  const el=r.경과일||0;
  const color=elapsedColor(r.진행상태);
  const stOpts=STATUS_OPTS.map(s=>`<option value="${s}"${r.진행상태===s?' selected':''}>${s}</option>`).join('');
  return `<div class="action-card fade-in" style="animation-delay:${Math.min(i*0.03,0.3)}s" onclick="openNotion('${r.url}','${r.id}')">
    <div class="card-top-bar" style="background:${color}"></div>
    <div class="card-hd">
      <span class="elapsed-badge ${elapsedClass(el)}">${el}일</span>
      <select class="status-sel" onclick="event.stopPropagation()" onchange="updateStatus('${r.id}',this)">${stOpts}</select>
      ${r.제품구분?`<span class="prod-chip" title="${r.제품구분}">${r.제품구분.replace(/\[.*?\]\s*/g,'')}</span>`:''}
    </div>
    <div class="card-bd">
      <div class="bd-left">
        <div class="card-title"><span class="card-title-icon">🔗</span>${r.건명||'(제목없음)'}</div>
        <div class="date-row"><span class="date-label">기안일</span><span class="date-val">${r.기안일||'-'}</span></div>
        <div class="date-row"><span class="date-label">기안승인</span><span class="date-val">${r.기안승인||'-'}</span></div>
        <div class="date-row"><span class="date-label">예상일정</span><span class="date-val">${r.예상일정||'-'}</span></div>
        <div class="date-row"><span class="date-label">입고일</span><span class="date-val">${r.입고일||'-'}</span></div>
      </div>
      <div class="bd-right">
        ${r.문서제목?`<div class="memo-label">문서제목</div><div class="memo-text">${r.문서제목}</div>`:''}
        ${r.비고?`<div class="memo-label" style="margin-top:8px;">비고</div><div class="memo-text">${r.비고}</div>`:''}
        ${!r.문서제목&&!r.비고?`<div style="color:var(--text3);font-size:12px;margin-top:8px;">추가 정보 없음</div>`:''}
      </div>
    </div>
  </div>`;
}
function openNotion(url,id){if(!url&&id)url=`https://notion.so/${id.replace(/-/g,'')}`; if(url)window.open(url,'_blank');}
async function updateStatus(pageId,sel){
  sel.disabled=true;
  const rec=_all.find(r=>r.id===pageId); if(rec)rec.진행상태=sel.value;
  try{const p=encodeURIComponent(JSON.stringify({pageId,property:'진행상태',value:sel.value})); await fetch(`${GAS}?action=updateZaejaeItem&data=${p}`,{redirect:'follow'});}catch(e){}
  sel.disabled=false; updateCounts(); render();
}
function showLoading(){document.getElementById('loadState').style.display='';document.getElementById('emptyState').style.display='none';document.getElementById('cardList').style.display='none';}
function showEmpty(){document.getElementById('loadState').style.display='none';document.getElementById('emptyState').style.display='';document.getElementById('cardList').style.display='none';}
loadData();
</script>
</body>
</html>
