<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>택배출고</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080f1e;--bg2:#0d1830;--bg3:#111e35;--bg4:#162240;
  --border:rgba(0,200,255,0.10);--border2:rgba(0,200,255,0.20);
  --cyan:#00c8ff;--cyan-dim:rgba(0,200,255,0.08);
  --gold:#f0c060;--green:#00e5a0;--red:#ff5a6e;--orange:#ff9040;--purple:#a080ff;--pink:#ff80c0;
  --text:#e8f0f8;--text2:#a8c8e0;--text3:#6a8faa;
  --font-kr:'Noto Sans KR',sans-serif;--font-en:'Inter',sans-serif;
}
body.light{--bg:#f0f4fa;--bg2:#fff;--bg3:#e8f0fb;--bg4:#dce8f7;--border:rgba(26,78,180,0.12);--border2:rgba(26,78,180,0.25);--cyan:#1a6eb8;--cyan-dim:rgba(26,110,184,0.08);--gold:#b07800;--green:#007a50;--red:#c02020;--orange:#c05010;--purple:#5030b0;--pink:#c040a0;--text:#1a2e50;--text2:#2a4e7a;--text3:#3a6a9a;}
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font-kr);}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

#toolbar{padding:12px 18px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ph-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px;flex-shrink:0;}
.ph-title::before{content:'';display:inline-block;width:3px;height:15px;background:var(--cyan);border-radius:2px;}
.search-wrap{flex:1;min-width:140px;max-width:280px;display:flex;gap:4px;}
.search-input{flex:1;padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;font-family:var(--font-kr);outline:none;}
.search-input:focus{border-color:var(--border2);}
.search-btn{padding:5px 10px;background:var(--cyan-dim);border:1px solid var(--border2);border-radius:7px;color:var(--cyan);font-size:11px;font-weight:600;cursor:pointer;}
.ph-count{font-size:11px;color:var(--text3);}
.ph-refresh{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.ph-refresh:hover{border-color:var(--border2);color:var(--cyan);}
.ph-refresh.spin{animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

#tabBar{display:flex;gap:0;padding:10px 18px 0;border-bottom:1px solid var(--border);overflow-x:auto;}
.s-tab{padding:7px 12px;cursor:pointer;border-bottom:2px solid transparent;font-size:11px;font-weight:600;color:var(--text3);white-space:nowrap;transition:all 0.15s;margin-bottom:-1px;display:flex;align-items:center;gap:5px;}
.s-tab:hover{color:var(--text2);}
.tab-cnt{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:var(--bg4);}

.wrap{padding:12px 18px 40px;}
.rec-table{width:100%;border-collapse:collapse;}
.rec-table th{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;padding:5px 8px;border-bottom:1px solid var(--border);text-align:left;background:var(--bg3);}
.rec-table td{font-size:11px;color:var(--text2);padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:top;}
.rec-table tr:last-child td{border-bottom:none;}
.rec-table tr:hover td{background:var(--bg3);cursor:pointer;}
.status-sel{font-size:10px;font-weight:600;font-family:var(--font-kr);padding:2px 6px;border-radius:5px;border:1px solid var(--border);cursor:pointer;outline:none;background:var(--bg3);color:var(--text2);max-width:120px;}
.waybill-input{background:var(--bg3);border:none;border-bottom:1px solid var(--border);color:var(--text2);font-size:11px;font-family:var(--font-en);width:100px;padding:1px 3px;outline:none;}
.waybill-input:focus{border-bottom-color:var(--cyan);}
.badge{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:600;}

#loadState,#emptyState{text-align:center;padding:50px 18px;}
.ld-dots{display:inline-flex;gap:5px;margin-bottom:12px;}
.ld-dots span{width:7px;height:7px;border-radius:50%;background:var(--cyan);animation:ldot 1.2s infinite;}
.ld-dots span:nth-child(2){animation-delay:0.2s;} .ld-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes ldot{0%,80%,100%{opacity:0.2;transform:scale(0.8);}40%{opacity:1;transform:scale(1);}}
</style>
</head>
<body>
<div id="toolbar">
  <div class="ph-title">🚚 택배출고</div>
  <div class="search-wrap">
    <input class="search-input" id="searchInput" placeholder="고객명·제품·주문번호 검색..." onkeydown="if(event.key==='Enter')doSearch()">
    <button class="search-btn" onclick="doSearch()">검색</button>
  </div>
  <span class="ph-count" id="phCount">-</span>
  <button class="ph-refresh" id="refreshBtn" onclick="loadData()">↻</button>
</div>
<div id="tabBar">
  <div class="s-tab active" data-status="all" onclick="setStatus('all')" style="--c:var(--text2);">전체<span class="tab-cnt" id="cntAll">-</span></div>
  <div class="s-tab" data-status="출력요청" onclick="setStatus('출력요청')" style="--c:var(--pink);">출력요청<span class="tab-cnt" id="cnt출력요청">-</span></div>
  <div class="s-tab" data-status="출고완료(취합대기)" onclick="setStatus('출고완료(취합대기)')" style="--c:var(--orange);">취합대기<span class="tab-cnt" id="cnt취합대기">-</span></div>
  <div class="s-tab" data-status="출고완료(취합완료)" onclick="setStatus('출고완료(취합완료)')" style="--c:var(--green);">취합완료<span class="tab-cnt" id="cnt취합완료">-</span></div>
  <div class="s-tab" data-status="미출고(실물X)" onclick="setStatus('미출고(실물X)')" style="--c:var(--red);">미출고<span class="tab-cnt" id="cnt미출고">-</span></div>
  <div class="s-tab" data-status="출고보류(예약)" onclick="setStatus('출고보류(예약)')" style="--c:var(--text3);">보류<span class="tab-cnt" id="cnt보류">-</span></div>
</div>
<div id="loadState"><div class="ld-dots"><span></span><span></span><span></span></div><div style="font-size:12px;color:var(--text3);">데이터 불러오는 중...</div></div>
<div id="emptyState" style="display:none;"><div style="font-size:36px;margin-bottom:12px;">📭</div><div style="font-size:13px;color:var(--text);">항목이 없어요</div></div>
<div class="wrap" id="mainWrap" style="display:none;">
  <div style="overflow-x:auto;">
    <table class="rec-table">
      <thead>
        <tr>
          <th>요청일</th><th>고객명</th><th>제품명</th>
          <th>택배사</th><th>상태</th><th>송장번호</th>
          <th>연락처</th><th>주소</th>
        </tr>
      </thead>
      <tbody id="recTbody"></tbody>
    </table>
  </div>
</div>
<script>
const GAS = 'https://script.google.com/macros/s/AKfycbx0xkRz1H4eb79Me3R0ESDsvKYoIKoXcQTp2zuIkZPeDKy8_ZYVeXEF71rPK_0u_3M0LQ/exec';
const STATUS_OPTS=['출력요청','출고완료(취합대기)','출고완료(취합완료)','미출고(실물X)','출고보류(예약)'];
const STATUS_COLOR={'출력요청':'rgba(255,128,192,0.12)','출력요청t':'var(--pink)','출고완료(취합완료)':'rgba(0,229,160,0.12)','출고완료(취합완료)t':'var(--green)','출고완료(취합대기)':'rgba(255,144,64,0.12)','출고완료(취합대기)t':'var(--orange)','미출고(실물X)':'rgba(255,90,110,0.12)','미출고(실물X)t':'var(--red)','출고보류(예약)':'var(--bg4)','출고보류(예약)t':'var(--text3)'};
let _all=[],_curStatus='all',_query='';

window.addEventListener('message',e=>{if(e.data&&e.data.type==='THEME')document.body.classList.toggle('light',e.data.mode==='light');});
if(sessionStorage.getItem('_theme')==='light')document.body.classList.add('light');

async function loadData(){
  document.getElementById('loadState').style.display='';
  document.getElementById('mainWrap').style.display='none';
  document.getElementById('refreshBtn').classList.add('spin');
  try{
    const res=await fetch(`${GAS}?action=getTaekbaeData`,{redirect:'follow'});
    const d=await res.json();
    if(d.ok&&d.records){_all=d.records; updateCounts(); render();}
    else{document.getElementById('emptyState').style.display='';document.getElementById('loadState').style.display='none';}
  }catch(e){document.getElementById('emptyState').style.display='';document.getElementById('loadState').style.display='none';}
  document.getElementById('refreshBtn').classList.remove('spin');
}
function setStatus(s){
  _curStatus=s;
  document.querySelectorAll('.s-tab').forEach(t=>{
    const match=t.dataset.status===s;
    t.classList.toggle('active',match);
    t.style.color=match?(t.style.getPropertyValue('--c')||'var(--cyan)'):'var(--text3)';
    t.style.borderBottomColor=match?(t.style.getPropertyValue('--c')||'var(--cyan)'):'transparent';
  });
  render();
}
function doSearch(){_query=document.getElementById('searchInput').value.trim().toLowerCase(); render();}
function updateCounts(){
  document.getElementById('cntAll').textContent=_all.length;
  document.getElementById('cnt출력요청').textContent=_all.filter(r=>r.상태==='출력요청').length;
  document.getElementById('cnt취합대기').textContent=_all.filter(r=>r.상태==='출고완료(취합대기)').length;
  document.getElementById('cnt취합완료').textContent=_all.filter(r=>r.상태==='출고완료(취합완료)').length;
  document.getElementById('cnt미출고').textContent=_all.filter(r=>r.상태==='미출고(실물X)').length;
  document.getElementById('cnt보류').textContent=_all.filter(r=>r.상태==='출고보류(예약)').length;
}
function getFiltered(){
  let l=_curStatus==='all'?[..._all]:_all.filter(r=>r.상태===_curStatus);
  if(_query) l=l.filter(r=>[r.고객명,r.제품명,r.주문번호,r.연락처].join(' ').toLowerCase().includes(_query));
  return l.sort((a,b)=>(b.요청일||'').localeCompare(a.요청일||''));
}
function statusBadge(s){
  const bg=STATUS_COLOR[s]||'var(--bg4)', c=STATUS_COLOR[s+'t']||'var(--text3)';
  return `<span class="badge" style="background:${bg};color:${c};border:1px solid ${c}33;">${s}</span>`;
}
function render(){
  const list=getFiltered();
  document.getElementById('phCount').textContent=`${list.length}건`;
  document.getElementById('loadState').style.display='none';
  if(!list.length){document.getElementById('mainWrap').style.display='none';document.getElementById('emptyState').style.display='';return;}
  document.getElementById('emptyState').style.display='none';
  document.getElementById('mainWrap').style.display='';
  const stOpts=s=>STATUS_OPTS.map(o=>`<option value="${o}"${s===o?' selected':''}>${o}</option>`).join('');
  document.getElementById('recTbody').innerHTML=list.map(r=>`
    <tr onclick="openNotion('${r.url}','${r.id}')">
      <td style="font-family:var(--font-en);white-space:nowrap;">${r.요청일||'-'}</td>
      <td style="font-weight:500;color:var(--text);">${r.고객명||'-'}</td>
      <td style="max-width:160px;word-break:keep-all;">${r.제품명||'-'}</td>
      <td>${r.택배사||'-'}</td>
      <td onclick="event.stopPropagation()">
        <select class="status-sel" onchange="updateStatus('${r.id}',this)">${stOpts(r.상태)}</select>
      </td>
      <td onclick="event.stopPropagation()">
        <input class="waybill-input" type="text" value="${r.송장번호||''}" placeholder="운송장 입력"
          onblur="updateWaybill('${r.id}',this.value)">
      </td>
      <td style="font-family:var(--font-en);">${r.연락처||'-'}</td>
      <td style="max-width:180px;font-size:10px;color:var(--text3);">${r.주소||'-'}</td>
    </tr>`).join('');
}
function openNotion(url,id){if(!url&&id)url=`https://notion.so/${id.replace(/-/g,'')}`; if(url)window.open(url,'_blank');}
async function updateStatus(pageId,sel){
  sel.disabled=true;
  const rec=_all.find(r=>r.id===pageId); if(rec)rec.상태=sel.value;
  try{const p=encodeURIComponent(JSON.stringify({pageId,property:'상태',value:sel.value})); await fetch(`${GAS}?action=updateTaekbaeItem&data=${p}`,{redirect:'follow'});}catch(e){}
  sel.disabled=false; updateCounts(); render();
}
async function updateWaybill(pageId,val){
  try{const p=encodeURIComponent(JSON.stringify({pageId,property:'송장번호',value:val,type:'text'})); await fetch(`${GAS}?action=updateTaekbaeItem&data=${p}`,{redirect:'follow'});}catch(e){}
}
loadData();
</script>
</body>
</html>
