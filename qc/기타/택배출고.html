<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>택배출고</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080f1e;--bg2:#0d1830;--bg3:#111e35;--bg4:#162240;
  --border:rgba(0,200,255,0.10);--border2:rgba(0,200,255,0.20);
  --cyan:#00c8ff;--cyan-dim:rgba(0,200,255,0.08);
  --gold:#f0c060;--green:#00e5a0;--red:#ff5a6e;--orange:#ff9040;--purple:#a080ff;--pink:#ff80c0;
  --text:#e8f0f8;--text2:#a8c8e0;--text3:#6a8faa;
  --font-kr:'Noto Sans KR',sans-serif;--font-en:'Inter',sans-serif;
}
body.light{--bg:#f0f4fa;--bg2:#fff;--bg3:#e8f0fb;--bg4:#dce8f7;--border:rgba(26,78,180,0.12);--border2:rgba(26,78,180,0.25);--cyan:#1a6eb8;--cyan-dim:rgba(26,110,184,0.08);--gold:#b07800;--green:#007a50;--red:#c02020;--orange:#c05010;--purple:#5030b0;--pink:#c040a0;--text:#1a2e50;--text2:#2a4e7a;--text3:#3a6a9a;}
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font-kr);}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

#toolbar{padding:12px 18px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ph-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px;flex-shrink:0;}
.ph-title::before{content:'';display:inline-block;width:3px;height:15px;background:var(--cyan);border-radius:2px;}
.search-wrap{flex:1;min-width:140px;max-width:280px;display:flex;gap:4px;}
.search-input{flex:1;padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;font-family:var(--font-kr);outline:none;}
.search-input:focus{border-color:var(--border2);}
.search-btn{padding:5px 10px;background:var(--cyan-dim);border:1px solid var(--border2);border-radius:7px;color:var(--cyan);font-size:11px;font-weight:600;cursor:pointer;}
.ph-count{font-size:11px;color:var(--text3);}
.btn-new{padding:5px 12px;background:var(--green);color:#000;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font-kr);}
.btn-new:hover{opacity:0.85;}
.ph-refresh{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.ph-refresh:hover{border-color:var(--border2);color:var(--cyan);}
.ph-refresh.spin{animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

#tabBar{display:flex;gap:0;padding:10px 18px 0;border-bottom:1px solid var(--border);overflow-x:auto;align-items:center;}
.s-tab{padding:7px 12px;cursor:pointer;border-bottom:2px solid transparent;font-size:11px;font-weight:600;color:var(--text3);white-space:nowrap;transition:all 0.15s;margin-bottom:-1px;display:flex;align-items:center;gap:5px;}
.s-tab:hover{color:var(--text2);}
.s-tab.active{color:var(--tab-c,var(--cyan));border-bottom-color:var(--tab-c,var(--cyan));}
.tab-cnt{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:var(--bg4);}
.realtime-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse-dot 2s infinite;flex-shrink:0;}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:0.3;}}

.wrap{padding:12px 18px 40px;}
.rec-table{width:100%;border-collapse:collapse;}
.rec-table th{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;padding:5px 8px;border-bottom:1px solid var(--border);text-align:left;background:var(--bg3);}
.rec-table td{font-size:11px;color:var(--text2);padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:top;}
.rec-table tr:last-child td{border-bottom:none;}
.rec-table tr:hover td{background:var(--bg3);cursor:pointer;}
.status-sel{font-size:10px;font-weight:600;font-family:var(--font-kr);padding:2px 6px;border-radius:5px;border:1px solid var(--border);cursor:pointer;outline:none;background:var(--bg3);color:var(--text2);max-width:130px;}
.row-edit-btn{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text3);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.row-edit-btn:hover{border-color:var(--border2);color:var(--cyan);background:var(--cyan-dim);}
.edit-input{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text2);font-size:11px;font-family:var(--font-en);width:90px;padding:1px 2px;outline:none;}
.edit-input:focus{border-bottom-color:var(--cyan);}

/* 자동완성 */
.ac-wrap{position:relative;display:inline-block;}
.ac-input{width:100%;padding:7px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;font-family:var(--font-kr);outline:none;}
.ac-input:focus{border-color:var(--border2);}
.ac-dropdown{display:none;position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;z-index:200;max-height:180px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.4);margin-top:2px;}
.ac-dropdown.open{display:block;}
.ac-item{padding:8px 12px;font-size:12px;color:var(--text2);cursor:pointer;transition:background 0.1s;}
.ac-item:hover,.ac-item.selected{background:var(--bg3);color:var(--text);}
.ac-item mark{background:rgba(0,200,255,0.2);color:var(--cyan);border-radius:2px;}

/* 신규등록 모달 */
#newModal{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;}
#newModal.open{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:24px 28px;width:480px;max-height:85vh;overflow-y:auto;position:relative;}
.modal-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:16px;}
.modal-close{position:absolute;top:16px;right:18px;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.modal-field{display:flex;flex-direction:column;gap:4px;}
.modal-field.full{grid-column:1/-1;}
.field-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;}
.field-input,.field-select{width:100%;padding:7px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;font-family:var(--font-kr);outline:none;}
.field-input:focus,.field-select:focus{border-color:var(--border2);}
.modal-btn{width:100%;padding:10px;background:var(--cyan);color:#000;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-kr);}
.modal-btn:disabled{opacity:0.5;cursor:not-allowed;}

#loadState,#emptyState{text-align:center;padding:50px 18px;}
.ld-dots{display:inline-flex;gap:5px;margin-bottom:12px;}
.ld-dots span{width:7px;height:7px;border-radius:50%;background:var(--cyan);animation:ldot 1.2s infinite;}
.ld-dots span:nth-child(2){animation-delay:0.2s;} .ld-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes ldot{0%,80%,100%{opacity:0.2;transform:scale(0.8);}40%{opacity:1;transform:scale(1);}}

/* 페이지네이션 */
#pager{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px 0 4px;}
.pager-btn{padding:5px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font-en);}
.pager-btn:hover:not(:disabled){border-color:var(--border2);color:var(--cyan);}
.pager-btn:disabled{opacity:0.35;cursor:not-allowed;}
.pager-info{font-size:11px;color:var(--text3);font-family:var(--font-en);}

/* 모델명/출고품 조합 미리보기 */
.combo-preview{font-size:11px;color:var(--text3);padding:6px 10px;background:var(--bg3);border:1px dashed var(--border2);border-radius:7px;margin-top:2px;}
.combo-preview b{color:var(--cyan);font-weight:600;}

/* ── 현황보기 대시보드 ── */
#dashWrap{padding:16px 18px 40px;display:none;}
.dash-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.dash-toggle{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:3px;gap:2px;}
.dash-toggle button{padding:6px 14px;background:transparent;border:none;border-radius:7px;color:var(--text3);font-size:11.5px;font-weight:600;font-family:var(--font-kr);cursor:pointer;transition:all .15s;}
.dash-toggle button.active{background:var(--gold);color:#000;}
.dash-nav{display:flex;align-items:center;gap:8px;margin-left:auto;}
.dash-nav-btn{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
.dash-nav-btn:hover{border-color:var(--border2);color:var(--gold);}
.dash-period-label{font-size:12px;font-weight:700;color:var(--text);min-width:150px;text-align:center;font-family:var(--font-en);}

.dash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.dash-stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.dash-stat-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.4px;margin-bottom:5px;text-transform:uppercase;}
.dash-stat-value{font-size:20px;font-weight:700;font-family:var(--font-en);color:var(--text);}
.dash-stat-value.gold{color:var(--gold);}
.dash-stat-value.orange{color:var(--orange);}
.dash-stat-value.cyan{color:var(--cyan);}
.dash-stat-sub{font-size:10px;color:var(--text3);margin-top:2px;}

.dash-panel{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:14px;}
.dash-panel-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.dash-panel-title .legend{margin-left:auto;display:flex;gap:12px;font-size:10px;font-weight:500;color:var(--text3);}
.dash-legend-dot{display:inline-block;width:7px;height:7px;border-radius:2px;margin-right:4px;vertical-align:middle;}

.bar-row{display:grid;grid-template-columns:110px 1fr 46px;align-items:center;gap:10px;padding:6px 0;}
.bar-row .bar-name{font-size:11px;color:var(--text2);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{position:relative;height:16px;background:var(--bg4);border-radius:5px;overflow:hidden;display:flex;}
.bar-seg{height:100%;transition:width .3s;}
.bar-seg.jaeja{background:var(--cyan);}
.bar-seg.daesang{background:var(--orange);}
.bar-row .bar-total{font-size:11px;font-weight:700;color:var(--text);font-family:var(--font-en);text-align:right;}

.dash-table{width:100%;border-collapse:collapse;}
.dash-table th{font-size:9.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:6px 8px;border-bottom:1px solid var(--border);text-align:left;cursor:pointer;user-select:none;}
.dash-table th:hover{color:var(--gold);}
.dash-table th.num,.dash-table td.num{text-align:right;}
.dash-table td{font-size:11px;color:var(--text2);padding:6px 8px;border-bottom:1px solid var(--border);}
.dash-table tr:last-child td{border-bottom:none;}
.dash-table tr:hover td{background:var(--bg4);}
.dash-empty{text-align:center;padding:30px;color:var(--text3);font-size:12px;}
</style>
</head>
<body>
<div id="toolbar">
  <div class="ph-title">🚚 택배출고</div>
  <div class="search-wrap">
    <input class="search-input" id="searchInput" placeholder="고객명·제품·주문번호 검색..." onkeydown="if(event.key==='Enter')doSearch()">
    <button class="search-btn" onclick="doSearch()">검색</button>
  </div>
  <span class="ph-count" id="phCount">-</span>
  <button class="btn-new" onclick="openNew()">+ 신규등록</button>
  <button class="ph-refresh" id="refreshBtn" onclick="loadData()">↻</button>
</div>
<div id="tabBar">
  <div class="s-tab active" data-status="출력요청" onclick="setStatus('출력요청')" style="--tab-c:var(--pink);">
    <span class="realtime-dot"></span>출력요청<span class="tab-cnt" id="cnt출력요청">-</span>
  </div>
  <div class="s-tab" data-status="출고완료" onclick="setStatus('출고완료')" style="--tab-c:var(--green);">출고완료<span class="tab-cnt" id="cnt출고완료">-</span></div>
  <div class="s-tab" data-status="미출고(실물X)" onclick="setStatus('미출고(실물X)')" style="--tab-c:var(--red);">미출고<span class="tab-cnt" id="cnt미출고">-</span></div>
  <div class="s-tab" data-status="출고보류(예약)" onclick="setStatus('출고보류(예약)')" style="--tab-c:var(--text3);">보류<span class="tab-cnt" id="cnt보류">-</span></div>
  <div style="flex:1;"></div>
  <div class="s-tab" data-status="__dashboard" onclick="setStatus('__dashboard')" style="--tab-c:var(--gold);">📊 현황보기</div>
</div>
<div id="loadState"><div class="ld-dots"><span></span><span></span><span></span></div><div style="font-size:12px;color:var(--text3);">불러오는 중...</div></div>
<div id="emptyState" style="display:none;"><div style="font-size:36px;margin-bottom:12px;">📭</div><div style="font-size:13px;color:var(--text);">항목 없음</div></div>
<div class="wrap" id="mainWrap" style="display:none;">
  <div style="overflow-x:auto;">
    <table class="rec-table">
      <thead id="recThead"></thead>
      <tbody id="recTbody"></tbody>
    </table>
  </div>
  <div id="pager"></div>
</div>

<!-- 현황보기 대시보드 -->
<div id="dashWrap">
  <div class="dash-toolbar">
    <div class="dash-toggle">
      <button id="dashModeWeek" class="active" onclick="setDashMode('week')">주간</button>
      <button id="dashModeMonth" onclick="setDashMode('month')">월간</button>
    </div>
    <div class="dash-nav">
      <button class="dash-nav-btn" onclick="dashShift(-1)">‹</button>
      <div class="dash-period-label" id="dashPeriodLabel">-</div>
      <button class="dash-nav-btn" onclick="dashShift(1)">›</button>
      <button class="dash-nav-btn" title="최신으로" onclick="dashShift(0)">⟳</button>
    </div>
  </div>

  <div class="dash-stats">
    <div class="dash-stat-card">
      <div class="dash-stat-label">전체 출고</div>
      <div class="dash-stat-value gold" id="dashTotalCnt">-</div>
      <div class="dash-stat-sub" id="dashTotalSub">건</div>
    </div>
    <div class="dash-stat-card">
      <div class="dash-stat-label">🔶 대상 (제조사 과실)</div>
      <div class="dash-stat-value orange" id="dashDaesangCnt">-</div>
      <div class="dash-stat-sub" id="dashDaesangPct">-</div>
    </div>
    <div class="dash-stat-card">
      <div class="dash-stat-label">🔷 자재출고 대응</div>
      <div class="dash-stat-value cyan" id="dashJaejaCnt">-</div>
      <div class="dash-stat-sub" id="dashJaejaPct">-</div>
    </div>
  </div>

  <div class="dash-panel">
    <div class="dash-panel-title">모델별 출고 랭킹
      <div class="legend">
        <span><span class="dash-legend-dot" style="background:var(--orange);"></span>대상(과실)</span>
        <span><span class="dash-legend-dot" style="background:var(--cyan);"></span>자재출고</span>
      </div>
    </div>
    <div id="dashBarChart"></div>
  </div>

  <div class="dash-panel">
    <div class="dash-panel-title">상세 테이블</div>
    <div style="overflow-x:auto;">
      <table class="dash-table" id="dashTable"></table>
    </div>
  </div>
</div>

<!-- 신규등록 모달 -->
<div id="newModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeNew()">✕</button>
    <div class="modal-title" id="newModalTitle">🚚 택배출고 신규등록</div>
    <div style="font-size:10.5px;color:var(--text3);margin:-10px 0 14px;" id="newModalDateHint">📅 요청일은 등록 시각 기준 오늘 날짜로 자동 저장됩니다.</div>
    <div class="modal-grid">
      <div class="modal-field"><div class="field-label">고객명 *</div><input class="field-input" id="nw고객명" placeholder="홍길동"></div>
      <div class="modal-field"><div class="field-label">연락처</div><input class="field-input" id="nw연락처" placeholder="010-0000-0000"></div>
      <div class="modal-field full">
        <div class="field-label">요청자</div>
        <div class="ac-wrap" id="acWrap">
          <input class="ac-input" id="nw요청자Input" placeholder="이름 입력 (3자 이상 자동완성)" autocomplete="off"
            oninput="acSearch(this.value)" onkeydown="acKeyDown(event)">
          <div class="ac-dropdown" id="acDrop"></div>
        </div>
        <input type="hidden" id="nw요청자Id">
      </div>
      <div class="modal-field full">
        <div class="field-label">모델명 <span style="text-transform:none;font-weight:400;">(선택 또는 신규 입력)</span></div>
        <input class="field-input" list="modelDatalist" id="nw모델명" placeholder="[꿈비] 휴대용 분유포트" oninput="updateComboPreview()">
        <datalist id="modelDatalist"></datalist>
      </div>
      <div class="modal-field full"><div class="field-label">출고품</div><input class="field-input" id="nw출고품" placeholder="뚜껑(체결불량)" oninput="updateComboPreview()"></div>
      <div class="modal-field full" style="margin-top:-6px;">
        <div class="combo-preview">출고정보 미리보기: <b id="comboPreviewText">-</b></div>
      </div>
      <div class="modal-field full"><div class="field-label">주소</div><input class="field-input" id="nw주소" placeholder="서울시 강남구..."></div>
      <div class="modal-field"><div class="field-label">주문번호</div><input class="field-input" id="nw주문번호" placeholder="2026051234567890"></div>
      <div class="modal-field"><div class="field-label">택배사</div>
        <select class="field-select" id="nw택배사">
          <option value="">선택</option><option value="CJ">CJ</option><option value="한진">한진</option>
        </select>
      </div>
    </div>
    <button class="modal-btn" id="newSaveBtn" onclick="saveNew()">등록</button>
  </div>
</div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbx0xkRz1H4eb79Me3R0ESDsvKYoIKoXcQTp2zuIkZPeDKy8_ZYVeXEF71rPK_0u_3M0LQ/exec';
const DATA_PATH  = '../qc_data.json';
const USERS_PATH = '../users.json';
const STATUS_OPTS=['출력요청','출고완료(취합대기)','출고완료(취합완료)','미출고(실물X)','출고보류(예약)'];
const PAGE_SIZE = 50;
let _static=[], _realtime=[], _curStatus='출력요청', _query='';
let _users=[], _acIdx=-1, _models=[], _page=1;

window.addEventListener('message',e=>{if(e.data&&e.data.type==='THEME')document.body.classList.toggle('light',e.data.mode==='light');});
if(sessionStorage.getItem('_theme')==='light')document.body.classList.add('light');

// ── 모델명 목록 로드 (신규등록 콤보박스 자동완성) ──
async function loadModels() {
  try {
    const res = await fetch(`${GAS}?action=getTaekbaeModels`, {redirect:'follow'});
    const d = await res.json();
    if (d.ok && d.models) {
      _models = d.models;

function acSearch(val) {
  document.getElementById('nw요청자Id').value = '';
  const drop = document.getElementById('acDrop');
  if (val.length < 3) { drop.classList.remove('open'); return; }
  const q = val.toLowerCase();
  const matches = _users.filter(u => u.name.toLowerCase().includes(q)).slice(0, 8);
  if (!matches.length) { drop.classList.remove('open'); return; }
  _acIdx = -1;
  drop.innerHTML = matches.map(u => {
    const esc = val.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const hi  = u.name.replace(new RegExp(esc,'gi'), m=>`<mark>${m}</mark>`);
    return `<div class="ac-item" data-id="${u.id}" data-name="${u.name.replace(/"/g,'&quot;')}" onmousedown="acSelect('${u.id}','${u.name.replace(/'/g,"\\'")}')">
      ${hi}</div>`;
  }).join('');
  drop.classList.add('open');
}
function acSelect(id, name) {
  document.getElementById('nw요청자Input').value = name;
  document.getElementById('nw요청자Id').value   = id;
  document.getElementById('acDrop').classList.remove('open');
}
function acKeyDown(e) {
  const drop = document.getElementById('acDrop');
  const items = drop.querySelectorAll('.ac-item');
  if (!drop.classList.contains('open') || !items.length) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); _acIdx=Math.min(_acIdx+1,items.length-1); items.forEach((el,i)=>el.classList.toggle('selected',i===_acIdx)); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); _acIdx=Math.max(_acIdx-1,0); items.forEach((el,i)=>el.classList.toggle('selected',i===_acIdx)); }
  else if (e.key === 'Enter' && _acIdx>=0) { e.preventDefault(); const s=items[_acIdx]; acSelect(s.dataset.id,s.dataset.name); }
  else if (e.key === 'Escape') { drop.classList.remove('open'); }
}
document.addEventListener('click',e=>{ const w=document.getElementById('acWrap'); if(w&&!w.contains(e.target))document.getElementById('acDrop').classList.remove('open'); });

function render(){
  const fullList=getFiltered().sort((a,b)=>(b.요청일||'').localeCompare(a.요청일||''));
  document.getElementById('phCount').textContent=`${fullList.length}건`;
  document.getElementById('loadState').style.display='none';
  if(!fullList.length){document.getElementById('mainWrap').style.display='none';document.getElementById('emptyState').style.display='';return;}
  document.getElementById('emptyState').style.display='none';
  document.getElementById('mainWrap').style.display='';

  // 페이지네이션 (50개씩) — 대용량 탭(출고완료 등)의 렉 방지
  const totalPages=Math.max(1,Math.ceil(fullList.length/PAGE_SIZE));
  if(_page>totalPages)_page=totalPages;
  const startIdx=(_page-1)*PAGE_SIZE;
  const list=fullList.slice(startIdx,startIdx+PAGE_SIZE);

  renderThead();
  const stOpts=s=>STATUS_OPTS.map(o=>`<option value="${o}"${s===o?' selected':''}>${o}</option>`).join('');
  const isRealtime=_curStatus==='출력요청';
  document.getElementById('recTbody').innerHTML=list.map(r=>isRealtime?renderRowRealtime(r,stOpts):renderRowStatic(r,stOpts)).join('');

  // 페이저 렌더
  const pager=document.getElementById('pager');
  if(fullList.length<=PAGE_SIZE){ pager.innerHTML=''; }
  else{
    pager.innerHTML=`
      <button class="pager-btn" ${_page<=1?'disabled':''} onclick="gotoPage(1)">≪ 처음</button>
      <button class="pager-btn" ${_page<=1?'disabled':''} onclick="gotoPage(_page-1)">‹ 이전</button>
      <span class="pager-info">${_page} / ${totalPages} 페이지 · ${fullList.length}건</span>
      <button class="pager-btn" ${_page>=totalPages?'disabled':''} onclick="gotoPage(_page+1)">다음 ›</button>
      <button class="pager-btn" ${_page>=totalPages?'disabled':''} onclick="gotoPage(${totalPages})">마지막 ≫</button>`;
  }
}

    Object.assign(rec, {
      고객명, 연락처, 모델명, 출고품, 주소, 주문번호,
      택배사: 택배사||null,
      요청자: 요청자Input || rec.요청자,
      수식내용조합: [모델명,출고품].filter(Boolean).join('_')
    });
    if (모델명 && !_models.includes(모델명)) {
      _models.push(모델명);
      document.getElementById('modelDatalist').innerHTML += `<option value="${모델명.replace(/"/g,'&quot;')}">`;
    }
    closeNew();
    render();
  } catch(e) {
    alert('수정 중 오류: '+e.message);
  }
  btn.disabled = false; btn.textContent = '등록';
}

// ══════════════════════════════════════════════════════════════
// 📊 현황보기 대시보드 — 출력일 기준 주간/월간 모델별 출고 랭킹
// ══════════════════════════════════════════════════════════════
let _dashMode='week', _dashOffset=0, _dashSort={key:'total',dir:'desc'};

function setDashMode(m){
  _dashMode=m; _dashOffset=0;
  document.getElementById('dashModeWeek').classList.toggle('active',m==='week');
  document.getElementById('dashModeMonth').classList.toggle('active',m==='month');
  renderDashboard();
}

// ISO 주차 계산 (YYYY-Www)
function isoWeekKey(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const target=new Date(d.valueOf());
  const dayNr=(d.getDay()+6)%7;
  target.setDate(target.getDate()-dayNr+3);
  const firstThursday=new Date(target.getFullYear(),0,4);
  const diff=(target-firstThursday)/86400000;
  const week=1+Math.round((diff-((firstThursday.getDay()+6)%7))/7);
  return `${target.getFullYear()}-W${String(week).padStart(2,'0')}`;
}
function monthKey(dateStr){ return dateStr.slice(0,7); }
function dashKeyOf(dateStr){ return _dashMode==='week'?isoWeekKey(dateStr):monthKey(dateStr); }

// 주차 키의 대표 시작일(월요일) 계산 — 정렬 및 이전/다음 이동용
function weekKeyStart(key){
  const [y,w]=key.split('-W').map((v,i)=>i===0?parseInt(v):parseInt(v));
  const simple=new Date(y,0,1+(w-1)*7);
  const dow=simple.getDay();
  const monday=new Date(simple);
  if(dow<=4) monday.setDate(simple.getDate()-dow+1); else monday.setDate(simple.getDate()+8-dow);
  return monday;
}
function dashKeySortVal(key){
  return _dashMode==='week' ? weekKeyStart(key).getTime() : new Date(key+'-01T00:00:00').getTime();
}
function dashKeyLabel(key){
  if(_dashMode==='month'){
    const [y,m]=key.split('-');
    return `${y}년 ${parseInt(m)}월`;
  }
  const start=weekKeyStart(key);
  const end=new Date(start); end.setDate(start.getDate()+6);
  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
  return `${key.replace('-W','년 ')}주차 (${fmt(start)}~${fmt(end)})`;
}

function renderDashboard(){
  const all=getCombined().filter(r=>r.출력일);
  if(!all.length){
    document.getElementById('dashPeriodLabel').textContent='데이터 없음';
    document.getElementById('dashBarChart').innerHTML='<div class="dash-empty">출력일이 기록된 데이터가 없습니다.</div>';
    document.getElementById('dashTable').innerHTML='';
    ['dashTotalCnt','dashDaesangCnt','dashJaejaCnt'].forEach(id=>document.getElementById(id).textContent='0');
    document.getElementById('dashTotalSub').textContent='건';
    document.getElementById('dashDaesangPct').textContent='-';
    document.getElementById('dashJaejaPct').textContent='-';
    return;
  }

  // 전체 데이터에 존재하는 기간 키 목록(오름차순)
  const keys=[...new Set(all.map(r=>dashKeyOf(r.출력일)))].sort((a,b)=>dashKeySortVal(a)-dashKeySortVal(b));
  let idx=keys.length-1+_dashOffset;
  idx=Math.max(0,Math.min(keys.length-1,idx));
  _dashOffset=idx-(keys.length-1); // clamp 반영
  const curKey=keys[idx];

  document.getElementById('dashPeriodLabel').textContent=dashKeyLabel(curKey);

  const periodRecs=all.filter(r=>dashKeyOf(r.출력일)===curKey);

  // 모델별 집계
  const map={};
  periodRecs.forEach(r=>{
    const model=r.모델명||'(모델명 미지정)';
    if(!map[model]) map[model]={model,total:0,daesang:0,jaeja:0};
    map[model].total++;
    if(r.구분==='대상') map[model].daesang++; else map[model].jaeja++;
  });
  let rows=Object.values(map);

  const totalCnt=periodRecs.length;
  const daesangCnt=rows.reduce((s,r)=>s+r.daesang,0);
  const jaejaCnt=rows.reduce((s,r)=>s+r.jaeja,0);
  document.getElementById('dashTotalCnt').textContent=totalCnt;
  document.getElementById('dashTotalSub').textContent=`모델 ${rows.length}종`;
  document.getElementById('dashDaesangCnt').textContent=daesangCnt;
  document.getElementById('dashDaesangPct').textContent=totalCnt?`${Math.round(daesangCnt/totalCnt*100)}%`:'-';
  document.getElementById('dashJaejaCnt').textContent=jaejaCnt;
  document.getElementById('dashJaejaPct').textContent=totalCnt?`${Math.round(jaejaCnt/totalCnt*100)}%`:'-';

  // ── 랭킹 바 차트 (총 건수 기준 상위 12개) ──
  const chartRows=[...rows].sort((a,b)=>b.total-a.total).slice(0,12);
  const maxTotal=Math.max(1,...chartRows.map(r=>r.total));
  document.getElementById('dashBarChart').innerHTML = chartRows.length ? chartRows.map(r=>{
    const jaejaW=(r.jaeja/maxTotal*100).toFixed(1);
    const daesangW=(r.daesang/maxTotal*100).toFixed(1);
    return `<div class="bar-row">
      <div class="bar-name" title="${r.model}">${r.model}</div>
      <div class="bar-track">
        <div class="bar-seg jaeja" style="width:${jaejaW}%"></div>
        <div class="bar-seg daesang" style="width:${daesangW}%"></div>
      </div>
      <div class="bar-total">${r.total}</div>
    </div>`;
  }).join('') : '<div class="dash-empty">해당 기간 데이터가 없습니다.</div>';

  // ── 정렬 가능한 상세 테이블 ──
  renderDashTable(rows);
}

function renderDashTable(rows){
  const {key,dir}=_dashSort;
  const sorted=[...rows].sort((a,b)=>{
    let av=a[key], bv=b[key];
    if(typeof av==='string') return dir==='asc'?av.localeCompare(bv):bv.localeCompare(av);
    return dir==='asc'?av-bv:bv-av;
  });
  const arrow=k=>_dashSort.key===k?(_dashSort.dir==='asc'?' ▲':' ▼'):'';
  const table=document.getElementById('dashTable');
  table.innerHTML=`
    <thead><tr>
      <th onclick="dashSortBy('model')">모델명${arrow('model')}</th>
      <th class="num" onclick="dashSortBy('total')">전체${arrow('total')}</th>
      <th class="num" onclick="dashSortBy('daesang')">🔶대상${arrow('daesang')}</th>
      <th class="num" onclick="dashSortBy('jaeja')">🔷자재출고${arrow('jaeja')}</th>
    </tr></thead>
    <tbody>${sorted.length?sorted.map(r=>`
      <tr>
        <td>${r.model}</td>
        <td class="num">${r.total}</td>
        <td class="num" style="color:var(--orange);">${r.daesang}</td>
        <td class="num" style="color:var(--cyan);">${r.jaeja}</td>
      </tr>`).join(''):'<tr><td colspan="4" class="dash-empty">데이터 없음</td></tr>'}</tbody>`;
}

function dashSortBy(key){
  if(_dashSort.key===key) _dashSort.dir=_dashSort.dir==='asc'?'desc':'asc';
  else _dashSort={key,dir:'desc'};
  renderDashboard();
}

function dashShift(delta){
  _dashOffset = delta===0 ? 0 : _dashOffset+delta;
  renderDashboard();
}

loadModels(); // 모델명 자동완성 목록 로드 (비동기)
loadData();
</script>
