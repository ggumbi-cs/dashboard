<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>반품입고 비용현황</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080f1e;--bg2:#0d1830;--bg3:#111e35;--bg4:#162240;
  --border:rgba(0,200,255,0.10);--border2:rgba(0,200,255,0.20);
  --cyan:#00c8ff;--cyan-dim:rgba(0,200,255,0.08);
  --gold:#f0c060;--green:#00e5a0;--red:#ff5a6e;--orange:#ff9040;--purple:#a080ff;
  --text:#e8f0f8;--text2:#a8c8e0;--text3:#6a8faa;
  --font-kr:'Noto Sans KR',sans-serif;--font-en:'Inter',sans-serif;
  --col-re:#ff5a6e; /* 재상품화 */
  --col-rm:#f0c060; /* 원자재화 */
}
body.light{
  --bg:#f0f4fa;--bg2:#fff;--bg3:#e8f0fb;--bg4:#dce8f7;
  --border:rgba(26,78,180,0.12);--border2:rgba(26,78,180,0.25);
  --cyan:#1a6eb8;--cyan-dim:rgba(26,110,184,0.08);
  --gold:#b07800;--green:#007a50;--red:#c02020;--orange:#c05010;--purple:#5030b0;
  --text:#1a2e50;--text2:#2a4e7a;--text3:#3a6a9a;
  --col-re:#c02020; --col-rm:#b07800;
}
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font-kr);}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── 헤더 ── */
#hd{padding:14px 20px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.hd-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px;flex-shrink:0;}
.hd-title::before{content:'';display:inline-block;width:3px;height:15px;background:var(--orange);border-radius:2px;}
.hd-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.period-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font-kr);transition:all 0.15s;}
.period-btn:hover{border-color:var(--border2);color:var(--text2);}
.period-btn.active{border-color:var(--cyan);background:var(--cyan-dim);color:var(--cyan);}
.pnav-btn{width:24px;height:24px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.pnav-btn:hover{border-color:var(--border2);color:var(--cyan);}
.ph-refresh{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.ph-refresh:hover{border-color:var(--border2);color:var(--cyan);}
.ph-refresh.spin{animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── 공통 섹션 ── */
.wrap{padding:14px 20px 40px;display:flex;flex-direction:column;gap:16px;}
.sec-hd{font-size:10px;font-weight:700;font-family:var(--font-en);color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.sec-hd::before{content:'';display:inline-block;width:3px;height:11px;border-radius:2px;}
.sec-hd.orange::before{background:var(--orange);}
.sec-hd.cyan::before{background:var(--cyan);}
.sec-hd.gold::before{background:var(--gold);}
.sec-hd.green::before{background:var(--green);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}

/* ── KPI ── */
#kpiRow{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi.total::before{background:var(--text3);}
.kpi.re::before{background:var(--col-re);}
.kpi.rm::before{background:var(--col-rm);}
.kpi.cnt::before{background:var(--green);}
.kpi-label{font-size:10px;color:var(--text3);margin-bottom:6px;}
.kpi-val{font-size:22px;font-weight:700;font-family:var(--font-en);line-height:1;}
.kpi-val.total{color:var(--text);}
.kpi-val.re{color:var(--col-re);}
.kpi-val.rm{color:var(--col-rm);}
.kpi-val.cnt{color:var(--green);}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:4px;}

/* ── 메인 2컬럼 ── */
#mainGrid{display:grid;grid-template-columns:3fr 2fr;gap:14px;}

/* 제품별 현황 리스트 */
.prod-list{display:flex;flex-direction:column;gap:7px;}
.prod-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);transition:border-color 0.15s;}
.prod-row:hover{border-color:var(--border2);}
.prod-rank{font-size:10px;font-weight:700;font-family:var(--font-en);color:var(--text3);width:18px;flex-shrink:0;text-align:right;}
.prod-name{font-size:11px;color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.prod-amt{font-size:11px;font-weight:700;font-family:var(--font-en);color:var(--text);flex-shrink:0;}
.prod-cnt{font-size:10px;color:var(--text3);flex-shrink:0;min-width:40px;text-align:right;}
.prod-bar-wrap{width:70px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;flex-shrink:0;}
.prod-bar-fill{height:100%;border-radius:2px;background:var(--orange);}
.prod-result-dots{display:flex;gap:3px;flex-shrink:0;}
.dot-re{width:7px;height:7px;border-radius:50%;background:var(--col-re);}
.dot-rm{width:7px;height:7px;border-radius:50%;background:var(--col-rm);}

/* 처리결과 분포 */
.dist-card{display:flex;flex-direction:column;gap:14px;}
.dist-total{text-align:center;padding:12px 0;}
.dist-total-amt{font-size:26px;font-weight:700;font-family:var(--font-en);color:var(--text);}
.dist-total-label{font-size:10px;color:var(--text3);margin-top:3px;}
.dist-bar{height:10px;border-radius:5px;overflow:hidden;display:flex;margin-bottom:14px;}
.dist-bar-re{background:var(--col-re);transition:width 0.4s;}
.dist-bar-rm{background:var(--col-rm);transition:width 0.4s;}
.dist-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1px solid var(--border);}
.dist-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.dist-label{font-size:11px;color:var(--text2);flex:1;}
.dist-amt{font-size:12px;font-weight:700;font-family:var(--font-en);color:var(--text);}
.dist-pct{font-size:10px;color:var(--text3);min-width:36px;text-align:right;}

/* ── 월별 추이 (컴팩트 SVG 차트) ── */
#trendSection{display:grid;grid-template-columns:3fr 2fr;gap:14px;align-items:start;}
.trend-chart-wrap{overflow-x:auto;}
.trend-svg{display:block;}
.trend-labels{display:flex;justify-content:space-between;padding:0 4px;margin-top:4px;}
.trend-lbl{font-size:9px;color:var(--text3);font-family:var(--font-en);}
.trend-legend{display:flex;flex-direction:column;gap:8px;padding:10px 0;}
.legend-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);}
.legend-dot{width:8px;height:8px;border-radius:50%;}

/* ── 최근 내역 테이블 ── */
.rec-table{width:100%;border-collapse:collapse;}
.rec-table th{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;padding:5px 8px;border-bottom:1px solid var(--border);text-align:left;background:var(--bg3);}
.rec-table td{font-size:11px;color:var(--text2);padding:7px 8px;border-bottom:1px solid var(--border);}
.rec-table tr:last-child td{border-bottom:none;}
.rec-table tr:hover td{background:var(--bg3);}
.badge-re{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:600;background:rgba(255,90,110,0.12);color:var(--col-re);border:1px solid rgba(255,90,110,0.2);}
.badge-rm{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:600;background:rgba(240,192,96,0.12);color:var(--col-rm);border:1px solid rgba(240,192,96,0.2);}

/* ── 로딩/빈 ── */
#loadState{text-align:center;padding:50px 20px;}
.ld-dots{display:inline-flex;gap:5px;margin-bottom:12px;}
.ld-dots span{width:7px;height:7px;border-radius:50%;background:var(--orange);animation:ldot 1.2s infinite;}
.ld-dots span:nth-child(2){animation-delay:0.2s;} .ld-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes ldot{0%,80%,100%{opacity:0.2;transform:scale(0.8);}40%{opacity:1;transform:scale(1);}}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeUp 0.3s ease both;}
</style>
</head>
<body>

<div id="hd">
  <div class="hd-title">↩️ 반품입고 비용현황</div>
  <div class="hd-right">
    <button class="period-btn" onclick="setPeriodType('weekly')">주간</button>
    <button class="period-btn active" onclick="setPeriodType('monthly')">월간</button>
    <button class="period-btn" onclick="setPeriodType('yearly')">연간</button>
    <div style="display:flex;align-items:center;gap:5px;margin-left:2px;">
      <button class="pnav-btn" onclick="movePeriod(-1)">◀</button>
      <span id="periodLabel" style="font-size:11px;font-weight:600;color:var(--text2);min-width:88px;text-align:center;">-</span>
      <button class="pnav-btn" onclick="movePeriod(1)">▶</button>
    </div>
    <button class="ph-refresh" id="refreshBtn" onclick="loadData()">↻</button>
  </div>
</div>

<div id="loadState">
  <div class="ld-dots"><span></span><span></span><span></span></div>
  <div style="font-size:12px;color:var(--text3);">데이터 불러오는 중...</div>
</div>

<div class="wrap" id="mainWrap" style="display:none;">

  <!-- KPI -->
  <div>
    <div class="sec-hd orange">Overview</div>
    <div id="kpiRow">
      <div class="kpi total"><div class="kpi-label">💰 총 처리금액</div><div class="kpi-val total" id="kTotal">-</div><div class="kpi-sub" id="kTotalSub">-</div></div>
      <div class="kpi re"><div class="kpi-label">🔴 재상품화</div><div class="kpi-val re" id="kRe">-</div><div class="kpi-sub" id="kReSub">-</div></div>
      <div class="kpi rm"><div class="kpi-label">🟡 원자재화</div><div class="kpi-val rm" id="kRm">-</div><div class="kpi-sub" id="kRmSub">건수 기준</div></div>
      <div class="kpi cnt"><div class="kpi-label">📋 처리건수 / 수량</div><div class="kpi-val cnt" id="kCnt">-</div><div class="kpi-sub" id="kCntSub">-</div></div>
    </div>
  </div>

  <!-- 제품별 + 분포 -->
  <div id="mainGrid">
    <div class="card">
      <div class="sec-hd orange">제품별 처리금액 현황</div>
      <div class="prod-list" id="prodList"></div>
    </div>
    <div class="card dist-card">
      <div class="sec-hd cyan">처리결과 분포</div>
      <div class="dist-total">
        <div class="dist-total-amt" id="distTotal">-</div>
        <div class="dist-total-label">총 처리금액</div>
      </div>
      <div class="dist-bar" id="distBar">
        <div class="dist-bar-re" id="distBarRe" style="width:50%"></div>
        <div class="dist-bar-rm" id="distBarRm" style="width:50%"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;" id="distRows"></div>
    </div>
  </div>

  <!-- 월별 추이 -->
  <div id="trendSection">
    <div class="card">
      <div class="sec-hd gold">월별 처리금액 추이</div>
      <div class="trend-chart-wrap">
        <svg class="trend-svg" id="trendSvg" width="100%" height="130" viewBox="0 0 600 130"></svg>
      </div>
      <div class="trend-labels" id="trendLabels"></div>
    </div>
    <div class="card">
      <div class="sec-hd gold">상위 처리월</div>
      <div style="display:flex;flex-direction:column;gap:6px;" id="topMonths"></div>
    </div>
  </div>

  <!-- 최근 내역 -->
  <div class="card">
    <div class="sec-hd green">최근 처리 내역 <span style="font-size:9px;font-weight:400;color:var(--text3);text-transform:none;letter-spacing:0;margin-left:4px;" id="recentCount"></span></div>
    <div style="overflow-x:auto;">
      <table class="rec-table">
        <thead>
          <tr>
            <th>처리일</th><th>제품명</th><th>처리결과</th>
            <th style="text-align:right;">수량</th>
            <th style="text-align:right;">처리금액</th>
            <th>비고</th>
          </tr>
        </thead>
        <tbody id="recTbody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const QC_GAS_URL = 'https://script.google.com/macros/s/AKfycbx0xkRz1H4eb79Me3R0ESDsvKYoIKoXcQTp2zuIkZPeDKy8_ZYVeXEF71rPK_0u_3M0LQ/exec';

let _all        = [];
let _records    = [];
let _periodType = 'monthly';
let _periodRef  = new Date();

// 테마
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'THEME')
    document.body.classList.toggle('light', e.data.mode === 'light');
});
if (sessionStorage.getItem('_theme') === 'light') document.body.classList.add('light');

// ── 기간 ──
function setPeriodType(type) {
  _periodType = type;
  _periodRef  = new Date();
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.period-btn[onclick*="${type}"]`).classList.add('active');
  applyFilter(); renderAll();
}
function movePeriod(dir) {
  const d = new Date(_periodRef);
  if (_periodType === 'weekly')  d.setDate(d.getDate() + dir * 7);
  if (_periodType === 'monthly') d.setMonth(d.getMonth() + dir);
  if (_periodType === 'yearly')  d.setFullYear(d.getFullYear() + dir);
  _periodRef = d; applyFilter(); renderAll();
}
function getPeriodLabel() {
  const d=_periodRef, y=d.getFullYear(), m=d.getMonth()+1;
  if (_periodType==='yearly')  return `${y}년`;
  if (_periodType==='monthly') return `${y}년 ${m}월`;
  const mon=new Date(d); mon.setDate(d.getDate()-d.getDay()+1);
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  return `${mon.getMonth()+1}.${String(mon.getDate()).padStart(2,'0')}~${sun.getMonth()+1}.${String(sun.getDate()).padStart(2,'0')}`;
}
function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function applyFilter() {
  document.getElementById('periodLabel').textContent = getPeriodLabel();
  const d=_periodRef, y=d.getFullYear(), m=d.getMonth()+1;
  if (_periodType==='yearly') {
    _records=_all.filter(r=>r.처리일&&parseInt(r.처리일.slice(0,4))===y);
  } else if (_periodType==='monthly') {
    _records=_all.filter(r=>r.처리일&&parseInt(r.처리일.slice(0,4))===y&&parseInt(r.처리일.slice(5,7))===m);
  } else {
    const mon=new Date(d); mon.setDate(d.getDate()-d.getDay()+1);
    const sun=new Date(mon); sun.setDate(mon.getDate()+6);
    const start=toISO(mon), end=toISO(sun);
    _records=_all.filter(r=>r.처리일&&r.처리일>=start&&r.처리일<=end);
  }
}

// ── 데이터 로드 (정적 JSON 우선, GAS 폴백) ──
async function loadData() {
  document.getElementById('loadState').style.display='';
  document.getElementById('mainWrap').style.display='none';
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spin');
  try {
    // ① 정적 JSON
    const res=await fetch('../qc_data.json');
    if (res.ok) {
      const json=await res.json();
      if (json.반품처리&&json.반품처리.records) {
        _all=json.반품처리.records;
        if (json.lastSynced)
          document.querySelector('.hd-title').title=`최근 동기화: ${new Date(json.lastSynced).toLocaleString('ko-KR')}`;
        applyFilter(); renderAll();
        btn.classList.remove('spin');
        return;
      }
    }
  } catch(e) {}
  try {
    // ② GAS 실시간 폴백
    const res=await fetch(`${QC_GAS_URL}?action=getReturnCostData`,{redirect:'follow'});
    const data=await res.json();
    if (data.ok&&data.records) { _all=data.records; applyFilter(); renderAll(); }
  } catch(e) {
    document.getElementById('loadState').innerHTML=
      '<div style="font-size:36px;margin-bottom:12px;">⚠️</div><div style="color:var(--text3);font-size:12px;">데이터 로드 실패. 동기화를 먼저 실행해 주세요.</div>';
  }
  btn.classList.remove('spin');
}

// ── 렌더 ──
function renderAll() {
  document.getElementById('loadState').style.display='none';
  document.getElementById('mainWrap').style.display='';
  renderKPI(); renderProdList(); renderDist(); renderTrend(); renderRecent();
}

function renderKPI() {
  const r=_records;
  const total=r.reduce((s,x)=>s+(x.처리금액||0),0);
  const re=r.filter(x=>x.처리결과==='재상품화');
  const rm=r.filter(x=>x.처리결과==='원자재화');
  const reAmt=re.reduce((s,x)=>s+(x.처리금액||0),0);
  const qty=r.reduce((s,x)=>s+(x.처리수량||0),0);
  document.getElementById('kTotal').textContent=won(total);
  document.getElementById('kTotalSub').textContent=`${r.length}건`;
  document.getElementById('kRe').textContent=won(reAmt);
  document.getElementById('kReSub').textContent=`${re.length}건`;
  document.getElementById('kRm').textContent=`${rm.length}건`;
  document.getElementById('kCnt').textContent=r.length;
  document.getElementById('kCntSub').textContent=`수량 ${qty}개`;
}

function renderProdList() {
  const byProd={};
  _records.forEach(r=>{
    if (!r.제품명) return;
    if (!byProd[r.제품명]) byProd[r.제품명]={amt:0,cnt:0,re:0,rm:0,qty:0};
    byProd[r.제품명].amt+=r.처리금액||0;
    byProd[r.제품명].cnt++;
    byProd[r.제품명].qty+=r.처리수량||0;
    if (r.처리결과==='재상품화') byProd[r.제품명].re++;
    else if (r.처리결과==='원자재화') byProd[r.제품명].rm++;
  });
  const sorted=Object.entries(byProd).sort((a,b)=>b[1].amt-a[1].amt);
  const maxAmt=sorted[0]?.[1].amt||1;
  document.getElementById('prodList').innerHTML=sorted.map(([name,v],i)=>`
    <div class="prod-row fade-in" style="animation-delay:${i*0.04}s">
      <div class="prod-rank">${i+1}</div>
      <div class="prod-name" style="white-space:normal;word-break:keep-all;" title="${name}">${stripBrand(name)}</div>
      <div class="prod-bar-wrap"><div class="prod-bar-fill" style="width:${(v.amt/maxAmt*100).toFixed(1)}%"></div></div>
      <div class="prod-amt">${won(v.amt)}</div>
      <div class="prod-cnt">${v.cnt}건</div>
      <div class="prod-result-dots">
        ${v.re>0?`<div class="dot-re" title="재상품화 ${v.re}건"></div>`:''}
        ${v.rm>0?`<div class="dot-rm" title="원자재화 ${v.rm}건"></div>`:''}
      </div>
    </div>`).join('')||'<div style="color:var(--text3);font-size:12px;">데이터 없음</div>';
}

function renderDist() {
  const total=_records.reduce((s,x)=>s+(x.처리금액||0),0);
  const reQty=_records.filter(x=>x.처리결과==='재상품화').reduce((s,x)=>s+(x.처리수량||0),0);
  const rmQty=_records.filter(x=>x.처리결과==='원자재화').reduce((s,x)=>s+(x.처리수량||0),0);
  const totQty=reQty+rmQty||1;
  const rePct=(reQty/totQty*100).toFixed(1);
  const rmPct=(rmQty/totQty*100).toFixed(1);
  document.getElementById('distTotal').textContent=won(total);
  document.getElementById('distBarRe').style.width=rePct+'%';
  document.getElementById('distBarRm').style.width=rmPct+'%';
  document.getElementById('distRows').innerHTML=`
    <div class="dist-row"><div class="dist-dot" style="background:var(--col-re)"></div><div class="dist-label">재상품화</div><div class="dist-amt">${reQty}개</div><div class="dist-pct">${rePct}%</div></div>
    <div class="dist-row"><div class="dist-dot" style="background:var(--col-rm)"></div><div class="dist-label">원자재화</div><div class="dist-amt">${rmQty}개</div><div class="dist-pct">${rmPct}%</div></div>
    <div style="margin-top:6px;font-size:10px;color:var(--text3);text-align:center;">수량 기준 비율</div>`;
}

function renderTrend() {
  const monthly={};
  _records.forEach(r=>{
    if (!r.처리일) return;
    const key=r.처리일.slice(0,7);
    if (!monthly[key]) monthly[key]={re:0,rm:0};
    if (r.처리결과==='재상품화') monthly[key].re+=r.처리금액||0;
    else monthly[key].rm+=r.처리금액||0;
  });
  const months=Object.keys(monthly).sort();
  if (!months.length) { document.getElementById('trendSvg').innerHTML=''; return; }
  const W=600,H=120,pad={l:4,r:4,t:14,b:20};
  const barW=Math.min(36,(W-pad.l-pad.r)/months.length-4);
  const gap=(W-pad.l-pad.r-barW*months.length)/(months.length+1);
  const maxAmt=Math.max(...months.map(m=>(monthly[m].re||0)+(monthly[m].rm||0)));
  const chartH=H-pad.t-pad.b;
  let bars='';
  months.forEach((m,i)=>{
    const x=pad.l+gap+i*(barW+gap);
    const tot=(monthly[m].re||0)+(monthly[m].rm||0);
    const hTot=maxAmt?(tot/maxAmt*chartH):0;
    const hRe=maxAmt?((monthly[m].re||0)/maxAmt*chartH):0;
    const y=pad.t+chartH;
    bars+=`<rect x="${x.toFixed(1)}" y="${(y-hTot).toFixed(1)}" width="${barW}" height="${Math.max(hRe,0).toFixed(1)}" fill="var(--col-re)" rx="2"/>`;
    bars+=`<rect x="${x.toFixed(1)}" y="${(y-hTot+hRe).toFixed(1)}" width="${barW}" height="${Math.max(hTot-hRe,0).toFixed(1)}" fill="var(--col-rm)" rx="2"/>`;
    if (tot===maxAmt) bars+=`<text x="${(x+barW/2).toFixed(1)}" y="${(pad.t+chartH-hTot-3).toFixed(1)}" text-anchor="middle" fill="var(--text2)" font-size="9" font-family="Inter">${wonShort(tot)}</text>`;
  });
  document.getElementById('trendSvg').innerHTML=bars;
  document.getElementById('trendLabels').innerHTML=months.map(m=>`<span class="trend-lbl">${m.slice(5)}</span>`).join('');
  const topM=[...months].sort((a,b)=>((monthly[b].re||0)+(monthly[b].rm||0))-((monthly[a].re||0)+(monthly[a].rm||0))).slice(0,4);
  document.getElementById('topMonths').innerHTML=topM.map((m,i)=>{
    const tot=(monthly[m].re||0)+(monthly[m].rm||0);
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg3);border-radius:7px;border:1px solid var(--border);">
      <span style="font-size:10px;font-weight:700;color:var(--text3);width:16px;">${i+1}</span>
      <span style="font-size:11px;color:var(--text2);flex:1;">${m}</span>
      <span style="font-size:11px;font-weight:600;font-family:var(--font-en);color:var(--orange);">${won(tot)}</span>
    </div>`;
  }).join('');
}

function renderRecent() {
  const sorted=[..._records].sort((a,b)=>(b.처리일||'').localeCompare(a.처리일||'')).slice(0,30);
  document.getElementById('recentCount').textContent=`최근 ${sorted.length}건 표시`;
  document.getElementById('recTbody').innerHTML=sorted.map(r=>`
    <tr>
      <td style="font-family:var(--font-en);white-space:nowrap;">${r.처리일||'-'}</td>
      <td style="word-break:keep-all;">${stripBrand(r.제품명||'-')}</td>
      <td>${r.처리결과==='재상품화'?'<span class="badge-re">재상품화</span>':'<span class="badge-rm">원자재화</span>'}</td>
      <td style="text-align:right;font-family:var(--font-en);">${r.처리수량||0}</td>
      <td style="text-align:right;font-family:var(--font-en);font-weight:600;">${won(r.처리금액||0)}</td>
      <td style="color:var(--text3);">${r.비고||''}</td>
    </tr>`).join('')||'<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:20px;">데이터 없음</td></tr>';
}

function won(n){ if(!n&&n!==0)return'-'; return '₩'+Math.round(n).toLocaleString('ko-KR'); }
function wonShort(n){ if(n>=1000000)return '₩'+(n/1000000).toFixed(1)+'M'; if(n>=1000)return '₩'+(n/1000).toFixed(0)+'K'; return '₩'+n; }
function stripBrand(name){ if(!name)return'-'; return name.replace(/\[.*?\]\s*/g,'').trim(); }

loadData();
</script>
</body>
</html>
