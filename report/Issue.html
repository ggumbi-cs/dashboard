<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Issue</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f0f2f5; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; font-size: 13px; color: #222; padding: 16px; }

.section-header { padding: 7px 14px; color: #fff; font-size: 13px; font-weight: 600; border-radius: 4px; margin-bottom: 10px; }
.sec-dark  { background: #1a2e50; }
.sec-green { background: #2a7a6f; }
.section-wrap { margin-bottom: 16px; }

.card { background: #fff; border-radius: 6px; padding: 12px 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.card-title { font-size: 11px; color: #888; margin-bottom: 8px; }

.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; }

/* 그리드 */

/* 환불 바차트 */
.bar-chart-wrap { position: relative; }
.bar-sum { font-size: 22px; font-weight: 700; color: #1a3a6e; position: absolute; top: -6px; right: 0; }
.bar-wrap { display: flex; align-items: flex-end; justify-content: center; gap: 32px; padding: 4px 0 0; border-bottom: 1px solid #eee; height: 150px; }
.bar-group { display: flex; flex-direction: column; align-items: center; gap: 2px; width: 9.8%; }
.bar-val { font-size: 8px; color: #e8834a; font-weight: 600; white-space: nowrap; }
.bar { border-radius: 3px 3px 0 0; width: 100%; }
.bar-labels-row { display: flex; justify-content: center; gap: 32px; margin-top: 4px; }
.bar-label { font-size: 8px; color: #888; text-align: center; word-break: keep-all; line-height: 1.2; width: 9.8%; }

/* 도넛 — 좌우 레이아웃 */
.donut-side-wrap { display: flex; align-items: center; gap: 10px; }
.donut-rel { position: relative; flex-shrink: 0; }
.dcenter { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 11px; font-weight: 700; text-align: center; line-height: 1.3; }
.dlegend-side { font-size: 10px; color: #555; line-height: 1.9; flex: 1; min-width: 0; }
.ldot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 3px; vertical-align: middle; }
.dval { font-weight: 600; }

/* 회수현황 라인 */
.x-labels { display: flex; justify-content: space-around; font-size: 9px; color: #888; margin-top: 2px; }

.issue-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.issue-table th { background: #1a2e50; color: #fff; padding: 6px 8px; text-align: left; font-weight: 500; }
.issue-table td { padding: 6px 8px; border-bottom: 1px solid #eee; color: #444; }

#loading { text-align: center; padding: 40px; color: #888; }
</style>
</head>
<body>
<div id="loading">데이터 로딩 중...</div>
<div id="content" style="display:none;"></div>

<script>
const params = new URLSearchParams(window.location.search);
const type   = params.get('type')   || 'monthly';
const period = params.get('period') || '26.05월';

function getSheetName() {
  if (type === 'monthly') return period;
  if (type === 'weekly') {
    const yy = period.slice(0,2), mm = period.slice(2,4);
    return '26.' + mm + '월';
  }
  return period;
}

const COLORS = ['#e8834a','#9b59b6','#5b9bd5','#74c476','#2a7a6f','#fd8d3c','#e74c3c','#f1c40f'];

const SHEET_DATA = {
  '26.05월': {
    환불: [
      { 구분2: '현금환불',           건수: 980, 금액: 72103761 },
      { 구분2: '실결제수단환불',     건수: 307, 금액: 24129808 },
      { 구분2: '개별환불-실결제수단', 건수: 111, 금액: 11857098 },
      { 구분2: '개별환불-현금',      건수: 15,  금액: 1047605  },
      { 구분2: '금액조정 현금환불',  건수: 28,  금액: 342125   },
    ],
    회수: [
      {일:'3/3',건수:398},{일:'3/4',건수:0},{일:'3/5',건수:490},
      {일:'3/6',건수:128},{일:'3/9',건수:41},{일:'3/10',건수:32},
      {일:'3/11',건수:9},{일:'3/12',건수:6},{일:'3/13',건수:19},
      {일:'3/16',건수:26},{일:'3/17',건수:53},{일:'3/18',건수:18},
      {일:'3/19',건수:18},{일:'3/20',건수:10},{일:'3/23',건수:13},
      {일:'3/24',건수:8},{일:'3/25',건수:6},{일:'3/27',건수:7},
      {일:'3/30',건수:6},{일:'3/31',건수:6},{일:'4/2',건수:3},
      {일:'4/6',건수:5},{일:'4/7',건수:2},{일:'4/9',건수:4},
      {일:'4/13',건수:1},{일:'4/14',건수:7},{일:'4/21',건수:5},
      {일:'4/23',건수:2},{일:'4/27',건수:4},{일:'4/29',건수:1},
    ],
    네이버: [
      { 구분2: '회수완료건',       건수: 1329 },
      { 구분2: '중복',             건수: 148  },
      { 구분2: '타옵션',           건수: 79   },
      { 구분2: '회수정보없음',     건수: 29   },
      { 구분2: '주문내역확인불가', 건수: 26   },
      { 구분2: '기타',             건수: 5    },
    ],
    자재수급: [
      { 진행상태:'결재대기', 제품구분:'[꿈비] 휴대용 분유포트',      건명:'하부커버 무상자재 지급 요청',       기안일:'2026-05-13', 기안승인:'',           예상일정:'미정', 문서제목:'[엄마감동] 휴대용 분유포트 하부커버 무상자재 지급 요청 건' },
      { 진행상태:'결재대기', 제품구분:'[꿈비] 휴대용 분유포트',      건명:'뚜껑 무상자재 지급 요청',           기안일:'2026-05-12', 기안승인:'',           예상일정:'미정', 문서제목:'[엄마감동] 휴대용 분유포트 뚜껑 무상자재 지급 요청 건' },
      { 진행상태:'결재대기', 제품구분:'[꿈비] 듀얼팬 아이스 쿨시트', 건명:'듀얼팬 아이스 쿨시트 케이블 발주', 기안일:'2026-05-11', 기안승인:'',           예상일정:'미정', 문서제목:'[엄마감동] 듀얼팬 쿨시트 CS처리용 케이블 발주 요청 건' },
      { 진행상태:'미입고',   제품구분:'[꿈비] 젖병살균세척기',       건명:'26.03월 젖병살균세척기 정기 발주', 기안일:'2026-03-30', 기안승인:'2026-05-07', 예상일정:'미정', 문서제목:'[엄마감동] 젖병살균세척기 03월 CS자재 발주 요청 건' },
      { 진행상태:'미입고',   제품구분:'[꿈비] 유모차 웜 라이너_그레이', 건명:'웜라이너 패드 발주',           기안일:'2026-01-27', 기안승인:'2026-01-28', 예상일정:'미정', 문서제목:'[엄마감동] 웜라이너 CS자재 발주 요청 건' },
    ]
  }
};

// 일별 데이터 → 주단위 집계
// 날짜 문자열 'M/D' → Date 객체 (연도는 현재 기준으로 추정)
function parseDate(str) {
  const [m, d] = str.split('/').map(Number);
  return new Date(2026, m - 1, d);
}
// 해당 주의 월요일 구하기
function getMonday(date) {
  const d = new Date(date);
  const day = d.getDay(); // 0=일,1=월...
  const diff = (day === 0) ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d;
}
function fmtMD(date) {
  return (date.getMonth()+1) + '/' + date.getDate();
}

function groupByWeek(rows) {
  const weeks = {};
  rows.forEach(r => {
    const d = parseDate(r.일);
    const mon = getMonday(d);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    const key = fmtMD(mon) + '~' + fmtMD(sun);
    if (!weeks[key]) weeks[key] = { label: key, 건수: 0 };
    weeks[key].건수 += r.건수;
  });
  return Object.values(weeks);
}

function makeDonut(data, valKey, total) {
  const circ = 2 * Math.PI * 34;
  let offset = 0, paths = '';
  data.forEach((d, i) => {
    const dash = circ * (d[valKey] / total);
    const gap  = circ - dash;
    paths += `<circle cx="45" cy="45" r="34" fill="none" stroke="${COLORS[i]}" stroke-width="16"
      stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}"
      stroke-dashoffset="${(-offset).toFixed(1)}"
      transform="rotate(-90 45 45)"/>`;
    offset += dash;
  });
  return paths;
}

function render(sheetKey) {
  const d = SHEET_DATA[sheetKey];
  if (!d) { document.getElementById('loading').textContent = '해당 시트 없음: ' + sheetKey; return; }

  // ── 환불현황 ──
  const totalAmt = d.환불.reduce((s, r) => s + r.금액, 0);
  const maxAmt   = Math.max(...d.환불.map(r => r.금액));
  const BAR_H = 110;
  const refundBars = d.환불.map((r, i) => {
    const h = Math.max(2, Math.round(r.금액 / maxAmt * BAR_H));
    return `<div class="bar-group">
      <div class="bar-val">₩${Math.round(r.금액/10000).toLocaleString()}만</div>
      <div class="bar" style="height:${h}px;background:${COLORS[i]};"></div>
    </div>`;
  }).join('');
  const refundLabels = d.환불.map(r =>
    `<div class="bar-label">${r.구분2}</div>`
  ).join('');

  // ── 환불비율 ──
  const totalCnt = d.환불.reduce((s, r) => s + r.건수, 0);
  const donut1 = makeDonut(d.환불, '건수', totalCnt);
  const legend1 = d.환불.map((r, i) => {
    const pct = (r.건수 / totalCnt * 100).toFixed(1);
    return `<div><span class="ldot" style="background:${COLORS[i]};"></span><span class="dval">${r.구분2}</span> ${r.건수.toLocaleString()} (${pct}%)</div>`;
  }).join('');

  // ── 회수현황 (주단위) ──
  const weekly = groupByWeek(d.회수);
  const wVals  = weekly.map(w => w.건수);
  const maxW   = Math.max(...wVals);
  const nW     = weekly.length;
  const svgW=400, svgH=150, pL=28, pR=8, pT=14, pB=16;
  const iW=svgW-pL-pR, iH=svgH-pT-pB;

  const wPts = weekly.map((w, i) => {
    const x = pL + (nW === 1 ? iW/2 : i/(nW-1)*iW);
    const y = pT + (1 - w.건수/maxW) * iH;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const polyPts = wPts + ` ${(pL+iW).toFixed(1)},${(pT+iH).toFixed(1)} ${pL},${(pT+iH).toFixed(1)}`;

  const ySteps = [0,0.5,1].map(p => ({
    val: Math.round(maxW*p),
    y: (pT+(1-p)*iH).toFixed(1)
  }));
  const yGrid = ySteps.map(s =>
    `<line x1="${pL}" y1="${s.y}" x2="${svgW-pR}" y2="${s.y}" stroke="#eee" stroke-width="1"/>
     <text x="${pL-3}" y="${parseFloat(s.y)+3}" text-anchor="end" font-size="7" fill="#aaa">${s.val}</text>`
  ).join('');

  // 최대값 포인트 강조
  const maxIdx = wVals.indexOf(maxW);
  const wDots = weekly.map((w, i) => {
    const x = pL + (nW === 1 ? iW/2 : i/(nW-1)*iW);
    const y = pT + (1 - w.건수/maxW) * iH;
    if (i !== maxIdx) return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.5" fill="#1a3a6e"/>`;
    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.5" fill="#1a3a6e"/>
            <text x="${x.toFixed(1)}" y="${(y-6).toFixed(1)}" text-anchor="middle" font-size="8" fill="#1a3a6e" font-weight="600">${w.건수}</text>`;
  }).join('');

  const xLabels = weekly.map(w => `<span style="font-size:8px;">${w.label}</span>`).join('');

  // ── 네이버폼현황 ──
  const totalNav = d.네이버.reduce((s, r) => s + r.건수, 0);
  const donut2 = makeDonut(d.네이버, '건수', totalNav);
  const legend2 = d.네이버.map((r, i) => {
    const pct = (r.건수 / totalNav * 100).toFixed(1);
    return `<div><span class="ldot" style="background:${COLORS[i]};"></span><span class="dval">${r.구분2}</span> ${r.건수.toLocaleString()} (${pct}%)</div>`;
  }).join('');

  // ── 자재수급 ──
  const statusColor = { '결재대기':'#e8834a', '미입고':'#5b9bd5', '입고완료':'#74c476' };
  const tableRows = d.자재수급.map(r =>
    `<tr>
      <td><span style="color:${statusColor[r.진행상태]||'#888'};font-weight:600;">${r.진행상태}</span></td>
      <td>${r.제품구분}</td>
      <td>${r.건명}</td>
      <td>${r.기안일}</td>
      <td>${r.기안승인||'-'}</td>
      <td>${r.예상일정}</td>
      <td style="font-size:10px;color:#666;">${r.문서제목}</td>
    </tr>`
  ).join('');

  document.getElementById('content').innerHTML = `
  <div class="section-wrap">
    <div class="section-header sec-dark">1. 낮잠이불 Issue</div>
    <div class="grid-4">

      <!-- 환불현황 -->
      <div class="card">
        <div class="card-title">환불현황</div>
        <div class="bar-chart-wrap">
          <div class="bar-sum">합계 ${Math.round(totalAmt/10000).toLocaleString()}만원</div>
          <div class="bar-wrap">${refundBars}</div>
          <div class="bar-labels-row">${refundLabels}</div>
        </div>
      </div>

      <!-- 환불비율 -->
      <div class="card">
        <div class="card-title">환불비율</div>
        <div class="donut-side-wrap">
          <div class="donut-rel" style="width:110px;height:110px;">
            <svg viewBox="0 0 90 90" style="width:110px;height:110px;">${donut1}<circle cx="45" cy="45" r="27" fill="#fff"/></svg>
            <div class="dcenter">${totalCnt.toLocaleString()}<br><span style="font-size:8px;color:#888;font-weight:400;">건</span></div>
          </div>
          <div class="dlegend-side">${legend1}</div>
        </div>
      </div>

      <!-- 회수현황 -->
      <div class="card">
        <div class="card-title">회수현황</div>
        <svg viewBox="0 0 ${svgW} ${svgH}" style="width:100%;height:${svgH}px;">
          ${yGrid}
          <polygon points="${polyPts}" fill="#b8c8e8" opacity="0.4"/>
          <polyline points="${wPts}" fill="none" stroke="#1a3a6e" stroke-width="1.5"/>
          ${wDots}
        </svg>
        <div class="x-labels">${xLabels}</div>
      </div>

      <!-- 네이버폼현황 -->
      <div class="card">
        <div class="card-title">네이버폼현황</div>
        <div class="donut-side-wrap">
          <div class="donut-rel" style="width:110px;height:110px;">
            <svg viewBox="0 0 90 90" style="width:110px;height:110px;">${donut2}<circle cx="45" cy="45" r="27" fill="#fff"/></svg>
            <div class="dcenter">${totalNav.toLocaleString()}<br><span style="font-size:8px;color:#888;font-weight:400;">건</span></div>
          </div>
          <div class="dlegend-side">${legend2}</div>
        </div>
      </div>

    </div>
  </div>

  <div class="section-wrap">
    <div class="section-header sec-green">2. 자재수급 Issue</div>
    <div class="card">
      <div class="card-title" style="margin-bottom:8px;">자재수급현황</div>
      <table class="issue-table">
        <thead>
          <tr>
            <th>진행상태</th><th>제품구분</th><th>건명</th>
            <th>기안일</th><th>기안승인</th><th>예상일정</th><th>문서제목</th>
          </tr>
        </thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
  </div>
  `;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

render(getSheetName());
</script>
</body>
</html>
