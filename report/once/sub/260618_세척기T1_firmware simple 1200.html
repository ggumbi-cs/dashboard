<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>펌웨어 요청 — 균등 1,200cc / 세척1+헹굼3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#0f2240; --sky:#3b82c4;
    --gold:#c9a84c;
    --teal:#0d9488;
    --orange:#ea580c;
    --n50:#f8fafc; --n100:#f1f5f9; --n200:#e2e8f0;
    --n500:#64748b; --n600:#475569; --n800:#1e293b;
    --c-heavy:#7c3aed; --c-std:#0d9488; --c-fast:#ea580c;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;font-size:13px;line-height:1.7;color:var(--n800);background:#f0f4f8;}
  .page-wrap{width:100%;background:white;box-shadow:0 4px 40px rgba(0,0,0,0.10);}

  /* COVER */
  .cover{background:linear-gradient(160deg,#0f2240,#1a3560 55%,#1e4a8a);color:white;padding:38px 64px 32px;position:relative;overflow:hidden;}
  .cover::before{content:'';position:absolute;top:-50px;right:-50px;width:260px;height:260px;border-radius:50%;background:rgba(59,130,196,0.12);pointer-events:none;}
  .cover-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,0.2);border:1px solid rgba(201,168,76,0.4);color:var(--gold);padding:3px 11px;border-radius:20px;font-size:11px;font-weight:500;margin-bottom:14px;letter-spacing:0.5px;}
  .cover-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:12px;}
  .cover-title{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:700;line-height:1.35;margin-bottom:5px;}
  .cover-subtitle{font-size:13px;color:rgba(255,255,255,0.65);margin-bottom:22px;font-weight:300;}
  .cover-meta{display:flex;gap:36px;border-top:1px solid rgba(255,255,255,0.18);padding-top:18px;font-size:12px;color:rgba(255,255,255,0.6);}
  .cover-meta strong{display:block;color:white;font-size:12.5px;margin-bottom:1px;}

  /* LANG BAR */
  .lang-bar{position:fixed;top:16px;right:20px;z-index:9999;display:flex;gap:6px;align-items:center;background:rgba(15,34,64,0.88);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.14);border-radius:30px;padding:5px 8px;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
  .lang-btn{padding:5px 14px;border-radius:20px;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;color:rgba(255,255,255,0.55);background:transparent;letter-spacing:0.3px;transition:all 0.18s;white-space:nowrap;}
  .lang-btn:hover{color:white;background:rgba(255,255,255,0.1);}
  .lang-btn.active{color:var(--navy);background:white;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
  .lang-sep{color:rgba(255,255,255,0.2);font-size:11px;user-select:none;}

  /* BODY */
  .body-wrap{padding:36px 64px 52px;}

  /* SAMPLE BLOCK */
  .sample-block{border:1.5px solid var(--n200);border-radius:12px;overflow:hidden;}
  .sample-header{display:grid;grid-template-columns:100px 1fr;background:var(--navy);color:white;}
  .sh-num{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 10px;border-right:1px solid rgba(255,255,255,0.12);background:rgba(0,0,0,0.18);}
  .sn-label{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.4);text-transform:uppercase;}
  .sn-num{font-family:'Noto Serif KR',serif;font-size:28px;font-weight:700;line-height:1;color:white;}
  .sn-comp{margin-top:5px;display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;background:#1e3a8a;color:#93c5fd;}
  .sh-info{padding:14px 20px;display:flex;flex-direction:column;justify-content:center;gap:4px;}
  .sh-title{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:700;color:white;}
  .sh-vol{font-size:11px;color:var(--gold);font-weight:600;margin-top:2px;font-family:monospace;}

  /* TABLE */
  .sample-table{width:100%;border-collapse:collapse;font-size:13px;}
  .sample-table thead tr.grp th{padding:8px 12px;text-align:center;font-size:11.5px;font-weight:700;white-space:nowrap;border-right:1px solid rgba(255,255,255,0.15);}
  .sample-table thead tr.grp th:last-child{border-right:none;}
  .sample-table thead tr.sub th{padding:6px 12px;text-align:center;font-size:11px;font-weight:600;white-space:nowrap;border-right:1px solid rgba(255,255,255,0.10);color:rgba(255,255,255,0.85);}
  .sample-table thead tr.sub th:last-child{border-right:none;}
  .th-course{background:#1a2540;color:white;width:80px;}
  .th-wash{background:#1e40af;color:white;}
  .th-rinse{background:#0f766e;color:white;}
  .th-total{background:#92400e;color:white;}
  .sample-table tbody tr{border-bottom:1px solid var(--n200);}
  .sample-table tbody tr:last-child{border-bottom:none;}
  .sample-table tbody tr:nth-child(even){background:#f9fafb;}
  .sample-table tbody td{padding:11px 12px;text-align:center;vertical-align:middle;white-space:nowrap;}
  td.course-cell{border-left:4px solid transparent;padding-left:14px;}
  tr.row-heavy td.course-cell{border-left-color:var(--c-heavy);}
  tr.row-std   td.course-cell{border-left-color:var(--c-std);}
  tr.row-fast  td.course-cell{border-left-color:var(--c-fast);}
  .course-tag{display:inline-block;padding:3px 12px;border-radius:6px;font-size:12.5px;font-weight:700;white-space:nowrap;}
  .course-tag.heavy{background:#ede9fe;color:var(--c-heavy);}
  .course-tag.std  {background:#ccfbf1;color:var(--c-std);}
  .course-tag.fast {background:#ffedd5;color:var(--c-fast);}
  .cc{font-family:monospace;font-size:13px;font-weight:700;color:var(--n800);}
  .mm{font-family:monospace;font-size:13px;font-weight:700;}
  .mm.heavy{color:var(--c-heavy);} .mm.std{color:var(--c-std);} .mm.fast{color:var(--c-fast);}
  .total-cc{font-family:monospace;font-size:13px;font-weight:700;color:#92400e;}
  .total-mm{font-family:monospace;font-size:13px;font-weight:700;color:#5b21b6;}

  /* FOOTER */
  .doc-footer{background:var(--n100);border-top:1px solid var(--n200);padding:14px 64px;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--n600);}
  .doc-footer strong{color:var(--n800);}
</style>
</head>
<body>

<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
  <span class="lang-sep">|</span>
  <button class="lang-btn" onclick="setLang('en')">English</button>
  <span class="lang-sep">|</span>
  <button class="lang-btn" onclick="setLang('zh')">中文</button>
</div>

<div class="page-wrap">

<div class="cover">
  <div class="cover-badge">📋 <span id="cv-badge"></span></div>
  <div class="cover-label">GGUMBI CS LAB — FIRMWARE SAMPLE REQUEST</div>
  <div class="cover-title" id="cv-title"></div>
  <div class="cover-subtitle" id="cv-sub"></div>
  <div class="cover-meta">
    <div><strong id="cv-lbl-date"></strong><span id="cv-date"></span></div>
    <div><strong id="cv-lbl-req"></strong>심우승 SQ</div>
    <div><strong id="cv-lbl-prod"></strong><span id="cv-prod"></span></div>
  </div>
</div>

<div class="body-wrap">

  <div class="sample-block">
    <div class="sample-header">
      <div class="sh-num">
        <div class="sn-label">SAMPLE</div>
        <div class="sn-num">01</div>
        <div class="sn-comp" id="sh-comp"></div>
      </div>
      <div class="sh-info">
        <div class="sh-title" id="sh-title"></div>
        <div class="sh-vol" id="sh-vol"></div>
      </div>
    </div>

    <table class="sample-table">
      <thead>
        <tr class="grp">
          <th rowspan="2" class="th-course" id="th-course"></th>
          <th colspan="2" class="th-wash" id="th-wash"></th>
          <th colspan="2" class="th-rinse" id="th-r1"></th>
          <th colspan="2" class="th-rinse" id="th-r2"></th>
          <th colspan="2" class="th-rinse" id="th-r3"></th>
          <th colspan="2" class="th-total" id="th-total"></th>
        </tr>
        <tr class="sub">
          <th class="th-wash" id="sub-vol1"></th><th class="th-wash" id="sub-time1"></th>
          <th class="th-rinse" id="sub-vol2"></th><th class="th-rinse" id="sub-time2"></th>
          <th class="th-rinse" id="sub-vol3"></th><th class="th-rinse" id="sub-time3"></th>
          <th class="th-rinse" id="sub-vol4"></th><th class="th-rinse" id="sub-time4"></th>
          <th class="th-total" id="sub-vol-t"></th><th class="th-total" id="sub-time-t"></th>
        </tr>
      </thead>
      <tbody>
        <!-- 강력 -->
        <tr class="row-heavy">
          <td class="course-cell"><span class="course-tag heavy" id="tag-heavy"></span></td>
          <td><span class="cc">1,200</span></td><td><span class="mm heavy" id="h-w"></span></td>
          <td><span class="cc">1,200</span></td><td><span class="mm heavy" id="h-r1"></span></td>
          <td><span class="cc">1,200</span></td><td><span class="mm heavy" id="h-r2"></span></td>
          <td><span class="cc">1,200</span></td><td><span class="mm heavy" id="h-r3"></span></td>
          <td><span class="total-cc">4,800</span></td><td><span class="total-mm" id="h-tot"></span></td>
        </tr>
        <!-- 표준 -->
        <tr class="row-std">
          <td class="course-cell"><span class="course-tag std" id="tag-std"></span></td>
          <td><span class="cc">1,200</span></td><td><span class="mm std" id="s-w"></span></td>
          <td><span class="cc">1,200</span></td><td><span class="mm std" id="s-r1"></span></td>
          <td><span class="cc">1,200</span></td><td><span class="mm std" id="s-r2"></span></td>
          <td><span class="cc">1,200</span></td><td><span class="mm std" id="s-r3"></span></td>
          <td><span class="total-cc">4,800</span></td><td><span class="total-mm" id="s-tot"></span></td>
        </tr>
        <!-- 급속 -->
        <tr class="row-fast">
          <td class="course-cell"><span class="course-tag fast" id="tag-fast"></span></td>
          <td><span class="cc">1,200</span></td><td><span class="mm fast" id="f-w"></span></td>
          <td><span class="cc">1,200</span></td><td><span class="mm fast" id="f-r1"></span></td>
          <td><span class="cc">1,200</span></td><td><span class="mm fast" id="f-r2"></span></td>
          <td><span class="cc">1,200</span></td><td><span class="mm fast" id="f-r3"></span></td>
          <td><span class="total-cc">4,800</span></td><td><span class="total-mm" id="f-tot"></span></td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<div class="doc-footer">
  <div><strong>꿈비(Ggumbi)</strong> &nbsp;|&nbsp; 엄마감동팀 CS Lab</div>
  <div id="footer-mid"></div>
  <div style="color:#9ca3af;font-size:10px;">FIRMWARE REQUEST — INTERNAL USE ONLY</div>
</div>

</div>

<script>
/* ── 시간 설계 근거
   기존 1+헹굼3 (샘플04) 참조:
     강력: 55+10+9+9 = 83분
     표준: 28+8+7+6  = 49분
     급속: 13+6+5+4  = 28분

   이번 1200cc 균등 / 헹굼 3회:
   헹굼이 기존 3회와 동일 구조이므로 시간도 비슷하게 유지.
   물량이 1,200cc로 늘어난 만큼 각 공정에 1~2분씩 소폭 추가.
     강력: 57+11+9+9  = 86분  (기존 83분 +3)
     표준: 29+9+7+7   = 52분  (기존 49분 +3)
     급속: 14+7+5+4   = 30분  (기존 28분 +2)
*/

const T = {
  ko: {
    badge:'개발사 펌웨어 요청',
    cv_title:'펌웨어 수정 요청\n균등 1,200cc / 세척1+헹굼3',
    cv_sub:'단일 샘플 · 전 공정 1,200cc 균등 · 강력·표준·급속 3코스',
    lbl_date:'작성일', date:'2026년 06월 08일',
    lbl_req:'요청자',
    lbl_prod:'대상 제품', prod:'꿈비 NEW 젖병세척기 올 스테인리스',
    comp:'1+헹굼3',
    sh_title:'균등 1,200cc형',
    sh_vol:'전 공정 1,200cc 균등 · 합계 4,800cc',
    th_course:'코스',
    th_wash:'세척 (1회차)', th_r1:'헹굼 ① (2회차)', th_r2:'헹굼 ② (3회차)', th_r3:'헹굼 ③ (4회차)',
    th_total:'합계', th_vol:'물량(cc)', th_time:'시간(분)',
    heavy:'강력', std:'표준', fast:'급속',
    h_w:'57분', h_r1:'11분', h_r2:'9분', h_r3:'9분', h_tot:'86분',
    s_w:'29분', s_r1:'9분',  s_r2:'7분', s_r3:'7분', s_tot:'52분',
    f_w:'14분', f_r1:'7분',  f_r2:'5분', f_r3:'4분', f_tot:'30분',
    footer:'요청자 : 심우승 SQ  |  작성일 : 2026년 06월 08일',
  },
  en: {
    badge:'Manufacturer Firmware Request',
    cv_title:'Firmware Modification Request\nEqual 1,200cc / Wash×1 + Rinse×3',
    cv_sub:'Single Sample · 1,200cc per step · Heavy · Standard · Quick',
    lbl_date:'Date', date:'June 08, 2026',
    lbl_req:'Requester',
    lbl_prod:'Product', prod:'Ggumbi NEW Baby Bottle Washer (All-Stainless)',
    comp:'1+Rinse×3',
    sh_title:'Equal 1,200cc Type',
    sh_vol:'All steps 1,200cc equal · Total 4,800cc',
    th_course:'Course',
    th_wash:'Wash (1st)', th_r1:'Rinse ① (2nd)', th_r2:'Rinse ② (3rd)', th_r3:'Rinse ③ (4th)',
    th_total:'Total', th_vol:'Volume(cc)', th_time:'Time(min)',
    heavy:'Heavy', std:'Standard', fast:'Quick',
    h_w:'57 min', h_r1:'11 min', h_r2:'9 min', h_r3:'9 min', h_tot:'86 min',
    s_w:'29 min', s_r1:'9 min',  s_r2:'7 min', s_r3:'7 min', s_tot:'52 min',
    f_w:'14 min', f_r1:'7 min',  f_r2:'5 min', f_r3:'4 min', f_tot:'30 min',
    footer:'Requester : Shim Woo-seung SQ  |  Date : June 08, 2026',
  },
  zh: {
    badge:'厂商固件修改请求',
    cv_title:'固件修改请求\n均等1,200cc / 清洗1次+漂洗3次',
    cv_sub:'单一样品 · 全工序均等1,200cc · 强力·标准·快速',
    lbl_date:'日期', date:'2026年06月08日',
    lbl_req:'申请人',
    lbl_prod:'产品名称', prod:'Ggumbi 新款婴儿奶瓶消毒器（全不锈钢）',
    comp:'1+漂洗×3',
    sh_title:'均等1,200cc型',
    sh_vol:'全工序均等1,200cc · 合计4,800cc',
    th_course:'程序',
    th_wash:'清洗（第1次）', th_r1:'漂洗①（第2次）', th_r2:'漂洗②（第3次）', th_r3:'漂洗③（第4次）',
    th_total:'合计', th_vol:'水量(cc)', th_time:'时间(分)',
    heavy:'强力', std:'标准', fast:'快速',
    h_w:'57分', h_r1:'11分', h_r2:'9分', h_r3:'9分', h_tot:'86分',
    s_w:'29分', s_r1:'9分',  s_r2:'7分', s_r3:'7分', s_tot:'52分',
    f_w:'14分', f_r1:'7分',  f_r2:'5分', f_r3:'4分', f_tot:'30分',
    footer:'申请人 : 심우승 SQ  |  日期 : 2026年06月08日',
  }
};

function setLang(lang) {
  const t = T[lang];
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
  document.body.style.fontFamily = lang==='zh' ? "'Noto Sans SC','Noto Sans KR',sans-serif" : "'Noto Sans KR',sans-serif";

  // 커버
  document.getElementById('cv-badge').textContent = t.badge;
  const parts = t.cv_title.split('\n');
  document.getElementById('cv-title').innerHTML = parts[0]+'<br><span style="font-size:17px;color:rgba(255,255,255,0.8);">'+parts[1]+'</span>';
  document.getElementById('cv-sub').textContent   = t.cv_sub;
  document.getElementById('cv-lbl-date').textContent = t.lbl_date;
  document.getElementById('cv-date').textContent     = t.date;
  document.getElementById('cv-lbl-req').textContent  = t.lbl_req;
  document.getElementById('cv-lbl-prod').textContent = t.lbl_prod;
  document.getElementById('cv-prod').textContent     = t.prod;

  // 샘플 헤더
  document.getElementById('sh-comp').textContent  = t.comp;
  document.getElementById('sh-title').textContent = t.sh_title;
  document.getElementById('sh-vol').textContent   = t.sh_vol;

  // 테이블 헤더
  document.getElementById('th-course').textContent = t.th_course;
  document.getElementById('th-wash').textContent   = t.th_wash;
  document.getElementById('th-r1').textContent     = t.th_r1;
  document.getElementById('th-r2').textContent     = t.th_r2;
  document.getElementById('th-r3').textContent     = t.th_r3;
  document.getElementById('th-total').textContent  = t.th_total;
  ['1','2','3','4'].forEach(n => {
    document.getElementById('sub-vol'+n).textContent  = t.th_vol;
    document.getElementById('sub-time'+n).textContent = t.th_time;
  });
  document.getElementById('sub-vol-t').textContent  = t.th_vol;
  document.getElementById('sub-time-t').textContent = t.th_time;

  // 코스 태그
  document.getElementById('tag-heavy').textContent = t.heavy;
  document.getElementById('tag-std').textContent   = t.std;
  document.getElementById('tag-fast').textContent  = t.fast;

  // 시간값
  ['h','s','f'].forEach(p => {
    ['w','r1','r2','r3','tot'].forEach(k => {
      document.getElementById(p+'-'+k).textContent = t[p+'_'+k];
    });
  });

  // 푸터
  document.getElementById('footer-mid').textContent = t.footer;
}

setLang('ko');
</script>
</body>
</html>
