<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AS Tool</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    font-family: Arial;
    box-sizing: border-box;
}

body {
    display: flex;
    flex-direction: column;
}

.toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-bottom: 1px solid #ddd;
    background: #fff;
    box-sizing: border-box;
}

.toolbar-title {
    font-size: 12px;
    font-weight: bold;
}

.scale-btn {
    padding: 4px 8px;
    border: 1px solid #bbb;
    background: #f7f7f7;
    cursor: pointer;
    font-size: 12px;
}

.scale-btn.active {
    background: #1f4e79;
    border-color: #1f4e79;
    color: #fff;
}

#pageContent {
    flex: 1;
    padding: 3px 10px 10px 10px;
    box-sizing: border-box;
    transform-origin: top left;
}

h2 {
    margin: 0 0 5px 0;
}

#resultBox {
    margin-top:10px;
    padding:10px;
    border:1px solid #ccc;
    height:200px;
    overflow:auto;
}
</style>
</head>

<body>
<div class="toolbar">
    <span class="toolbar-title">창크기조정</span>
    <button type="button" class="scale-btn active" data-scale="1">100%</button>
    <button type="button" class="scale-btn" data-scale="0.9">90%</button>
    <button type="button" class="scale-btn" data-scale="0.8">80%</button>
    <button type="button" class="scale-btn" data-scale="0.7">70%</button>
</div>

<div id="pageContent">

<h2>AS 기술 진단 어시스턴트</h2>

<div>
    ① 제품 모델 선택
    <select id="modelSelect">
        <option value="">선택</option>
    </select>

    ② 불량 증상 선택
    <select id="symptomSelect">
        <option value="">선택</option>
    </select>
</div>

<div id="resultBox"></div>

<div style="margin-top:10px;">
    <span id="updateTime">데이터 로딩중...</span>
</div>

</div>

<script src="./tool_app.js"></script>
<script>
const scaleStorageKey = "tool-scale-as";
const pageContent = document.getElementById("pageContent");

function applyPageScale(scale) {
    pageContent.style.transform = `scale(${scale})`;
    pageContent.style.width = `${100 / scale}%`;
    pageContent.style.height = `${100 / scale}%`;

    document.querySelectorAll(".scale-btn").forEach((btn) => {
        btn.classList.toggle("active", Number(btn.dataset.scale) === scale);
    });

    localStorage.setItem(scaleStorageKey, String(scale));
}

document.querySelectorAll(".scale-btn").forEach((btn) => {
    btn.addEventListener("click", () => applyPageScale(Number(btn.dataset.scale)));
});

const savedScale = Number(localStorage.getItem(scaleStorageKey));
applyPageScale([1, 0.9, 0.8, 0.7].includes(savedScale) ? savedScale : 1);
</script>

</body>
</html>
