<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>회수접수도우미</title>

<style>
html, body {
    height: 100%;
    margin: 0;
}

body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
}

.toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-bottom: 1px solid #ddd;
    background: #fff;
    box-sizing: border-box;
}

.toolbar-title {
    font-size: 12px;
    font-weight: bold;
}

.scale-btn {
    padding: 4px 8px;
    border: 1px solid #bbb;
    background: #f7f7f7;
    cursor: pointer;
    font-size: 12px;
}

.scale-btn.active {
    background: #1f4e79;
    border-color: #1f4e79;
    color: #fff;
}

#pageContent {
    flex: 1;
    padding: 10px;
    box-sizing: border-box;
    transform-origin: top left;
}

.layout {
    display: grid;
    grid-template-columns: 55% 45%;
    gap: 12px;
    height: 100%;
}

.left, .right {
    border: 1px solid #ddd;
    padding: 10px;
    box-sizing: border-box;
    overflow: auto;
    background: #fff;
}

h2, h3 {
    margin: 5px 0 10px 0;
}

label {
    font-weight: bold;
    display: block;
    margin-bottom: 4px;
}

input, select {
    width: 95%;
    padding: 6px;
    margin-bottom: 10px;
    box-sizing: border-box;
}

.result-box {
    border: 1px solid #ccc;
    padding: 12px;
    background: #fff;
    min-height: 84px;
    white-space: pre-line;
}

.button-area {
    margin-top: 10px;
}
</style>
</head>

<body>
<div class="toolbar">
    <span class="toolbar-title">창크기조정</span>
    <button type="button" class="scale-btn active" data-scale="1">100%</button>
    <button type="button" class="scale-btn" data-scale="0.9">90%</button>
    <button type="button" class="scale-btn" data-scale="0.8">80%</button>
    <button type="button" class="scale-btn" data-scale="0.7">70%</button>
</div>
<div id="pageContent">
<div class="layout">
<div class="left">

<h2>회수접수도우미</h2>

<label>모델명 입력방식</label>
<select id="modelType">
    <option>3종 선택</option>
    <option>직접입력</option>
</select>

<div id="selectWrap">
    <label>3종 선택</label>
    <select id="productSelect">
        <option>분유쉐이커</option>
        <option>LED분유쉐이커</option>
        <option>휴대용분유포트</option>
    </select>
</div>

<div id="inputWrap" style="display:none;">
    <label>모델명 입력</label>
    <input type="text" id="productInput">
</div>

<label>회수사유</label>
<select id="reason">
    <option>일반반품</option>
    <option>변심반품</option>
    <option>불량반품</option>
    <option>불량교환</option>
    <option>AS</option>
    <option>검수</option>
</select>

<div id="symptomWrap">
    <label>증상</label>
    <input type="text" id="symptom">
</div>

<div id="orderWrap">
    <label>주문번호</label>
    <input type="text" id="order">
</div>

<div id="customerWrap">
    <label>고객명</label>
    <input type="text" id="customer">
</div>

</div>

<div class="right">
<h3>자동 생성 결과</h3>
<div class="result-box" id="result">여기에 결과 출력</div>
<div class="button-area">
    <button type="button" id="copyBtn">복사</button>
    <button type="button" id="resetBtn">초기화</button>
</div>
<ul>
    <li><strong style="color:red;">특별 본사회수(분석)대상 : 분유쉐이커 2종</strong></li>
    <li><strong style="color:red;">증상 : 소음, 충전불량, 전원불량</strong></li>
    <li><strong style="color:red;">회수사유 : 검수</strong></li>
</ul>
</div>
</div>
</div>

<script>
const scaleStorageKey = "tool-scale-as2";
const pageContent = document.getElementById("pageContent");

function applyPageScale(scale) {
    pageContent.style.transform = `scale(${scale})`;
    pageContent.style.width = `${100 / scale}%`;
    pageContent.style.height = `${100 / scale}%`;

    document.querySelectorAll(".scale-btn").forEach((btn) => {
        btn.classList.toggle("active", Number(btn.dataset.scale) === scale);
    });

    localStorage.setItem(scaleStorageKey, String(scale));
}

document.querySelectorAll(".scale-btn").forEach((btn) => {
    btn.addEventListener("click", () => applyPageScale(Number(btn.dataset.scale)));
});

const savedScale = Number(localStorage.getItem(scaleStorageKey));
applyPageScale([1, 0.9, 0.8, 0.7].includes(savedScale) ? savedScale : 1);

const LINKMOM = ["분유쉐이커","LED분유쉐이커","휴대용분유포트"];

const modelType = document.getElementById("modelType");
const selectWrap = document.getElementById("selectWrap");
const inputWrap = document.getElementById("inputWrap");

const reason = document.getElementById("reason");

const symptomWrap = document.getElementById("symptomWrap");
const orderWrap = document.getElementById("orderWrap");
const customerWrap = document.getElementById("customerWrap");

const productSelect = document.getElementById("productSelect");
const productInput = document.getElementById("productInput");

const symptom = document.getElementById("symptom");
const order = document.getElementById("order");
const customer = document.getElementById("customer");
const result = document.getElementById("result");
const copyBtn = document.getElementById("copyBtn");
const resetBtn = document.getElementById("resetBtn");

function getProduct(){
    return modelType.value === "3종 선택"
        ? productSelect.value.trim()
        : productInput.value.trim();
}

function isLinkmom(p){
    return LINKMOM.includes(p);
}

function updateFields(){
    const r = reason.value;

    symptomWrap.style.display =
        ["불량반품","불량교환","AS","검수"].includes(r) ? "block" : "none";

    orderWrap.style.display =
        ["일반반품","변심반품","불량반품","불량교환"].includes(r) ? "block" : "none";

    customerWrap.style.display =
        ["AS","검수"].includes(r) ? "block" : "none";
}

function buildMemo(){
    const p = getProduct();
    const r = reason.value;
    const s = symptom.value.trim();
    const o = order.value.trim();
    const c = customer.value.trim();

    const link = isLinkmom(p);

    // 🔥 모든 유형 제품명 포함

    if(link){
        if(r==="일반반품") return o ? `★일반반품 링크맘 엄감★${o} / ${p}` : "주문번호를 입력해주세요.";
        if(r==="변심반품") return o ? `★변심반품 링크맘 엄감★${o} / ${p}` : "주문번호를 입력해주세요.";

        if(r==="불량반품"||r==="불량교환"){
            if(!o) return "주문번호를 입력해주세요.";
            if(!p) return "모델명을 입력해주세요.";
            if(!s) return "증상을 입력해주세요.";
            return `★${r}★${o} / ${p} / ${s}`;
        }

        if(r==="AS"||r==="검수"){
            if(!c) return "고객명을 입력해주세요.";
            if(!s) return "증상을 입력해주세요.";
            return `★${r} 링크맘 엄감★ (${p}) ${c}고객님 / ${s}`;
        }
    }

    if(r==="일반반품"||r==="변심반품"){
        if(!o) return "주문번호를 입력해주세요.";
        if(!p) return "모델명을 입력해주세요.";
        return `★${r}★${o} / ${p}`;
    }

    if(r==="불량반품"||r==="불량교환"){
        if(!o) return "주문번호를 입력해주세요.";
        if(!p) return "모델명을 입력해주세요.";
        if(!s) return "증상을 입력해주세요.";
        return `★${r}★${o} / ${p} / ${s}`;
    }

    if(r==="AS"||r==="검수"){
        if(!c) return "고객명을 입력해주세요.";
        if(!p) return "모델명을 입력해주세요.";
        if(!s) return "증상을 입력해주세요.";
        return `★${r} 링크맘 엄감★ (${p}) ${c}고객님 / ${s}`;
    }

    return "";
}

function sendToParent(){
    const memo = buildMemo();
    result.innerText = memo || "여기에 결과 출력";
}

document.querySelectorAll("input, select").forEach(el=>{
    el.addEventListener("input", ()=>{
        updateFields();
        sendToParent();
    });
    el.addEventListener("change", ()=>{
        updateFields();
        sendToParent();
    });
});

modelType.addEventListener("change", ()=>{
    if(modelType.value==="3종 선택"){
        selectWrap.style.display="block";
        inputWrap.style.display="none";
    }else{
        selectWrap.style.display="none";
        inputWrap.style.display="block";
    }
});

copyBtn.addEventListener("click", async ()=>{
    const text = result.innerText.trim();
    if(!text || text === "여기에 결과 출력"){
        alert("내용 없음");
        return;
    }
    try{
        await navigator.clipboard.writeText(text);
        alert("복사 완료");
    }catch(e){
        alert("복사 실패");
    }
});

resetBtn.addEventListener("click", ()=>{
    location.reload();
});

updateFields();
sendToParent();
</script>

</body>
</html>
