<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>부품별 원인 및 관리방법</title>

<script src="tool_app.js"></script>

<style>
html, body {
    height: 100%;
    margin: 0;
}

body {
    font-family: Arial;
    display: flex;
    flex-direction: column;
}

.toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-bottom: 1px solid #ddd;
    background: #fff;
    box-sizing: border-box;
}

.toolbar-title {
    font-size: 12px;
    font-weight: bold;
}

.scale-btn {
    padding: 4px 8px;
    border: 1px solid #bbb;
    background: #f7f7f7;
    cursor: pointer;
    font-size: 12px;
}

.scale-btn.active {
    background: #1f4e79;
    border-color: #1f4e79;
    color: #fff;
}

#pageContent {
    flex: 1;
    transform-origin: top left;
}

/* 전체 영역 */
.container {
    display: flex;
    flex: 1;
    gap: 10px;
}

/* 박스 */
.box {
    flex: 1;
    border: 1px solid #ccc;
    padding: 10px;
    overflow-y: auto;
}

.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
    z-index: 9999;
}

.modal-overlay.open {
    display: flex;
}

.modal {
    width: min(760px, 96vw);
    max-height: 78vh;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.modal-header {
    padding: 14px 18px;
    border-bottom: 1px solid #e5e5e5;
    font-size: 18px;
    font-weight: bold;
}

.modal-body {
    padding: 18px;
    overflow-y: auto;
    white-space: pre-wrap;
    line-height: 1.6;
    font-size: 14px;
}

.modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 12px 18px 16px;
    border-top: 1px solid #e5e5e5;
}

/* 항목 */
.row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
}

/* 버튼 */
button {
    cursor: pointer;
}
</style>

</head>

<body>
<div class="toolbar">
    <span class="toolbar-title">창크기조정</span>
    <button type="button" class="scale-btn active" data-scale="1">100%</button>
    <button type="button" class="scale-btn" data-scale="0.9">90%</button>
    <button type="button" class="scale-btn" data-scale="0.8">80%</button>
    <button type="button" class="scale-btn" data-scale="0.7">70%</button>
</div>

<div id="pageContent">

<h3>부품별 원인 및 관리방법</h3>

<!-- CSV 상태 -->
<div id="updateBox" style="font-size:12px; color:#666; margin-bottom:5px;">
CSV 로드 중...
</div>

<div class="container">

    <!-- 자동 추천 -->
    <div class="box">
        <h4>자동 추천 (툴1 연동)</h4>
        <div id="autoParts"></div>
    </div>

    <!-- 직접 선택 -->
    <div class="box">
        <h4>직접 선택</h4>

        <select id="manualPart">
            <option value="">선택</option>
        </select>

        <button onclick="manualShow()">내용보기</button>
    </div>

</div>
</div>

<div class="modal-overlay" id="guideModal">
    <div class="modal">
        <div class="modal-header">엔지니어 의견</div>
        <div class="modal-body" id="modalContent">데이터 없음</div>
        <div class="modal-footer">
            <button type="button" id="copyGuideBtn">내용 복사하기</button>
            <button type="button" id="closeGuideBtn">확인</button>
        </div>
    </div>
</div>

<script>

let csvData = [];
let lastMemoText = "";
let lastRankedParts = [];
let currentGuideText = "";
const scaleStorageKey = "tool-scale-as3";
const pageContent = document.getElementById("pageContent");

function applyPageScale(scale) {
    pageContent.style.transform = `scale(${scale})`;
    pageContent.style.width = `${100 / scale}%`;
    pageContent.style.height = `${100 / scale}%`;

    document.querySelectorAll(".scale-btn").forEach((btn) => {
        btn.classList.toggle("active", Number(btn.dataset.scale) === scale);
    });

    localStorage.setItem(scaleStorageKey, String(scale));
}

document.querySelectorAll(".scale-btn").forEach((btn) => {
    btn.addEventListener("click", () => applyPageScale(Number(btn.dataset.scale)));
});

const savedScale = Number(localStorage.getItem(scaleStorageKey));
applyPageScale([1, 0.9, 0.8, 0.7].includes(savedScale) ? savedScale : 1);

function normalizePartName(value){
    return String(value || "").replace(/\s+/g, " ").trim();
}

// =========================
// CSV 로드
// =========================
async function loadCSV(){
    try{
        const res = await fetch("/dashboard/data/불량부품원인.csv");
        const text = await res.text();
        const rows = parseCSV(text);
        const headers = rows[0].map(h => String(h).replace(/^\uFEFF/, "").trim());

        const partIndex = typeof getColumnIndex === "function"
            ? getColumnIndex(headers, "사용부품")
            : headers.indexOf("사용부품");
        const guideIndex = typeof getColumnIndex === "function"
            ? getColumnIndex(headers, "AI 멘트수정")
            : headers.indexOf("AI 멘트수정");

        if (partIndex === -1 || guideIndex === -1) {
            document.getElementById("updateBox").innerText = "CSV 필수 컬럼 없음";
            return;
        }

        const dataRows = rows.slice(1);

        csvData = dataRows
            .map(r => ({
                part: normalizePartName(r[partIndex]),
                guide: String(r[guideIndex] || "").trim()
            }))
            .filter(item => item.part);

        // 드롭다운 채우기
        const parts = [...new Set(csvData.map(d => d.part).filter(Boolean))];
        const select = document.getElementById("manualPart");
        select.innerHTML = `<option value="">선택</option>`;

        parts.forEach(p=>{
            const opt = document.createElement("option");
            opt.value = p;
            opt.textContent = p;
            select.appendChild(opt);
        });

        // ✅ 로드 완료 표시
        document.getElementById("updateBox").innerText =
            `CSV 로드 완료 (${dataRows.length}건)`;

        // 메모 수신이 CSV 로드보다 먼저였던 경우를 대비
        updateAutoRecommendation(lastMemoText, lastRankedParts);

    } catch(e){
        document.getElementById("updateBox").innerText = "CSV 로드 실패";
    }
}

loadCSV();

// =========================
// 툴1 결과 받기
// =========================
window.addEventListener("message",(e)=>{
    const text = e.data.memo || "";
    const rankedParts = Array.isArray(e.data.rankedParts) ? e.data.rankedParts : [];
    updateAutoRecommendation(text, rankedParts);
});

if (typeof subscribeSharedMemo === "function") {
    subscribeSharedMemo((text, rankedParts) => {
        updateAutoRecommendation(text, rankedParts);
    });
}

// =========================
// 자동 영역
// =========================
function renderAuto(parts){
    const box = document.getElementById("autoParts");
    box.innerHTML = "";

    parts.forEach(part=>{
        const div = document.createElement("div");
        div.className = "row";

        div.innerHTML = `
            <span>${part}</span>
            <button onclick="show('${part}')">보기</button>
        `;

        box.appendChild(div);
    });
}

function parsePartsFromMemo(text){
    return String(text || "")
        .split("|")
        .map(t => normalizePartName(t.trim().split(" ")[0]))
        .filter(Boolean);
}

function hasGuide(part){
    const normalized = normalizePartName(part);
    return csvData.some(d => d.part === normalized && d.guide);
}

function pickTop3Available(rankedParts){
    const picked = [];
    const seen = new Set();

    rankedParts.forEach(part => {
        const p = normalizePartName(part);
        if (!p || seen.has(p)) return;
        if (!hasGuide(p)) return;
        seen.add(p);
        picked.push(p);
    });

    return picked.slice(0, 3);
}

function updateAutoRecommendation(text, rankedParts){
    lastMemoText = text || "";
    lastRankedParts = Array.isArray(rankedParts) ? rankedParts : [];

    const sourceRanks = lastRankedParts.length ? lastRankedParts : parsePartsFromMemo(lastMemoText);
    const top3 = pickTop3Available(sourceRanks);
    renderAuto(top3);
}

// =========================
// 팝업
// =========================
function show(part){
    const normalized = normalizePartName(part);
    const match = csvData.find(d => d.part === normalized);
    openGuideModal(match && match.guide ? match.guide : "데이터 없음");
}

// =========================
// 수동 선택
// =========================
function manualShow(){
    const part = document.getElementById("manualPart").value;
    show(part);
}

function openGuideModal(text){
    currentGuideText = text || "데이터 없음";
    document.getElementById("modalContent").innerText = currentGuideText;
    document.getElementById("guideModal").classList.add("open");
}

function closeGuideModal(){
    document.getElementById("guideModal").classList.remove("open");
}

document.getElementById("copyGuideBtn").addEventListener("click", async () => {
    if (!currentGuideText) return;

    try {
        await navigator.clipboard.writeText(currentGuideText);
        alert("복사 완료");
    } catch (e) {
        alert("복사 실패");
    }
});

document.getElementById("closeGuideBtn").addEventListener("click", closeGuideModal);

document.getElementById("guideModal").addEventListener("click", (e) => {
    if (e.target.id === "guideModal") {
        closeGuideModal();
    }
});

</script>

</body>
</html>
