<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>툴3</title>

<script src="tool_app.js"></script>

<style>
body {
    font-family: Arial;
    padding: 10px;
}

.box {
    border: 1px solid #ccc;
    padding: 10px;
    margin-bottom: 10px;
}

.row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
}
</style>

</head>

<body>

<h3>툴3 - 부품 상세</h3>

<div class="box">
<h4>자동 추천</h4>
<div id="auto"></div>
</div>

<div class="box">
<h4>직접 선택</h4>

<select id="manualPart">
<option value="">선택</option>
</select>

<button onclick="manualShow()">내용보기</button>

</div>

<script>

let csvData = [];

// CSV 로드
async function loadCSV(){
    const res = await fetch("/dashboard/data/불량부품원인.csv");
    const text = await res.text();
    const rows = parseCSV(text);

    const headers = rows[0];

    const partIndex = headers.indexOf("부품명");
    const guideIndex = headers.indexOf("AI 멘트수정");

    csvData = rows.slice(1).map(r => ({
        part: r[partIndex],
        guide: r[guideIndex]
    }));

    const parts = [...new Set(csvData.map(d=>d.part))];

    const select = document.getElementById("manualPart");
    parts.forEach(p=>{
        const opt = document.createElement("option");
        opt.value = p;
        opt.textContent = p;
        select.appendChild(opt);
    });
}

loadCSV();

// 툴1 결과 받기
window.addEventListener("message",(e)=>{
    const text = e.data.memo || "";

    const parts = text.split("|").map(t=>t.trim().split(" ")[0]);

    renderAuto(parts);
});

// 자동 영역
function renderAuto(parts){
    const box = document.getElementById("auto");
    box.innerHTML = "";

    parts.slice(0,3).forEach(part=>{
        const div = document.createElement("div");
        div.className = "row";

        div.innerHTML = `
            <span>${part}</span>
            <button onclick="show('${part}')">보기</button>
        `;

        box.appendChild(div);
    });
}

// 팝업
function show(part){
    const match = csvData.find(d=>d.part === part);
    alert(match ? match.guide : "데이터 없음");
}

// 수동
function manualShow(){
    const part = document.getElementById("manualPart").value;
    show(part);
}

</script>

</body>
</html>
