<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>툴3</title>

<script src="tool_app.js"></script>

<style>
body {
    font-family: Arial;
    padding: 10px;
}

/* 좌우 분할 */
.container {
    display: flex;
    gap: 10px;
}

/* 박스 공통 */
.box {
    flex: 1;
    border: 1px solid #ccc;
    padding: 10px;
    height: 100%;
}

/* 항목 줄 */
.row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
}

/* 버튼 */
button {
    cursor: pointer;
}
</style>

</head>

<body>

<h3>AS 기술 진단 어시스턴트 (툴3)</h3>

<div class="container">

    <!-- 자동 추천 -->
    <div class="box">
        <h4>자동 추천 (툴1 연동)</h4>
        <div id="autoParts"></div>
    </div>

    <!-- 직접 선택 -->
    <div class="box">
        <h4>직접 선택</h4>

        <select id="manualPart">
            <option value="">선택</option>
        </select>

        <button onclick="manualShow()">내용보기</button>
    </div>

</div>

<script>

let csvData = [];

// CSV 로드
async function loadCSV(){
    const res = await fetch("/dashboard/data/불량부품원인.csv");
    const text = await res.text();
    const rows = parseCSV(text);

    const headers = rows[0];

    const partIndex = headers.indexOf("부품명");
    const guideIndex = headers.indexOf("AI 멘트수정");

    csvData = rows.slice(1).map(r => ({
        part: r[partIndex],
        guide: r[guideIndex]
    }));

    // 드롭다운 채우기
    const parts = [...new Set(csvData.map(d=>d.part))];
    const select = document.getElementById("manualPart");

    parts.forEach(p=>{
        const opt = document.createElement("option");
        opt.value = p;
        opt.textContent = p;
        select.appendChild(opt);
    });
}

loadCSV();

// 🔥 툴1 결과 받기
window.addEventListener("message",(e)=>{
    const text = e.data.memo || "";

    const parts = text.split("|").map(t=>t.trim().split(" ")[0]);

    renderAuto(parts);
});

// 자동 영역
function renderAuto(parts){
    const box = document.getElementById("autoParts");
    box.innerHTML = "";

    parts.slice(0,3).forEach(part=>{
        const div = document.createElement("div");
        div.className = "row";

        div.innerHTML = `
            <span>${part}</span>
            <button onclick="show('${part}')">보기</button>
        `;

        box.appendChild(div);
    });
}

// 팝업 (부품 기준만)
function show(part){
    const match = csvData.find(d=>d.part === part);
    alert(match ? match.guide : "데이터 없음");
}

// 수동
function manualShow(){
    const part = document.getElementById("manualPart").value;
    show(part);
}

</script>

</body>
</html>
