<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>툴3</title>

<script src="tool_app.js"></script>

<style>
html, body {
    height: 100%;
    margin: 0;
}

body {
    font-family: Arial;
    display: flex;
    flex-direction: column;
}

/* 전체 영역 */
.container {
    display: flex;
    flex: 1;
    gap: 10px;
}

/* 박스 */
.box {
    flex: 1;
    border: 1px solid #ccc;
    padding: 10px;
    overflow-y: auto;
}

/* 항목 */
.row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
}

/* 버튼 */
button {
    cursor: pointer;
}
</style>

</head>

<body>

<h3>AS 기술 진단 어시스턴트 (툴3)</h3>

<!-- CSV 상태 -->
<div id="updateBox" style="font-size:12px; color:#666; margin-bottom:5px;">
CSV 로드 중...
</div>

<div class="container">

    <!-- 자동 추천 -->
    <div class="box">
        <h4>자동 추천 (툴1 연동)</h4>
        <div id="autoParts"></div>
    </div>

    <!-- 직접 선택 -->
    <div class="box">
        <h4>직접 선택</h4>

        <select id="manualPart">
            <option value="">선택</option>
        </select>

        <button onclick="manualShow()">내용보기</button>
    </div>

</div>

<script>

let csvData = [];
let lastMemoText = "";
let lastRankedParts = [];

// =========================
// CSV 로드
// =========================
async function loadCSV(){
    try{
        const res = await fetch("/dashboard/data/불량부품원인.csv");
        const text = await res.text();
        const rows = parseCSV(text);

        const headers = rows[0];

        const partIndex = headers.indexOf("부품명");
        const guideIndex = headers.indexOf("AI 멘트수정");

        const dataRows = rows.slice(1);

        csvData = dataRows.map(r => ({
            part: r[partIndex],
            guide: r[guideIndex]
        }));

        // 드롭다운 채우기
        const parts = [...new Set(csvData.map(d=>d.part))];
        const select = document.getElementById("manualPart");

        parts.forEach(p=>{
            const opt = document.createElement("option");
            opt.value = p;
            opt.textContent = p;
            select.appendChild(opt);
        });

        // ✅ 로드 완료 표시
        document.getElementById("updateBox").innerText =
            `CSV 로드 완료 (${dataRows.length}건)`;

        // 메모 수신이 CSV 로드보다 먼저였던 경우를 대비
        updateAutoRecommendation(lastMemoText, lastRankedParts);

    } catch(e){
        document.getElementById("updateBox").innerText = "CSV 로드 실패";
    }
}

loadCSV();

// =========================
// 툴1 결과 받기
// =========================
window.addEventListener("message",(e)=>{
    const text = e.data.memo || "";
    const rankedParts = Array.isArray(e.data.rankedParts) ? e.data.rankedParts : [];
    updateAutoRecommendation(text, rankedParts);
});

if (typeof subscribeSharedMemo === "function") {
    subscribeSharedMemo((text, rankedParts) => {
        updateAutoRecommendation(text, rankedParts);
    });
}

// =========================
// 자동 영역
// =========================
function renderAuto(parts){
    const box = document.getElementById("autoParts");
    box.innerHTML = "";

    parts.forEach(part=>{
        const div = document.createElement("div");
        div.className = "row";

        div.innerHTML = `
            <span>${part}</span>
            <button onclick="show('${part}')">보기</button>
        `;

        box.appendChild(div);
    });
}

function parsePartsFromMemo(text){
    return String(text || "")
        .split("|")
        .map(t => t.trim().split(" ")[0].trim())
        .filter(Boolean);
}

function hasGuide(part){
    return csvData.some(d => d.part === part && d.guide && d.guide.trim());
}

function pickTop3Available(rankedParts){
    const picked = [];
    const seen = new Set();

    rankedParts.forEach(part => {
        const p = String(part || "").trim();
        if (!p || seen.has(p)) return;
        if (!hasGuide(p)) return;
        seen.add(p);
        picked.push(p);
    });

    return picked.slice(0, 3);
}

function updateAutoRecommendation(text, rankedParts){
    lastMemoText = text || "";
    lastRankedParts = Array.isArray(rankedParts) ? rankedParts : [];

    const sourceRanks = lastRankedParts.length ? lastRankedParts : parsePartsFromMemo(lastMemoText);
    const top3 = pickTop3Available(sourceRanks);
    renderAuto(top3);
}

// =========================
// 팝업
// =========================
function show(part){
    const match = csvData.find(d=>d.part === part);
    alert(match && match.guide ? match.guide : "데이터 없음");
}

// =========================
// 수동 선택
// =========================
function manualShow(){
    const part = document.getElementById("manualPart").value;
    show(part);
}

</script>

</body>
</html>
