<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>일일루틴 자동화 툴</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Malgun Gothic', sans-serif;
  font-size: 13px;
  background: #f0f2f5;
  color: #222;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── 상단 바 ── */
.top-bar {
  background: #1a2e50;
  padding: 7px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.top-bar .title { color: #c8ddf0; font-weight: 700; font-size: 13px; }
.top-bar .right-area { display: flex; align-items: center; gap: 10px; }
.top-bar .status-msg { font-size: 11px; color: #6a9ec0; }
.gist-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.gist-status.ok  { background: #1f5c53; color: #7ee8d8; }
.gist-status.err { background: #5c1f1f; color: #e87e7e; }
.gist-status.ing { background: #2e3a50; color: #7aabcc; }


/* ── 레이아웃 ── */
.main {
  flex: 1;
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 10px;
  padding: 10px;
  overflow: hidden;
}

/* ── 좌측 패널 ── */
.panel {
  background: #fff;
  border-radius: 6px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-header {
  background: #1a2e50;
  color: #c8ddf0;
  padding: 7px 12px;
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
}
.panel-body {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── 드롭존 ── */
.drop-zone {
  border: 2px dashed #b0c4de;
  border-radius: 6px;
  padding: 18px 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: #f8fafc;
  color: #7a9ec0;
  font-size: 12px;
  line-height: 1.7;
}
.drop-zone:hover, .drop-zone.drag-over { border-color: #2356a8; background: #eef4ff; color: #2356a8; }
.drop-zone .drop-icon { font-size: 22px; display: block; margin-bottom: 4px; }
.drop-zone.has-file { border-color: #2a7a6f; background: #f0faf8; color: #2a7a6f; }

/* ── 폼 ── */
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-label { font-size: 11px; font-weight: 700; color: #4a6080; text-transform: uppercase; letter-spacing: 0.3px; }
.form-input {
  border: 1px solid #d0dae8; border-radius: 4px;
  padding: 5px 8px; font-size: 12px; font-family: inherit;
  color: #222; background: #fff; outline: none; transition: border-color 0.15s;
}
.form-input:focus { border-color: #2356a8; }

/* ── 필터 리스트 ── */
.filter-scroll {
  border: 1px solid #d0dae8; border-radius: 4px;
  max-height: 110px; overflow-y: auto; background: #fafbfd;
}
.filter-item {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 8px; font-size: 11.5px;
  border-bottom: 1px solid #eef0f4;
}
.filter-item:last-child { border-bottom: none; }
.filter-item:hover { background: #f0f4ff; }
.filter-item input[type=checkbox] { cursor: pointer; flex-shrink: 0; }
.filter-item .item-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.filter-item .del-btn {
  background: none; border: none; color: #c0a0a0; cursor: pointer;
  font-size: 13px; line-height: 1; padding: 0 2px; flex-shrink: 0;
}
.filter-item .del-btn:hover { color: #c0392b; }

.filter-toolbar { display: flex; gap: 4px; margin-bottom: 4px; }
.toggle-btn {
  font-size: 10.5px; padding: 2px 7px; border-radius: 3px;
  border: 1px solid #b0c4de; background: #f0f4ff; color: #2356a8;
  cursor: pointer; font-family: inherit;
}
.toggle-btn:hover { background: #dce8ff; }

.add-row { display: flex; gap: 4px; margin-top: 4px; }
.add-row .form-input { flex: 1; }
.add-btn {
  background: #2356a8; color: #fff; border: none;
  border-radius: 4px; padding: 4px 10px; font-size: 12px;
  cursor: pointer; font-family: inherit; font-weight: 700; white-space: nowrap;
}
.add-btn:hover { background: #1a3a7a; }

/* ── 버튼 ── */
.btn {
  padding: 7px 14px; border: none; border-radius: 4px;
  font-size: 12px; font-family: inherit; font-weight: 700;
  cursor: pointer; transition: background 0.15s;
}
.btn-primary { background: #2356a8; color: #fff; }
.btn-primary:hover { background: #1a3a7a; }
.btn-primary:disabled { background: #8aa8d0; cursor: not-allowed; }
.btn-success { background: #2a7a6f; color: #fff; }
.btn-success:hover { background: #1f5c53; }
.btn-success:disabled { background: #8abdb8; cursor: not-allowed; }
.btn-secondary { background: #e8edf5; color: #4a6080; border: 1px solid #c8d4e4; }
.btn-secondary:hover { background: #d8e4f0; }
.btn-row { display: flex; gap: 6px; }

/* ── 결과 패널 ── */
.result-panel {
  background: #fff; border-radius: 6px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  display: flex; flex-direction: column; overflow: hidden;
}
.result-header {
  background: #1a2e50; color: #c8ddf0;
  padding: 7px 12px; font-size: 12px; font-weight: 600;
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.result-badge {
  background: #2356a8; color: #fff; font-size: 10px;
  padding: 1px 7px; border-radius: 10px; font-weight: 700;
}
.table-wrap { flex: 1; overflow: auto; }
table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
thead tr { background: #e8edf5; position: sticky; top: 0; z-index: 1; }
thead th { padding: 6px 8px; text-align: left; font-weight: 700; color: #2a4070; border-bottom: 2px solid #c8d4e4; white-space: nowrap; }
tbody tr { border-bottom: 1px solid #eef0f4; }
tbody tr:hover { background: #f4f7ff; }
tbody td { padding: 5px 8px; color: #333; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #aab8cc; font-size: 12px; gap: 8px; }
.empty-icon { font-size: 32px; }

/* ── 모달 ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: #fff; border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  width: 420px; padding: 24px;
  display: flex; flex-direction: column; gap: 14px;
}
.modal h3 { font-size: 14px; color: #1a2e50; }
.modal p { font-size: 11.5px; color: #607090; line-height: 1.6; }
.modal .form-input { width: 100%; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
.modal-btns .btn { padding: 6px 18px; }

/* ── 스크롤바 ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #f0f2f5; }
::-webkit-scrollbar-thumb { background: #b0c4de; border-radius: 3px; }
</style>
</head>
<body>

<!-- 구글시트 저장 방식으로 전환 — Token 모달 불필요 -->

<!-- ── 상단 바 ── -->
<div class="top-bar">
  <span class="title">📋 일일루틴 자동화 툴</span>
  <div class="right-area">
    <span class="gist-status ing" id="gistStatus">구글시트 연결 중...</span>
    <span class="status-msg" id="statusMsg">초기화 중...</span>

  </div>
</div>

<div class="main">

  <!-- 좌측 패널 -->
  <div class="panel">
    <div class="panel-header">⚙ 설정</div>
    <div class="panel-body">

      <!-- 파일 업로드 -->
      <div class="form-group">
        <span class="form-label">파일 업로드</span>
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
          <span class="drop-icon">📂</span>
          CSV / XLSX 파일을 드래그하거나<br>클릭하여 선택
        </div>
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xlsm" style="display:none">
      </div>

      <!-- 저장 파일명 -->
      <div class="form-group">
        <span class="form-label">저장 파일명</span>
        <div style="display:flex;gap:4px;align-items:center">
          <input class="form-input" type="text" id="outputName" value="결과파일" style="flex:1">
          <span style="font-size:11px;color:#888">.xlsx</span>
        </div>
      </div>

      <!-- 반품타입 필터 -->
      <div class="form-group">
        <span class="form-label">반품타입 필터</span>
        <div class="filter-toolbar">
          <button class="toggle-btn" onclick="checkAll('type')">전체선택</button>
          <button class="toggle-btn" onclick="uncheckAll('type')">전체해제</button>
        </div>
        <div class="filter-scroll" id="typeFilter"></div>
        <div class="add-row">
          <input class="form-input" type="text" id="typeAddInput" placeholder="새 반품타입 입력"
            onkeydown="if(event.key==='Enter') addItem('type')">
          <button class="add-btn" onclick="addItem('type')">+ 추가</button>
        </div>
      </div>

      <!-- 제품명 필터 -->
      <div class="form-group">
        <span class="form-label">제품명 필터</span>
        <div class="filter-toolbar">
          <button class="toggle-btn" onclick="checkAll('product')">전체선택</button>
          <button class="toggle-btn" onclick="uncheckAll('product')">전체해제</button>
        </div>
        <div class="filter-scroll" id="productFilter"></div>
        <div class="add-row">
          <input class="form-input" type="text" id="productAddInput" placeholder="새 제품명 입력"
            onkeydown="if(event.key==='Enter') addItem('product')">
          <button class="add-btn" onclick="addItem('product')">+ 추가</button>
        </div>
      </div>

      <!-- 실행 버튼 -->
      <div class="btn-row" style="margin-top:auto">
        <button class="btn btn-primary" id="runBtn" onclick="runProcess()" disabled>▶ 실행</button>
        <button class="btn btn-success" id="downloadBtn" onclick="downloadResult()" disabled>⬇ 다운로드</button>
        <button class="btn btn-secondary" onclick="resetAll()">↺ 초기화</button>
      </div>

    </div>
  </div>

  <!-- 우측 결과 패널 -->
  <div class="result-panel">
    <div class="result-header">
      <span>📊 처리 결과</span>
      <span class="result-badge" id="resultBadge" style="display:none">0 건</span>
    </div>
    <div id="emptyState" class="empty-state">
      <span class="empty-icon">📄</span>
      <span>파일을 업로드하고 실행하면<br>결과가 여기에 표시됩니다</span>
    </div>
    <div class="table-wrap" id="tableWrap" style="display:none">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
// ════════════════════════════════
// 설정
// ════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbymKpZXyoAmsI978lOgGcJI8Z26J6UE8XesXb7haMJ6dRT16jAIFsJANMnK-Y9Wd35jNA/exec';
const SHEET_NAME  = 'as5_어드민자동화';

const DEFAULT_TYPES = [
  "교환 : 작동불량","교환 : 기타(제품불량)","교환 : 파손/스크래치","교환 : 오염/이염",
  "취소 : 작동불량","취소 : 기타(제품불량)","취소 : 파손/스크래치","취소 : 오염/이염",
  "교환 : 이물질","교환 : A_오염/이염","교환 : A_파손/스크래치",
];
const DEFAULT_PRODUCTS = [
  "[꿈비] 분유쉐이커","[꿈비] 출수형 분유포트","[꿈비] 스마트 센서 휴지통",
  "[꿈비] 버블리스 분유포트(분유포트+분유쉐이커) 핑크","[집계] 젖병살균세척기",
  "[꿈비] 젖병세척기 스팀플러스","[꿈비] UV LED 젖병소독기",
  "[꿈비] 아이스허그 듀얼팬 쿨시트 2.0 테디베어","[꿈비] 휴대용 분유포트",
  "[뉴어스] 음식물처리기","[꿈비] 아이스허그 듀얼팬 쿨시트 2.0 아이스패밀리",
  "[꿈비] 스팀젖병소독기","[꿈비] 장난감 살균기 60L 세트 클린베이지",
  "[꿈비] 유모차 웜 라이너_그레이","[꿈비] 손목보호 전동 젖병세척솔",
  "[뉴어스] 미세먼지비움 청소기","[꿈비] 뭉침없이 조용한 분유쉐이커",
  "[꿈비] 젖병살균세척기_크림 PRO","[꿈비] 젖병살균세척기_크림 V.1",
  "[꿈비] 젖병살균세척기_크림 V.2","[꿈비] 젖병살균세척기_세이지그린 V.1",
  "[꿈비] 젖병살균세척기_세이지그린 V.2","[꿈비] 젖병살균세척기_크림_리퍼_1세대",
  "[꿈비] 젖병살균세척기_크림_리퍼_2세대",
  "[꿈비] 분리형 분유포트 전용 배터리","[꿈비] 배터리 분리형 휴대용 분유포트",
];

let filterTypes    = [...DEFAULT_TYPES];
let filterProducts = [...DEFAULT_PRODUCTS];

const PATTERNS = [
  /~~(.*?)~(.*?)~(.*?)~(.*?)~~/s,
  /\*\*(.*?)\*(.*?)\*(.*?)\*(.*?)\*\*/s,
  /~(.*?)~(.*?)~(.*?)~(.*?)~~/s,
  /~~(.*?)~(.*?)~(.*?)~(.*?)~/s,
];
const PATTERNS_NO_NAME = [
  /~~(.*?)~(.*?)~(.*?)~~/s,
  /\*\*(.*?)\*(.*?)\*(.*?)\*\*/s,
];

let loadedData = null;
let resultData = null;

// ════════════════════════════════
// 구글시트 API
// ════════════════════════════════
function setGistStatus(state, msg) {
  const el = document.getElementById('gistStatus');
  el.className = 'gist-status ' + state;
  el.textContent = msg;
}

async function gistLoad() {
  setGistStatus('ing', '불러오는 중...');
  try {
    const res = await fetch(`${SCRIPT_URL}?action=getAS5&sheet=${encodeURIComponent(SHEET_NAME)}&t=${Date.now()}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.msg || '불러오기 실패');
    if (Array.isArray(data.types)    && data.types.length)    filterTypes    = data.types;
    if (Array.isArray(data.products) && data.products.length) filterProducts = data.products;
    buildFilters();
    setGistStatus('ok', '구글시트 연결됨 ✓');
    setStatus('✅ 구글시트에서 필터 불러오기 완료');
  } catch(e) {
    setGistStatus('err', '연결 오류');
    setStatus('⚠ 불러오기 실패: ' + e.message + ' (기본값 사용)');
    buildFilters();
  }
}

async function gistSave() {
  setGistStatus('ing', '저장 중...');
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'saveAS5',
        sheet: SHEET_NAME,
        types: filterTypes,
        products: filterProducts
      })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.msg || '저장 실패');
    setGistStatus('ok', '구글시트 저장됨 ✓');
  } catch(e) {
    setGistStatus('err', '저장 실패');
    setStatus('⚠ 저장 실패: ' + e.message);
  }
}



// ════════════════════════════════
// 필터 UI
// ════════════════════════════════
function buildFilters() {
  renderList('typeFilter',    filterTypes,    'type');
  renderList('productFilter', filterProducts, 'product');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderList(containerId, items, prefix) {
  document.getElementById(containerId).innerHTML = items.map((item, i) => `
    <div class="filter-item">
      <input type="checkbox" id="${prefix}_${i}" value="${escHtml(item)}" checked>
      <span class="item-text" title="${escHtml(item)}">${escHtml(item)}</span>
      <button class="del-btn" onclick="removeItem('${prefix}',${i})" title="삭제">✕</button>
    </div>
  `).join('');
}

function getChecked(prefix) {
  return [...document.querySelectorAll(`input[id^="${prefix}_"]:checked`)].map(el => el.value);
}
function checkAll(prefix)   { document.querySelectorAll(`input[id^="${prefix}_"]`).forEach(el => el.checked = true); }
function uncheckAll(prefix) { document.querySelectorAll(`input[id^="${prefix}_"]`).forEach(el => el.checked = false); }

async function addItem(prefix) {
  const inputId = prefix === 'type' ? 'typeAddInput' : 'productAddInput';
  const val = document.getElementById(inputId).value.trim();
  if (!val) return;
  const arr = prefix === 'type' ? filterTypes : filterProducts;
  if (arr.includes(val)) { alert('이미 존재하는 항목입니다.'); return; }
  arr.push(val);
  renderList(prefix === 'type' ? 'typeFilter' : 'productFilter', arr, prefix);
  document.getElementById(inputId).value = '';
  await gistSave();
  setStatus(`✅ "${val}" 추가 및 Gist 저장 완료`);
}

async function removeItem(prefix, idx) {
  const arr  = prefix === 'type' ? filterTypes : filterProducts;
  const name = arr[idx];
  if (!confirm(`"${name}" 를 삭제할까요?`)) return;
  arr.splice(idx, 1);
  renderList(prefix === 'type' ? 'typeFilter' : 'productFilter', arr, prefix);
  await gistSave();
  setStatus(`🗑 "${name}" 삭제 및 Gist 저장 완료`);
}

// ════════════════════════════════
// 파일 업로드
// ════════════════════════════════
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

function handleFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['csv','xlsx','xlsm'].includes(ext)) { setStatus('❌ CSV 또는 XLSX만 지원합니다'); return; }
  setStatus('📂 파일 읽는 중...');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      loadedData = XLSX.utils.sheet_to_json(ws, { defval: '' });
      dropZone.classList.add('has-file');
      dropZone.innerHTML = `<span class="drop-icon">✅</span>${file.name}<br><span style="font-size:10px">${loadedData.length}행 로드됨</span>`;
      document.getElementById('runBtn').disabled = false;
      setStatus(`✅ ${file.name} 로드 완료 (${loadedData.length}행)`);
    } catch(err) { setStatus('❌ 파일 읽기 실패: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

// ════════════════════════════════
// 데이터 처리
// ════════════════════════════════
function safeStr(val) { return (val == null) ? '' : String(val).trim(); }

function normDate(val) {
  if (!val) return '';
  if (val instanceof Date) {
    return `${val.getFullYear()}-${String(val.getMonth()+1).padStart(2,'0')}-${String(val.getDate()).padStart(2,'0')}`;
  }
  const m = String(val).match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
  return m ? `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}` : String(val);
}

function parseCsHistory(text, fallbackName='') {
  const raw = safeStr(text);
  if (!raw) return ['','','',''];
  for (const pat of PATTERNS) {
    const m = raw.match(pat);
    if (m && m.length >= 5) return [safeStr(m[1]),safeStr(m[2]),safeStr(m[3]),safeStr(m[4])];
  }
  for (const pat of PATTERNS_NO_NAME) {
    const m = raw.match(pat);
    if (m && m.length >= 4) return [safeStr(fallbackName),safeStr(m[1]),safeStr(m[2]),safeStr(m[3])];
  }
  return ['','','',''];
}

function runProcess() {
  if (!loadedData) return;
  setStatus('⚙ 데이터 처리 중...');
  const cTypes    = getChecked('type');
  const cProducts = getChecked('product');

  let work = loadedData.filter(row => {
    const t = safeStr(row['반품타입']), p = safeStr(row['어드민상품']);
    return (!t || cTypes.includes(t)) && (!p || cProducts.includes(p));
  });

  const nameCandidates = ['수령자','수령자 이름','수령자명','이름'];
  let fallbackCol = null;
  if (work.length > 0) for (const c of nameCandidates) { if (c in work[0]) { fallbackCol = c; break; } }

  const rows = work.map(row => {
    const [name, symptom, serial, link] = parseCsHistory(row['cs이력']||'', fallbackCol ? safeStr(row[fallbackCol]) : '');
    return {
      '도착일': normDate(row['도착일']), '주문번호': safeStr(row['주문번호']),
      '제품명': safeStr(row['어드민상품']), '고객명': name, '제품증상': symptom,
      '시리얼넘버': serial, '영상링크': link, '사용부품':'', '과실':'', '접수불량':'',
    };
  });

  const seen1 = new Set();
  const dedup1 = rows.filter(r => { const k=JSON.stringify(r); if(seen1.has(k)) return false; seen1.add(k); return true; });
  const seen2 = new Set();
  resultData = dedup1.filter(r => {
    const k=`${r['주문번호']}||${r['제품명']}||${r['제품증상']}`;
    if(seen2.has(k)) return false; seen2.add(k); return true;
  });

  renderTable(resultData);
  document.getElementById('downloadBtn').disabled = false;
  setStatus(`✅ 처리 완료 — ${resultData.length}건`);
}

function renderTable(data) {
  if (!data?.length) {
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('tableWrap').style.display = 'none';
    document.getElementById('resultBadge').style.display = 'none';
    return;
  }
  const cols = Object.keys(data[0]);
  document.getElementById('tableHead').innerHTML = '<tr>' + cols.map(c=>`<th>${c}</th>`).join('') + '</tr>';
  document.getElementById('tableBody').innerHTML = data.map(row =>
    '<tr>' + cols.map(c=>`<td title="${row[c]}">${row[c]}</td>`).join('') + '</tr>'
  ).join('');
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('tableWrap').style.display = 'block';
  const badge = document.getElementById('resultBadge');
  badge.style.display = 'inline';
  badge.textContent = `${data.length} 건`;
}

function downloadResult() {
  if (!resultData?.length) return;
  const name = document.getElementById('outputName').value.trim() || '결과파일';
  const ws = XLSX.utils.json_to_sheet(resultData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '결과');
  XLSX.writeFile(wb, `${name}.xlsx`);
  setStatus(`⬇ ${name}.xlsx 다운로드 완료`);
}

function resetAll() {
  loadedData = resultData = null;
  fileInput.value = '';
  dropZone.classList.remove('has-file','drag-over');
  dropZone.innerHTML = '<span class="drop-icon">📂</span>CSV / XLSX 파일을 드래그하거나<br>클릭하여 선택';
  document.getElementById('runBtn').disabled = true;
  document.getElementById('downloadBtn').disabled = true;
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('tableWrap').style.display = 'none';
  document.getElementById('resultBadge').style.display = 'none';
  checkAll('type'); checkAll('product');
  setStatus('CSV 또는 XLSX 파일을 업로드해주세요');
}

function setStatus(msg) { document.getElementById('statusMsg').textContent = msg; }

// ── 시작 ──
(async () => {
  await gistLoad();
})();
</script>
