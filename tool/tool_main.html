<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>툴 메인</title>

<style>
html, body {
    margin: 0;
    height: 100%;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    height: 100vh;
    gap: 10px;
    padding: 10px;
    box-sizing: border-box;
}

.panel {
    border: 1px solid #ccc;
    overflow: hidden;
}

.panel-right {
    display: grid;
    grid-template-columns: 55% 45%;
}

.panel-right iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.result-side {
    padding: 20px;
    background: #f9f9f9;
}

.result-box {
    border: 1px solid #ccc;
    padding: 15px;
    background: white;
    height: 200px;
    white-space: pre-line;
}

.button-area {
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="grid">
    
    <div class="panel">
        <iframe src="./as.html"></iframe>
    </div>

    <div class="panel panel-right">

        <iframe src="./as2.html"></iframe>

        <div class="result-side">

            <h3>자동 생성 결과</h3>

            <div class="result-box" id="result">
                여기에 결과 출력
            </div>

            <div class="button-area">
                <button onclick="copyText()">복사</button>
                <button onclick="resetAll()">초기화</button>
            </div>

            <ul>
                <li>3종 제품은 링크맘 엄감 규칙 적용</li>
                <li>기타 제품 AS/검수 규칙</li>
                <li>증상 입력 필요</li>
            </ul>

        </div>

    </div>

    <div class="panel">영역 3</div>
    <div class="panel">영역 4</div>

</div>

<script>
let currentText = "";

window.addEventListener("message", (e)=>{
    currentText = e.data.memo || "";
    document.getElementById("result").innerText = currentText;
});

function copyText(){
    if(!currentText || currentText.includes("입력해주세요")){
        alert(currentText || "내용 없음");
        return;
    }
    navigator.clipboard.writeText(currentText);
    alert("복사 완료");
}

function resetAll(){
    location.reload();
}
</script>

</body>
</html>
