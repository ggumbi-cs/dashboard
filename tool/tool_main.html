<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>툴 메인</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    height: 100vh;
    gap: 10px;
    padding: 10px;
    box-sizing: border-box;
}

.panel {
    background: #fff;
    border: 1px solid #ccc;
    overflow: hidden;
}

.panel iframe {
    width: 100%;
    height: 100%;
    border: none;
}
</style>

</head>

<body>

<div class="grid">
    <div class="panel">
        <iframe id="asFrame"></iframe>
    </div>

    <div class="panel">
        <iframe id="as2Frame"></iframe>
    </div>

    <div class="panel">
        <iframe id="as3Frame"></iframe>
    </div>

    <div class="panel">영역 4</div>

</div>

<script>
const isLocal = location.hostname === "localhost" || location.hostname === "127.0.0.1";
const base = isLocal ? "./" : "/dashboard/tool/";

document.getElementById("asFrame").src = base + "as.html";
document.getElementById("as2Frame").src = base + "as2.html";
document.getElementById("as3Frame").src = base + "as3.html";
</script>

</body>
</html>
