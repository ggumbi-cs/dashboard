<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>심우승 · 개인설정</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f0f2f5; font-family: 'Malgun Gothic', sans-serif; font-size: 13px; color: #222; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

.top-bar {
  background: #1a2e50; padding: 7px 16px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}
.top-bar .user-name { color: #c8ddf0; font-weight: 700; font-size: 13px; }
.top-bar .save-status { font-size: 11px; color: #6a9ec0; }
.save-btn {
  background: #2356a8; border: none; color: #fff;
  padding: 4px 14px; border-radius: 3px; font-size: 12px;
  cursor: pointer; font-family: inherit; font-weight: 600;
}
.save-btn:hover { background: #1a3a7a; }
.save-btn.saved { background: #2a7a6f; }

.slot-grid {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 10px;
  padding: 10px;
  overflow: hidden;
}

.slot-card {
  background: #fff; border-radius: 6px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  overflow: hidden; display: flex; flex-direction: column;
}
.slot-header {
  background: #1a2e50; color: #c8ddf0;
  padding: 5px 10px; font-size: 12px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
  flex-shrink: 0; flex-wrap: nowrap;
}
.slot-num { color: #5bb8f5; white-space: nowrap; }

/* 크기 조정 버튼 그룹 */
.zoom-group {
  display: flex; align-items: center; gap: 2px;
  flex: 1;
}
.zoom-label {
  color: #6a9ec0; font-size: 10px; white-space: nowrap; margin-right: 2px;
}
.zoom-btn {
  background: #243d6a;
  border: 1px solid #2e5080;
  color: #a8c4df;
  padding: 2px 6px;
  font-size: 10.5px;
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 600;
  line-height: 1.4;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  white-space: nowrap;
}
.zoom-btn:hover {
  background: #2e5080; color: #c8ddf0;
}
.zoom-btn.active {
  background: #2356a8;
  border-color: #5bb8f5;
  color: #fff;
}

.slot-select {
  background: #243d6a; border: 1px solid #2e5080; color: #a8c4df;
  padding: 3px 6px; font-size: 11.5px; border-radius: 3px;
  cursor: pointer; outline: none; font-family: inherit; min-width: 80px;
  margin-left: auto; flex-shrink: 0;
}
.slot-select:focus { border-color: #5bb8f5; }

/* iframe 래퍼 — 크기 조정용 */
.slot-body {
  flex: 1;
  overflow: hidden;
  position: relative;
  display: flex; align-items: center; justify-content: center;
  color: #bbb; font-size: 12px;
}

/* iframe은 transform-origin top-left 기준으로 scale */
.slot-body iframe {
  position: absolute;
  top: 0; left: 0;
  border: none;
  display: block;
  transform-origin: top left;
  /* width/height는 JS에서 scale에 맞게 동적으로 설정 */
}
</style>
</head>
<body>

<div class="top-bar">
  <span class="user-name">👤 심우승 · 개인 Tool 설정</span>
  <span class="save-status" id="saveStatus">선택 설정이 자동 저장됩니다</span>
  <button class="save-btn" id="saveBtn" onclick="saveSettings()">저장</button>
</div>

<div class="slot-grid">

  <!-- 슬롯 1 -->
  <div class="slot-card" id="card1">
    <div class="slot-header">
      <span class="slot-num">슬롯 1</span>
      <div class="zoom-group" id="zoomGroup1">
        <span class="zoom-label">크기:</span>
        <button class="zoom-btn active" data-slot="1" data-scale="1.0" onclick="setZoom(1, 1.0, this)">100%</button>
        <button class="zoom-btn" data-slot="1" data-scale="0.9" onclick="setZoom(1, 0.9, this)">90%</button>
        <button class="zoom-btn" data-slot="1" data-scale="0.8" onclick="setZoom(1, 0.8, this)">80%</button>
        <button class="zoom-btn" data-slot="1" data-scale="0.7" onclick="setZoom(1, 0.7, this)">70%</button>
        <button class="zoom-btn" data-slot="1" data-scale="0.6" onclick="setZoom(1, 0.6, this)">60%</button>
      </div>
      <select class="slot-select" id="slot1Tool" onchange="autoSave()">
        <option value="">-- 선택 --</option>
        <option value="AS1">AS1</option><option value="AS2">AS2</option>
        <option value="AS3">AS3</option><option value="AS4">AS4</option>
        <option value="AS5">AS5</option><option value="AS6">AS6</option>
        <option value="AS7">AS7</option><option value="AS8">AS8</option>
        <option value="AS9">AS9</option><option value="AS10">AS10</option>
      </select>
    </div>
    <div class="slot-body" id="body1">선택된 Tool이 여기에 표시됩니다</div>
  </div>

  <!-- 슬롯 2 -->
  <div class="slot-card" id="card2">
    <div class="slot-header">
      <span class="slot-num">슬롯 2</span>
      <div class="zoom-group" id="zoomGroup2">
        <span class="zoom-label">크기:</span>
        <button class="zoom-btn active" data-slot="2" data-scale="1.0" onclick="setZoom(2, 1.0, this)">100%</button>
        <button class="zoom-btn" data-slot="2" data-scale="0.9" onclick="setZoom(2, 0.9, this)">90%</button>
        <button class="zoom-btn" data-slot="2" data-scale="0.8" onclick="setZoom(2, 0.8, this)">80%</button>
        <button class="zoom-btn" data-slot="2" data-scale="0.7" onclick="setZoom(2, 0.7, this)">70%</button>
        <button class="zoom-btn" data-slot="2" data-scale="0.6" onclick="setZoom(2, 0.6, this)">60%</button>
      </div>
      <select class="slot-select" id="slot2Tool" onchange="autoSave()">
        <option value="">-- 선택 --</option>
        <option value="AS1">AS1</option><option value="AS2">AS2</option>
        <option value="AS3">AS3</option><option value="AS4">AS4</option>
        <option value="AS5">AS5</option><option value="AS6">AS6</option>
        <option value="AS7">AS7</option><option value="AS8">AS8</option>
        <option value="AS9">AS9</option><option value="AS10">AS10</option>
      </select>
    </div>
    <div class="slot-body" id="body2">선택된 Tool이 여기에 표시됩니다</div>
  </div>

  <!-- 슬롯 3 -->
  <div class="slot-card" id="card3">
    <div class="slot-header">
      <span class="slot-num">슬롯 3</span>
      <div class="zoom-group" id="zoomGroup3">
        <span class="zoom-label">크기:</span>
        <button class="zoom-btn active" data-slot="3" data-scale="1.0" onclick="setZoom(3, 1.0, this)">100%</button>
        <button class="zoom-btn" data-slot="3" data-scale="0.9" onclick="setZoom(3, 0.9, this)">90%</button>
        <button class="zoom-btn" data-slot="3" data-scale="0.8" onclick="setZoom(3, 0.8, this)">80%</button>
        <button class="zoom-btn" data-slot="3" data-scale="0.7" onclick="setZoom(3, 0.7, this)">70%</button>
        <button class="zoom-btn" data-slot="3" data-scale="0.6" onclick="setZoom(3, 0.6, this)">60%</button>
      </div>
      <select class="slot-select" id="slot3Tool" onchange="autoSave()">
        <option value="">-- 선택 --</option>
        <option value="AS1">AS1</option><option value="AS2">AS2</option>
        <option value="AS3">AS3</option><option value="AS4">AS4</option>
        <option value="AS5">AS5</option><option value="AS6">AS6</option>
        <option value="AS7">AS7</option><option value="AS8">AS8</option>
        <option value="AS9">AS9</option><option value="AS10">AS10</option>
      </select>
    </div>
    <div class="slot-body" id="body3">선택된 Tool이 여기에 표시됩니다</div>
  </div>

  <!-- 슬롯 4 -->
  <div class="slot-card" id="card4">
    <div class="slot-header">
      <span class="slot-num">슬롯 4</span>
      <div class="zoom-group" id="zoomGroup4">
        <span class="zoom-label">크기:</span>
        <button class="zoom-btn active" data-slot="4" data-scale="1.0" onclick="setZoom(4, 1.0, this)">100%</button>
        <button class="zoom-btn" data-slot="4" data-scale="0.9" onclick="setZoom(4, 0.9, this)">90%</button>
        <button class="zoom-btn" data-slot="4" data-scale="0.8" onclick="setZoom(4, 0.8, this)">80%</button>
        <button class="zoom-btn" data-slot="4" data-scale="0.7" onclick="setZoom(4, 0.7, this)">70%</button>
        <button class="zoom-btn" data-slot="4" data-scale="0.6" onclick="setZoom(4, 0.6, this)">60%</button>
      </div>
      <select class="slot-select" id="slot4Tool" onchange="autoSave()">
        <option value="">-- 선택 --</option>
        <option value="AS1">AS1</option><option value="AS2">AS2</option>
        <option value="AS3">AS3</option><option value="AS4">AS4</option>
        <option value="AS5">AS5</option><option value="AS6">AS6</option>
        <option value="AS7">AS7</option><option value="AS8">AS8</option>
        <option value="AS9">AS9</option><option value="AS10">AS10</option>
      </select>
    </div>
    <div class="slot-body" id="body4">선택된 Tool이 여기에 표시됩니다</div>
  </div>

</div>

<script>
const STORAGE_KEY = 'toolSettings_' + location.pathname.split('/').pop().replace('.html','');

const TOOL_FILES = {
  'AS1':'as.html','AS2':'as2.html','AS3':'as3.html','AS4':'as4.html',
  'AS5':'as5.html','AS6':'as6.html','AS7':'as7.html','AS8':'as8.html',
  'AS9':'as9.html','AS10':'as10.html'
};

const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
const BASE = isLocal ? './' : '/dashboard/tool/';

// 각 슬롯의 현재 zoom scale 저장
const slotScales = { 1: 1.0, 2: 1.0, 3: 1.0, 4: 1.0 };

/* ── 크기 조정 ── */
function setZoom(slotNum, scale, btn) {
  slotScales[slotNum] = scale;

  // 버튼 active 상태 갱신
  const group = document.getElementById(`zoomGroup${slotNum}`);
  group.querySelectorAll('.zoom-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // iframe이 있으면 즉시 적용
  applyZoom(slotNum);

  // 저장
  saveSettings();
}

function applyZoom(slotNum) {
  const body = document.getElementById(`body${slotNum}`);
  const iframe = body.querySelector('iframe');
  if (!iframe) return;

  const scale = slotScales[slotNum];
  const w = body.clientWidth;
  const h = body.clientHeight;

  // iframe 실제 크기 = 컨테이너 / scale → scale 후 꽉 채움
  iframe.style.width  = (w / scale) + 'px';
  iframe.style.height = (h / scale) + 'px';
  iframe.style.transform = `scale(${scale})`;
}

/* ── Tool 로드 ── */
function loadTool(slotNum) {
  const key  = document.getElementById(`slot${slotNum}Tool`).value;
  const body = document.getElementById(`body${slotNum}`);

  if (!key) {
    body.innerHTML = '선택된 Tool이 여기에 표시됩니다';
    body.style.display = 'flex';
    return;
  }

  body.style.display = 'block';
  body.style.padding = '0';
  body.innerHTML = `<iframe src="${BASE}${TOOL_FILES[key]}"></iframe>`;

  // iframe 로드 후 zoom 적용
  const iframe = body.querySelector('iframe');
  iframe.addEventListener('load', () => applyZoom(slotNum));
  applyZoom(slotNum);
}

/* ── 저장 / 불러오기 ── */
function saveSettings() {
  const s = {
    slot1: document.getElementById('slot1Tool').value,
    slot2: document.getElementById('slot2Tool').value,
    slot3: document.getElementById('slot3Tool').value,
    slot4: document.getElementById('slot4Tool').value,
    zoom1: slotScales[1],
    zoom2: slotScales[2],
    zoom3: slotScales[3],
    zoom4: slotScales[4],
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));

  const btn = document.getElementById('saveBtn');
  btn.textContent = '저장됨 ✓';
  btn.classList.add('saved');
  document.getElementById('saveStatus').textContent = '저장 완료 · ' + new Date().toLocaleTimeString();
  setTimeout(() => { btn.textContent = '저장'; btn.classList.remove('saved'); }, 2000);
}

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

    [1,2,3,4].forEach(i => {
      // zoom 복원
      if (s[`zoom${i}`]) {
        const scale = s[`zoom${i}`];
        slotScales[i] = scale;
        const group = document.getElementById(`zoomGroup${i}`);
        group.querySelectorAll('.zoom-btn').forEach(b => {
          b.classList.toggle('active', parseFloat(b.dataset.scale) === scale);
        });
      }
      // tool 복원
      if (s[`slot${i}`]) {
        document.getElementById(`slot${i}Tool`).value = s[`slot${i}`];
        loadTool(i);
      }
    });
  } catch(e) {}
}

let autoSaveTimer;
function autoSave() {
  [1,2,3,4].forEach(i => loadTool(i));
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(saveSettings, 800);
}

/* 창 크기 변경 시 iframe zoom 재계산 */
window.addEventListener('resize', () => {
  [1,2,3,4].forEach(i => applyZoom(i));
});

document.addEventListener('DOMContentLoaded', loadSettings);
</script>
</body>
</html>
