<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>코딩요청 · 엄마감동팀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />
<style>
  :root{
    --bg:#f3f6fb;
    --panel:#ffffff;
    --panel-2:#eef2f9;
    --border:#d7e0ee;
    --border-soft:#e2e8f2;
    --text:#1a2740;
    --muted:#5a6b8a;
    --muted-2:#8a97b0;
    --accent:#2f6fe0;
    --accent-soft:rgba(47,111,224,.10);
    --danger:#d63d46;
    --shadow-1:rgba(30,58,95,.10);
    --shadow-2:rgba(30,58,95,.16);
    --radius:16px;
    --radius-sm:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  .mono{ font-family:'IBM Plex Mono',ui-monospace,SFMono-Regular,monospace; }
  a{ color:inherit; }
  button{ font-family:inherit; }
  :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; border-radius:4px; }
  ::selection{ background:var(--accent-soft); }
  .hidden{ display:none !important; }

  .page{ max-width:1180px; margin:0 auto; padding:28px 20px 80px; }

  /* ── 상단 고정 영역 ── */
  .sticky-head{
    position:sticky; top:0; z-index:40;
    background:var(--bg);
    padding-bottom:14px; margin-bottom:4px;
    border-bottom:1px solid var(--border-soft);
  }
  .stat-line{
    font-size:11.5px; color:var(--muted); margin-top:7px;
    font-family:'IBM Plex Mono',monospace; letter-spacing:.01em;
  }
  .stat-line b{ color:var(--accent); font-weight:700; }

  /* ── 상단바 ───────────────────────────────────────── */
  .topbar{
    display:flex; align-items:flex-end; justify-content:space-between;
    gap:16px; margin-bottom:22px; flex-wrap:wrap;
  }
  .topbar h1{
    margin:0; font-size:22px; font-weight:700; letter-spacing:-.02em;
    display:flex; align-items:center; gap:10px;
  }
  .topbar h1 .eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600;
    color:var(--muted-2); letter-spacing:.08em; display:block; margin-bottom:4px;
  }
  .topbar .sub{ color:var(--muted); font-size:13px; margin-top:4px; }
  .icon-btn{
    background:var(--panel); border:1px solid var(--border); color:var(--muted);
    width:38px; height:38px; border-radius:10px; cursor:pointer; font-size:16px;
    display:flex; align-items:center; justify-content:center; transition:.15s ease;
  }
  .icon-btn:hover{ color:var(--text); border-color:var(--accent); }

  /* ── 툴바 ─────────────────────────────────────────── */
  .toolbar{
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    margin-bottom:18px;
  }
  .btn-primary{
    background:var(--accent); color:#081022; border:none; font-weight:700;
    font-size:13.5px; padding:10px 18px; border-radius:10px; cursor:pointer;
    transition:.15s ease; box-shadow:0 6px 18px rgba(92,139,255,.25);
  }
  .btn-primary:hover{ filter:brightness(1.08); transform:translateY(-1px); }
  .filter-chips{ display:flex; gap:6px; flex-wrap:wrap; }
  .filter-chip{
    background:transparent; border:1px solid var(--border); color:var(--muted);
    padding:7px 12px; border-radius:999px; font-size:12px; cursor:pointer; transition:.15s ease;
    font-family:'IBM Plex Mono',monospace;
  }
  .filter-chip:hover{ color:var(--text); border-color:var(--muted-2); }
  .filter-chip.active{ background:var(--accent-soft); border-color:var(--accent); color:#bcd0ff; }
  .search-wrap{ margin-left:auto; }
  .search-wrap input{
    background:var(--panel); border:1px solid var(--border); color:var(--text);
    padding:9px 14px; border-radius:10px; font-size:13px; width:220px; transition:.15s ease;
  }
  .search-wrap input:focus{ border-color:var(--accent); }
  .search-wrap input::placeholder{ color:var(--muted-2); }

  /* ── 카드 그리드 ──────────────────────────────────── */
  .card-grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px;
  }
  .empty-state{
    text-align:center; padding:70px 20px; color:var(--muted);
    border:1px dashed var(--border); border-radius:var(--radius);
  }
  .empty-state .big{ font-size:15px; color:var(--text); font-weight:600; margin-bottom:6px; }
  .loading-msg{ color:var(--muted-2); font-size:13px; padding:30px 4px; font-family:'IBM Plex Mono',monospace; }

  .card{
    background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
    display:flex; overflow:hidden; cursor:pointer; transition:.15s ease;
  }
  .card:hover{ border-color:var(--muted-2); transform:translateY(-2px); box-shadow:0 10px 24px var(--shadow-1); }
  .card-accent{ width:4px; flex-shrink:0; }
  .card-body{ padding:15px 16px; flex:1; min-width:0; }
  .card-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:9px; }
  .ticket{ font-size:11px; color:var(--muted-2); letter-spacing:.03em; }
  .status-pill{
    display:inline-flex; align-items:center; gap:6px;
    border:1px solid var(--c,var(--muted)); color:var(--c,var(--muted));
    padding:3px 10px 3px 8px; border-radius:999px; font-size:11px;
    font-family:'IBM Plex Mono',monospace; background:transparent; white-space:nowrap;
  }
  .status-pill .dot{
    width:6px; height:6px; border-radius:50%; background:var(--c,var(--muted));
    box-shadow:0 0 0 3px color-mix(in srgb, var(--c,var(--muted)) 22%, transparent);
  }
  .card-title{
    margin:0 0 6px; font-size:15px; font-weight:700; letter-spacing:-.01em;
    overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  }
  .card-note{
    margin:0 0 10px; font-size:12.5px; color:var(--muted); line-height:1.5;
    overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  }
  .card-tags{ display:flex; flex-wrap:wrap; gap:5px; margin-bottom:12px; }
  .tag{
    font-size:11px; padding:3px 9px; border-radius:999px; border:1px solid var(--border);
    color:var(--muted); background:var(--panel-2);
  }
  .tag-tool{ border-color:var(--c,var(--border)); color:var(--c,var(--muted)); background:transparent; font-weight:600; }
  .tag-more{ color:var(--muted-2); }
  .card-foot{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .card-people{ display:flex; align-items:center; }
  .avatar{
    width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:10.5px; font-weight:700; color:#08101f; border:2px solid var(--panel);
    margin-left:-6px; flex-shrink:0;
  }
  .avatar:first-child{ margin-left:0; }
  .muted-xs{ color:var(--muted-2); font-size:11.5px; }
  .card-meta{ font-size:10.5px; color:var(--muted-2); white-space:nowrap; }

  /* ── 모달 ─────────────────────────────────────────── */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(5,9,18,.68); backdrop-filter:blur(3px);
    display:flex; align-items:center; justify-content:center; padding:20px; z-index:100;
  }
  .modal{
    background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
    width:100%; max-width:640px; max-height:88vh; overflow-y:auto;
    box-shadow:0 30px 80px var(--shadow-2);
  }
  .modal-head{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:18px 20px; border-bottom:1px solid var(--border); position:sticky; top:0;
    background:var(--panel); z-index:2;
  }
  .modal-head h2{ margin:0; font-size:14.5px; font-weight:700; font-family:'IBM Plex Mono',monospace; color:var(--muted); }
  .modal-head-actions{ display:flex; align-items:center; gap:6px; }
  .modal-body{ padding:20px; display:flex; flex-direction:column; gap:16px; }
  .field label{
    display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:7px;
  }
  .field .hint{ font-size:11px; color:var(--muted-2); margin-top:5px; font-weight:400; }
  .field input[type=text], .field textarea{
    width:100%; background:var(--panel-2); border:1px solid var(--border); color:var(--text);
    padding:10px 12px; border-radius:var(--radius-sm); font-size:13.5px; transition:.15s ease;
    font-family:inherit;
  }
  .field input[type=text]:focus, .field textarea:focus{ border-color:var(--accent); }
  .field textarea{ resize:vertical; min-height:70px; }
  .field-title input{ font-size:16px !important; font-weight:700; }

  .status-btn-row{ display:flex; gap:6px; flex-wrap:wrap; }
  .status-btn{
    border:1px solid var(--c,var(--border)); color:var(--c,var(--muted)); background:transparent;
    padding:7px 13px; border-radius:999px; font-size:12.5px; cursor:pointer; transition:.15s ease;
    font-family:'IBM Plex Mono',monospace;
  }
  .status-btn.active{ background:var(--c,var(--accent)); color:#08101f; font-weight:700; }

  .chip-row{ display:flex; flex-wrap:wrap; gap:7px; align-items:center; }
  .chip-toggle{
    border:1px solid var(--border); background:transparent; color:var(--muted);
    padding:6px 13px; border-radius:999px; font-size:12.5px; cursor:pointer; transition:.15s ease;
  }
  .chip-toggle:hover{ border-color:var(--c,var(--accent)); color:var(--text); }
  .chip-toggle.active{ background:var(--c,var(--accent)); border-color:var(--c,var(--accent)); color:#08101f; font-weight:600; }
  .chip-work{ font-size:12px; }
  .chip-add{ border-style:dashed; color:var(--muted-2); }
  .chip-input{
    background:var(--panel-2); border:1px solid var(--accent); color:var(--text);
    padding:6px 12px; border-radius:999px; font-size:12.5px; width:110px;
  }

  .person-field{ position:relative; }
  .person-chips{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
  .person-chip{
    display:inline-flex; align-items:center; gap:6px; background:var(--panel-2); border:1px solid var(--border);
    border-radius:999px; padding:4px 10px 4px 4px; font-size:12.5px;
  }
  .chip-x{
    background:none; border:none; color:var(--muted-2); cursor:pointer; font-size:14px; padding:0 2px; line-height:1;
  }
  .chip-x:hover{ color:var(--danger); }
  .ac-input{
    width:100%; background:var(--panel-2); border:1px solid var(--border); color:var(--text);
    padding:9px 12px; border-radius:var(--radius-sm); font-size:13px;
  }
  .ac-input:focus{ border-color:var(--accent); }
  .ac-dropdown{
    position:absolute; left:0; right:0; top:calc(100% + 4px); background:var(--panel-2);
    border:1px solid var(--border); border-radius:var(--radius-sm); z-index:5; overflow:hidden;
    box-shadow:0 12px 30px var(--shadow-1); max-height:200px; overflow-y:auto;
  }
  .ac-item{ display:flex; align-items:center; gap:8px; padding:8px 12px; font-size:13px; cursor:pointer; }
  .ac-item:hover{ background:var(--border-soft); }

  .modal-footer{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:16px 20px; border-top:1px solid var(--border); position:sticky; bottom:0; background:var(--panel);
  }
  .btn-ghost{
    background:transparent; border:1px solid var(--border); color:var(--muted);
    padding:9px 16px; border-radius:10px; font-size:13px; cursor:pointer; transition:.15s ease;
  }
  .btn-ghost:hover{ color:var(--text); border-color:var(--muted-2); }
  .btn-danger-ghost{ color:var(--danger); border-color:rgba(242,84,91,.35); }
  .btn-danger-ghost:hover{ border-color:var(--danger); }

  .comments-section{ border-top:1px solid var(--border); margin-top:2px; padding-top:16px; }
  .comments-section h3{ font-size:12px; color:var(--muted); margin:0 0 10px; font-weight:600; }
  .comment-list{ display:flex; flex-direction:column; gap:8px; margin-bottom:12px; max-height:220px; overflow-y:auto; }
  .comment-item{
    background:var(--panel-2); border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:9px 12px;
  }
  .comment-text{ margin:0 0 4px; font-size:13px; white-space:pre-wrap; word-break:break-word; }
  .comment-time{ font-size:10.5px; color:var(--muted-2); }
  .comment-input-row{ display:flex; gap:6px; flex-wrap:wrap; align-items:flex-start; }
  .comment-input-row input[type=text]{
    background:var(--panel-2); border:1px solid var(--border); color:var(--text);
    padding:8px 10px; border-radius:8px; font-size:12.5px; width:100%;
  }
  .comment-input-row .cn{ width:130px; flex-shrink:0; position:relative; }
  .comment-input-row .cn .ac-dropdown{ font-size:12.5px; }
  .comment-input-row .ct{ flex:1; min-width:120px; }
  .comment-input-row button{
    background:var(--accent); color:#081022; border:none; font-weight:700; font-size:12.5px;
    padding:8px 14px; border-radius:8px; cursor:pointer;
  }

  /* ── 토스트 ───────────────────────────────────────── */
  .toast-container{ position:fixed; bottom:22px; right:22px; display:flex; flex-direction:column; gap:8px; z-index:200; }
  .toast{
    background:var(--panel); border:1px solid var(--border); color:var(--text);
    padding:11px 16px; border-radius:10px; font-size:13px; opacity:0; transform:translateY(8px);
    transition:.25s ease; box-shadow:0 10px 26px var(--shadow-1);
  }
  .toast.show{ opacity:1; transform:translateY(0); }
  .toast-error{ border-color:rgba(242,84,91,.5); color:#ffb3b6; }
  .toast-success{ border-color:rgba(63,195,122,.5); color:#a8e8c1; }

  @media (max-width:640px){
    .page{ padding:18px 14px 60px; }
    .search-wrap{ margin-left:0; width:100%; }
    .search-wrap input{ width:100%; }
    .modal{ max-height:94vh; }
  }
  @media (prefers-reduced-motion:reduce){
    *{ transition:none !important; }
  }
</style>
</head>
<body>
<noscript>이 페이지는 JavaScript가 필요합니다.</noscript>

<div class="page">
  <div class="sticky-head">
    <header class="topbar">
      <div>
        <span class="eyebrow mono">AUTOMATION IDEAS</span>
        <h1>🛠 코딩요청</h1>
        <div class="sub">엄마감동팀 자동화 아이디어 게시판 · Notion 연동</div>
        <div class="stat-line" id="statLine"></div>
      </div>
      <button id="refreshBtn" class="icon-btn mono" title="새로고침">↻</button>
    </header>

    <div class="toolbar">
      <button id="btnNew" class="btn-primary">+ 새 코딩요청</button>
      <div id="filterChips" class="filter-chips"></div>
      <div class="search-wrap"><input type="text" id="searchInput" placeholder="주제·비고 검색"></div>
    </div>
  </div>

  <div id="emptyState" class="empty-state hidden">
    <div class="big">아직 등록된 코딩요청이 없습니다</div>
    <div>+ 새 코딩요청 버튼으로 첫 아이디어를 등록해보세요</div>
  </div>
  <div id="cardGrid" class="card-grid">
    <div class="loading-msg">불러오는 중...</div>
  </div>
</div>

<!-- ── 모달 (등록/수정 겸용) ── -->
<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h2 id="modalTitleLabel">새 코딩요청 등록</h2>
      <div class="modal-head-actions">
        <button type="button" id="notionLinkBtn" class="icon-btn hidden" title="노션에서 보기">↗</button>
        <button type="button" id="closeModalBtn" class="icon-btn" title="닫기">×</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="field field-title">
        <label for="subjectInput">주제</label>
        <input type="text" id="subjectInput" placeholder="어떤 자동화 아이디어인가요?">
      </div>

      <div class="field">
        <label>현황</label>
        <div id="statusButtons" class="status-btn-row"></div>
      </div>

      <div class="field person-field">
        <label for="proposerInput">제안자</label>
        <div id="proposerChip"></div>
        <input type="text" id="proposerInput" class="ac-input" placeholder="이름 검색...">
        <div id="proposerDropdown" class="ac-dropdown hidden"></div>
        <div class="hint">※ 노션에 연결된 팀원만 선택할 수 있어요</div>
      </div>

      <div class="field person-field">
        <label for="assigneeInput">진행자 (복수가능)</label>
        <div id="assigneeChips" class="person-chips"></div>
        <input type="text" id="assigneeInput" class="ac-input" placeholder="이름 검색...">
        <div id="assigneeDropdown" class="ac-dropdown hidden"></div>
      </div>

      <div class="field">
        <label>제작Tool</label>
        <div id="toolChips" class="chip-row"></div>
      </div>

      <div class="field">
        <label>지원 및 업무</label>
        <div id="workChips" class="chip-row"></div>
      </div>

      <div class="field">
        <label for="noteInput">비고</label>
        <textarea id="noteInput" placeholder="추가 설명, 참고사항..."></textarea>
      </div>

      <div id="commentsSection" class="comments-section hidden">
        <h3>댓글</h3>
        <div id="commentList" class="comment-list"></div>
        <div class="comment-input-row">
          <div class="cn person-field">
            <input type="text" id="commentNameInput" class="ac-input" placeholder="이름">
            <div id="commentNameDropdown" class="ac-dropdown hidden"></div>
          </div>
          <input type="text" id="commentTextInput" class="ct" placeholder="댓글을 입력하세요">
          <button type="button" id="commentSubmitBtn">등록</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" id="deleteBtn" class="btn-ghost btn-danger-ghost hidden">삭제(보관)</button>
      <div style="display:flex; gap:8px; margin-left:auto;">
        <button type="button" id="cancelBtn" class="btn-ghost">취소</button>
        <button type="button" id="saveBtn" class="btn-primary">등록</button>
      </div>
    </div>
  </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script>
const WORKER_URL = 'https://coding-request.wssim231.workers.dev';

const STATUS_LIST = ['착수전','초안배포','진행중','적용중','보류'];
const WORK_OPTIONS = ['개별실행','Web','제미나이API','구글시트','거래처등록','현금환불','전표처리','수리내역','마감업무','노션내보내기'];
const BASE_TOOL_OPTIONS = ['클로드','GPT'];
const STATUS_COLOR = { '착수전':'#9096a8', '초안배포':'#33b1c7', '진행중':'#f0a63a', '적용중':'#3fc37a', '보류':'#a679e0' };
const TOOL_COLOR = { '클로드':'#e08a4f', 'GPT':'#5c9eea' };

let REQUESTS = [];
let USERS = [];
let TOOL_OPTIONS = BASE_TOOL_OPTIONS.slice();
let currentFilter = '전체';
let currentSearch = '';
let editingPageId = null;
let selectedStatus = '착수전';
let selectedProposer = null;
let selectedAssignees = [];
let selectedTools = new Set();
let selectedWorks = new Set();
let currentComments = [];

function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function statusColor(s){ return STATUS_COLOR[s] || '#9096a8'; }
function toolColor(name){ return TOOL_COLOR[name] || '#7c8db5'; }
function ticketId(id){ return 'CR-' + String(id).replace(/-/g,'').slice(-4).toUpperCase(); }
function hashColor(name){
  let h = 0;
  for (const ch of String(name || '?')) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
  return 'hsl(' + (h % 360) + ' 55% 55%)';
}
function avatarHtml(person){
  const initial = (person.name || '?').trim().charAt(0) || '?';
  return '<span class="avatar" style="background:' + hashColor(person.name) + '" title="' + escapeHtml(person.name) + '">' + escapeHtml(initial) + '</span>';
}
function relTime(str){
  if(!str) return '';
  const d = new Date(str.replace(' ','T') + ':00');
  if (isNaN(d.getTime())) return str;
  const diffMs = Date.now() - d.getTime();
  const min = Math.floor(diffMs / 60000);
  if (min < 1) return '방금 전';
  if (min < 60) return min + '분 전';
  const hr = Math.floor(min / 60);
  if (hr < 24) return hr + '시간 전';
  const day = Math.floor(hr / 24);
  if (day < 30) return day + '일 전';
  const mo = Math.floor(day / 30);
  if (mo < 12) return mo + '개월 전';
  return Math.floor(mo / 12) + '년 전';
}

function toast(msg, type){
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' toast-' + type : '');
  el.textContent = msg;
  c.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 2600);
}

async function gasGet(action, params){
  params = params || {};
  const url = new URL(WORKER_URL);
  url.searchParams.set('action', action);
  Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
  const res = await fetch(url.toString());
  return res.json();
}
async function gasPost(action, payload){
  payload = payload || {};
  const res = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(Object.assign({ action: action }, payload)),
  });
  return res.json();
}

async function loadUsers(){
  try {
    const r = await gasGet('crUsers');
    if (r.ok) USERS = r.users || [];
    if (USERS.length === 0) {
      document.getElementById('proposerInput').placeholder = '등록된 팀원 없음 (노션 연동 확인 필요)';
      document.getElementById('assigneeInput').placeholder = '등록된 팀원 없음 (노션 연동 확인 필요)';
    }
  } catch(e) { console.error(e); }
}

function deriveToolOptions(){
  const set = new Set(BASE_TOOL_OPTIONS);
  REQUESTS.forEach(r => (r.제작Tool || []).forEach(t => set.add(t)));
  TOOL_OPTIONS = Array.from(set);
}

async function loadList(){
  try {
    const r = await gasGet('crList');
    if (r.ok) { REQUESTS = r.rows || []; deriveToolOptions(); }
    else toast(r.msg || '목록을 불러오지 못했습니다', 'error');
  } catch(e) { toast('서버 연결 실패: ' + e.message, 'error'); }
}

function getFiltered(){
  return REQUESTS.filter(r => {
    if (currentFilter !== '전체' && r.현황 !== currentFilter) return false;
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      if (!((r.주제 || '').toLowerCase().includes(q) || (r.비고 || '').toLowerCase().includes(q))) return false;
    }
    return true;
  });
}

function cardHTML(r){
  const c = statusColor(r.현황);
  const toolTags = (r.제작Tool || []).map(t => '<span class="tag tag-tool" style="--c:' + toolColor(t) + '">' + escapeHtml(t) + '</span>').join('');
  const workList = r.지원업무 || [];
  const workShown = workList.slice(0, 3).map(w => '<span class="tag">' + escapeHtml(w) + '</span>').join('');
  const workMore = workList.length > 3 ? '<span class="tag tag-more">+' + (workList.length - 3) + '</span>' : '';
  const people = [].concat(r.제안자 || [], r.진행자 || []).slice(0, 4).map(avatarHtml).join('');
  return (
    '<article class="card" data-id="' + r.pageId + '">' +
      '<div class="card-accent" style="background:' + c + '"></div>' +
      '<div class="card-body">' +
        '<div class="card-top">' +
          '<span class="ticket mono">' + ticketId(r.pageId) + '</span>' +
          '<span class="status-pill" style="--c:' + c + '"><i class="dot"></i>' + escapeHtml(r.현황 || '-') + '</span>' +
        '</div>' +
        '<h3 class="card-title">' + escapeHtml(r.주제 || '(제목 없음)') + '</h3>' +
        (r.비고 ? '<p class="card-note">' + escapeHtml(r.비고) + '</p>' : '') +
        '<div class="card-tags">' + toolTags + workShown + workMore + '</div>' +
        '<div class="card-foot">' +
          '<div class="card-people">' + (people || '<span class="muted-xs">-</span>') + '</div>' +
          '<div class="card-meta mono">' + relTime(r.createdAt) + '</div>' +
        '</div>' +
      '</div>' +
    '</article>'
  );
}

function updateFilterCounts(){
  const counts = { '전체': REQUESTS.length };
  STATUS_LIST.forEach(s => counts[s] = REQUESTS.filter(r => r.현황 === s).length);
  document.querySelectorAll('.filter-chip').forEach(b => {
    const f = b.dataset.f;
    b.textContent = f + ' (' + (counts[f] || 0) + ')';
  });
}

function renderStatLine(){
  const el = document.getElementById('statLine');
  if (!el) return;
  if (!REQUESTS.length) { el.innerHTML = ''; return; }
  const total = REQUESTS.length;
  const applied = REQUESTS.filter(r => r.현황 === '적용중').length;
  const people = new Set();
  REQUESTS.forEach(r => {
    (r.제안자 || []).forEach(p => people.add(p.id));
    (r.진행자 || []).forEach(p => people.add(p.id));
  });
  el.innerHTML = '🔥 지금까지 <b>' + total + '</b>건의 아이디어 · <b>' + applied + '</b>건 실제 적용 · <b>' + people.size + '</b>명 참여 중';
}

function render(){
  const list = getFiltered();
  const grid = document.getElementById('cardGrid');
  const empty = document.getElementById('emptyState');
  if (list.length === 0) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
  } else {
    empty.classList.add('hidden');
    grid.innerHTML = list.map(cardHTML).join('');
    grid.querySelectorAll('.card').forEach(el => {
      el.addEventListener('click', () => openEdit(el.dataset.id));
    });
  }
  updateFilterCounts();
  renderStatLine();
}

function initFilters(){
  const el = document.getElementById('filterChips');
  const list = ['전체'].concat(STATUS_LIST);
  el.innerHTML = list.map(s => '<button type="button" class="filter-chip' + (s === currentFilter ? ' active' : '') + '" data-f="' + s + '">' + s + '</button>').join('');
  el.querySelectorAll('.filter-chip').forEach(b => {
    b.addEventListener('click', () => {
      currentFilter = b.dataset.f;
      el.querySelectorAll('.filter-chip').forEach(x => x.classList.toggle('active', x === b));
      render();
    });
  });
}

function renderStatusButtons(){
  const el = document.getElementById('statusButtons');
  el.innerHTML = STATUS_LIST.map(s =>
    '<button type="button" class="status-btn' + (s === selectedStatus ? ' active' : '') + '" data-s="' + s + '" style="--c:' + statusColor(s) + '">' + s + '</button>'
  ).join('');
  el.querySelectorAll('.status-btn').forEach(b => {
    b.addEventListener('click', () => { selectedStatus = b.dataset.s; renderStatusButtons(); });
  });
}

function renderToolChips(){
  const el = document.getElementById('toolChips');
  el.innerHTML = TOOL_OPTIONS.map(t =>
    '<button type="button" class="chip-toggle' + (selectedTools.has(t) ? ' active' : '') + '" data-t="' + escapeHtml(t) + '" style="--c:' + toolColor(t) + '">' + escapeHtml(t) + '</button>'
  ).join('') + '<button type="button" id="toolAddBtn" class="chip-toggle chip-add">+ 도구추가</button>';
  el.querySelectorAll('.chip-toggle[data-t]').forEach(b => {
    b.addEventListener('click', () => {
      const t = b.dataset.t;
      if (selectedTools.has(t)) selectedTools.delete(t); else selectedTools.add(t);
      renderToolChips();
    });
  });
  document.getElementById('toolAddBtn').addEventListener('click', addNewToolInline);
}

function addNewToolInline(){
  const el = document.getElementById('toolChips');
  const addBtn = document.getElementById('toolAddBtn');
  const input = document.createElement('input');
  input.type = 'text'; input.className = 'chip-input'; input.placeholder = '도구 이름';
  addBtn.replaceWith(input);
  input.focus();
  let committed = false;
  const commit = async () => {
    if (committed) return; committed = true;
    const name = input.value.trim();
    if (!name) { renderToolChips(); return; }
    input.disabled = true;
    try {
      const r = await gasPost('crAddTool', { name: name });
      if (r.ok) {
        if (!TOOL_OPTIONS.includes(name)) TOOL_OPTIONS.push(name);
        selectedTools.add(name);
        toast(r.already ? '이미 있는 도구입니다' : '도구 추가됨: ' + name, 'success');
      } else {
        toast(r.msg || '도구 추가 실패', 'error');
      }
    } catch(e) { toast('서버 연결 실패: ' + e.message, 'error'); }
    renderToolChips();
  };
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { committed = true; renderToolChips(); }
  });
  input.addEventListener('blur', commit);
}

function renderWorkChips(){
  const el = document.getElementById('workChips');
  el.innerHTML = WORK_OPTIONS.map(w =>
    '<button type="button" class="chip-toggle chip-work' + (selectedWorks.has(w) ? ' active' : '') + '" data-w="' + escapeHtml(w) + '">' + escapeHtml(w) + '</button>'
  ).join('');
  el.querySelectorAll('.chip-toggle[data-w]').forEach(b => {
    b.addEventListener('click', () => {
      const w = b.dataset.w;
      if (selectedWorks.has(w)) selectedWorks.delete(w); else selectedWorks.add(w);
      renderWorkChips();
    });
  });
}

function renderProposerChip(){
  const wrap = document.getElementById('proposerChip');
  const input = document.getElementById('proposerInput');
  if (selectedProposer) {
    wrap.innerHTML = '<span class="person-chip">' + avatarHtml(selectedProposer) + escapeHtml(selectedProposer.name) + '<button type="button" class="chip-x" aria-label="제거">×</button></span>';
    wrap.querySelector('.chip-x').addEventListener('click', () => { selectedProposer = null; renderProposerChip(); });
    input.value = ''; input.classList.add('hidden');
  } else {
    wrap.innerHTML = '';
    input.classList.remove('hidden');
  }
}

function renderAssigneeChips(){
  const wrap = document.getElementById('assigneeChips');
  wrap.innerHTML = selectedAssignees.map((p, i) =>
    '<span class="person-chip">' + avatarHtml(p) + escapeHtml(p.name) + '<button type="button" class="chip-x" data-i="' + i + '" aria-label="제거">×</button></span>'
  ).join('');
  wrap.querySelectorAll('.chip-x').forEach(b => {
    b.addEventListener('click', () => { selectedAssignees.splice(Number(b.dataset.i), 1); renderAssigneeChips(); });
  });
}

function setupAutocomplete(inputId, dropdownId, mode){
  const input = document.getElementById(inputId);
  const dropdown = document.getElementById(dropdownId);
  function excludedIds(){
    return mode === 'assignee' ? selectedAssignees.map(p => p.id) : (mode === 'proposer' && selectedProposer ? [selectedProposer.id] : []);
  }
  function show(matches){
    if (matches.length === 0) { dropdown.classList.add('hidden'); return; }
    dropdown.innerHTML = matches.map(u => '<div class="ac-item" data-id="' + u.id + '">' + avatarHtml(u) + escapeHtml(u.name) + '</div>').join('');
    dropdown.classList.remove('hidden');
    dropdown.querySelectorAll('.ac-item').forEach(elx => {
      elx.addEventListener('mousedown', e => {
        e.preventDefault();
        const u = USERS.find(x => x.id === elx.dataset.id);
        if (!u) return;
        if (mode === 'assignee') { selectedAssignees.push(u); renderAssigneeChips(); input.value = ''; }
        else if (mode === 'proposer') { selectedProposer = u; renderProposerChip(); input.value = ''; }
        else { input.value = u.name; }
        dropdown.classList.add('hidden');
      });
    });
  }
  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (!q) { dropdown.classList.add('hidden'); return; }
    const excl = excludedIds();
    show(USERS.filter(u => !excl.includes(u.id) && u.name.toLowerCase().includes(q)).slice(0, 8));
  });
  input.addEventListener('focus', () => { if (input.value.trim()) input.dispatchEvent(new Event('input')); });
  input.addEventListener('blur', () => { setTimeout(() => dropdown.classList.add('hidden'), 150); });
}

function resetModalState(){
  editingPageId = null;
  selectedStatus = '착수전';
  selectedProposer = null;
  selectedAssignees = [];
  selectedTools = new Set();
  selectedWorks = new Set();
  currentComments = [];
}

function refreshModalFields(){
  renderStatusButtons();
  renderProposerChip();
  renderAssigneeChips();
  renderToolChips();
  renderWorkChips();
}

function showModal(){
  document.getElementById('modalOverlay').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
  document.getElementById('subjectInput').focus();
}
function closeModal(){
  document.getElementById('modalOverlay').classList.add('hidden');
  document.body.style.overflow = '';
}

function openCreate(){
  resetModalState();
  document.getElementById('modalTitleLabel').textContent = '새 코딩요청 등록';
  document.getElementById('subjectInput').value = '';
  document.getElementById('noteInput').value = '';
  refreshModalFields();
  document.getElementById('commentsSection').classList.add('hidden');
  document.getElementById('deleteBtn').classList.add('hidden');
  document.getElementById('notionLinkBtn').classList.add('hidden');
  document.getElementById('saveBtn').textContent = '등록';
  showModal();
}

function openEdit(pageId){
  const r = REQUESTS.find(x => x.pageId === pageId);
  if (!r) return;
  resetModalState();
  editingPageId = pageId;
  document.getElementById('modalTitleLabel').textContent = ticketId(pageId) + ' 수정';
  document.getElementById('subjectInput').value = r.주제 || '';
  document.getElementById('noteInput').value = r.비고 || '';
  selectedStatus = r.현황 || '착수전';
  selectedProposer = (r.제안자 && r.제안자[0]) ? Object.assign({}, r.제안자[0]) : null;
  selectedAssignees = (r.진행자 || []).map(p => Object.assign({}, p));
  selectedTools = new Set(r.제작Tool || []);
  selectedWorks = new Set(r.지원업무 || []);
  refreshModalFields();

  document.getElementById('commentsSection').classList.remove('hidden');
  document.getElementById('deleteBtn').classList.remove('hidden');
  const notionBtn = document.getElementById('notionLinkBtn');
  notionBtn.classList.remove('hidden');
  notionBtn.onclick = () => window.open(r.url, '_blank');
  document.getElementById('saveBtn').textContent = '저장';
  document.getElementById('commentList').innerHTML = '<p class="muted-xs">불러오는 중...</p>';
  loadComments(pageId);
  showModal();
}

async function submitModal(){
  const subject = document.getElementById('subjectInput').value.trim();
  if (!subject) { toast('주제를 입력하세요', 'error'); document.getElementById('subjectInput').focus(); return; }
  const payload = {
    pageId: editingPageId || '',
    subject: subject,
    note: document.getElementById('noteInput').value.trim(),
    proposer: selectedProposer ? selectedProposer.id : '',
    assignees: selectedAssignees.map(p => p.id),
    status: selectedStatus,
    tools: Array.from(selectedTools),
    works: Array.from(selectedWorks),
  };
  const btn = document.getElementById('saveBtn');
  const prevLabel = btn.textContent;
  btn.disabled = true; btn.textContent = '저장 중...';
  try {
    const r = await gasPost('crSave', payload);
    if (r.ok) {
      toast(editingPageId ? '수정되었습니다' : '등록되었습니다', 'success');
      closeModal();
      await loadList(); render();
    } else {
      toast(r.msg || '저장 실패', 'error');
    }
  } catch(e) { toast('서버 연결 실패: ' + e.message, 'error'); }
  btn.disabled = false; btn.textContent = prevLabel;
}

async function archiveCurrent(){
  if (!editingPageId) return;
  if (!confirm('이 요청을 삭제(보관)하시겠습니까? 노션에서도 보관 처리됩니다.')) return;
  try {
    const r = await gasPost('crArchive', { pageId: editingPageId });
    if (r.ok) { toast('삭제되었습니다', 'success'); closeModal(); await loadList(); render(); }
    else toast(r.msg || '삭제 실패', 'error');
  } catch(e) { toast('서버 연결 실패: ' + e.message, 'error'); }
}

async function loadComments(pageId){
  try {
    const r = await gasGet('crComments', { pageId: pageId });
    if (r.ok) { currentComments = r.comments || []; renderComments(); }
    else document.getElementById('commentList').innerHTML = '<p class="muted-xs">댓글을 불러오지 못했습니다: ' + escapeHtml(r.msg || '') + '</p>';
  } catch(e) { document.getElementById('commentList').innerHTML = '<p class="muted-xs">서버 연결 실패</p>'; }
}
function renderComments(){
  const listEl = document.getElementById('commentList');
  if (currentComments.length === 0) { listEl.innerHTML = '<p class="muted-xs">아직 댓글이 없습니다.</p>'; return; }
  listEl.innerHTML = currentComments.map(c =>
    '<div class="comment-item"><p class="comment-text">' + escapeHtml(c.text) + '</p><span class="comment-time mono">' + escapeHtml(c.createdAt) + '</span></div>'
  ).join('');
}
async function submitComment(){
  if (!editingPageId) return;
  const nameInput = document.getElementById('commentNameInput');
  const textInput = document.getElementById('commentTextInput');
  const name = nameInput.value.trim() || '익명';
  const text = textInput.value.trim();
  if (!text) { textInput.focus(); return; }
  const discussionId = (currentComments[0] && currentComments[0].discussionId) || '';
  const btn = document.getElementById('commentSubmitBtn');
  btn.disabled = true;
  try {
    const r = await gasPost('crAddComment', { pageId: editingPageId, discussionId: discussionId, name: name, text: text });
    if (r.ok) { textInput.value = ''; await loadComments(editingPageId); }
    else toast(r.msg || '댓글 등록 실패', 'error');
  } catch(e) { toast('서버 연결 실패: ' + e.message, 'error'); }
  btn.disabled = false;
}

document.getElementById('btnNew').addEventListener('click', openCreate);
document.getElementById('closeModalBtn').addEventListener('click', closeModal);
document.getElementById('cancelBtn').addEventListener('click', closeModal);
document.getElementById('saveBtn').addEventListener('click', submitModal);
document.getElementById('deleteBtn').addEventListener('click', archiveCurrent);
document.getElementById('commentSubmitBtn').addEventListener('click', submitComment);
document.getElementById('refreshBtn').addEventListener('click', async () => { await loadList(); render(); toast('새로고침 완료', 'success'); });
document.getElementById('searchInput').addEventListener('input', e => { currentSearch = e.target.value; render(); });
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target.id === 'modalOverlay') closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && !document.getElementById('modalOverlay').classList.contains('hidden')) closeModal(); });
document.getElementById('commentTextInput').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); submitComment(); } });

(async function init(){
  initFilters();
  setupAutocomplete('proposerInput', 'proposerDropdown', 'proposer');
  setupAutocomplete('assigneeInput', 'assigneeDropdown', 'assignee');
  setupAutocomplete('commentNameInput', 'commentNameDropdown', 'text');
  await Promise.all([loadUsers(), loadList()]);
  render();
})();
</script>
</body>
