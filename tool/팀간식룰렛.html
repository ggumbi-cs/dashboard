<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎡 팀 간식 룰렛</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

  :root {
    --purple-light: #EEEDFE;
    --purple-mid: #7F77DD;
    --purple-dark: #534AB7;
    --purple-deep: #26215C;
    --bg: #F7F6FF;
    --surface: #FFFFFF;
    --border: rgba(83,74,183,0.15);
    --text: #1a1825;
    --text-sub: #6b6880;
    --red: #E24B4A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-left h1 { font-size: 17px; font-weight: 700; color: var(--purple-deep); }
  .badge-2x {
    background: var(--purple-light);
    color: var(--purple-dark);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 999px;
    letter-spacing: 0.03em;
  }
  .month-chip {
    background: var(--purple-mid);
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 999px;
  }

  /* ── WINNER BANNER ── */
  .winner-banner {
    display: none;
    background: linear-gradient(135deg, #EEEDFE 0%, #F0EEFF 100%);
    border: 1px solid #AFA9EC;
    border-radius: 14px;
    margin: 1.25rem 1.5rem 0;
    padding: 1rem 1.25rem;
    align-items: center;
    gap: 14px;
  }
  .winner-banner.show { display: flex; }
  .winner-trophy { font-size: 32px; flex-shrink: 0; }
  .winner-info { flex: 1; min-width: 0; }
  .winner-label { font-size: 11px; color: var(--purple-dark); font-weight: 700; letter-spacing: 0.06em; margin-bottom: 3px; }
  .winner-name { font-size: 18px; font-weight: 700; color: var(--purple-deep); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .winner-date { font-size: 11px; color: var(--purple-mid); margin-top: 3px; }
  .winner-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn-replay {
    background: var(--purple-dark);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-replay:hover { background: var(--purple-deep); }
  .btn-reset {
    background: none;
    color: var(--text-sub);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: color 0.15s;
  }
  .btn-reset:hover { color: var(--red); border-color: var(--red); }

  /* ── GIST CONFIG ── */
  .gist-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin: 1.25rem 1.5rem 0;
    padding: 1rem 1.25rem;
  }
  .gist-panel summary {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-sub);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
  }
  .gist-panel summary::marker { display: none; }
  .gist-panel summary::-webkit-details-marker { display: none; }
  .gist-arrow { transition: transform 0.2s; display: inline-block; }
  details[open] .gist-arrow { transform: rotate(90deg); }
  .gist-fields { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .gist-fields label { font-size: 11px; color: var(--text-sub); margin-bottom: 2px; display: block; }
  .gist-fields input {
    width: 100%;
    font-size: 13px;
    font-family: 'Courier New', monospace;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
  }
  .gist-fields input:focus { outline: none; border-color: var(--purple-mid); }
  .gist-help {
    font-size: 11px;
    color: var(--text-sub);
    line-height: 1.6;
    background: #f9f8ff;
    border-radius: 8px;
    padding: 10px 12px;
    border: 1px solid var(--border);
  }
  .gist-help a { color: var(--purple-dark); }
  .gist-status { font-size: 11px; margin-top: 6px; padding: 5px 10px; border-radius: 6px; display: none; }
  .gist-status.ok { display: block; background: #EAF3DE; color: #3B6D11; }
  .gist-status.err { display: block; background: #FCEBEB; color: #A32D2D; }
  .gist-status.loading { display: block; background: var(--purple-light); color: var(--purple-dark); }
  .btn-gist-save {
    background: var(--purple-dark);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-gist-save:hover { background: var(--purple-deep); }

  /* ── MAIN LAYOUT ── */
  .main {
    display: grid;
    grid-template-columns: minmax(320px, 560px) 1fr;
    gap: 1.25rem;
    padding: 1.25rem 1.5rem 2rem;
    align-items: start;
  }
  @media (max-width: 600px) {
    .main { grid-template-columns: 1fr; }
  }

  /* ── SETUP PANEL ── */
  .setup-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem;
  }
  .setup-panel h3 {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-sub);
    margin-bottom: 12px;
    letter-spacing: 0.04em;
  }
  .col-labels {
    display: grid;
    grid-template-columns: 3fr 64px 28px;
    gap: 6px;
    margin-bottom: 4px;
  }
  .col-labels span { font-size: 10px; color: var(--text-sub); padding: 0 4px; }
  .item-row {
    display: grid;
    grid-template-columns: 3fr 64px 28px;
    gap: 6px;
    align-items: center;
    margin-bottom: 6px;
  }
  .item-row input[type="text"],
  .item-row input[type="number"] {
    font-size: 12px;
    padding: 5px 8px;
    height: 30px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    width: 100%;
  }
  .item-row input[type="number"] { text-align: center; }
  .item-row input:focus { outline: none; border-color: var(--purple-mid); }
  .del-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text-sub);
    cursor: pointer;
    width: 28px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.15s;
  }
  .del-btn:hover { background: #FCEBEB; color: var(--red); border-color: var(--red); }
  .add-btn {
    margin-top: 6px;
    background: none;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--text-sub);
    cursor: pointer;
    width: 100%;
    padding: 7px;
    font-size: 12px;
    font-family: inherit;
    transition: background 0.15s;
  }
  .add-btn:hover { background: var(--purple-light); color: var(--purple-dark); }

  /* ── ROULETTE ── */
  .roulette-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
  }
  .canvas-wrap { position: relative; }
  #roulette { display: block; border-radius: 50%; }
  .pointer-wrap {
    position: absolute;
    top: 50%;
    right: -26px;
    transform: translateY(-50%);
  }
  .pointer {
    width: 0; height: 0;
    border-top: 20px solid transparent;
    border-bottom: 20px solid transparent;
    border-right: 36px solid var(--red);
    filter: drop-shadow(0 2px 4px rgba(226,75,74,0.4));
  }
  #spin-btn {
    padding: 12px 52px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    border-radius: 999px;
    border: none;
    background: linear-gradient(135deg, var(--purple-mid), var(--purple-dark));
    color: #fff;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.15s;
    box-shadow: 0 4px 18px rgba(83,74,183,0.35);
    letter-spacing: 0.02em;
  }
  #spin-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(83,74,183,0.45); }
  #spin-btn:active { transform: scale(0.97); }
  #spin-btn:disabled {
    background: #ddd;
    color: #999;
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  /* ── OVERLAY / RESULT ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,16,50,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .overlay.show { display: flex; }
  #confetti-canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 99;
    width: 100%; height: 100%;
  }
  .result-card {
    background: var(--surface);
    border-radius: 20px;
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    max-width: 340px;
    width: 90%;
    border: 1px solid var(--border);
    position: relative;
    z-index: 101;
    box-shadow: 0 24px 60px rgba(83,74,183,0.2);
  }
  .result-ribbon {
    display: inline-block;
    background: var(--purple-light);
    color: var(--purple-dark);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 4px 14px;
    border-radius: 999px;
    margin-bottom: 16px;
  }
  .result-trophy { font-size: 52px; margin-bottom: 10px; display: block; }
  .result-name { font-size: 22px; font-weight: 700; color: var(--purple-deep); margin-bottom: 8px; word-break: keep-all; }
  .result-sub { font-size: 13px; color: var(--text-sub); line-height: 1.7; margin-bottom: 1.75rem; }
  .result-sub strong { color: var(--purple-dark); }
  .result-close {
    background: var(--purple-light);
    border: none;
    border-radius: 10px;
    padding: 10px 32px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    color: var(--purple-dark);
    cursor: pointer;
    transition: background 0.15s;
  }
  .result-close:hover { background: #dddafc; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <h1>🎡 팀 간식 룰렛</h1>
    <span class="badge-2x">당첨 시 2배 구매</span>
  </div>
  <span class="month-chip" id="month-chip"></span>
</div>

<!-- WINNER BANNER -->
<div class="winner-banner" id="winner-banner">
  <div class="winner-trophy">🏆</div>
  <div class="winner-info">
    <div class="winner-label">이달의 당첨 간식</div>
    <div class="winner-name" id="banner-name"></div>
    <div class="winner-date" id="banner-date"></div>
  </div>
  <div class="winner-actions">
    <button class="btn-replay" id="btn-replay">🎉 다시 보기</button>
    <button class="btn-reset" id="btn-reset">초기화</button>
  </div>
</div>

<!-- GIST CONFIG (개발자 전용 — ?dev=1 파라미터일 때만 표시) -->
<details class="gist-panel" id="gist-details" style="display:none">
  <summary>
    <span class="gist-arrow">▶</span>
    ⚙️ 결과 공유 설정 (GitHub Gist 연동)
  </summary>
  <div class="gist-fields">
    <div class="gist-help">
      📌 <strong>설정 방법</strong><br>
      1. <a href="https://gist.github.com" target="_blank">gist.github.com</a>에서 <code>snack_result.json</code> 이름으로 <strong>공개(Public)</strong> Gist 생성<br>
      2. 파일 내용은 <code>{}</code> 로 시작하면 됩니다<br>
      3. <a href="https://github.com/settings/tokens" target="_blank">GitHub Token</a>에서 <code>gist</code> 권한으로 토큰 발급<br>
      4. 아래에 입력 후 저장 → 이제 누구나 같은 결과 확인 가능!
    </div>
    <div>
      <label>Gist ID (URL의 마지막 부분)</label>
      <input type="text" id="gist-id" placeholder="예: a1b2c3d4e5f6..." />
    </div>
    <div>
      <label>GitHub Personal Access Token (gist 권한)</label>
      <input type="password" id="gist-token" placeholder="ghp_xxxxxxxxxxxx" />
    </div>
    <button class="btn-gist-save" id="btn-gist-save">설정 저장 (이 브라우저에만)</button>
    <div class="gist-status" id="gist-status"></div>
  </div>
</details>

<!-- MAIN -->
<div class="main">
  <!-- SETUP -->
  <div class="setup-panel">
    <h3>📋 항목 설정 (2~10가지)</h3>
    <div class="col-labels">
      <span>제품명</span>
      <span style="text-align:center">투표권</span>
      <span></span>
    </div>
    <div id="items-list"></div>
    <button class="add-btn" id="add-btn">＋ 항목 추가</button>
  </div>

  <!-- ROULETTE -->
  <div class="roulette-panel">
    <div class="canvas-wrap">
      <canvas id="roulette" width="600" height="600"></canvas>
      <div class="pointer-wrap"><div class="pointer"></div></div>
    </div>
    <button id="spin-btn">🎰 룰렛 돌리기</button>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <canvas id="confetti-canvas"></canvas>
  <div class="result-card">
    <div class="result-ribbon" id="result-ribbon"></div>
    <span class="result-trophy">🎊</span>
    <div class="result-name" id="result-name"></div>
    <div class="result-sub" id="result-sub"></div>
    <button class="result-close" id="close-btn">확인</button>
  </div>
</div>

<script>
// ── DEV MODE (?dev=1) ──
const isDev = new URLSearchParams(window.location.search).get('dev') === '1';
if (isDev) {
  document.getElementById('gist-details').style.display = 'block';
}

// ── COLORS ──
const COLORS = [
  '#7F77DD','#1D9E75','#D85A30','#378ADD','#BA7517',
  '#D4537E','#639922','#E24B4A','#534AB7','#0F6E56'
];

// ── STATE ──
const defaultItems = [
  { name: '오리온 비초비 비스켓', votes: 5 },
  { name: '곰곰 달달 맛밥', votes: 6 },
  { name: '오리온 눈을감자', votes: 2 },
  { name: '오레오 화이트크림+딸기', votes: 1 },
  { name: '몽쉘 생크림케이크 카카오', votes: 3 },
  { name: '빼빼로 아몬드', votes: 5 },
  { name: '새 간식 후보 A', votes: 3 },
];

let items = defaultItems.map(i => ({ ...i }));
let isSpinning = false;
let currentAngle = 0;
let monthWinner = null; // { name, date, angle }

// ── ELEMENTS ──
const canvas = document.getElementById('roulette');
const ctx = canvas.getContext('2d');
const itemsList = document.getElementById('items-list');
const addBtn = document.getElementById('add-btn');
const spinBtn = document.getElementById('spin-btn');
const overlay = document.getElementById('overlay');
const closeBtn = document.getElementById('close-btn');
const winnerBanner = document.getElementById('winner-banner');
const bannerName = document.getElementById('banner-name');
const bannerDate = document.getElementById('banner-date');
const btnReplay = document.getElementById('btn-replay');
const btnReset = document.getElementById('btn-reset');
const gistIdInput = document.getElementById('gist-id');
const gistTokenInput = document.getElementById('gist-token');
const btnGistSave = document.getElementById('btn-gist-save');
const gistStatus = document.getElementById('gist-status');
const monthChip = document.getElementById('month-chip');

// ── MONTH HELPERS ──
function getMonthKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function getMonthLabel() {
  const d = new Date();
  return `${d.getFullYear()}년 ${d.getMonth()+1}월`;
}
monthChip.textContent = getMonthLabel();

// ── LOCAL STORAGE: gist config ──
function loadGistConfig() {
  gistIdInput.value = localStorage.getItem('gist_id') || '';
  gistTokenInput.value = localStorage.getItem('gist_token') || '';
}
btnGistSave.addEventListener('click', () => {
  localStorage.setItem('gist_id', gistIdInput.value.trim());
  localStorage.setItem('gist_token', gistTokenInput.value.trim());
  showStatus('설정이 저장되었습니다.', 'ok');
  loadResultFromGist();
});

function showStatus(msg, type) {
  gistStatus.textContent = msg;
  gistStatus.className = 'gist-status ' + type;
  if (type !== 'loading') setTimeout(() => { gistStatus.className = 'gist-status'; }, 3500);
}

// ── GIST API ──
async function loadResultFromGist() {
  const id = localStorage.getItem('gist_id');
  if (!id) return;
  showStatus('결과 불러오는 중...', 'loading');
  try {
    const res = await fetch(`https://api.github.com/gists/${id}`, {
      headers: { 'Accept': 'application/vnd.github+json' }
    });
    if (!res.ok) throw new Error('Gist 접근 실패 (ID 확인 필요)');
    const data = await res.json();
    const file = data.files['snack_result.json'];
    if (!file) throw new Error('snack_result.json 파일 없음');
    const content = JSON.parse(file.content);
    const key = getMonthKey();
    if (content[key]) {
      monthWinner = content[key];
      showWinnerBanner(monthWinner);
      showStatus('이달의 결과를 불러왔습니다.', 'ok');
    } else {
      showStatus('이번 달 결과 없음 — 룰렛을 돌려보세요!', 'ok');
    }
  } catch(e) {
    showStatus('⚠ ' + e.message, 'err');
  }
}

async function saveResultToGist(winner) {
  const id = localStorage.getItem('gist_id');
  const token = localStorage.getItem('gist_token');
  if (!id || !token) {
    showStatus('⚠ Gist ID와 Token을 먼저 설정해주세요.', 'err');
    document.getElementById('gist-details').open = true;
    return false;
  }
  showStatus('결과 저장 중...', 'loading');
  try {
    // 먼저 기존 내용 읽기
    const getRes = await fetch(`https://api.github.com/gists/${id}`, {
      headers: { 'Accept': 'application/vnd.github+json', 'Authorization': `Bearer ${token}` }
    });
    if (!getRes.ok) throw new Error('Gist 읽기 실패');
    const getData = await getRes.json();
    const existing = getData.files['snack_result.json'];
    let content = {};
    if (existing) {
      try { content = JSON.parse(existing.content); } catch(e) {}
    }
    // 이달의 결과 추가
    content[getMonthKey()] = winner;
    const patchRes = await fetch(`https://api.github.com/gists/${id}`, {
      method: 'PATCH',
      headers: {
        'Accept': 'application/vnd.github+json',
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        files: { 'snack_result.json': { content: JSON.stringify(content, null, 2) } }
      })
    });
    if (!patchRes.ok) throw new Error('저장 실패 (Token 권한 확인)');
    showStatus('✅ 결과가 Gist에 저장되었습니다!', 'ok');
    return true;
  } catch(e) {
    showStatus('⚠ ' + e.message, 'err');
    return false;
  }
}

// ── WINNER BANNER ──
function showWinnerBanner(w) {
  bannerName.textContent = w.name;
  bannerDate.textContent = w.date + ' 당첨';
  winnerBanner.classList.add('show');
  // 룰렛도 당첨 위치로 복원
  if (typeof w.angle === 'number') {
    currentAngle = w.angle;
    drawWheel();
  }
  spinBtn.disabled = true;
  spinBtn.textContent = '이달의 당첨 완료 🏆';
}

btnReplay.addEventListener('click', () => {
  if (!monthWinner) return;
  document.getElementById('result-ribbon').textContent = getMonthLabel() + ' 당첨';
  document.getElementById('result-name').textContent = monthWinner.name;
  document.getElementById('result-sub').innerHTML =
    `🛒 <strong>${monthWinner.name}</strong>이(가) 당첨됐습니다!<br>수량을 <strong>2배</strong>로 구매해 주세요 🎁<br><span style="font-size:11px;color:#aaa">${monthWinner.date} 추첨</span>`;
  overlay.classList.add('show');
  launchConfetti();
});

btnReset.addEventListener('click', async () => {
  if (!confirm(`${getMonthLabel()} 당첨 결과를 초기화하고 다시 돌리시겠습니까?`)) return;
  // Gist에서 해당 월 삭제
  const id = localStorage.getItem('gist_id');
  const token = localStorage.getItem('gist_token');
  if (id && token) {
    try {
      const getRes = await fetch(`https://api.github.com/gists/${id}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const getData = await getRes.json();
      const existing = getData.files['snack_result.json'];
      let content = {};
      if (existing) { try { content = JSON.parse(existing.content); } catch(e) {} }
      delete content[getMonthKey()];
      await fetch(`https://api.github.com/gists/${id}`, {
        method: 'PATCH',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ files: { 'snack_result.json': { content: JSON.stringify(content, null, 2) } } })
      });
    } catch(e) {}
  }
  monthWinner = null;
  winnerBanner.classList.remove('show');
  spinBtn.disabled = false;
  spinBtn.textContent = '🎰 룰렛 돌리기';
  currentAngle = 0;
  drawWheel();
});

// ── ITEM LIST ──
function renderList() {
  itemsList.innerHTML = '';
  items.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML = `
      <input type="text" value="${item.name}" placeholder="제품명" data-i="${i}" class="name-input" />
      <input type="number" value="${item.votes}" min="1" max="99" data-i="${i}" class="vote-input" />
      <button class="del-btn" data-i="${i}">×</button>
    `;
    itemsList.appendChild(row);
  });
  itemsList.querySelectorAll('.name-input').forEach(el =>
    el.addEventListener('input', e => { items[+e.target.dataset.i].name = e.target.value; drawWheel(); })
  );
  itemsList.querySelectorAll('.vote-input').forEach(el =>
    el.addEventListener('input', e => { items[+e.target.dataset.i].votes = Math.max(1, +e.target.value||1); drawWheel(); })
  );
  itemsList.querySelectorAll('.del-btn').forEach(el =>
    el.addEventListener('click', e => {
      if (items.length <= 2) return;
      items.splice(+e.target.dataset.i, 1);
      renderList();
    })
  );
  addBtn.style.display = items.length >= 10 ? 'none' : 'block';
  drawWheel();
}

addBtn.addEventListener('click', () => {
  if (items.length < 10) { items.push({ name: '새 항목', votes: 3 }); renderList(); }
});

// ── WHEEL ──
function drawWheel() {
  const total = items.reduce((s, it) => s + it.votes, 0);
  const cx = 300, cy = 300, r = 290;
  ctx.clearRect(0, 0, 600, 600);

  let startAngle = currentAngle;
  items.forEach((item, i) => {
    const slice = (item.votes / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, startAngle + slice);
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startAngle + slice / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.font = '600 15px Noto Sans KR, sans-serif';
    const label = item.name.length > 10 ? item.name.slice(0, 10) + '…' : item.name;
    ctx.fillText(label, r - 14, 5);
    ctx.restore();

    startAngle += slice;
  });

  // center hub
  ctx.beginPath();
  ctx.arc(cx, cy, 44, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = 'rgba(83,74,183,0.2)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

// ── SPIN ──
function weightedRandom(weights) {
  const r = Math.random();
  let cum = 0;
  for (let i = 0; i < weights.length; i++) {
    cum += weights[i];
    if (r < cum) return i;
  }
  return weights.length - 1;
}

spinBtn.addEventListener('click', () => {
  if (isSpinning || items.length < 2 || monthWinner) return;
  isSpinning = true;
  spinBtn.disabled = true;

  const total = items.reduce((s, it) => s + it.votes, 0);
  const winnerIdx = weightedRandom(items.map(it => it.votes / total));
  const slices = items.map(it => (it.votes / total) * Math.PI * 2);

  const startA = currentAngle; // ← 먼저 선언

  // 포인터는 오른쪽(3시 = angle 0). 휠은 currentAngle 기준으로 그려지므로,
  // 당첨 칸의 중앙이 angle=0에 오려면 currentAngle을 -(cumSlice + sliceHalf)로 만들어야 함.
  let cumSlice = 0;
  for (let i = 0; i < winnerIdx; i++) cumSlice += slices[i];
  const sliceCenter = cumSlice + slices[winnerIdx] / 2;

  const spins = 7 + Math.random() * 4;
  const normalizedCurrent = ((startA % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  const targetFinal = -sliceCenter;
  const targetNorm = ((targetFinal % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  let delta = targetNorm - normalizedCurrent;
  if (delta > 0) delta -= Math.PI * 2; // 항상 반시계 방향(음수)으로
  const targetAngle = delta - spins * Math.PI * 2;

  const duration = 5500;
  const start = performance.now();

  function animate(now) {
    const elapsed = now - start;
    const t = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - t, 4);
    currentAngle = startA + targetAngle * ease;
    drawWheel();
    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      currentAngle = startA + targetAngle;
      drawWheel();
      isSpinning = false;
      setTimeout(() => finishSpin(winnerIdx), 400);
    }
  }
  requestAnimationFrame(animate);
});

async function finishSpin(idx) {
  const item = items[idx];
  const now = new Date();
  const dateStr = `${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()}`;

  monthWinner = { name: item.name, date: dateStr, angle: currentAngle };

  // 결과 팝업
  document.getElementById('result-ribbon').textContent = getMonthLabel() + ' 당첨';
  document.getElementById('result-name').textContent = item.name;
  document.getElementById('result-sub').innerHTML =
    `🛒 <strong>${item.name}</strong>이(가) 당첨됐습니다!<br>수량을 <strong>2배</strong>로 구매해 주세요 🎁`;
  overlay.classList.add('show');
  launchConfetti();

  showWinnerBanner(monthWinner);

  // Gist 저장 (개발자만)
  if (isDev) await saveResultToGist(monthWinner);
}

closeBtn.addEventListener('click', () => {
  overlay.classList.remove('show');
  stopConfetti();
});

// ── CONFETTI ──
let confettiAnim, confettiParticles = [];

function launchConfetti() {
  const cc = document.getElementById('confetti-canvas');
  cc.width = window.innerWidth;
  cc.height = window.innerHeight;
  const cctx = cc.getContext('2d');
  confettiParticles = Array.from({ length: 180 }, () => ({
    x: Math.random() * cc.width,
    y: -30 - Math.random() * 200,
    r: 5 + Math.random() * 9,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    vx: -2.5 + Math.random() * 5,
    vy: 3 + Math.random() * 5,
    angle: Math.random() * Math.PI * 2,
    va: -0.06 + Math.random() * 0.12,
    shape: Math.random() > 0.5 ? 'rect' : 'circle',
  }));
  function draw() {
    cctx.clearRect(0, 0, cc.width, cc.height);
    confettiParticles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.09; p.angle += p.va;
      cctx.save();
      cctx.translate(p.x, p.y);
      cctx.rotate(p.angle);
      cctx.fillStyle = p.color;
      if (p.shape === 'rect') cctx.fillRect(-p.r/2, -p.r/2, p.r, p.r*1.6);
      else { cctx.beginPath(); cctx.arc(0,0,p.r/2,0,Math.PI*2); cctx.fill(); }
      cctx.restore();
    });
    confettiParticles = confettiParticles.filter(p => p.y < cc.height + 40);
    if (confettiParticles.length > 0) confettiAnim = requestAnimationFrame(draw);
  }
  confettiAnim = requestAnimationFrame(draw);
}
function stopConfetti() {
  cancelAnimationFrame(confettiAnim);
  const cc = document.getElementById('confetti-canvas');
  cc.getContext('2d').clearRect(0, 0, cc.width, cc.height);
}

loadGistConfig();
renderList();
loadResultFromGist();
